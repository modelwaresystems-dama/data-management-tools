<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Know Your Value — Growth Architect Console | Modelware Systems International</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#16202b; --ink-soft:#5a6675; --paper:#eef1f4; --card:#ffffff;
  --line:#dde2e8; --line-soft:#eaedf1;
  --accent:#106030; --accent-deep:#0b4422; --accent-soft:#dceee2;
  --gold:#f0a020; --gold-soft:#fcefd6;
  --rust:#e02020; --rust-soft:#fbdcdc;
  --blue:#5060a0; --blue-soft:#e0e3f0;
  --va:#106030; --bnva:#f0a020; --nva:#e02020;
  --shadow:0 1px 2px rgba(22,32,43,.05),0 6px 20px -10px rgba(22,32,43,.22);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Libre Franklin',sans-serif;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;background:linear-gradient(180deg,rgba(16,96,48,.05),transparent 340px)}
#root{position:relative;z-index:1}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,textarea,select{font-family:inherit;font-size:14px;color:var(--ink)}
::-webkit-scrollbar{height:10px;width:10px}::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px}::-webkit-scrollbar-track{background:transparent}
a{color:var(--accent);text-decoration:none}

.app{display:flex;height:100vh}
.sidebar{width:272px;flex-shrink:0;background:linear-gradient(185deg,#0d4f28,#0b3d20);color:#dce8e0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;border-right:1px solid rgba(0,0,0,.15)}
.brand{padding:22px 22px 18px;border-bottom:1px solid rgba(255,255,255,.1)}
.brand-row{display:flex;align-items:center;gap:13px}
.brand-logo{width:46px;height:46px;flex-shrink:0;background:#fff;border-radius:10px;padding:4px;display:flex;align-items:center;justify-content:center}
.brand-logo img{max-width:100%;max-height:100%;display:block}
.brand .co{font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--gold);font-weight:700}
.brand h1{font-family:'IBM Plex Sans',sans-serif;font-size:18px;font-weight:600;line-height:1.15;margin-top:2px;color:#fff}
.brand p{font-size:11.5px;color:#9fb6a8;margin-top:11px;line-height:1.45}
.nav{flex:1;overflow-y:auto;padding:12px 12px 20px}
.nav-group{margin-bottom:12px}
.nav-group .label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#74948a;padding:9px 12px 5px;font-weight:700}
.nav-item{display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:10px 12px;border-radius:7px;color:#bcd0c5;font-size:13px;font-weight:500;transition:background .14s,color .14s}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-item.active{background:var(--accent);color:#fff;box-shadow:inset 3px 0 0 var(--gold)}
.nav-item .ic{width:18px;text-align:center;font-size:14px;flex-shrink:0}
.nav-item .ic.step{display:flex;align-items:center;justify-content:center;background:var(--gold);color:#3a2806;border-radius:50%;width:19px;height:19px;line-height:1;font-size:11px;font-weight:800;font-family:'IBM Plex Sans',sans-serif;flex-shrink:0}
.nav-item.active .ic.step{background:#fff;color:var(--accent-deep)}
.nav-item .ct{margin-left:auto;background:rgba(255,255,255,.13);font-size:10.5px;padding:1px 7px;border-radius:20px;font-weight:600}
.nav-item.active .ct{background:rgba(255,255,255,.24)}
.side-foot{padding:13px 14px;border-top:1px solid rgba(255,255,255,.1);display:flex;flex-direction:column;gap:7px}
.side-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px;border-radius:7px;font-size:12px;font-weight:600;transition:.15s}
.side-btn.primary{background:var(--gold);color:#3a2806}.side-btn.primary:hover{background:#f6b13e}
.side-btn.ghost{background:rgba(255,255,255,.07);color:#cfd6d2}.side-btn.ghost:hover{background:rgba(255,255,255,.13)}
.saved{font-size:10.5px;color:#74948a;text-align:center;padding-top:2px}
.side-foot .ver{font-size:10px;color:rgba(255,255,255,.32);text-align:center;letter-spacing:.02em}
.side-foot .ver b{color:rgba(255,255,255,.55);font-weight:700}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{padding:20px 40px 16px;display:flex;align-items:flex-end;justify-content:space-between;gap:24px;flex-wrap:wrap;background:var(--card);border-bottom:1px solid var(--line)}
.topbar .tt .crumb{font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--accent);font-weight:700}
.topbar .tt h2{font-family:'IBM Plex Sans',sans-serif;font-size:26px;font-weight:600;margin-top:3px;letter-spacing:-.01em}
.topbar .tt p{font-size:13px;color:var(--ink-soft);margin-top:5px;max-width:680px}
.content{padding:22px 40px 60px;flex:1;overflow-y:auto}

.card{background:var(--card);border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow);overflow:hidden}
.card-head{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:14px 20px;border-bottom:1px solid var(--line-soft)}
.card-head h3{font-family:'IBM Plex Sans',sans-serif;font-size:15.5px;font-weight:600}
.card-head .sub{font-size:11.5px;color:var(--ink-soft);margin-top:1px}
.tbl-wrap{overflow-x:auto}
table.grid{width:100%;border-collapse:collapse;font-size:13px}
table.grid th{background:#f3f5f7;text-align:left;padding:10px 12px;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-soft);border-bottom:1px solid var(--line);white-space:nowrap}
table.grid td{padding:10px 12px;border-bottom:1px solid var(--line-soft);vertical-align:top}
table.grid tr:last-child td{border-bottom:none}

.pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.pill-va{background:var(--accent-soft);color:var(--accent-deep)}
.pill-bnva{background:var(--gold-soft);color:#7a5710}
.pill-nva{background:var(--rust-soft);color:#8a3a20}
.tag{display:inline-block;padding:2px 9px;border-radius:6px;font-size:11px;font-weight:600;background:#eef0f3;color:var(--ink-soft)}

.grid-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px;margin-bottom:22px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.stat::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent)}
.stat .ic{font-size:15px;margin-bottom:8px;display:inline-block;opacity:.85}
.stat .val{font-family:'IBM Plex Sans',sans-serif;font-size:28px;font-weight:600;line-height:1;letter-spacing:-.02em}
.stat .lbl{font-size:11.5px;color:var(--ink-soft);margin-top:5px;font-weight:500}
.stat .bar-mini{height:5px;border-radius:3px;background:var(--line-soft);margin-top:11px;overflow:hidden}
.stat .bar-mini span{display:block;height:100%;border-radius:3px}

.two-col{display:grid;grid-template-columns:1.3fr 1fr;gap:18px;align-items:start;margin-bottom:22px}
@media(max-width:1100px){.two-col{grid-template-columns:1fr}}
.bars{padding:18px 20px;display:flex;flex-direction:column;gap:14px}
.bar-row .bar-top{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:5px}
.bar-track{height:10px;background:var(--line-soft);border-radius:5px;overflow:hidden}
.bar-fill{height:100%;border-radius:5px;transition:width .5s ease}

.risk-list{padding:8px 0}
.risk-item{display:flex;gap:12px;padding:12px 20px;border-bottom:1px solid var(--line-soft)}
.risk-item:last-child{border:none}
.risk-dot{width:9px;height:9px;border-radius:50%;margin-top:5px;flex-shrink:0}
.risk-item .rt{font-size:13px;font-weight:600}
.risk-item .rd{font-size:12px;color:var(--ink-soft);margin-top:2px}

.empty{padding:40px;text-align:center;color:var(--ink-soft);font-size:13.5px}
.empty .ei{font-size:32px;margin-bottom:10px;opacity:.5}
.empty .cta{display:inline-flex;align-items:center;gap:8px;margin-top:14px;padding:11px 18px;border-radius:9px;background:var(--accent);color:#fff;font-weight:600;font-size:13px}

.statement-box{padding:20px 24px;background:linear-gradient(135deg,var(--accent-deep),var(--accent));color:#eafaf3;border-radius:10px;font-family:'IBM Plex Sans',sans-serif;font-size:15px;line-height:1.55;font-weight:500;position:relative;border-left:4px solid var(--gold)}
.statement-box .lab{font-family:'Libre Franklin',sans-serif;font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--gold-soft);font-weight:700;margin-bottom:8px}

/* team cards */
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.person{background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:16px 18px;cursor:pointer;transition:border .12s,transform .12s}
.person:hover{border-color:var(--accent);transform:translateY(-1px)}
.person .ph{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.avatar{width:42px;height:42px;border-radius:11px;background:linear-gradient(150deg,#0d4f28,#15814a);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Sans',sans-serif;font-weight:600;font-size:16px;flex-shrink:0}
.person .pn{font-family:'IBM Plex Sans',sans-serif;font-size:15px;font-weight:600;line-height:1.2}
.person .pr{font-size:11.5px;color:var(--ink-soft)}
.mini-mix{display:flex;height:8px;border-radius:5px;overflow:hidden;margin:10px 0 8px}
.mini-mix span{display:block;height:100%}
.person .meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.chip{font-size:11px;font-weight:600;padding:3px 9px;border-radius:7px;background:#eef0f3;color:var(--ink-soft)}
.chip.warn{background:var(--rust-soft);color:#8a3a20}
.chip.ok{background:var(--accent-soft);color:var(--accent-deep)}

/* gauge */
.eff-top{display:grid;grid-template-columns:240px 1fr;gap:22px;align-items:center;margin-bottom:22px}
@media(max-width:820px){.eff-top{grid-template-columns:1fr}}
.gauge{display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px;box-shadow:var(--shadow)}
.gauge .gv{font-family:'IBM Plex Sans',sans-serif;font-size:40px;font-weight:600;line-height:1}
.gauge .gl{font-size:12px;color:var(--ink-soft);margin-top:4px}
.subbars{display:flex;flex-direction:column;gap:13px}
.sb .sb-top{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:5px}
.sb .sb-top .q{color:var(--ink-soft);cursor:help}
.sb-track{height:9px;background:var(--line-soft);border-radius:5px;overflow:hidden}
.sb-fill{height:100%;border-radius:5px;transition:width .5s}

/* form fields */
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;color:var(--ink-soft);margin-bottom:5px}
.mini-input,.f-area,.f-select{border:1px solid var(--line);background:#fff;border-radius:8px;padding:9px 11px;width:100%;font-size:14px}
.f-area{min-height:54px;resize:vertical;line-height:1.5}
.mini-input:focus,.f-area:focus,.f-select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.seg{display:flex;gap:6px}
.seg button{flex:1;padding:8px 0;border-radius:8px;border:1px solid var(--line);background:#fff;font-size:14px;font-weight:600;color:var(--ink-soft);transition:.12s}
.seg button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.seg.gold button.on{background:var(--gold);color:#3a2806;border-color:var(--gold)}

.verdict{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.03em}
.v-align{background:var(--accent-soft);color:var(--accent-deep)}
.v-under{background:var(--gold-soft);color:#7a5710}
.v-over{background:var(--blue-soft);color:#36406e}
.v-blind{background:var(--rust-soft);color:#8a3a20}

/* slide-over */
.sheet-bg{position:fixed;inset:0;background:rgba(20,34,36,.42);backdrop-filter:blur(3px);z-index:160;opacity:0;animation:fade .2s forwards}
@keyframes fade{to{opacity:1}}
.sheet-panel{position:fixed;top:0;right:0;height:100vh;width:560px;max-width:94vw;background:var(--paper);z-index:161;display:flex;flex-direction:column;box-shadow:-18px 0 50px -20px rgba(0,0,0,.4);transform:translateX(40px);opacity:0;animation:slidein .26s cubic-bezier(.2,.9,.3,1) forwards}
@keyframes slidein{to{transform:translateX(0);opacity:1}}
.sp-head{padding:20px 24px 16px;background:linear-gradient(160deg,#0d4f28,#0b3d20);color:#eafaf3;position:relative}
.sp-head .crumb{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700}
.sp-head h3{font-family:'IBM Plex Sans',sans-serif;font-size:20px;font-weight:600;margin-top:3px;color:#fff}
.sp-head p{font-size:12.5px;color:#a8c2b4;margin-top:7px;line-height:1.5}
.sp-body{flex:1;overflow-y:auto;padding:20px 24px 26px}
.sp-foot{padding:14px 24px;border-top:1px solid var(--line);background:var(--card);display:flex;gap:10px;align-items:center}
.sp-foot .spacer{flex:1}
.sp-x{position:absolute;top:16px;right:18px;color:#cfe3d8;font-size:20px;width:32px;height:32px;border-radius:8px}
.sp-x:hover{background:rgba(255,255,255,.12);color:#fff}
.mbtn{padding:9px 18px;border-radius:9px;font-size:13px;font-weight:600}
.mbtn.cancel{background:#eef0f3;color:var(--ink-soft)}
.mbtn.danger{background:var(--rust);color:#fff}
.mbtn.go{background:var(--accent);color:#fff}
.section-h{font-size:11px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;color:var(--accent);margin:18px 0 10px}
.fb-item{background:#fff;border:1px solid var(--line);border-radius:10px;padding:11px 13px;margin-bottom:9px;font-size:12.5px}
.fb-item .fh{display:flex;justify-content:space-between;gap:8px;margin-bottom:4px}
.fb-item .fd{color:var(--ink-soft);font-size:11px}

.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;padding:12px 22px;border-radius:11px;font-size:13px;font-weight:500;box-shadow:0 12px 30px rgba(0,0,0,.3);transition:transform .35s cubic-bezier(.2,.9,.3,1);z-index:200;display:flex;align-items:center;gap:10px}
.toast.show{transform:translateX(-50%) translateY(0)}.toast .ti{color:var(--gold)}
.modal-bg{position:fixed;inset:0;background:rgba(26,43,46,.5);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:170;padding:20px}
.modal{background:var(--card);border-radius:15px;max-width:460px;width:100%;padding:26px;box-shadow:0 30px 60px rgba(0,0,0,.3)}
.modal h3{font-family:'IBM Plex Sans',sans-serif;font-size:21px;margin-bottom:8px}
.modal p{font-size:13.5px;color:var(--ink-soft);margin-bottom:18px}
.modal-acts{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
.help{font-size:12.5px;color:var(--ink-soft);background:var(--gold-soft);border-left:3px solid var(--gold);padding:11px 14px;border-radius:0 9px 9px 0;margin-bottom:18px;line-height:1.55}
.cov-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;padding:16px 20px}
.cov{border:1px solid var(--line);border-radius:9px;padding:11px 13px}
.cov .ct2{font-size:13px;font-weight:600;margin-bottom:6px}
.cov .cb{height:7px;border-radius:4px;background:var(--line-soft);overflow:hidden}
.cov .cb span{display:block;height:100%;border-radius:4px}
.cov .cs{font-size:11px;color:var(--ink-soft);margin-top:6px}
.theme-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:22px 0 10px}
.theme-head .th-name{font-family:'IBM Plex Sans',sans-serif;font-size:16px;font-weight:600;display:flex;align-items:center;gap:10px}
.theme-head .th-id{background:var(--accent-deep);color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px}
.theme-head .th-cov{font-size:12px;color:var(--ink-soft);font-weight:600}
.init-row{display:flex;gap:14px;align-items:flex-start;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:13px 16px;margin-bottom:9px;box-shadow:var(--shadow)}
.init-row.gap{border-style:dashed;border-color:#e6b8b0;background:#fff8f7}
.init-row .id-badge{flex-shrink:0;width:40px;height:40px;border-radius:9px;background:var(--accent-soft);color:var(--accent-deep);display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Sans',sans-serif;font-weight:700;font-size:13px}
.init-row.gap .id-badge{background:var(--rust-soft);color:#8a3a20}
.init-row .ir-main{flex:1;min-width:0}
.init-row .ir-name{font-size:13.5px;font-weight:600;line-height:1.4}
.init-row .ir-meta{font-size:11.5px;color:var(--ink-soft);margin-top:3px}
.init-row .ir-bar{height:6px;border-radius:4px;background:var(--line-soft);overflow:hidden;margin-top:8px;max-width:320px}
.init-row .ir-bar span{display:block;height:100%;border-radius:4px;background:var(--accent)}
.init-row .ir-staff{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.init-row .ir-right{flex-shrink:0;text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.init-row .ir-hrs{font-family:'IBM Plex Sans',sans-serif;font-size:20px;font-weight:600;line-height:1}
.init-row .ir-hrs small{font-size:11px;color:var(--ink-soft);font-weight:500}
.ask-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:12px;box-shadow:var(--shadow)}
.ask-card .ah{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.ask-card .ah .an{font-family:'IBM Plex Sans',sans-serif;font-size:16px;font-weight:600;display:flex;align-items:center;gap:9px}
.ask-card .obj{font-size:13px;color:var(--ink);margin:8px 0 4px}
.ask-card .met{font-size:12px;color:var(--ink-soft)}
.ask-card .inits{display:flex;flex-direction:column;gap:5px;margin-top:11px;padding-top:11px;border-top:1px solid var(--line-soft)}
.ask-card .ini{display:flex;gap:9px;align-items:baseline;font-size:12.5px}
.ask-card .ini .iid{color:var(--accent);font-weight:700;font-size:11px;flex-shrink:0;min-width:26px}
.cov .cs{font-size:11px;color:var(--ink-soft);margin-top:6px}
@media(max-width:760px){.sidebar{display:none}.topbar,.content{padding-left:18px;padding-right:18px}.sheet-panel{width:100vw;max-width:100vw}.eff-top{grid-template-columns:1fr}}
.flyer-frame{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--shadow)}
@media print{ .sidebar,.topbar{display:none!important} .app{height:auto!important} .content{padding:0!important;overflow:visible!important;height:auto!important} .flyer-frame{border:none;box-shadow:none;border-radius:0} body::before{display:none} }
.octree-wrap{overflow-x:auto;padding:8px 4px 18px}
.octree{display:inline-block;min-width:100%}
.octree ul{display:flex;justify-content:center;padding-top:22px;position:relative;margin:0;list-style:none}
.octree ul::before{content:'';position:absolute;top:0;left:50%;width:0;height:22px;border-left:2px solid var(--line)}
.octree>ul{padding-top:0}
.octree>ul::before{display:none}
.octree li{list-style:none;display:flex;flex-direction:column;align-items:center;position:relative;padding:22px 9px 0}
.octree li::before,.octree li::after{content:'';position:absolute;top:0;right:50%;width:50%;height:22px;border-top:2px solid var(--line)}
.octree li::after{right:auto;left:50%}
.octree li:first-child::before{border:0}
.octree li:last-child::after{border:0}
.octree li:only-child{padding-top:0}
.octree li:only-child::before,.octree li:only-child::after{display:none}
.oc-node{background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);min-width:170px;max-width:240px;overflow:hidden;text-align:left}
.oc-root{background:linear-gradient(135deg,var(--accent-deep),var(--accent));color:#fff;border:0;text-align:center;padding:12px 18px;min-width:180px}
.oc-exec{border:1px solid var(--blue-soft);box-shadow:0 0 0 2px var(--blue-soft),var(--shadow)}

  <section id="man-fit">
    <h2>How the two tools fit together</h2>
    <p class="lead">Know Your Value has two halves. You fill in one; your Growth Architect runs the other. They share the same vocabulary, so a single piece of work flows cleanly from your weekly log all the way to a department-level value picture.</p>

    <div class="flow">
      <div class="step"><div class="n">1</div><h4>You log your work</h4><p>In the <b>Workbook</b>, against the company's strategic themes and initiatives.</p></div>
      <div class="arrow">→</div>
      <div class="step"><div class="n">2</div><h4>You export &amp; send</h4><p>One Excel file goes to your Growth Architect each period.</p></div>
      <div class="arrow">→</div>
      <div class="step"><div class="n">3</div><h4>They roll it up</h4><p>The <b>Console</b> aggregates the team by department and initiative.</p></div>
      <div class="arrow">→</div>
      <div class="step"><div class="n">4</div><h4>Feedback returns</h4><p>Stakeholder feedback comes back to you through your Growth Architect.</p></div>
    </div>

    <div class="note"><span class="kase">Who uses what</span>
      <b>The Workbook</b> is for every individual contributor — it's your personal record of value. <b>The Growth Architect Console</b> is for the person who leads a department (the "Growth Architect"); they import everyone's workbooks and manage the team's value picture. You never need the Console to fill in your Workbook.</div>

    <p>Two ideas live in <em>both</em> tools and are the reason they connect. This manual gives each its own section:</p>
    <div class="chips">
      <span class="chip g">Business Value-Add — strategic initiatives by department</span>
      <span class="chip g">Stakeholder Feedback</span>
    </div>
  </section>

  <section id="man-steps">

          <li><span class="sn">3</span><b>Value Question</b> &mdash; pin down the core value you're here to create.</li>

          <li><span class="sn">6</span><b>Project Scoring</b> &mdash; score your projects for the value and alignment they carry.</li>

  <section id="man-concepts">
    <h2>Shared concepts &amp; vocabulary</h2>
    <p>A handful of terms mean the same thing in both tools. Getting these straight makes everything else click.</p>

    <h3>Strategic themes &amp; Data Initiatives</h3>
    <p>The company expresses what it values as six <b>strategic themes</b>, each broken into a small set of <b>Data Initiatives</b>. Work tied to one of these initiatives is what the framework calls <b>Business Value-Add</b> — value the business has explicitly asked for.</p>
    <div class="chips">
      <span class="chip">Data Governance &amp; Compliance</span>
      <span class="chip">Data Quality &amp; Master Data</span>
      <span class="chip">Advanced Analytics &amp; AI</span>
      <span class="chip">Data Platform &amp; Architecture</span>
      <span class="chip">Data Fluency &amp; Culture</span>
      <span class="chip">Self-Service &amp; Democratization</span>
    </div>

    <h3>The work-mix: VA / BNVA / NVA</h3>
    <p>Every activity you log is classified into one of three categories — <em>your own</em> view of its value:</p>
    <div class="mixbar"><span style="width:55%;background:var(--va)">Value-Adding (VA)</span><span style="width:30%;background:var(--bnva)">Business Non-Value-Adding (BNVA)</span><span style="width:15%;background:var(--nva)">NVA</span></div>
    <ul>
      <li><b>VA — Value-Adding:</b> work that directly creates value the business wants.</li>
      <li><b>BNVA — Business Non-Value-Adding:</b> necessary overhead (meetings, admin) that keeps things running but isn't itself the value.</li>
      <li><b>NVA — Non-Value-Adding:</b> rework, waste, things that could be removed.</li>
    </ul>

    <h3>VA-aligned — the headline metric</h3>
    <div class="tip"><span class="kase">Definition</span>
      <b>VA-aligned</b> = the share of your hours that are <em>both</em> classified <b>VA</b> <em>and</em> sit on a strategic Data Initiative. It is never higher than your VA figure, and it drops when value-adding effort isn't pointed at a company initiative. That gap is the useful signal — value you're creating that the business hasn't (yet) asked for.</div>
    <p>This is different from the raw VA percentage of your work-mix: a task can be on a strategic initiative but classified BNVA (so it counts toward initiative <em>coverage</em> but not toward VA-aligned).</p>

    <h3>Roles &amp; departments (the matrix)</h3>
    <p>People rarely sit in exactly one box. In KYV a person can be a <b>Team member</b> of several departments, the <b>Growth Architect</b> (lead) of one, and an <b>Executive</b> who oversees others — all at once. Because one person's work can span several of these hats, each activity you log carries a <b>Role</b> so it can be attributed to the right department. (See <a href="#man-x-bva">Crossover 1</a>.)</p>

    <h3>Stakeholders</h3>
    <p>A <b>stakeholder</b> is whoever relies on the value of a given piece of work — the people who would notice if it stopped. Naming them per initiative is what makes feedback meaningful. (See <a href="#man-x-feedback">Crossover 2</a>.)</p>
  </section>

  <!-- ================= WORKBOOK ================= -->
  <section id="man-wb-what">
    <h2><span class="num">Part 1</span>The KYV Workbook</h2>
    <p class="lead">Your personal, single-file record of the value you create. Open the HTML file in any browser — your entries are saved automatically in that browser, and you export an Excel file to share.</p>
    <div class="note"><span class="kase">No install, no account</span>It's one self-contained file. Work is saved in your own browser as you type; nothing is uploaded anywhere until you choose to export and send the Excel file.</div>
  </section>

  <section id="man-wb-sections">
    <h2>Section by section</h2>
    <p class="lead" style="margin-top:-2px">Every screen in the Workbook now opens with a <b>"How to complete this screen"</b> guide — a numbered, field-by-field walkthrough with a worked example of what a good record looks like. The jump buttons below take you straight to each screen; expand that guide at the top of the page as you fill it in.</p>

    <div class="wb-group">Position</div>

    <h3 id="man-step-whereAmINow">Where Am I Now</h3>
    <div class="man-jumps"><button class="man-jump" data-wb="whereAmINow">▸ Open “Where Am I Now” in the Workbook</button></div>
    <p>Anchor the value you deliver today, who depends on it, and the proof.</p>
    <p class="enter"><b>What to enter</b></p>
    <ul>
      <li><b>Today, I am mainly valued for</b> — The outcome you're known for — phrase it as value, not a task. <span class="eg">e.g. Translating data governance delivery into executive-ready outcomes and evidence</span></li>
      <li><b>Who relies on this value</b> — The people or teams who depend on this value. <span class="eg">e.g. CEO / EXCO; Risk &amp; Compliance; Business Unit Heads; Data Office</span></li>
      <li><b>Progression</b> — Is this value growing, plateauing, or declining? <span class="eg">e.g. Growing</span></li>
      <li><b>Evidence (last 30 days)</b> — Concrete proof from the last 30 days. <span class="eg">e.g. Delivered a data maturity baseline used in Q2 budget planning</span></li>
      <li><b>Next step (7 days)</b> — One small step you can take in the next 7 days. <span class="eg">e.g. Publish a 1-page Value Statement + Evidence for the EXCO sponsor</span></li>
    </ul>
    <p class="aimline"><em>Aim for: Specific, outcome-framed and backed by recent evidence.</em></p>

    <h3 id="man-step-spotWinWin">Spot the Win-Win</h3>
    <div class="man-jumps"><button class="man-jump" data-wb="spotWinWin">▸ Open “Spot the Win-Win” in the Workbook</button></div>
    <p>Map each activity against what the organisation really needs and what grows you next.</p>
    <p class="enter"><b>What to enter</b></p>
    <ul>
      <li><b>Current Role</b> — The role/hat you wear for this activity. <span class="eg">e.g. CDO</span></li>
      <li><b>Activity</b> — The specific activity or workstream. <span class="eg">e.g. Data Quality programme – critical data elements</span></li>
      <li><b>RACI</b> — Your role: Responsible, Accountable, Consulted, or Informed. <span class="eg">e.g. R</span></li>
      <li><b>What the org REALLY needs</b> — What the organisation actually needs from this. <span class="eg">e.g. Reduce rework in downstream reporting; improve trust</span></li>
      <li><b>What I need to grow next</b> — The capability this builds toward your next step. <span class="eg">e.g. Deepen Data Quality mastery; publish an executive DQ guide</span></li>
      <li><b>Still relevant?</b> — Is this still worth your time? <span class="eg">e.g. Yes</span></li>
      <li><b>Strategic response</b> — If not fully relevant: renegotiate, redesign, or relocate it. <span class="eg">e.g. Not Applicable</span></li>
      <li><b>Evidence / Proof</b> — Proof this is delivering value. <span class="eg">e.g. DQ scorecard baseline + monthly trend</span></li>
    </ul>
    <p class="aimline"><em>Aim for: Honest about relevance — every row carries proof.</em></p>

    <h3 id="man-step-valueQuestion">Value Question</h3>
    <div class="man-jumps"><button class="man-jump" data-wb="valueQuestion">▸ Open “Value Question” in the Workbook</button></div>
    <p>For each initiative, decide whether your involvement actually changes the outcome.</p>
    <p class="enter"><b>What to enter</b></p>
    <ul>
      <li><b>Initiative</b> — The initiative you're weighing in on. <span class="eg">e.g. Data Quality scorecard + remediation backlog</span></li>
      <li><b>Committed</b> — Are you currently committed to it? (Y/N) <span class="eg">e.g. Y</span></li>
      <li><b>Who Benefits</b> — Who gains if this succeeds. <span class="eg">e.g. Executive committee; Finance; Analytics teams</span></li>
      <li><b>How Do They Benefit</b> — The benefit they actually feel. <span class="eg">e.g. Fewer decision disputes; reduced rework; faster reporting</span></li>
      <li><b>What Changes because I'm Involved</b> — What changes specifically because YOU are involved. <span class="eg">e.g. Critical data elements measured monthly and tracked to owners</span></li>
      <li><b>Go / No-Go</b> — Your call: Go, Hold, or No-Go. <span class="eg">e.g. Go</span></li>
      <li><b>Metric / Delta</b> — The measure that proves the change. <span class="eg">e.g. Rework hours ↓; data defects ↓</span></li>
      <li><b>Next step to clarify</b> — Next step to confirm the value. <span class="eg">e.g. Agree top 10 CDEs and DQ thresholds with owners</span></li>
    </ul>
    <p class="aimline"><em>Aim for: A brutally honest Go / Hold / No-Go with a measurable delta.</em></p>

    <div class="wb-group">Work Analysis</div>

    <h3 id="man-step-classifyWork">Classify Your Work</h3>
    <div class="man-jumps"><button class="man-jump" data-wb="classifyWork">▸ Open “Classify Your Work” in the Workbook</button></div>
    <p>Tag where your month goes — no judgement, only clarity.</p>
    <p class="enter"><b>What to enter</b></p>
    <ul>
      <li><b>Category</b> — Value-Adding, Business-Non-Value-Adding, or Non-Value-Adding. <span class="eg">e.g. VA</span></li>
      <li><b>Activity</b> — The activity you're classifying. <span class="eg">e.g. Publish DMBOK-aligned Data Quality playbook</span></li>
      <li><b>% of month</b> — Roughly what % of your month this takes. <span class="eg">e.g. 15</span></li>
      <li><b>Action strategy</b> — What you'll do about it: add more, automate, reduce, eliminate. <span class="eg">e.g. Add more</span></li>
      <li><b>Notes</b> — Why it falls in this category. <span class="eg">e.g. Reusable guidance; raises organisational capability</span></li>
    </ul>
    <p class="aimline"><em>Aim for: Percentages across all rows roughly sum to 100%.</em></p>
    <div class="note"><span class="kase">Note</span>Percentages across your rows should roughly add up to 100% of your month — this is what drives your <b>Month Completion Level</b> on the dashboard.</div>

    <h3 id="man-step-workAudit">Work Audit <span class="chip g" style="font-size:11px">most important</span></h3>
    <div class="man-jumps"><button class="man-jump" data-wb="workAudit">▸ Open “Work Audit” in the Workbook</button></div>
    <p>Log weekly hours by activity. VA hours tied to a theme count as 'aligned'.</p>
    <p class="enter"><b>What to enter</b></p>
    <ul>
      <li><b>Date (Week)</b> — The week or date. <span class="eg">e.g. Week 1</span></li>
      <li><b>Role</b> &mdash; The hat this work was done under &mdash; pick from your roles list (a dropdown). The Console uses it to attribute these hours to a department. <span class="eg">e.g. Advisory</span></li>
      <li><b>Initiative</b> — Pick the strategic initiative this work serves — the theme fills in automatically. <span class="eg">e.g. Deploy data quality monitoring &amp; cleansing processes</span></li>
      <li><b>Strategic Theme</b> — Fills in from the initiative you pick. <span class="eg">e.g. Data Quality &amp; Master Data</span></li>
      <li><b>Activity Description</b> — What you actually did. <span class="eg">e.g. Cleaned customer data for CRM</span></li>
      <li><b>Category</b> — VA / BNVA / NVA. <span class="eg">e.g. VA</span></li>
      <li><b>Time Spent (hrs)</b> — Hours spent. <span class="eg">e.g. 3</span></li>
      <li><b>N/A Reason</b> — If BNVA/NVA, why it was needed. <span class="eg">e.g. Operational overhead</span></li>
      <li><b>Action Strategy</b> — What to do about it. <span class="eg">e.g. Expand – improves accuracy</span></li>
    </ul>
    <p class="aimline"><em>Aim for: Each row links to an initiative so hours roll up to objectives.</em></p>
    <div class="note"><span class="kase">Note</span>This is what the Console rolls up. Each row’s <b>Role</b> decides which department the hours count toward, and VA hours tied to an initiative become <b>Business Value-Add</b>. Set the available roles &mdash; or load the list your Growth Architect sends &mdash; in the <b>&#9672; Roles</b> bar at the top of this screen (<b>Import roles list</b>).</div>

    <h3 id="man-step-projectScoring">Project Scoring</h3>
    <div class="man-jumps"><button class="man-jump" data-wb="projectScoring">▸ Open “Project Scoring” in the Workbook</button></div>
    <p>Score initiatives on impact, urgency, growth and effort. Value and ROI compute for you.</p>
    <p class="enter"><b>What to enter</b></p>
    <ul>
      <li><b>Initiative</b> — The project's friendly name. <span class="eg">e.g. Deploy Self-Service BI Portal (Power BI)</span></li>
      <li><b>Strategic Initiative (link)</b> — The strategic initiative it delivers — the theme fills in automatically. <span class="eg">e.g. Deploy self-service BI tools with certified data sources</span></li>
      <li><b>Strategic Theme</b> — Fills in from the strategic initiative. <span class="eg">e.g. Self-Service &amp; Democratization</span></li>
      <li><b>Impact (1-5)</b> — Business impact, 1 (low) to 5 (high). <span class="eg">e.g. 4</span></li>
      <li><b>Urgency (1-5)</b> — How urgent, 1 to 5. <span class="eg">e.g. 4</span></li>
      <li><b>Growth (1-5)</b> — How much it grows you, 1 to 5. <span class="eg">e.g. 3</span></li>
      <li><b>Effort (1-5)</b> — Effort required, 1 (easy) to 5 (hard). <span class="eg">e.g. 2</span></li>
    </ul>
    <p class="aimline"><em>Aim for: Linked to a strategic initiative; scores are honest 1–5.</em></p>

    <div class="wb-group">Direction</div>

    <h3 id="man-step-threeYearGoal">2–3 Year Goal</h3>
    <div class="man-jumps"><button class="man-jump" data-wb="threeYearGoal">▸ Open “2–3 Year Goal” in the Workbook</button></div>
    <p>Define the destination — the value statement assembles itself from your answers.</p>
    <p class="enter"><b>What to enter</b></p>
    <ul>
      <li><b>Beneficiary</b> — Who you'll deliver value to. <span class="eg">e.g. Enterprise leadership / EXCO and the Data Community</span></li>
      <li><b>Useful Change</b> — The useful change you'll create for them. <span class="eg">e.g. Consistent, measurable Data Management outcomes</span></li>
      <li><b>Capability / Action</b> — How you'll do it — the capability you'll build. <span class="eg">e.g. Publish domain playbooks (DQ, MDM, Modelling) and coach teams</span></li>
      <li><b>Metric / Evidence</b> — How success will be measured. <span class="eg">e.g. Adoption ↑; audit findings ↓; rework ↓</span></li>
    </ul>
    <p class="aimline"><em>Aim for: Beneficiary, change, capability and metric are all concrete.</em></p>

    <h3 id="man-step-careerMenu">Career Menu</h3>
    <div class="man-jumps"><button class="man-jump" data-wb="careerMenu">▸ Open “Career Menu” in the Workbook</button></div>
    <p>Choose deliberately what to increase, reduce, or experiment with.</p>
    <p class="enter"><b>What to enter</b></p>
    <ul>
      <li><b>Menu option</b> — The lever you're considering. <span class="eg">e.g. Deepen expertise</span></li>
      <li><b>Choose as</b> — Increase, Reduce, or Experiment. <span class="eg">e.g. Increase</span></li>
      <li><b>Why (1 sentence)</b> — One sentence on why. <span class="eg">e.g. Builds domain-leadership credibility via published artefacts</span></li>
      <li><b>Evidence / metric</b> — How you'll know it's working. <span class="eg">e.g. Playbooks published; adoption by projects</span></li>
      <li><b>First step (7 days)</b> — First step in the next 7 days. <span class="eg">e.g. Draft DQ playbook outline; pilot with one domain</span></li>
      <li><b>Trade-off accepted</b> — What you accept giving up. <span class="eg">e.g. Less time on ad-hoc reporting and low-value meetings</span></li>
    </ul>
    <p class="aimline"><em>Aim for: Each choice names the trade-off you accept.</em></p>

    <h3 id="man-step-winWinMatrix">Win-Win Matrix</h3>
    <div class="man-jumps"><button class="man-jump" data-wb="winWinMatrix">▸ Open “Win-Win Matrix” in the Workbook</button></div>
    <p>Plot each activity on business value × personal value. Aim for the top-right.</p>
    <p class="enter"><b>What to enter</b></p>
    <ul>
      <li><b>Choice / Activity</b> — The choice or activity. <span class="eg">e.g. Publish DQ measurement playbook</span></li>
      <li><b>Business Value</b> — Value to the business: Low / Med / High. <span class="eg">e.g. High</span></li>
      <li><b>Personal Value</b> — Value to your growth: Low / Med / High. <span class="eg">e.g. High</span></li>
      <li><b>Move toward High/High</b> — How to move it toward High / High. <span class="eg">e.g. Attach to an active DQ initiative; report monthly gains</span></li>
      <li><b>Who must notice</b> — Who must notice for it to count. <span class="eg">e.g. EXCO sponsor; Head of Risk; Domain Heads</span></li>
      <li><b>Persuasive evidence</b> — Persuasive proof. <span class="eg">e.g. Monthly DQ trend; reduced rework hours</span></li>
    </ul>
    <p class="aimline"><em>Aim for: Each row names who must notice and the persuasive proof.</em></p>

    <h3 id="man-step-ninetyDayPlan">90-Day Plan</h3>
    <div class="man-jumps"><button class="man-jump" data-wb="ninetyDayPlan">▸ Open “90-Day Plan” in the Workbook</button></div>
    <p>Turn direction into dated commitments with owners and metrics.</p>
    <p class="enter"><b>What to enter</b></p>
    <ul>
      <li><b>Strategic Initiative</b> — Pick the strategic initiative this serves — links your plan to the business objectives. <span class="eg">e.g. Deploy data quality monitoring &amp; cleansing processes</span></li>
      <li><b>Action</b> — The concrete action you'll take. <span class="eg">e.g. Publish v1 of the DQ measurement playbook</span></li>
      <li><b>Type</b> — VA expand / BNVA reduce / NVA stop / Stakeholder engage. <span class="eg">e.g. VA expand</span></li>
      <li><b>Metric / evidence</b> — What proves it's done. <span class="eg">e.g. Playbook published; 1 pilot domain onboarded</span></li>
      <li><b>First step + date</b> — First step + a date. <span class="eg">e.g. Outline sections (Week 1); publish v1 by 2026-04-21</span></li>
      <li><b>Stakeholder</b> — Who needs to be engaged. <span class="eg">e.g. Head of Risk; Domain Owners; EXCO sponsor</span></li>
      <li><b>Risks / mitigation</b> — Main risk and how you'll mitigate it. <span class="eg">e.g. Scope creep → limit v1 to top 10 CDEs</span></li>
    </ul>
    <p class="aimline"><em>Aim for: Each action links to a strategic initiative and has a date.</em></p>

    <div class="wb-group">Strategy</div>

    <h3 id="man-step-dataAIStrategy">Data &amp; AI Strategy</h3>
    <div class="man-jumps"><button class="man-jump" data-wb="dataAIStrategy">▸ Open “Data &amp; AI Strategy” in the Workbook</button></div>
    <p>The strategic pillars your work plugs into — these are the business objectives.</p>
    <p class="enter"><b>What to enter</b></p>
    <ul>
      <li><b>Strategic Theme / Pillar</b> — The strategic theme / pillar. <span class="eg">e.g. Data Quality &amp; Master Data</span></li>
      <li><b>Strategic Objective</b> — The objective for this theme. <span class="eg">e.g. Achieve trusted, accurate data (95%+) for better decisions</span></li>
      <li><b>Key Initiatives / Capabilities</b> — Key initiatives / capabilities under it. <span class="eg">e.g. MDM; data quality monitoring; DQ scorecards</span></li>
      <li><b>Metric / Success Indicator</b> — Success indicator. <span class="eg">e.g. Data quality index; issues resolved per month</span></li>
    </ul>
    <p class="aimline"><em>Aim for: Each theme has a clear objective and a success metric.</em></p>
    <div class="note"><span class="kase">Note</span>These are the company’s objectives — the themes every initiative sits under. Define them before you start linking work to initiatives.</div>

    <h3 id="man-step-strategicInitiatives">Strategic Initiatives</h3>
    <div class="man-jumps"><button class="man-jump" data-wb="strategicInitiatives">▸ Open “Strategic Initiatives” in the Workbook</button></div>
    <p>The master list of initiatives — the menu every linked dropdown draws from.</p>
    <p class="enter"><b>What to enter</b></p>
    <ul>
      <li><b>Theme ID</b> — Numeric ID of the parent theme. <span class="eg">e.g. 2</span></li>
      <li><b>Strategic Theme</b> — Parent strategic theme. <span class="eg">e.g. Data Quality &amp; Master Data</span></li>
      <li><b>Initiative ID</b> — ID such as 2.1. <span class="eg">e.g. 2.2</span></li>
      <li><b>Initiative</b> — The initiative name — this is what appears in dropdowns elsewhere. <span class="eg">e.g. Deploy data quality monitoring &amp; cleansing processes</span></li>
    </ul>
    <p class="aimline"><em>Aim for: Every initiative has a parent theme and an ID.</em></p>
    <div class="note"><span class="kase">Note</span>Set this up early. The initiative dropdowns on <b>Work Audit</b>, <b>Project Scoring</b>, the <b>90-Day Plan</b> and the <b>Value Tracking Log</b> all draw from this master list.</div>

    <div class="wb-group">Value Tracking</div>

    <h3 id="man-step-valueTrackingLog">Value Tracking Log</h3>
    <div class="man-jumps"><button class="man-jump" data-wb="valueTrackingLog">▸ Open “Value Tracking Log” in the Workbook</button></div>
    <p>The evidence ledger — baseline vs post for every initiative, with the Δ computed.</p>
    <p class="enter"><b>What to enter</b></p>
    <ul>
      <li><b>Project Initiative</b> — Project initiative delivered. <span class="eg">e.g. Migrate Core Data Infrastructure to Cloud</span></li>
      <li><b>Strategic Initiative (link)</b> — The strategic initiative it serves. <span class="eg">e.g. Implement cloud data lake/warehouse and integration pipelines</span></li>
      <li><b>Completion Date</b> — When it completed (YYYY-MM-DD). <span class="eg">e.g. 2025-11-01</span></li>
      <li><b>Status</b> — Not Started / In Progress / Completed / On Hold. <span class="eg">e.g. Completed</span></li>
      <li><b>Stakeholder(s)</b> — Who benefited. <span class="eg">e.g. BI Team; Data Team; All Analysts</span></li>
      <li><b>Useful Change Delivered</b> — The useful change delivered. <span class="eg">e.g. Warehouse migrated to cloud; faster, cheaper queries</span></li>
      <li><b>Metric / KPI</b> — The KPI measured. <span class="eg">e.g. Average BI query runtime (seconds)</span></li>
      <li><b>Unit</b> — Unit for baseline/post. <span class="eg">e.g. Seconds / Query</span></li>
      <li><b>Baseline</b> — Value before. <span class="eg">e.g. 8</span></li>
      <li><b>Post</b> — Value after. <span class="eg">e.g. 3</span></li>
      <li><b>Est. Annual Value</b> — Estimated annual value. <span class="eg">e.g. 1,200 analyst hours/yr saved; $80K IT savings</span></li>
      <li><b>Evidence / Notes</b> — Where the proof lives. <span class="eg">e.g. Query logs show 60% faster report generation</span></li>
    </ul>
    <p class="aimline"><em>Aim for: Real numbers and a clear unit of measure.</em></p>

    <h3 id="man-step-projectFeedback">Project Feedback</h3>
    <div class="man-jumps"><button class="man-jump" data-wb="projectFeedback">▸ Open “Project Feedback” in the Workbook</button></div>
    <p>Capture stakeholder feedback and chase every follow-up to done.</p>
    <p class="enter"><b>What to enter</b></p>
    <ul>
      <li><b>Feedback ID</b> — A short reference. <span class="eg">e.g. FBK-001</span></li>
      <li><b>Date</b> — Date received (YYYY-MM-DD). <span class="eg">e.g. 2026-04-01</span></li>
      <li><b>Initiative Name</b> — Initiative the feedback is about. <span class="eg">e.g. Deploy Data Quality Monitoring &amp; Cleansing</span></li>
      <li><b>Strategic Initiative (link)</b> — The strategic initiative it relates to. <span class="eg">e.g. Deploy data quality monitoring &amp; cleansing processes</span></li>
      <li><b>Stakeholder</b> — Who gave the feedback. <span class="eg">e.g. Jane Smith</span></li>
      <li><b>Role / Dept</b> — Their role / department. <span class="eg">e.g. Finance</span></li>
      <li><b>Type</b> — Survey / Verbal / Email / Workshop. <span class="eg">e.g. Survey</span></li>
      <li><b>Score (1-5)</b> — Rating, 1 to 5. <span class="eg">e.g. 4</span></li>
      <li><b>Comments / Notes</b> — What they said. <span class="eg">e.g. Accuracy improved, but dashboards refresh slowly</span></li>
      <li><b>Follow-Up Action</b> — The action you'll take. <span class="eg">e.g. Review ETL schedule with BI team</span></li>
      <li><b>Status</b> — Not Started / In Progress / Completed. <span class="eg">e.g. In Progress</span></li>
    </ul>
    <p class="aimline"><em>Aim for: Real quotes; every follow-up has a status.</em></p>
    <div class="note"><span class="kase">Note</span>This is what surfaces in the Console’s <b>Stakeholder Feedback</b> view, aggregated by initiative and by role/department.</div>

  </section>

  <section id="man-wb-export">
    <h2>Exporting &amp; sending</h2>
    <ol>
      <li>Fill in the sections above — at minimum, the <b>Work Audit</b> with Role, Initiative and Category on every row.</li>
      <li>Use the workbook's <b>Export to Excel</b> button to produce a single <code>.xlsx</code> file.</li>
      <li>Send that file to your Growth Architect each period (typically monthly).</li>
    </ol>
    <div class="tip"><span class="kase">Tip</span>Export a fresh file each month. The Console keeps a versioned history per person, so month-on-month change is tracked automatically — don't overwrite; just send the new one.</div>
  </section>

  <!-- ================= CONSOLE ================= -->
  <section id="man-ga-what">
    <h2><span class="num">Part 2</span>The Growth Architect Console</h2>
    <p class="lead">The manager-side companion. Import the team's workbooks and the Console rolls them up into a department value picture, an organisation chart, initiative coverage, and a stakeholder-feedback loop.</p>
  </section>

  <section id="man-ga-import">
    <h2>Importing workbooks</h2>
    <ol>
      <li>Open the Console and use <b>Import staff workbooks</b>.</li>
      <li>Drop in the <code>.xlsx</code> files your team exported. The Console reads them tolerantly — it matches columns by meaning, so both the current app's exports and older templates work.</li>
      <li>Each import is stored as a <b>monthly snapshot</b> against that person, building a versioned history rather than overwriting the last one.</li>
    </ol>
    <div class="note"><span class="kase">Set your department first</span>In <b>Settings → Department &amp; profile</b>, set the department you lead. The Department Overview and "My Effectiveness" are scoped to it.</div>
  </section>

  <section id="man-ga-views">
    <h2>The views</h2>
    <div class="man-jumps"><button class="man-jump ga" data-ga="overview">▸ Department Overview</button><button class="man-jump ga" data-ga="orgchart">▸ Org Chart</button><button class="man-jump ga" data-ga="initiatives">▸ Data Initiatives</button><button class="man-jump ga" data-ga="stakefb">▸ Stakeholder Feedback</button></div>
    <table>
      <tr><th>View</th><th>What it shows</th></tr>
      <tr><td><b>Department Overview</b></td><td>Your department's combined picture — team size, Business Value-Add, value delivered, initiative coverage, work-mix and risk flags. Scoped to your department and to the work tagged to that department's role.</td></tr>
      <tr><td><b>Team &amp; Workbooks</b></td><td>Each person as a card, with their roles, value statement and latest metrics. Import and manage snapshots here.</td></tr>
      <tr><td><b>Organisation</b></td><td>A department scorecard — people per department (clickable), average VA-aligned and Business VA.</td></tr>
      <tr><td><b>Org Chart</b></td><td>The matrix tree: executives, departments, the Growth Architect of each, and members — with a per-department VA chip. One person can appear in several departments (a "◈ matrix" tag).</td></tr>
      <tr><td><b>Company Value Asks</b></td><td>What the business is asking for, and how well it's covered.</td></tr>
      <tr><td><b>Data Initiatives · Alignment</b></td><td>Coverage of each strategic Data Initiative across the team.</td></tr>
      <tr><td><b>Stakeholder Feedback</b></td><td>Feedback aggregated by initiative and by role/department. See <a href="#man-x-feedback">Crossover 2</a>.</td></tr>
      <tr><td><b>Change Over Time</b></td><td>Month-on-month trends from the versioned snapshots.</td></tr>
      <tr><td><b>My Effectiveness</b></td><td>How well you, as Growth Architect, understand the company's asks and translate them into your department's work.</td></tr>
      <tr><td><b>Feedback I've Given</b></td><td>A log of the value feedback you've recorded for your people.</td></tr>
    </table>
  </section>

  <section id="man-ga-matrix">
    <h2>Roles &amp; departments</h2>
    <p>Open anyone's card to manage their place in the organisation. A person can hold several positions at once — tick every department that applies in each section:</p>
    <ul>
      <li><b>Member of</b> — departments they're a team member of.</li>
      <li><b>Leads as Growth Architect</b> — the department(s) they lead.</li>
      <li><b>Oversees as Executive</b> — departments they oversee.</li>
    </ul>
    <p>Changes save automatically and the Org Chart refreshes when you close the panel. You can also give each person a <b>title per department</b> (e.g. "Specialist Trainer" in Training, "Advisory Principal" in Advisory), and the chart shows the right title for the department you're viewing.</p>
    <div class="tip"><span class="kase">Feedback is separate</span>The card keeps role management and feedback apart: roles save as you tick, while value feedback has its own "Add feedback" button so the two can't be confused.</div>
    <div class="note"><span class="kase">Publish roles to the team</span>From the <b>Data Initiatives</b> view, use <b>Export roles list</b> to download a small Excel of your departments. Each person imports it in their Workbook on the <b>Work Audit</b> screen &mdash; in the <b>&#9672; Roles</b> bar at the top, click <b>Import roles list</b>. Their <b>Role</b> field then becomes a dropdown of your departments, so hours come back already lined up with how you split work, with far fewer <b>Unallocated</b> rows to map.</div>
  </section>

  <!-- ================= CROSSOVER 1 ================= -->
  <section id="man-x-bva">
    <h2><span class="num">Crossover 1</span>Business Value-Add — Strategic Initiatives by Department</h2>
    <p class="lead">This is the spine that connects the two tools. You tag work to an initiative <em>and</em> a role in the Workbook; the Console maps the role to a department and reports each department's value separately — so no department claims work that was really done under another hat.</p>
    <div class="man-jumps"><button class="man-jump" data-wb="workAudit">▸ Tag work in the Work Audit</button><button class="man-jump ga" data-ga="initiatives">▸ See Data Initiatives coverage</button></div>

    <div class="flow">
      <div class="step"><div class="n">1</div><h4>Tag the work</h4><p>In the Work Audit, give each row an <b>Initiative</b> (what business value it serves) and a <b>Role</b> (which hat you wore).</p></div>
      <div class="arrow">→</div>
      <div class="step"><div class="n">2</div><h4>Map role → dept</h4><p>The Console maps each role to a department — automatically when the role matches a department name, a per-department title, or a clear position.</p></div>
      <div class="arrow">→</div>
      <div class="step"><div class="n">3</div><h4>Report per department</h4><p>Each department's hours, VA-aligned %, work-mix and initiative coverage are computed from <em>only</em> its slice of your audit.</p></div>
    </div>

    <h3>Two views of the same work</h3>
    <div class="two">
      <div class="col">
        <h4><span class="tagw wb">Workbook</span>What you do</h4>
        <ul>
          <li>Pick the <b>Initiative</b> your activity supports — that's what makes it Business Value-Add.</li>
          <li>Set the <b>Role</b> for the row so the right department gets credit.</li>
          <li>Classify it VA / BNVA / NVA and log the hours.</li>
        </ul>
        <p style="margin-bottom:0;color:var(--soft);font-size:13.5px">You're answering: <em>"What business goal did this serve, and under which of my hats?"</em></p>
      </div>
      <div class="col">
        <h4><span class="tagw ga">Console</span>What the Growth Architect sees</h4>
        <ul>
          <li>Your work split across departments — open your card to see the <b>Work split across roles</b> table.</li>
          <li>Each department's <b>VA-aligned %</b>, hours and work-mix from its slice only.</li>
          <li>Which strategic initiatives the department is actually covering.</li>
        </ul>
        <p style="margin-bottom:0;color:var(--soft);font-size:13.5px">They're answering: <em>"Is my department's effort pointed at what the business asked for?"</em></p>
      </div>
    </div>

    <h3>How a role is matched to a department</h3>
    <p>When the Console reads your Role values, it resolves each to a department in this order:</p>
    <ol>
      <li><b>A manual mapping</b> the Growth Architect has set for you (always wins).</li>
      <li><b>A department name</b> match — role <code>Advisory</code> → the Advisory department.</li>
      <li><b>A per-department title</b> match — role <code>LMS Integration</code> → the department where that's your title.</li>
      <li><b>A position name</b> when it's unambiguous — <code>Growth Architect</code> maps to the one department you lead; <code>Executive</code> / <code>Team member</code> likewise when there's only one.</li>
    </ol>
    <p>Anything that can't be resolved is shown as <b>Unallocated</b> (in red) and the Growth Architect maps it once, in the <b>Work split across roles</b> editor on your card. Unallocated hours don't count toward any department until mapped.</p>

    <div class="cross"><span class="kase">For the person filling the Workbook</span>The cleanest results come from using a consistent Role label that matches how you're set up in the team — usually the department name or your title there. If in doubt, use the department name (<code>Advisory</code>, <code>Training</code>) rather than a free-text job title.</div>

    <div class="note"><span class="kase">What splits and what doesn't (today)</span>Hours, VA-aligned %, work-mix and initiative coverage split cleanly by role. "Value delivered" and "Quick wins" (from the Value Tracking Log and Project Scoring) are reported per person for now, because those sheets don't yet carry a Role column.</div>
  </section>

  <!-- ================= CROSSOVER 2 ================= -->
  <section id="man-x-feedback">
    <h2><span class="num">Crossover 2</span>Stakeholder Feedback</h2>
    <p class="lead">Value is only real if someone relies on it. KYV closes the loop: you name who depends on your work per initiative; stakeholders' feedback is captured against those initiatives; and it comes back to you through your Growth Architect.</p>
    <div class="man-jumps"><button class="man-jump" data-wb="projectFeedback">▸ Open Project Feedback</button><button class="man-jump ga" data-ga="stakefb">▸ Open Stakeholder Feedback</button></div>

    <div class="flow">
      <div class="step"><div class="n">1</div><h4>Name stakeholders</h4><p>In the Workbook, record who relies on each piece of value, per initiative.</p></div>
      <div class="arrow">→</div>
      <div class="step"><div class="n">2</div><h4>Feedback captured</h4><p>The Growth Architect records value feedback per initiative — a 1–5 score, comments and a follow-up action.</p></div>
      <div class="arrow">→</div>
      <div class="step"><div class="n">3</div><h4>Aggregated</h4><p>The Console rolls feedback up by initiative and by role/department.</p></div>
      <div class="arrow">→</div>
      <div class="step"><div class="n">4</div><h4>Returned to you</h4><p>Your Growth Architect shares it back, with the follow-up agreed.</p></div>
    </div>

    <div class="two">
      <div class="col">
        <h4><span class="tagw wb">Workbook</span>What you do</h4>
        <ul>
          <li>In <b>Where Am I Now</b>, say <em>who relies on this value</em>.</li>
          <li>In the <b>Value Tracking Log</b>, name the <b>stakeholder(s)</b> per delivered outcome.</li>
          <li>In <b>Project Feedback</b>, capture feedback with the stakeholder's <b>Role / Department</b> and the related initiative.</li>
        </ul>
      </div>
      <div class="col">
        <h4><span class="tagw ga">Console</span>What the Growth Architect does</h4>
        <ul>
          <li>Opens your card and uses <b>Give value feedback</b> — choosing the initiative, a 1–5 value score, comments and a follow-up status.</li>
          <li>Reviews the <b>Stakeholder Feedback</b> view: feedback grouped by initiative, with a by-role/department breakdown and filters.</li>
          <li>Tracks everything they've recorded under <b>Feedback I've Given</b>.</li>
        </ul>
      </div>
    </div>

    <div class="cross"><span class="kase">Why name stakeholders per initiative</span>When you tie each piece of value to a named stakeholder and an initiative, feedback can be specific and fair — "the Finance team rated the data-quality dashboard 4/5, next step: add a weekly refresh" — instead of vague, unattributed impressions. Your Growth Architect is the channel: they collect it, log it against the initiative, and bring it back to you.</div>

    <div class="tip"><span class="kase">The cycle</span>Stakeholder feedback pairs naturally with monthly snapshots: agree a follow-up, do the work next period, and the Change Over Time view shows whether the value score moved.</div>
  </section>

  <section id="man-faq">
    <h2>FAQ &amp; troubleshooting</h2>

    <div class="qa"><p class="q">My value statement shows the prompt label instead of my text.</p>
    <p>Re-open the latest Console; it reads the real statement from your workbook even on existing snapshots. If you still see the prompt, hard-refresh the page to clear a cached older file.</p></div>

    <div class="qa"><p class="q">I ticked a department but the person doesn't appear there.</p>
    <p>Individual names appear on the <b>Org Chart</b> and in the <b>Organisation</b> scorecard rows. The change shows the moment you close the panel. If a department sits under an executive whose branch is collapsed, use <b>Expand all</b>.</p></div>

    <div class="qa"><p class="q">A VA work item isn't showing under the right department.</p>
    <p>Check the <b>Role</b> on that Work Audit row. If it's a position like <code>Growth Architect</code> and the person leads exactly one department, it maps automatically; otherwise open their card and map the role in <b>Work split across roles</b>.</p></div>

    <div class="qa"><p class="q">Why is VA-aligned different from my VA percentage?</p>
    <p>VA-aligned counts hours that are both VA <em>and</em> on a strategic initiative. VA work that isn't tied to an initiative raises your VA mix but not VA-aligned — the gap is value the business hasn't explicitly asked for.</p></div>

    <div class="qa"><p class="q">A department's overview looks like it's counting another role's work.</p>
    <p>The Department Overview is scoped to your set department and to the work tagged to that department's role. Make sure each person's Work Audit rows carry the correct Role, and that any unallocated roles are mapped.</p></div>
  </section>

  <section id="man-glossary">
    <h2>Glossary</h2>
    <table>
      <tr><th>Term</th><th>Meaning</th></tr>
      <tr><td><b>Business Value-Add (BVA)</b></td><td>Work tied to one of the company's strategic Data Initiatives — value the business has explicitly asked for.</td></tr>
      <tr><td><b>VA / BNVA / NVA</b></td><td>Value-Adding / Business Non-Value-Adding / Non-Value-Adding — your own classification of each activity.</td></tr>
      <tr><td><b>VA-aligned</b></td><td>Share of hours that are both VA-classified and on a strategic initiative.</td></tr>
      <tr><td><b>Strategic theme</b></td><td>One of the six high-level areas the business values.</td></tr>
      <tr><td><b>Data Initiative</b></td><td>A specific initiative under a theme; the unit work is aligned to.</td></tr>
      <tr><td><b>Role (on a Work Audit row)</b></td><td>The hat an activity was done under; used to attribute the work to a department.</td></tr>
      <tr><td><b>Growth Architect</b></td><td>The person who leads a department and runs the Console for it.</td></tr>
      <tr><td><b>Snapshot</b></td><td>One imported workbook for a person in a given period; snapshots build a versioned history.</td></tr>
      <tr><td><b>Stakeholder</b></td><td>Whoever relies on the value of a piece of work.</td></tr>
      <tr><td><b>Unallocated</b></td><td>Audit hours whose Role hasn't been mapped to a department yet; not counted until mapped.</td></tr>
    </table>
  </section>

      <h1 style="font-family:'IBM Plex Sans',sans-serif;font-size:42px;font-weight:600;letter-spacing:-.02em;margin:0;color:#fff">Know Your Value</h1>
      <p style="font-size:16px;color:#bcd9c9;margin:12px 0 0;max-width:640px;line-height:1.55">Make your value visible, map it to what the business actually needs, and grow on purpose. A practical methodology and workbook that turns "I work hard" into evidenced, strategic value.</p>
    </div>
  </div>

  <!-- what it is -->
  <div style="padding:30px 38px 6px">
    <div style="font-size:11px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;color:#106030;margin-bottom:8px">What it is</div>
    <p style="font-size:14.5px;line-height:1.65;color:#2c3a45;max-width:760px">Know Your Value helps every professional answer three questions with evidence: <b>What value do I deliver today? Does it still matter to the business? And where should I grow next?</b> It connects individual work to the organisation's strategic objectives, so effort lands where it counts and people can see — and prove — their contribution.</p>
  </div>

  <!-- journey -->
  <div style="padding:22px 38px 6px">
    <div style="font-size:11px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;color:#106030;margin-bottom:14px">The journey — five stages</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <div style="flex:1;min-width:150px;background:#dceee2;border-radius:11px;padding:14px 15px;border-top:3px solid #106030">
          <div style="font-family:'IBM Plex Sans',sans-serif;font-weight:700;font-size:13px;color:#0b4422">1. Position</div>
          <div style="font-size:12px;color:#3c4a55;margin-top:5px;line-height:1.45">Pin down the value you deliver today, who relies on it, and the proof.</div></div><div style="flex:1;min-width:150px;background:#dceee2;border-radius:11px;padding:14px 15px;border-top:3px solid #106030">
          <div style="font-family:'IBM Plex Sans',sans-serif;font-weight:700;font-size:13px;color:#0b4422">2. Work Analysis</div>
          <div style="font-size:12px;color:#3c4a55;margin-top:5px;line-height:1.45">See where your time really goes; score what's worth doing.</div></div><div style="flex:1;min-width:150px;background:#dceee2;border-radius:11px;padding:14px 15px;border-top:3px solid #f0a020">
          <div style="font-family:'IBM Plex Sans',sans-serif;font-weight:700;font-size:13px;color:#0b4422">3. Direction</div>
          <div style="font-size:12px;color:#3c4a55;margin-top:5px;line-height:1.45">Decide where you're heading and commit to a 90-day plan.</div></div><div style="flex:1;min-width:150px;background:#dceee2;border-radius:11px;padding:14px 15px;border-top:3px solid #f0a020">
          <div style="font-family:'IBM Plex Sans',sans-serif;font-weight:700;font-size:13px;color:#0b4422">4. Strategy</div>
          <div style="font-size:12px;color:#3c4a55;margin-top:5px;line-height:1.45">Anchor to the company's objectives — the value the business asks for.</div></div><div style="flex:1;min-width:150px;background:#dceee2;border-radius:11px;padding:14px 15px;border-top:3px solid #106030">
          <div style="font-family:'IBM Plex Sans',sans-serif;font-weight:700;font-size:13px;color:#0b4422">5. Value Tracking</div>
          <div style="font-size:12px;color:#3c4a55;margin-top:5px;line-height:1.45">Prove it: log the evidence and capture stakeholder feedback.</div></div>
    </div>
  </div>

  <!-- core ideas -->
  <div style="padding:24px 38px 6px">
    <div style="font-size:11px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;color:#106030;margin-bottom:14px">The core ideas</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px">
      <div style="border:1px solid #dde2e8;border-radius:11px;padding:15px 16px">
          <div style="font-family:'IBM Plex Sans',sans-serif;font-weight:600;font-size:14px;color:#16202b;margin-bottom:5px">Classify your work</div>
          <div style="font-size:12.5px;color:#5a6675;line-height:1.5">Split effort into Value-Adding, Business-Non-Value-Adding and Non-Value-Adding — and spot burnout, stagnation or invisibility risk early.</div></div><div style="border:1px solid #dde2e8;border-radius:11px;padding:15px 16px">
          <div style="font-family:'IBM Plex Sans',sans-serif;font-weight:600;font-size:14px;color:#16202b;margin-bottom:5px">Find the win-win</div>
          <div style="font-size:12.5px;color:#5a6675;line-height:1.5">Target work where business value and personal growth overlap. Aim for the top-right.</div></div><div style="border:1px solid #dde2e8;border-radius:11px;padding:15px 16px">
          <div style="font-family:'IBM Plex Sans',sans-serif;font-weight:600;font-size:14px;color:#16202b;margin-bottom:5px">Your value statement</div>
          <div style="font-size:12.5px;color:#5a6675;line-height:1.5">Assemble a crisp, repeatable articulation of the value you deliver — ready for any conversation.</div></div><div style="border:1px solid #dde2e8;border-radius:11px;padding:15px 16px">
          <div style="font-family:'IBM Plex Sans',sans-serif;font-weight:600;font-size:14px;color:#16202b;margin-bottom:5px">Align to Data Initiatives</div>

/* ===== monthly versions ===== */
const MONTHS={jan:"01",feb:"02",mar:"03",apr:"04",may:"05",jun:"06",jul:"07",aug:"08",sep:"09",oct:"10",nov:"11",dec:"12"};
function monthKey(iso){ if(!iso) return ""; const d=new Date(iso); if(!isNaN(d.getTime())) return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"); return ""; }
function periodKey(p){ if(!p) return ""; const s=String(p).trim(); let m=s.match(/^(\d{4})[-\/](\d{1,2})/); if(m) return m[1]+"-"+m[2].padStart(2,"0"); m=s.match(/([a-z]{3})[a-z]*\s+(\d{4})/i); if(m&&MONTHS[m[1].toLowerCase()]) return m[2]+"-"+MONTHS[m[1].toLowerCase()]; m=s.match(/(\d{4})/); if(m) return m[1]; return s.toLowerCase(); }
function vKey(v){ return periodKey(v.period)||monthKey(v.importedAt)||(v.importedAt||""); }
function vLabel(v){ return v.period||monthKey(v.importedAt)||(v.importedAt||"").slice(0,10)||"\u2014"; }
function sortVersions(m){ (m.versions||[]).sort((a,b)=>{ const ka=vKey(a),kb=vKey(b); if(ka<kb)return -1; if(ka>kb)return 1; return (a.importedAt||"")<(b.importedAt||"")?-1:1; }); }
function latestVersion(m){ const vs=m.versions||[]; return vs.length?vs[vs.length-1]:null; }
function prevVersion(m){ const vs=m.versions||[]; return vs.length>1?vs[vs.length-2]:null; }
function latestSheets(m){ const v=latestVersion(m); return v?v.sheets:null; }
function hasWorkbook(m){ return (m.versions||[]).length>0; }
function thisMonthKey(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"); }
function addVersion(member,item,period){
  member.versions=member.versions||[];
  const key=periodKey(period)||monthKey(item.importedAt);
  const ex=key?member.versions.find(v=>vKey(v)===key):null;
  if(ex){ ex.sheets=item.sheets; ex.file=item.file; ex.importedAt=item.importedAt; if(period)ex.period=period; }
  else member.versions.push({id:uid("v"),period:period||monthKey(item.importedAt),file:item.file,importedAt:item.importedAt,sheets:item.sheets});
  sortVersions(member);
}

function aoaHeaderRow(aoa,keys){ // find first row (<=8) containing any keyword
  for(let i=0;i<Math.min(aoa.length,8);i++){ const cells=(aoa[i]||[]).map(c=>String(c==null?"":c).toLowerCase());
    if(cells.some(h=>keys.some(k=>h.includes(k)))) return i; } return 0; }
function colIndex(header,aliases,exclude){ for(const a of aliases){ for(let i=0;i<header.length;i++){ const h=header[i]; if(!h)continue; if(exclude&&exclude.some(x=>h.includes(x)))continue; if(h===a||h.includes(a))return i; } } return -1; }
function categoryColByValue(aoa,startRow){ // find column whose cells are mostly VA/BNVA/NVA
  const counts={}; for(let r=startRow;r<aoa.length;r++){ (aoa[r]||[]).forEach((c,ci)=>{ const v=String(c||"").trim().toUpperCase(); if(v==="VA"||v==="BNVA"||v==="NVA") counts[ci]=(counts[ci]||0)+1; }); }
  let best=-1,bc=0; Object.keys(counts).forEach(ci=>{ if(counts[ci]>bc){bc=counts[ci];best=+ci;} }); return best; }

function parseStaffWorkbook(wb){
  const out={whereAmINow:[],classifyWork:[],workAudit:[],valueTrackingLog:[],projectScoring:[],projectFeedback:[],threeYearGoal:[]};
  wb.SheetNames.forEach(sn=>{
    const low=sn.toLowerCase();
    const aoa=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,defval:""});
    if(!aoa.length) return;
    try{
      if(low.includes("classify")) out.classifyWork=pClassify(aoa);
      else if(low.includes("work audit")) out.workAudit=pWorkAudit(aoa);
      else if(low.includes("value tracking")) out.valueTrackingLog=pValueLog(aoa);
      else if(low.includes("scoring")) out.projectScoring=pScoring(aoa);
      else if(low.includes("feedback")) out.projectFeedback=pFeedback(aoa);
      else if(low.includes("where am i")) out.whereAmINow=pWhere(aoa);
      else if(low.includes("year goal")||low.includes("2 - 3")||low.includes("2-3")) out.threeYearGoal=pGoal(aoa);
    }catch(e){ console.warn("parse issue on",sn,e); }
  });
  return out;
}
function rowsAfter(aoa,h){ return aoa.slice(h+1).filter(r=>r&&r.some(c=>String(c).trim()!=="")); }
function pClassify(aoa){ const h=aoaHeaderRow(aoa,["category","activity","% of","judgement","clarity"]); const header=(aoa[h]||[]).map(c=>String(c).toLowerCase());
  let cat=colIndex(header,["category"]); if(cat<0) cat=categoryColByValue(aoa,h+1);
  let pct=colIndex(header,["% of","% ","percent","month"]); if(pct<0){ // first numeric col after cat
    for(let i=0;i<(aoa[h+1]||[]).length;i++){ if(i!==cat && num((aoa[h+1]||[])[i])>0){pct=i;break;} } }
  const act=colIndex(header,["activity","work related","work-related"]);
  return rowsAfter(aoa,h).map(r=>({category:String(r[cat]||"").trim().toUpperCase(),pct:pct>=0?num(r[pct]):0,activity:act>=0?r[act]:""})).filter(x=>x.category==="VA"||x.category==="BNVA"||x.category==="NVA"); }

    Object.keys(x.m.initProjects).forEach(k=>{ if(initAgg[k]){ initAgg[k].projects+=x.m.initProjects[k]; touched.add(k);} });
    touched.forEach(k=>{ if(!initAgg[k].staff.includes(x.s.name)) initAgg[k].staff.push(x.s.name); });
  });

function effortShareByTheme(d){ // share over real themes only
  let tot=0; const e={}; REAL_THEMES.forEach(t=>{ e[t.theme]=d.effort[t.theme]||0; tot+=e[t.theme]; });
  const share={}; REAL_THEMES.forEach(t=>share[t.theme]=tot?e[t.theme]/tot:0); return {share,tot};
}
function effectiveness(){
  const d=dept();
  // comprehension
  let filled=0; REAL_THEMES.forEach(t=>{ const u=MGR.understanding[t.theme]||{}; if(String(u.priority).trim()!=="" && String(u.words).trim()!=="") filled++; });
  const comprehension=REAL_THEMES.length?filled/REAL_THEMES.length*100:0;
  // coverage (Data Initiatives with work aligned)
  const coverage=d.vaInitCount?d.initCovered/d.vaInitCount*100:0;
  // alignment = Business Value-Add: hours on a defined Data Initiative / total logged hours
  const alignment=d.deptBVA*100;
  // realization
  const realization=(d.completed+d.inProg)>0?d.completed/(d.completed+d.inProg)*100:0;
  // engagement
  const nStaff=MGR.staff.length;
  const withFb=new Set(MGR.feedback.map(f=>f.staffId)).size;
  const fus=MGR.feedback.filter(f=>f.followUpStatus); const closed=MGR.feedback.filter(f=>(f.followUpStatus||"").toLowerCase()==="completed").length;
  const engagement=nStaff?(withFb/nStaff*60 + (MGR.feedback.length? (closed/Math.max(1,MGR.feedback.length))*40 : 0)):0;
  // understanding accuracy = 1 - TVD(priority weights, effort shares)
  let pw={},psum=0; REAL_THEMES.forEach(t=>{ const p=num((MGR.understanding[t.theme]||{}).priority); pw[t.theme]=p; psum+=p; });
  const {share}=effortShareByTheme(d);
  let accuracy=0, accNA=(psum===0||d.alignment===0&&Object.keys(d.effort).length===0);
  if(psum>0){ let tvd=0; REAL_THEMES.forEach(t=>{ const p=pw[t.theme]/psum; tvd+=Math.abs(p-(share[t.theme]||0)); }); accuracy=(1-tvd/2)*100; }
  const sub=[
    {k:"Objective comprehension",v:comprehension,c:"var(--accent)",q:"Share of company themes you've stated an objective and priority for."},
    {k:"Data-initiative coverage",v:coverage,c:"var(--accent)",q:"Share of the company's Data Initiatives that have work aligned to them."},
    {k:"Value-add alignment",v:alignment,c:"var(--gold)",q:"Hours on a defined Data Initiative (Business Value-Add) \u00F7 total logged hours."},
    {k:"Value realisation",v:realization,c:"var(--accent)",q:"Tracked initiatives completed \u00F7 (completed + in progress)."},
    {k:"Feedback engagement",v:engagement,c:"var(--blue)",q:"Coverage of staff you've given feedback to, plus follow-ups closed."},
    {k:"Understanding accuracy",v:accuracy,c:"var(--gold)",q:"How closely your stated priorities match where the department's effort actually goes."},
  ];
  const W={"Objective comprehension":15,"Data-initiative coverage":20,"Value-add alignment":20,"Value realisation":15,"Feedback engagement":10,"Understanding accuracy":20};
  let overall=0,wsum=0; sub.forEach(s=>{ overall+=s.v*W[s.k]; wsum+=W[s.k]; }); overall=wsum?overall/wsum:0;
  return {overall,sub,d,share,accNA};
}

  // understanding assessment + gap table
  let psum=0; REAL_THEMES.forEach(t=>psum+=num((MGR.understanding[t.theme]||{}).priority));
  const assessRows=REAL_THEMES.map(t=>{ const u=MGR.understanding[t.theme]||{}; const a=MGR.asks.find(x=>x.theme===t.theme)||{};
    const effShare=e.share[t.theme]||0; const prioShare=psum?num(u.priority)/psum:0;
    let verdict="Aligned",vc="v-align";
    const eff=d.effort[t.theme]||0; let val=0; d.staff.forEach(x=>val+=(x.m.valTheme[t.theme]||0));
    if((num(u.priority)>=4||num(a.companyPriority)>=4) && eff===0 && val===0){ verdict="Blind spot"; vc="v-blind"; }
    else if(num(u.priority)>=4 && effShare < prioShare*0.5){ verdict="Under-served"; vc="v-under"; }
    else if(num(u.priority)<=2 && effShare>0.15){ verdict="Over-invested"; vc="v-over"; }
    return `<tr>
      <td style="max-width:170px"><b>${esc(t.theme)}</b></td>
      <td><div class="seg" style="min-width:160px">${[1,2,3,4,5].map(n=>`<button type="button" class="${num(u.priority)===n?'on':''}" onclick="setUnderstanding('${esc(t.theme)}','priority',${n})">${n}</button>`).join("")}</div></td>

      <td style="text-align:center;font-weight:600">${Math.round(effShare*100)}%</td>
      <td style="text-align:center">${a.companyPriority||"\u2013"}</td>
      <td><span class="verdict ${vc}">${verdict}</span></td>
    </tr>`; }).join("");

  return `<div class="help">Your effectiveness is measured by how well you <b>understand the value the company asks of your department</b> and translate it into real, aligned, evidenced work. Fill in your understanding below \u2014 the scores update live.</div>
    <div class="eff-top">${gauge}<div class="card" style="padding:20px 22px">${subbars}</div></div>
    <div class="card"><div class="card-head"><div><h3>Understanding vs. Reality</h3><div class="sub">Your priority for each company ask, in your words, against where the department's effort actually goes</div></div></div>
    <div class="tbl-wrap"><table class="grid"><thead><tr><th>Company value ask</th><th>My priority</th><th>The objective in my words</th><th>Dept effort</th><th>Co. priority</th><th>Read</th></tr></thead><tbody>${assessRows}</tbody></table></div>
    <div style="padding:12px 20px;font-size:11.5px;color:var(--ink-soft);border-top:1px solid var(--line-soft)"><b>Blind spot</b>: a high-priority ask with no effort or value. <b>Under-served</b>: you rate it highly but little effort lands there. <b>Over-invested</b>: heavy effort on something you rate low.</div></div>`;
}
