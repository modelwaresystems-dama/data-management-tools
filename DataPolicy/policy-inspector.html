<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Policy Inspector · Codex</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,300..900,0..100,0..1&family=Spectral:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   POLICY INSPECTOR — Editorial Codex Aesthetic
   ============================================================ */
:root {
  --paper:       #f4ecda;
  --paper-2:     #ece1c5;
  --paper-3:     #e2d4b1;
  --ink:         #1c2030;
  --ink-2:       #3d4358;
  --ink-3:       #757a8e;
  --ink-4:       #a8a89b;
  --rule:        #c9bd9c;
  --rule-soft:   #d9cda9;
  --accent:      #8b2c2c;
  --accent-soft: #b75e4a;
  --copper:      #a0561d;
  --gold:        #a48837;
  --sage:        #486b3e;
  --shadow:      0 1px 0 rgba(28, 32, 48, 0.04);
  --shadow-lg:   0 18px 60px -30px rgba(28, 32, 48, 0.35);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--paper);
  color: var(--ink);
  font-family: 'Spectral', Georgia, serif;
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: "kern", "liga", "onum";
}

body::before {
  content: "";
  position: fixed; inset: 0;
  pointer-events: none;
  background-image: radial-gradient(circle at 25% 30%, rgba(180, 146, 58, 0.04) 0px, transparent 30%),
                    radial-gradient(circle at 80% 70%, rgba(139, 44, 44, 0.03) 0px, transparent 40%);
  z-index: 0;
}

::selection { background: var(--accent); color: var(--paper); }

a { color: inherit; text-decoration: none; }

/* ----------------- LAYOUT ----------------- */
.app {
  display: grid;
  grid-template-rows: auto 1fr;
  grid-template-columns: 280px 1fr;
  grid-template-areas:
    "topbar topbar"
    "sidebar main";
  height: 100vh;
  position: relative;
  z-index: 1;
}

/* ----------------- TOP BAR ----------------- */
.topbar {
  grid-area: topbar;
  display: flex;
  align-items: center;
  padding: 0 28px;
  height: 68px;
  background: var(--paper);
  border-bottom: 1px solid var(--rule);
  gap: 24px;
}

.brand {
  display: flex;
  align-items: baseline;
  gap: 14px;
  flex-shrink: 0;
}

.brand-mark {
  font-family: 'Fraunces', serif;
  font-weight: 900;
  font-size: 26px;
  letter-spacing: -0.02em;
  color: var(--ink);
  font-variation-settings: "SOFT" 30, "WONK" 1;
}

.brand-mark::before {
  content: "§";
  color: var(--accent);
  margin-right: 4px;
  font-weight: 400;
}

.brand-sub {
  font-family: 'Spectral', serif;
  font-style: italic;
  font-size: 14px;
  color: var(--ink-3);
  font-weight: 400;
}

.brand-divider {
  width: 1px;
  height: 32px;
  background: var(--rule);
}

.brand-policy {
  font-family: 'Fraunces', serif;
  font-size: 15px;
  color: var(--ink-2);
  font-weight: 500;
  letter-spacing: 0.02em;
}

.brand-policy small {
  display: block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-bottom: 2px;
  font-weight: 500;
}

.topbar-spacer { flex: 1; }

.search-wrap {
  position: relative;
  width: 360px;
}

.search-input {
  width: 100%;
  height: 38px;
  padding: 0 14px 0 38px;
  background: var(--paper-2);
  border: 1px solid var(--rule);
  border-radius: 2px;
  font-family: 'Spectral', serif;
  font-size: 14px;
  color: var(--ink);
  outline: none;
  transition: border-color 0.15s, background 0.15s;
}

.search-input::placeholder {
  color: var(--ink-4);
  font-style: italic;
}

.search-input:focus {
  border-color: var(--ink);
  background: var(--paper);
}

.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 16px;
  height: 16px;
  color: var(--ink-3);
  pointer-events: none;
}

.search-results {
  position: absolute;
  top: calc(100% + 4px);
  left: 0; right: 0;
  background: var(--paper);
  border: 1px solid var(--rule);
  box-shadow: var(--shadow-lg);
  max-height: 70vh;
  overflow-y: auto;
  z-index: 100;
  display: none;
}

.search-results.active { display: block; }

.search-result {
  padding: 10px 14px;
  border-bottom: 1px solid var(--rule-soft);
  cursor: pointer;
  transition: background 0.1s;
}

.search-result:hover, .search-result.highlight {
  background: var(--paper-2);
}

.search-result:last-child { border-bottom: none; }

.search-result-type {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--accent);
  margin-bottom: 2px;
}

.search-result-title {
  font-size: 14px;
  color: var(--ink);
  font-weight: 500;
  line-height: 1.4;
}

.search-result-snippet {
  font-size: 12px;
  color: var(--ink-3);
  margin-top: 2px;
  line-height: 1.4;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}

mark {
  background: rgba(180, 146, 58, 0.3);
  color: var(--ink);
  padding: 0 2px;
}

/* ----------------- SIDEBAR ----------------- */
.sidebar {
  grid-area: sidebar;
  background: var(--paper-2);
  border-right: 1px solid var(--rule);
  overflow-y: auto;
  padding: 24px 0;
}

.nav-section {
  margin-bottom: 20px;
}

.nav-section-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--ink-3);
  padding: 0 28px 8px;
  font-weight: 600;
}

.nav-link {
  display: flex;
  align-items: center;
  padding: 7px 28px;
  font-size: 14px;
  color: var(--ink-2);
  cursor: pointer;
  transition: color 0.1s, background 0.1s;
  font-family: 'Fraunces', serif;
  font-weight: 400;
  position: relative;
  letter-spacing: -0.005em;
}

.nav-link:hover {
  color: var(--ink);
  background: var(--paper-3);
}

.nav-link.active {
  color: var(--accent);
  font-weight: 600;
  background: var(--paper-3);
}

.nav-link.active::before {
  content: "";
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--accent);
}

.nav-count {
  margin-left: auto;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ink-3);
  font-weight: 500;
}

.nav-link.active .nav-count {
  color: var(--accent-soft);
}

/* ----------------- MAIN ----------------- */
.main {
  grid-area: main;
  overflow-y: auto;
  background: var(--paper);
  position: relative;
}

.breadcrumb-bar {
  position: sticky;
  top: 0;
  background: rgba(244, 236, 218, 0.95);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--rule-soft);
  padding: 10px 48px;
  display: flex;
  align-items: center;
  gap: 12px;
  z-index: 10;
}

.back-btn {
  border: 1px solid var(--rule);
  background: transparent;
  width: 26px; height: 26px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink-2);
  font-family: 'Fraunces', serif;
  font-size: 16px;
  transition: all 0.15s;
}

.back-btn:hover:not(:disabled) {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
}

.back-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

.breadcrumbs {
  font-size: 13px;
  color: var(--ink-3);
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'Spectral', serif;
}

.breadcrumb-link {
  cursor: pointer;
  transition: color 0.1s;
}

.breadcrumb-link:hover { color: var(--accent); }
.breadcrumb-sep { color: var(--ink-4); }
.breadcrumb-current { color: var(--ink); font-weight: 500; }

.content {
  padding: 48px 64px 120px;
  max-width: 1100px;
}

@media (max-width: 1280px) {
  .content { padding: 40px 48px 100px; }
}

/* ----------------- TYPOGRAPHY ----------------- */

.eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--accent);
  font-weight: 600;
  margin-bottom: 14px;
}

.page-title {
  font-family: 'Fraunces', serif;
  font-size: 44px;
  line-height: 1.08;
  letter-spacing: -0.02em;
  color: var(--ink);
  font-weight: 700;
  font-variation-settings: "SOFT" 50, "WONK" 1;
  margin-bottom: 12px;
}

.page-subtitle {
  font-family: 'Spectral', serif;
  font-style: italic;
  font-size: 19px;
  color: var(--ink-2);
  line-height: 1.5;
  font-weight: 400;
  max-width: 760px;
  margin-bottom: 36px;
}

.section-title {
  font-family: 'Fraunces', serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--ink);
  margin: 40px 0 18px;
  letter-spacing: -0.01em;
  display: flex;
  align-items: baseline;
  gap: 14px;
}

.section-title-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--ink-3);
  font-weight: 500;
}

.section-title-line {
  flex: 1;
  height: 1px;
  background: var(--rule);
  margin-left: 8px;
}

.label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--ink-3);
  font-weight: 600;
  margin-bottom: 6px;
  display: block;
}

.body-text {
  font-size: 16px;
  color: var(--ink-2);
  line-height: 1.65;
}

.body-text p { margin-bottom: 1em; }
.body-text p:last-child { margin-bottom: 0; }

.drop-cap::first-letter {
  font-family: 'Fraunces', serif;
  font-size: 4.2em;
  float: left;
  line-height: 0.85;
  margin: 0.05em 0.08em 0 0;
  color: var(--accent);
  font-weight: 700;
  font-variation-settings: "SOFT" 100, "WONK" 1;
}

code, .mono {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.88em;
  color: var(--ink);
  background: var(--paper-2);
  padding: 1px 6px;
  border-radius: 2px;
  letter-spacing: 0;
}

/* ----------------- OVERVIEW PAGE ----------------- */
.hero {
  border-top: 4px solid var(--ink);
  padding-top: 32px;
  margin-bottom: 56px;
}

.hero-meta {
  display: flex;
  gap: 32px;
  margin-top: 24px;
  padding-top: 20px;
  border-top: 1px solid var(--rule);
  flex-wrap: wrap;
}

.hero-meta-item {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.hero-meta-value {
  font-family: 'Fraunces', serif;
  font-size: 18px;
  color: var(--ink);
  font-weight: 600;
}

.hero-meta-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--ink-3);
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 1px;
  background: var(--rule);
  border: 1px solid var(--rule);
  margin: 32px 0;
}

.stat {
  background: var(--paper);
  padding: 22px 20px;
  cursor: pointer;
  transition: background 0.15s;
}

.stat:hover { background: var(--paper-2); }

.stat-value {
  font-family: 'Fraunces', serif;
  font-size: 36px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1;
  letter-spacing: -0.03em;
  margin-bottom: 6px;
}

.stat-value sup {
  font-size: 14px;
  color: var(--accent);
  margin-left: 2px;
  font-weight: 500;
}

.stat-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--ink-3);
  font-weight: 600;
}

/* ----------------- ENTITY CARDS / CHIPS ----------------- */

.chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  background: var(--paper-2);
  border: 1px solid var(--rule);
  font-size: 12px;
  color: var(--ink-2);
  font-family: 'Spectral', serif;
  cursor: pointer;
  transition: all 0.12s;
  border-radius: 2px;
  text-decoration: none;
  line-height: 1.4;
}

.chip:hover {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
}

.chip-id {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 0.02em;
}

.chip:hover .chip-id { color: var(--paper-3); }

.chip-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

/* link span inline */
.link {
  color: var(--accent);
  cursor: pointer;
  border-bottom: 1px solid transparent;
  transition: border-color 0.15s;
}

.link:hover { border-bottom-color: var(--accent); }

.link-code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.88em;
  font-weight: 500;
}

/* ----------------- THEME GRID ----------------- */

.theme-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
  gap: 20px;
}

.theme-card {
  border: 1px solid var(--rule);
  padding: 24px 24px 20px;
  background: var(--paper);
  cursor: pointer;
  position: relative;
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
}

.theme-card:hover {
  border-color: var(--ink);
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
}

.theme-card-num {
  font-family: 'Fraunces', serif;
  font-size: 56px;
  font-weight: 300;
  line-height: 0.85;
  color: var(--accent);
  letter-spacing: -0.04em;
  margin-bottom: 12px;
  font-variation-settings: "SOFT" 100, "WONK" 1;
}

.theme-card-code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.12em;
  color: var(--ink-3);
  text-transform: uppercase;
  margin-bottom: 4px;
  font-weight: 500;
}

.theme-card-title {
  font-family: 'Fraunces', serif;
  font-size: 21px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1.2;
  letter-spacing: -0.01em;
  margin-bottom: 12px;
}

.theme-card-desc {
  font-size: 14px;
  color: var(--ink-2);
  line-height: 1.55;
  flex: 1;
  margin-bottom: 16px;
}

.theme-card-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 14px;
  border-top: 1px solid var(--rule-soft);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ink-3);
}

.theme-card-arrow {
  color: var(--accent);
  font-family: 'Spectral', serif;
  font-style: italic;
  font-size: 13px;
}

/* ----------------- PRINCIPLES GRID ----------------- */

.principle-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 24px;
}

@media (max-width: 1024px) {
  .principle-grid { grid-template-columns: 1fr; }
}

.principle-card {
  border-top: 2px solid var(--accent);
  padding: 22px 4px 18px;
  cursor: pointer;
  transition: padding 0.18s;
}

.principle-card:hover {
  padding-left: 14px;
}

.principle-card-num {
  font-family: 'Fraunces', serif;
  font-size: 11px;
  letter-spacing: 0.16em;
  color: var(--accent);
  text-transform: uppercase;
  font-weight: 600;
  margin-bottom: 8px;
}

.principle-card-title {
  font-family: 'Fraunces', serif;
  font-size: 24px;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--ink);
  margin-bottom: 8px;
  line-height: 1.15;
}

.principle-card-def {
  font-size: 14px;
  color: var(--ink-2);
  line-height: 1.55;
  font-style: italic;
}

/* ----------------- TABLE / LIST VIEWS ----------------- */

.filter-bar {
  display: flex;
  gap: 12px;
  margin-bottom: 24px;
  align-items: center;
  flex-wrap: wrap;
}

.filter-input {
  flex: 1;
  min-width: 200px;
  height: 36px;
  padding: 0 14px;
  background: var(--paper-2);
  border: 1px solid var(--rule);
  font-family: 'Spectral', serif;
  font-size: 14px;
  color: var(--ink);
  outline: none;
}

.filter-input:focus { border-color: var(--ink); background: var(--paper); }

.filter-select {
  height: 36px;
  padding: 0 12px;
  background: var(--paper-2);
  border: 1px solid var(--rule);
  font-family: 'Spectral', serif;
  font-size: 14px;
  color: var(--ink);
  cursor: pointer;
}

.entity-table {
  border-top: 1px solid var(--ink);
  width: 100%;
}

.entity-row {
  display: grid;
  padding: 16px 4px;
  border-bottom: 1px solid var(--rule-soft);
  cursor: pointer;
  transition: background 0.12s, padding 0.12s;
  align-items: baseline;
  gap: 16px;
}

.entity-row:hover {
  background: var(--paper-2);
  padding-left: 12px;
}

.entity-row-id {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--accent);
  font-weight: 600;
  letter-spacing: 0.04em;
}

.entity-row-title {
  font-family: 'Fraunces', serif;
  font-size: 17px;
  font-weight: 500;
  color: var(--ink);
  line-height: 1.3;
  letter-spacing: -0.005em;
}

.entity-row-meta {
  font-family: 'Spectral', serif;
  font-style: italic;
  font-size: 13px;
  color: var(--ink-3);
}

.entity-row-meta a { color: var(--ink-2); }
.entity-row-meta a:hover { color: var(--accent); }

/* Controls table specific */
.row-controls { grid-template-columns: 92px 1fr 200px 120px; }
.row-evidence { grid-template-columns: 1fr 100px 200px 200px; }
.row-sops     { grid-template-columns: 70px 1fr 200px; }
.row-roles    { grid-template-columns: 1fr; }
.row-kpis     { grid-template-columns: 1fr 200px; }
.row-mi       { grid-template-columns: 70px 1fr 100px 100px; }
.row-source   { grid-template-columns: 160px 1fr 110px; }
.row-terms    { grid-template-columns: 220px 1fr; }

@media (max-width: 1024px) {
  .row-controls, .row-evidence, .row-sops, .row-kpis, .row-mi, .row-source, .row-terms {
    grid-template-columns: 1fr;
    gap: 4px;
  }
}

/* ----------------- DETAIL PAGE ----------------- */

.detail-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 32px;
  margin-top: 24px;
}

.detail-block {
  background: var(--paper);
  padding: 24px 26px;
  border-left: 3px solid var(--rule);
  position: relative;
}

.detail-block.accent { border-left-color: var(--accent); }
.detail-block.gold   { border-left-color: var(--gold); }
.detail-block.sage   { border-left-color: var(--sage); }
.detail-block.copper { border-left-color: var(--copper); }

.detail-block-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-3);
  font-weight: 600;
  margin-bottom: 12px;
}

.detail-block-body {
  font-size: 15px;
  line-height: 1.65;
  color: var(--ink-2);
}

.kv-grid {
  display: grid;
  grid-template-columns: 180px 1fr;
  gap: 16px 24px;
  margin: 0;
}

.kv-grid dt {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-3);
  font-weight: 600;
  padding-top: 4px;
}

.kv-grid dd {
  font-size: 14px;
  color: var(--ink);
  line-height: 1.5;
}

.kv-grid dd .link,
.kv-grid dd .chip { font-size: 13px; }

@media (max-width: 768px) {
  .kv-grid { grid-template-columns: 1fr; gap: 4px 0; }
  .kv-grid dt { margin-top: 12px; }
}

/* QA status badges */
.qa-badge {
  display: inline-block;
  padding: 2px 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  border-radius: 2px;
  text-transform: uppercase;
}

.qa-PASS { background: rgba(72, 107, 62, 0.15); color: var(--sage); border: 1px solid rgba(72, 107, 62, 0.3); }
.qa-WARN { background: rgba(160, 86, 41, 0.12); color: var(--copper); border: 1px solid rgba(160, 86, 41, 0.3); }
.qa-FAIL { background: rgba(139, 44, 44, 0.12); color: var(--accent); border: 1px solid rgba(139, 44, 44, 0.3); }

/* Severity badges (CCAA findings) */
.sev-Low      { color: var(--sage); }
.sev-Medium   { color: var(--gold); }
.sev-High     { color: var(--copper); }
.sev-Critical { color: var(--accent); font-weight: 600; }

/* Priority badges (MI) */
.prio-Low    { color: var(--sage); }
.prio-Medium { color: var(--gold); }
.prio-High   { color: var(--accent); }

/* ----------------- RELATED / FOOTER OF DETAIL ----------------- */

.related-rail {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
  margin-top: 40px;
  padding-top: 24px;
  border-top: 1px solid var(--rule);
}

.related-block {
  border: 1px solid var(--rule);
  padding: 18px 20px;
  background: var(--paper);
}

.related-block-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-bottom: 12px;
  font-weight: 600;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.related-block-title .nav-count { margin: 0; }

.related-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.related-item {
  font-size: 13px;
  color: var(--ink-2);
  cursor: pointer;
  padding: 5px 0;
  border-bottom: 1px solid var(--rule-soft);
  transition: color 0.12s, padding 0.12s;
  display: flex;
  gap: 8px;
  align-items: baseline;
}

.related-item:last-child { border-bottom: none; }

.related-item:hover {
  color: var(--accent);
  padding-left: 4px;
}

.related-item-id {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-3);
  font-weight: 500;
  flex-shrink: 0;
}

.related-empty {
  font-size: 12px;
  color: var(--ink-4);
  font-style: italic;
}

/* ----------------- PRINCIPLE SOURCE/ALIGNMENT BLOCKS ----------------- */

.alignment-block {
  font-family: 'Spectral', serif;
  font-size: 13px;
  color: var(--ink-2);
  font-style: italic;
  padding: 10px 14px;
  background: var(--paper-2);
  border-left: 2px solid var(--gold);
  line-height: 1.55;
}

.example-block {
  font-family: 'Spectral', serif;
  font-style: italic;
  font-size: 14px;
  color: var(--ink-2);
  padding: 16px 20px;
  background: rgba(180, 146, 58, 0.06);
  border: 1px solid var(--rule-soft);
  position: relative;
  line-height: 1.6;
}

.example-block::before {
  content: "“";
  font-family: 'Fraunces', serif;
  font-size: 60px;
  color: var(--gold);
  position: absolute;
  top: -12px;
  left: 8px;
  line-height: 1;
  opacity: 0.6;
}

/* Two-column example pair (applied vs failure) */
.example-pair {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-top: 12px;
}

@media (max-width: 900px) {
  .example-pair { grid-template-columns: 1fr; }
}

.example-applied, .example-failure {
  padding: 14px 18px;
  font-family: 'Spectral', serif;
  font-style: italic;
  font-size: 13.5px;
  line-height: 1.55;
  border-top: 2px solid;
}

.example-applied {
  border-top-color: var(--sage);
  background: rgba(72, 107, 62, 0.05);
}

.example-failure {
  border-top-color: var(--accent);
  background: rgba(139, 44, 44, 0.04);
}

.example-tag {
  font-family: 'JetBrains Mono', monospace;
  font-style: normal;
  font-size: 9px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-3);
  display: block;
  margin-bottom: 6px;
  font-weight: 600;
}

.example-applied .example-tag { color: var(--sage); }
.example-failure .example-tag { color: var(--accent); }

/* ----------------- CCAA / FINDINGS ----------------- */

.findings-grid {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.finding {
  border: 1px solid var(--rule);
  padding: 22px 26px;
  background: var(--paper);
  border-left: 3px solid var(--copper);
}

.finding-head {
  display: flex;
  align-items: baseline;
  gap: 14px;
  margin-bottom: 8px;
}

.finding-id {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--accent);
  font-weight: 600;
}

.finding-sev {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

.finding-type {
  font-family: 'Fraunces', serif;
  font-size: 18px;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: -0.005em;
  margin-bottom: 12px;
}

.finding-affects {
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--rule-soft);
}

/* ----------------- LISTS / BULLETS in narrative ----------------- */

.bullet-list {
  list-style: none;
  padding-left: 0;
}

.bullet-list li {
  padding-left: 22px;
  position: relative;
  margin-bottom: 8px;
  line-height: 1.55;
  color: var(--ink-2);
}

.bullet-list li::before {
  content: "§";
  color: var(--accent);
  position: absolute;
  left: 0;
  font-weight: 500;
  font-family: 'Fraunces', serif;
}

/* ----------------- UTILS ----------------- */

.hr-fancy {
  border: none;
  height: 1px;
  background: linear-gradient(to right, transparent 0%, var(--rule) 20%, var(--rule) 80%, transparent 100%);
  margin: 36px 0;
}

.muted { color: var(--ink-3); }
.small { font-size: 12px; }
.italic { font-style: italic; }

/* Scrollbar */
.sidebar::-webkit-scrollbar, .main::-webkit-scrollbar, .search-results::-webkit-scrollbar {
  width: 8px;
}
.sidebar::-webkit-scrollbar-track, .main::-webkit-scrollbar-track, .search-results::-webkit-scrollbar-track {
  background: transparent;
}
.sidebar::-webkit-scrollbar-thumb, .main::-webkit-scrollbar-thumb, .search-results::-webkit-scrollbar-thumb {
  background: var(--rule);
  border-radius: 4px;
}
.sidebar::-webkit-scrollbar-thumb:hover, .main::-webkit-scrollbar-thumb:hover {
  background: var(--ink-3);
}

/* Mobile */
@media (max-width: 768px) {
  .app {
    grid-template-columns: 1fr;
    grid-template-rows: auto auto 1fr;
    grid-template-areas: "topbar" "sidebar" "main";
  }
  .sidebar { max-height: 200px; padding: 12px 0; }
  .nav-section { margin-bottom: 8px; }
  .topbar { flex-wrap: wrap; height: auto; padding: 12px 16px; }
  .search-wrap { width: 100%; order: 10; }
  .brand-divider, .brand-policy { display: none; }
  .content { padding: 24px 18px 80px; }
  .page-title { font-size: 32px; }
  .page-subtitle { font-size: 16px; }
  .breadcrumb-bar { padding: 10px 18px; }
}

/* Print */
@media print {
  .sidebar, .topbar, .breadcrumb-bar { display: none; }
  .app { grid-template-columns: 1fr; grid-template-rows: 1fr; }
  .main { overflow: visible; }
  body { background: white; }
}

/* Reduce motion */
@media (prefers-reduced-motion: reduce) {
  * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}
/* ----------------- LIBRARY VIEW + POLICY SWITCHER ----------------- */

/* policy switcher in the top bar (replaces .brand-policy) */
.policy-switcher {
  display: flex;
  align-items: center;
  gap: 12px;
  flex: 0 0 auto;
}
.ps-btn {
  background: transparent;
  border: 1px solid var(--rule);
  color: var(--ink-2);
  font-family: 'Spectral', Georgia, serif;
  font-size: 13px;
  padding: 7px 14px;
  border-radius: 4px;
  cursor: pointer;
  letter-spacing: 0.02em;
  transition: all 0.15s ease;
}
.ps-btn:hover { background: var(--paper-2); border-color: var(--ink-3); color: var(--ink); }
.ps-btn.is-active {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
}
.ps-btn-library { font-weight: 500; }

.ps-dropdown {
  position: relative;
  display: inline-block;
}
.ps-current {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: var(--paper-2);
  border: 1px solid var(--rule);
  padding: 7px 14px;
  border-radius: 4px;
  cursor: pointer;
  font-family: 'Spectral', Georgia, serif;
  min-width: 220px;
  max-width: 360px;
  transition: all 0.15s ease;
}
.ps-current:hover { border-color: var(--ink-3); background: var(--paper-3); }
.ps-current-code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 0.04em;
  white-space: nowrap;
}
.ps-current-name {
  font-size: 13px;
  color: var(--ink);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
  text-align: left;
}
.ps-caret { font-size: 10px; color: var(--ink-3); }

.ps-menu {
  position: absolute;
  top: calc(100% + 6px);
  right: 0;
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 6px;
  padding: 4px;
  min-width: 320px;
  max-width: 480px;
  max-height: 60vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
  display: none;
  z-index: 100;
}
.ps-menu.open { display: block; }
.ps-menu-header {
  font-size: 11px;
  color: var(--ink-3);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 8px 12px 6px;
  border-bottom: 1px solid var(--rule-soft);
  margin-bottom: 4px;
}
.ps-option {
  display: flex;
  align-items: baseline;
  gap: 10px;
  width: 100%;
  background: transparent;
  border: none;
  text-align: left;
  padding: 8px 12px;
  border-radius: 4px;
  cursor: pointer;
  font-family: 'Spectral', Georgia, serif;
}
.ps-option:hover { background: var(--paper-2); }
.ps-option.is-active { background: var(--ink); color: var(--paper); }
.ps-option.is-active .ps-option-code { color: var(--paper); }
.ps-option-code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 0.04em;
  white-space: nowrap;
  flex: 0 0 auto;
}
.ps-option-name {
  font-size: 13px;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* library landing page */
.lib-header {
  max-width: 880px;
  margin: 0 auto 36px;
  text-align: center;
  padding-top: 12px;
}
.lib-eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--copper);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.lib-title {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 56px;
  font-weight: 400;
  font-variation-settings: "SOFT" 50, "WONK" 1;
  line-height: 1.05;
  color: var(--ink);
  margin-bottom: 14px;
  letter-spacing: -0.02em;
}
.lib-subtitle {
  font-size: 17px;
  color: var(--ink-2);
  line-height: 1.55;
  max-width: 640px;
  margin: 0 auto;
  font-style: italic;
}

.lib-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 18px;
  margin-bottom: 40px;
}
.lib-card {
  position: relative;
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 6px;
  transition: all 0.18s ease;
  overflow: hidden;
}
.lib-card:hover {
  border-color: var(--ink-3);
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
}
.lib-card-link {
  display: block;
  padding: 22px 22px 18px;
  color: var(--ink);
}
.lib-card-meta {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 8px;
}
.lib-card-code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.lib-card-domain {
  font-size: 11px;
  color: var(--ink-3);
  letter-spacing: 0.04em;
  font-style: italic;
}
.lib-card-title {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 22px;
  font-weight: 400;
  line-height: 1.2;
  margin-bottom: 12px;
  letter-spacing: -0.01em;
}
.lib-card-desc {
  font-size: 14px;
  color: var(--ink-2);
  line-height: 1.5;
  margin-bottom: 14px;
  display: -webkit-box;
  -webkit-line-clamp: 4;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.lib-card-counts {
  display: flex;
  flex-wrap: wrap;
  gap: 14px 18px;
  padding-top: 12px;
  border-top: 1px solid var(--rule-soft);
  font-size: 11px;
  color: var(--ink-3);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.lib-card-counts strong {
  color: var(--ink);
  font-weight: 600;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  margin-right: 4px;
}
.lib-card-remove {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 24px;
  height: 24px;
  background: transparent;
  border: none;
  color: var(--ink-3);
  cursor: pointer;
  font-size: 18px;
  line-height: 1;
  border-radius: 50%;
  opacity: 0;
  transition: all 0.15s ease;
  z-index: 2;
}
.lib-card:hover .lib-card-remove { opacity: 1; }
.lib-card-remove:hover {
  background: var(--accent);
  color: var(--paper);
}

/* drop zone */
.lib-dropzone {
  max-width: 720px;
  margin: 0 auto;
  padding: 48px 32px;
  background: var(--paper-2);
  border: 2px dashed var(--rule);
  border-radius: 8px;
  text-align: center;
  transition: all 0.2s ease;
}
.lib-dropzone.dragging {
  background: var(--paper-3);
  border-color: var(--accent);
  border-style: solid;
}
.lib-drop-icon {
  font-family: 'Fraunces', serif;
  font-size: 48px;
  color: var(--copper);
  margin-bottom: 12px;
  font-weight: 300;
}
.lib-drop-title {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 26px;
  font-weight: 400;
  color: var(--ink);
  margin-bottom: 10px;
  letter-spacing: -0.01em;
}
.lib-drop-sub {
  color: var(--ink-2);
  font-size: 14px;
  line-height: 1.55;
  max-width: 500px;
  margin: 0 auto 20px;
}
.lib-drop-sub code {
  font-family: 'JetBrains Mono', monospace;
  background: var(--paper);
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 12px;
}
.lib-drop-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
}
.lib-btn {
  display: inline-block;
  background: var(--paper);
  color: var(--ink);
  border: 1px solid var(--rule);
  padding: 10px 18px;
  border-radius: 4px;
  cursor: pointer;
  font-family: 'Spectral', Georgia, serif;
  font-size: 14px;
  letter-spacing: 0.02em;
  transition: all 0.15s ease;
}
.lib-btn:hover {
  background: var(--paper-3);
  border-color: var(--ink-3);
}
.lib-btn-primary {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
}
.lib-btn-primary:hover {
  background: var(--ink-2);
  border-color: var(--ink-2);
}
.lib-btn-danger {
  color: var(--accent);
  border-color: var(--accent-soft);
}
.lib-btn-danger:hover {
  background: var(--accent);
  color: var(--paper);
  border-color: var(--accent);
}

/* status banner */
.library-status {
  margin-top: 18px;
  padding: 10px 16px;
  border-radius: 4px;
  font-size: 13px;
  text-align: left;
  font-family: 'Spectral', serif;
  line-height: 1.5;
}
.library-status-info {
  background: var(--paper-3);
  color: var(--ink-2);
  border: 1px solid var(--rule);
}
.library-status-ok {
  background: rgba(72, 107, 62, 0.12);
  color: var(--sage);
  border: 1px solid var(--sage);
}
.library-status-error {
  background: rgba(139, 44, 44, 0.08);
  color: var(--accent);
  border: 1px solid var(--accent-soft);
}

/* hide breadcrumb bar entirely on library view */
.is-library-view .breadcrumb-bar { display: none; }

/* responsive */
@media (max-width: 720px) {
  .lib-title { font-size: 38px; }
  .lib-grid { grid-template-columns: 1fr; }
  .ps-current { min-width: 160px; max-width: 220px; }
  .ps-current-name { font-size: 12px; }
}

/* ----------------- WORKLOAD VIEW (cross-policy roles) ----------------- */

.lib-cta {
  margin-top: 18px;
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.lib-cta-link {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--accent);
  border-bottom: 1px solid var(--accent-soft);
  padding-bottom: 2px;
  transition: all 0.15s ease;
}
.lib-cta-link:hover {
  color: var(--ink);
  border-bottom-color: var(--ink);
}
.lib-cta-hint {
  font-size: 12px;
  color: var(--ink-3);
  font-style: italic;
}

.ps-btn-workload {
  font-weight: 500;
}

.role-card .role-card-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  color: var(--copper);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.role-workload-header {

  margin: 0 auto 24px;
}
.role-workload-header .lib-eyebrow a {

}
.role-workload-header .lib-eyebrow a:hover {
  border-bottom-color: var(--copper);

.role-workload-policies {

.role-policy-block {

}

.role-policy-header {

  gap: 16px;
  padding-bottom: 14px;

.role-policy-link {

.role-policy-link:hover .role-policy-code { color: var(--ink); }
.role-policy-link:hover .role-policy-name { text-decoration: underline; }
.role-policy-code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.role-policy-name {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 18px;
  font-weight: 500;
  letter-spacing: -0.005em;
}
.role-policy-summary {
  font-size: 11px;
  color: var(--ink-3);
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.04em;
}

.role-responsibilities {
  font-size: 15px;
  line-height: 1.6;
  color: var(--ink-2);
  margin-bottom: 18px;
  font-style: italic;
  padding-left: 14px;
  border-left: 2px solid var(--rule);
}
.role-responsibilities p { margin-bottom: 8px; }
.role-responsibilities p:last-child { margin-bottom: 0; }

.role-section-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  color: var(--ink-3);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin: 18px 0 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.role-section-title:first-child { margin-top: 0; }
.role-section-count {
  background: var(--paper-3);
  color: var(--ink-2);
  padding: 1px 7px;
  border-radius: 10px;
  font-size: 10px;
  font-weight: 600;
}

.role-activities-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13.5px;
  margin-bottom: 4px;
}
.role-activities-table th {
  text-align: left;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 600;

/* ----------------- ENTITY TABLE HEADERS ----------------- */

.entity-row-header {
  cursor: default !important;
  padding: 10px 4px !important;
  border-bottom: 2px solid var(--rule) !important;
  background: transparent !important;
  align-items: center;
}
.entity-row-header:hover {
  background: transparent !important;
  padding-left: 4px !important;
}
.entity-row-header > div {
  font-family: 'JetBrains Mono', monospace !important;
  font-size: 10px !important;
  font-weight: 700 !important;
  color: var(--ink-3) !important;
  letter-spacing: 0.1em !important;
  text-transform: uppercase !important;
  font-style: normal !important;
}

/* Sortable header cells */
.entity-row-header > div.sortable {
  cursor: pointer;
  user-select: none;
  position: relative;
  padding-right: 16px;
  transition: color 0.12s ease;
}
.entity-row-header > div.sortable:hover {
  color: var(--ink) !important;
}
/* Default subtle arrow indicating sortability */
.entity-row-header > div.sortable::after {
  content: '↕';
  position: absolute;
  right: 2px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 11px;
  opacity: 0.25;
  transition: opacity 0.12s ease;
}
.entity-row-header > div.sortable:hover::after {
  opacity: 0.6;
}
/* Active sort: replace generic arrow with directional one */
.entity-row-header > div.sortable.sort-asc,
.entity-row-header > div.sortable.sort-desc {
  color: var(--accent) !important;
}
.entity-row-header > div.sortable.sort-asc::after {
  content: '↑';
  opacity: 1;
  color: var(--accent);
}
.entity-row-header > div.sortable.sort-desc::after {
  content: '↓';
  opacity: 1;
  color: var(--accent);
}

@media (max-width: 1024px) {
  /* On narrow screens entity tables collapse to single column, so hide
     the header row (which would just stack into a confusing list of
     column names). */
  .entity-row-header { display: none !important; }
}

/* Evidence list now shows "DSDS_C01 · Approved storage technology
   catalogue" in the Control column, so it needs more room than the
   ID-only original layout (was 100px). */
.row-evidence {
  grid-template-columns: 1.2fr 1.4fr 1fr 1fr !important;
}
@media (max-width: 1024px) {
  .row-evidence { grid-template-columns: 1fr !important; }
}

<script>
'use strict';

// =============================================================
//  CODE BLOCK 1: WORKBOOK PARSER (uses SheetJS / XLSX global)
// =============================================================
// =============================================================
//  POLICY WORKBOOK PARSER — xlsx → normalised policy data
//  Mirrors the Python extraction logic (forward-fill merged
//  cells in Compliance, split semicolon/comma list columns, etc.)
// =============================================================

const PARSER = (() => {

  // ---------- sheet → key mapping ----------
  // Each entry: { key, match(sheetName) -> bool, required? }
  // The "match" function lets us tolerate the policy-code prefix
  // (e.g. "DVAI Themes" vs "DGDC Themes" vs "DGSQ Themes").
  const SHEET_DEFS = [
    { key: 'readme',         match: n => /^README$/i.test(n) },
    { key: 'principles',     match: n => /(^|\s)(Key\s+)?Principles$/i.test(n) },
    { key: 'principle_control', match: n => /Principle[_\s]Control[_\s]Map/i.test(n) },
    { key: 'themes',         match: n => /(^|\s)Themes$/i.test(n) },
    { key: 'theme_narrative', match: n => /Theme\s+Narrative/i.test(n) },
    { key: 'theme_control',  match: n => /^Theme[_\s]Control$/i.test(n) },
    { key: 'controls',       match: n => /(^|\s)Controls$/i.test(n) && !/Theme/i.test(n) && !/Principle/i.test(n) && !/Policy/i.test(n) },
    { key: 'policy_statements', match: n => /^Policy\s+Control\s+Statement$/i.test(n) },
    { key: 'acceptance',     match: n => /^Acceptance\s+Criteria$/i.test(n) },
    { key: 'evidence',       match: n => /^Evidence\s+Catalogue$/i.test(n) },
    { key: 'compliance',     match: n => /^Compliance(\s|&)/i.test(n) },
    { key: 'roles',          match: n => /^Roles\s+and\s+Responsibilities$/i.test(n) },
    { key: 'sops',           match: n => /(List\s+of\s+SOPs|^SOPs$)/i.test(n) },
    { key: 'kpis',           match: n => /^KPI\s+Pack\s+Map$/i.test(n) },
    { key: 'mgmt_intent',    match: n => /^Management\s+Intent$/i.test(n) },
    { key: 'research',       match: n => /^Research\s+Content$/i.test(n) },
    { key: 'terms',          match: n => /^Terms\s+and\s+Definitions$/i.test(n) },
    { key: 'ccaa_trace',     match: n => /^CCAA[_\s]Traceability$/i.test(n) },
    { key: 'ccaa_coverage',  match: n => /^CCAA[_\s]Coverage$/i.test(n) },
    { key: 'ccaa_findings',  match: n => /^CCAA[_\s]Findings$/i.test(n) },
    { key: 'ccaa_sme',       match: n => /^CCAA[_\s]SME[_\s]Pack$/i.test(n) },
    { key: 'purpose',        match: n => /^Purpose\s+of\s+the\s+Document$/i.test(n) },
    { key: 'scope',          match: n => /^Scope\s+of\s+Policy$/i.test(n) },
    { key: 'related_topics', match: n => /^Related\s+Topics$/i.test(n) },
    { key: 'references',     match: n => /^References$/i.test(n) },
  ];

  // ---------- generic helpers ----------
  function sheetToObjects(workbook, sheetName) {
    const ws = workbook.Sheets[sheetName];
    if (!ws) return [];
    // sheet_to_json with header:1 gives us arrays so we can manage
    // empty cells the same way Python did.
    const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null, blankrows: false });
    if (!rows.length) return [];
    const headers = rows[0].map(h => (h == null ? '' : String(h)));
    const out = [];
    for (let r = 1; r < rows.length; r++) {
      const row = rows[r];
      // Skip rows that are entirely empty
      if (!row || row.every(v => v == null || v === '')) continue;
      const obj = {};
      headers.forEach((h, i) => {
        if (h) obj[h] = (row[i] == null || row[i] === '') ? null : row[i];
      });
      out.push(obj);
    }
    return out;
  }

  function forwardFill(rows, columns) {
    // Mirror pandas .ffill() on selected columns
    const last = {};
    columns.forEach(c => last[c] = null);
    for (const r of rows) {
      for (const c of columns) {
        if (r[c] == null || r[c] === '') {
          r[c] = last[c];
        } else {
          last[c] = r[c];
        }
      }
    }
    return rows;
  }

  function splitList(value, separators = [';', ',']) {
    if (value == null || value === '') return [];
    const s = String(value);
    // Use the first separator that actually appears, otherwise the
    // value is a single item.
    let parts = [s];
    for (const sep of separators) {
      if (s.includes(sep)) {
        parts = s.split(sep);
        break;
      }
    }
    return parts.map(p => p.trim()).filter(p => p.length > 0);
  }

  // ---------- mapping sheets to keys ----------
  function classifySheets(workbook) {
    const map = {};
    for (const name of workbook.SheetNames) {
      for (const def of SHEET_DEFS) {
        if (def.match(name)) {
          // First match wins; record it
          if (!map[def.key]) map[def.key] = name;
          break;
        }
      }
    }
    return map;
  }

  // ---------- meta extraction ----------
  function extractMeta(workbook, readmeSheetName) {
    // The README sheet has a header row of column names and the first
    // data row contains the policy meta values.
    const rows = sheetToObjects(workbook, readmeSheetName);
    const first = rows[0] || {};
    const meta = { ...first };
    return meta;
  }

  // ---------- the main parse ----------
  function parseWorkbook(workbook) {
    const sheetMap = classifySheets(workbook);
    const out = { meta: {} };

    // Meta from README
    if (sheetMap.readme) {
      out.meta = extractMeta(workbook, sheetMap.readme);
    }

    // Generic sheets: just read as objects
    const genericKeys = [
      'principles', 'themes', 'theme_narrative', 'controls', 'theme_control',
      'principle_control', 'policy_statements', 'acceptance', 'evidence',
      'roles', 'research', 'terms',
      'ccaa_trace', 'ccaa_coverage', 'ccaa_findings', 'ccaa_sme',
      'purpose', 'scope', 'related_topics', 'references'
    ];
    for (const key of genericKeys) {
      const name = sheetMap[key];
      out[key] = name ? sheetToObjects(workbook, name) : [];
    }

    // Compliance: forward-fill merged Department & Role columns
    if (sheetMap.compliance) {
      const rows = sheetToObjects(workbook, sheetMap.compliance);
      forwardFill(rows, [
        'Department / Unit',
        'Role (R = Responsible, O = Owner/Approver)'
      ]);
      out.compliance = rows;
    } else {
      out.compliance = [];
    }

    // SOPs: split Related Controls (`;`) and Outputs (`;`)
    if (sheetMap.sops) {
      const rows = sheetToObjects(workbook, sheetMap.sops);
      for (const r of rows) {
        r['Related Controls List'] = splitList(r['Related Controls'], [';']);
        r['Outputs List'] = splitList(r['Outputs'], [';']);
      }
      out.sops = rows;
    } else {
      out.sops = [];
    }

    // KPIs: control IDs may live in either 'Control' (DVAI-style) or
    // 'Control ID(s)' (DSDS-style); split by ';' or ','.
    if (sheetMap.kpis) {
      const rows = sheetToObjects(workbook, sheetMap.kpis);
      for (const r of rows) {
        const raw = r['Control ID(s)'] != null ? r['Control ID(s)']
                  : r['Control']        != null ? r['Control']
                  : '';
        r['Control IDs List'] = splitList(raw, [';', ',']);
      }
      out.kpis = rows;
    } else {
      out.kpis = [];
    }

    // Management Intent: split Control ID(s) by `,` and Theme Code by `;`
    if (sheetMap.mgmt_intent) {
      const rows = sheetToObjects(workbook, sheetMap.mgmt_intent);
      for (const r of rows) {
        r['Control IDs List'] = splitList(r['Control ID(s)'], [',']);
        r['Theme Codes List'] = splitList(r['Theme Code'], [';']);
      }
      out.mgmt_intent = rows;
    } else {
      out.mgmt_intent = [];
    }

    // CCAA Findings: split Affected ID(s) by `;`
    if (sheetMap.ccaa_findings) {
      const rows = sheetToObjects(workbook, sheetMap.ccaa_findings);
      for (const r of rows) {
        r['Affected IDs List'] = splitList(r['Affected ID(s)'], [';']);
      }
      out.ccaa_findings = rows;
    } else {
      out.ccaa_findings = [];
    }

    // Defensive defaults: ensure no consumer crashes on missing arrays
    const arrayKeys = [
      'principles', 'themes', 'theme_narrative', 'controls', 'theme_control',
      'principle_control', 'policy_statements', 'acceptance', 'evidence',
      'compliance', 'roles', 'sops', 'kpis', 'mgmt_intent', 'research',
      'terms', 'ccaa_trace', 'ccaa_coverage', 'ccaa_findings', 'ccaa_sme',
      'purpose', 'scope', 'related_topics', 'references'
    ];
    for (const k of arrayKeys) if (!Array.isArray(out[k])) out[k] = [];

    return out;
  }

  // ---------- entry point used by the UI ----------
  async function parseFile(file) {
    if (typeof XLSX === 'undefined') {
      throw new Error('SheetJS (XLSX) library not loaded');
    }
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array' });
    const data = parseWorkbook(wb);
    // Derive a code & name for the policy card
    const code = (data.meta['Policy Code'] || '').toString().trim()
              || (file.name.replace(/\.xlsx$/i, '').slice(0, 8));
    const name = (data.meta['Policy Name'] || '').toString().trim()
              || file.name.replace(/\.xlsx$/i, '');
    return {
      code,
      name,
      domain: (data.meta['Policy Domain'] || '').toString(),
      description: (data.meta['Policy Description'] || '').toString(),
      sourceFile: file.name,
      loadedAt: new Date().toISOString(),
      data
    };
  }

  return { parseFile, parseWorkbook };
})();


// =============================================================
//  CODE BLOCK 2: LIBRARY STATE + FILE HANDLERS
// =============================================================
// =============================================================
//  LIBRARY LAYER — manages multiple policies, persistence,
//  file loading, and the library landing view.
//  Hooks into the main app via:
//    - bindPolicy(data)         (re-bind DATA, idx, derived maps)
//    - rebuildSearchIndex()     (refresh search after switching)
//    - render() / navigate(...) (existing renderers)
// =============================================================

const LIBRARY = (() => {
  const STORAGE_KEY = 'policy_inspector_library_v1';
  const STORAGE_ACTIVE = 'policy_inspector_active_v1';

  // policies: Map<code, { code, name, domain, description, sourceFile, loadedAt, data }>
  const policies = new Map();
  let activeCode = null;

  // ---------- persistence ----------
  function save() {
    try {
      const serialised = JSON.stringify({
        policies: Array.from(policies.values())
      });
      localStorage.setItem(STORAGE_KEY, serialised);
      if (activeCode) localStorage.setItem(STORAGE_ACTIVE, activeCode);
      return { ok: true };
    } catch (err) {
      console.warn('Could not save library to localStorage:', err);
      return { ok: false, error: err };
    }
  }

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return false;
      const parsed = JSON.parse(raw);
      if (!parsed || !Array.isArray(parsed.policies)) return false;
      policies.clear();
      for (const p of parsed.policies) {
        if (p && p.code) policies.set(p.code, p);
      }
      activeCode = localStorage.getItem(STORAGE_ACTIVE) || null;
      if (activeCode && !policies.has(activeCode)) activeCode = null;
      return true;
    } catch (err) {
      console.warn('Could not load library from localStorage:', err);
      return false;
    }
  }

  function clearStorage() {
    try {
      localStorage.removeItem(STORAGE_KEY);
      localStorage.removeItem(STORAGE_ACTIVE);
    } catch (_) {}
  }

  // ---------- crud ----------
  function add(policy) {
    if (!policy || !policy.code) throw new Error('Policy must have a code');
    // If duplicate code, suffix with a counter so user can re-load without clobbering
    let code = policy.code;
    if (policies.has(code) && policies.get(code).sourceFile !== policy.sourceFile) {
      let i = 2;
      while (policies.has(`${policy.code}#${i}`)) i++;
      code = `${policy.code}#${i}`;
      policy = { ...policy, code };
    }
    policies.set(code, policy);
    save();
    return policy;
  }

  function remove(code) {
    policies.delete(code);
    if (activeCode === code) activeCode = null;
    save();
  }

  function clear() {
    policies.clear();
    activeCode = null;
    clearStorage();
  }

  function list() {
    return Array.from(policies.values()).sort((a, b) => {
      const da = (a.domain || '').localeCompare(b.domain || '');
      if (da !== 0) return da;
      return (a.name || '').localeCompare(b.name || '');
    });
  }

  function get(code) { return policies.get(code) || null; }
  function setActive(code) {
    if (!policies.has(code)) return null;
    activeCode = code;
    try { localStorage.setItem(STORAGE_ACTIVE, code); } catch (_) {}
    return policies.get(code);
  }
  function getActive() { return activeCode ? policies.get(activeCode) : null; }
  function getActiveCode() { return activeCode; }
  function size() { return policies.size; }

  return {
    add, remove, clear, list, get, size,
    setActive, getActive, getActiveCode,
    save, load, clearStorage
  };
})();

// =============================================================
//  FILE HANDLERS — workbook loading, bundle import/export
// =============================================================
const FILES = (() => {
  // Show a status banner during loading
  function showStatus(message, kind = 'info') {
    const banner = document.getElementById('library-status');
    if (!banner) return;
    banner.textContent = message;
    banner.className = 'library-status library-status-' + kind;
    banner.style.display = message ? 'block' : 'none';
  }

  async function loadWorkbooks(files) {
    if (!files || !files.length) return [];
    if (typeof XLSX === 'undefined') {
      showStatus('Spreadsheet library still loading — please try again in a moment.', 'error');
      return [];
    }
    const loaded = [];
    const errors = [];
    let i = 0;
    for (const file of files) {
      i++;
      showStatus(`Parsing ${file.name} (${i} of ${files.length})…`, 'info');
      try {
        const policy = await PARSER.parseFile(file);
        if (!policy.data.controls.length && !policy.data.themes.length) {
          errors.push(`${file.name}: no themes or controls found — is this a policy workbook?`);
          continue;
        }
        LIBRARY.add(policy);
        loaded.push(policy);
      } catch (err) {
        console.error('Parse error for', file.name, err);
        errors.push(`${file.name}: ${err.message || err}`);
      }
    }
    if (errors.length) {
      showStatus(`Loaded ${loaded.length} of ${files.length}. Issues: ${errors.join(' | ')}`, 'error');
    } else if (loaded.length) {
      showStatus(`Loaded ${loaded.length} policy ${loaded.length === 1 ? 'workbook' : 'workbooks'}.`, 'ok');
      setTimeout(() => showStatus(''), 2400);
    }
    return loaded;
  }

  async function attachDocuments(files, targetCode) {
    // Attach .docx / .pdf files to a policy. If targetCode is provided,
    // all files attach to that policy. Otherwise try to find a code
    // that appears in the filename, fall back to currently active policy.
    if (!files || !files.length) return 0;
    const policies = LIBRARY.list();
    let attached = 0;
    for (const file of files) {
      let code = targetCode;
      if (!code) {
        // Try to find a policy code mentioned in the filename
        const upper = file.name.toUpperCase();
        const match = policies.find(p => upper.includes(p.code.toUpperCase()));
        code = match ? match.code : (LIBRARY.getActiveCode() || (policies[0] && policies[0].code));
      }
      if (!code) {
        showStatus(`Cannot attach ${file.name}: no policy loaded yet. Load a workbook first.`, 'error');
        continue;
      }
      showStatus(`Attaching ${file.name} to ${code}…`, 'info');
      const ok = await attachPolicyDoc(file, code);
      if (ok) attached++;
    }
    if (attached) {
      showStatus(`Attached ${attached} ${attached === 1 ? 'document' : 'documents'}.`, 'ok');
      setTimeout(() => showStatus(''), 2400);
    }
    return attached;
  }

  async function importBundle(file) {
    try {
      const text = await file.text();
      const parsed = JSON.parse(text);
      if (!parsed || !Array.isArray(parsed.policies)) {
        throw new Error('Bundle must be a JSON object with a "policies" array');
      }
      let added = 0;
      for (const p of parsed.policies) {
        if (p && p.code && p.data) { LIBRARY.add(p); added++; }
      }
      showStatus(`Imported ${added} policies from bundle.`, 'ok');
      setTimeout(() => showStatus(''), 2400);
      return added;
    } catch (err) {
      showStatus(`Bundle import failed: ${err.message || err}`, 'error');
      return 0;
    }
  }

  function exportBundle() {
    const bundle = {
      exported_at: new Date().toISOString(),
      tool: 'Policy Inspector',
      version: 1,
      policies: LIBRARY.list()
    };
    const blob = new Blob([JSON.stringify(bundle, null, 0)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const stamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
    a.href = url;
    a.download = `policy_library_bundle_${stamp}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  return { loadWorkbooks, attachDocuments, importBundle, exportBundle, showStatus };
})();


// =============================================================
//  CODE BLOCK 2.5: DOCUMENT STORAGE (IndexedDB for .docx / .pdf)
// =============================================================
// =============================================================
//  DOCS_DB — IndexedDB store for policy reference documents
//  (Word docx, PDF). Documents are too large for localStorage
//  (1 MB+ each × 19 policies ≈ 21 MB), so we use IndexedDB
//  which on most browsers offers ~50% of free disk.
// =============================================================

const DOCS_DB = (() => {
  const DB_NAME = 'policy_inspector_docs_v1';
  const STORE = 'docs';
  let _dbPromise = null;

  function open() {
    if (_dbPromise) return _dbPromise;
    _dbPromise = new Promise((resolve, reject) => {
      if (typeof indexedDB === 'undefined') {
        reject(new Error('IndexedDB is not available in this browser'));
        return;
      }
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(STORE)) {
          db.createObjectStore(STORE, { keyPath: 'code' });
        }
      };
      req.onsuccess = e => resolve(e.target.result);
      req.onerror = e => reject(e.target.error || new Error('Could not open IndexedDB'));
    });
    return _dbPromise;
  }

  async function put(code, file) {
    const db = await open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, 'readwrite');
      const req = tx.objectStore(STORE).put({
        code,
        filename: file.name,
        type: file.type || 'application/octet-stream',
        size: file.size,
        blob: file,
        outline: null,        // populated later by the docx parser
        addedAt: new Date().toISOString()
      });
      req.onsuccess = () => resolve();
      req.onerror = e => reject(e.target.error);
    });
  }

  async function updateOutline(code, outline) {
    const db = await open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, 'readwrite');
      const store = tx.objectStore(STORE);
      const getReq = store.get(code);
      getReq.onsuccess = () => {
        const rec = getReq.result;
        if (!rec) { resolve(); return; }
        rec.outline = outline;
        const putReq = store.put(rec);
        putReq.onsuccess = () => resolve();
        putReq.onerror = e => reject(e.target.error);
      };
      getReq.onerror = e => reject(e.target.error);
    });
  }

  async function get(code) {
    const db = await open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, 'readonly');
      const req = tx.objectStore(STORE).get(code);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = e => reject(e.target.error);
    });
  }

  async function remove(code) {
    const db = await open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, 'readwrite');
      const req = tx.objectStore(STORE).delete(code);
      req.onsuccess = () => resolve();
      req.onerror = e => reject(e.target.error);
    });
  }

  async function listMeta() {
    // Return only metadata (no blobs) so we can populate UI quickly
    const db = await open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, 'readonly');
      const req = tx.objectStore(STORE).getAll();
      req.onsuccess = () => {
        const all = req.result || [];
        resolve(all.map(r => ({
          code: r.code,
          filename: r.filename,
          type: r.type,
          size: r.size,
          addedAt: r.addedAt
        })));
      };
      req.onerror = e => reject(e.target.error);
    });
  }

  return { put, updateOutline, get, remove, listMeta };
})();

// In-memory shadow of which policy codes have a doc attached.
// Populated at boot from DOCS_DB.listMeta(). Used by renderers to
// decide whether to show "Open document" vs "Attach document" UI.
const ATTACHED_DOCS = new Map(); // code -> { filename, size, type, addedAt }

async function refreshAttachedDocsIndex() {
  try {
    const list = await DOCS_DB.listMeta();
    ATTACHED_DOCS.clear();
    for (const m of list) ATTACHED_DOCS.set(m.code, m);
  } catch (err) {
    console.warn('Could not load document index:', err);
  }
}

// Open a doc by code: fetch blob, create object URL, open in a new tab.
// Browser will either display it inline (PDF) or offer download (docx).
async function openPolicyDoc(code) {
  try {
    const rec = await DOCS_DB.get(code);
    if (!rec || !rec.blob) {
      alert('No document attached to this policy yet.');
      return;
    }
    const url = URL.createObjectURL(rec.blob);
    // Open in a new tab. For docx the browser will trigger download.
    const a = document.createElement('a');
    a.href = url;
    a.target = '_blank';
    a.rel = 'noopener';
    // Use filename as the download name so the user sees the original
    a.download = rec.filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    // Revoke after a delay to let the browser fetch it
    setTimeout(() => URL.revokeObjectURL(url), 30 * 1000);
  } catch (err) {
    alert('Could not open document: ' + (err.message || err));
  }
}

async function attachPolicyDoc(file, code) {
  try {
    await DOCS_DB.put(code, file);
    ATTACHED_DOCS.set(code, {
      code,
      filename: file.name,
      type: file.type,
      size: file.size,
      addedAt: new Date().toISOString()
    });
    // Refresh top-bar switcher so the "Policy doc" button appears
    if (typeof renderPolicySwitcher === 'function') renderPolicySwitcher();
    // If this is the currently active policy, kick off indexing so the
    // "In the policy document" panels populate. parseBlob is async and
    // re-renders when done. ensureActiveDocIndex lives inside the main
    // app IIFE; it exposes itself on window so we can reach it here.
    if (LIBRARY.getActiveCode() === code && typeof window.ensureActiveDocIndex === 'function') {
      window.ensureActiveDocIndex();
    }
    return true;
  } catch (err) {
    console.error('Could not store document:', err);
    alert('Could not save document: ' + (err.message || err));
    return false;
  }
}

async function detachPolicyDoc(code) {
  try {
    await DOCS_DB.remove(code);
    ATTACHED_DOCS.delete(code);
    if (LIBRARY.getActiveCode() === code) {
      ACTIVE_DOC_INDEX = null;
      ACTIVE_DOC_STATUS = null;
    }
    if (typeof renderPolicySwitcher === 'function') renderPolicySwitcher();
    return true;
  } catch (err) {
    console.error('Could not remove document:', err);
    return false;
  }
}

function formatFileSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(0) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

  function matchReferenceToSource(refText) {
    if (!refText || !DATA.research || !DATA.research.length) return null;
    const norm = s => String(s || '')
      .toLowerCase()
      .replace(/[\u2013\u2014]/g, '-')   // en/em dash → hyphen
      .replace(/\s+/g, ' ')
      .trim();
    const ref = norm(refText);
    if (!ref) return null;
    // Try exact title match
    for (const r of DATA.research) {
      const title = r['Source / Reference (Official Title)'];
      if (title && norm(title) === ref) return title;
    }
    // Then prefix/containment in either direction
    for (const r of DATA.research) {
      const title = r['Source / Reference (Official Title)'];
      if (!title) continue;
      const t = norm(title);
      if (ref.startsWith(t) || t.startsWith(ref)) return title;
      if (ref.includes(t) || t.includes(ref)) return title;
    }
    return null;
  }

  document.addEventListener('click', (e) => {
    const t = e.target.closest('[data-view]');
    if (t) {
      const view = t.getAttribute('data-view');
      const id = t.getAttribute('data-id');
      const scrollTo = t.getAttribute('data-scroll-to');
      navigate(view, id);
      if (scrollTo) {

        requestAnimationFrame(() => {

    return `

  function renderTheme(tc) {
    const t = idx.theme.get(tc);

    const intents = themeMisMap.get(tc) || [];
    const kpis = themeKpisMap.get(t['Theme Name']) || [];
    // Find principles referenced by this theme's controls
    const principleSet = new Set();
    controls.forEach(c => {
      (controlPrinciplesMap.get(c['Control ID']) || []).forEach(pc => {
        principleSet.add(String(pc['Principle Number']).padStart(2,'0'));
      });
    });
    const principles = Array.from(principleSet).sort();
    // Find SOPs that touch any of these controls
    const sopSet = new Set();
    controls.forEach(c => {
      (controlSopsMap.get(c['Control ID']) || []).forEach(s => sopSet.add(s['SOP ID']));
    });

    return `
      <div class="eyebrow">${escapeHtml(tc)} · Article ${escapeHtml(t['Article Number'])}</div>
      <h1 class="page-title">${escapeHtml(t['Theme Name'])}</h1>
      <p class="page-subtitle">${escapeHtml(t['Theme Purpose'])}</p>

        <span class="section-title-line"></span>

      <div class="related-rail">

          <div class="related-list">
            ${principles.length ? principles.map(k => {
              const p = idx.principle.get(k);
              return `<div class="related-item" data-view="principle" data-id="${k}">
                        <span class="related-item-id">P${k}</span>

                      </div>`;

  function renderControls() {

    if (themeFilter !== 'all') {
      controls = controls.filter(c => c['Theme Code'] === themeFilter);
    }
    if (filter) {
      controls = controls.filter(c =>
        (c['Control ID'] || '').toLowerCase().includes(filter) ||
        (c['Control Name'] || '').toLowerCase().includes(filter) ||
        (c['Core Intent'] || '').toLowerCase().includes(filter)
      );
    }
    return `
      <div class="eyebrow">Governance architecture</div>

      <p class="page-subtitle">Forty-one controls form the operational backbone of the policy. Each control names a responsible role, a frequency, and a minimum evidence set.</p>

        <select id="filter-theme" class="filter-select">
          <option value="all">All themes</option>
          ${DATA.themes.map(t => `
            <option value="${escapeHtml(t['Theme Code'])}" ${themeFilter === t['Theme Code'] ? 'selected':''}>

              <div class="entity-row-title">${escapeHtml(c['Control Name'])}</div>

    const acceptance = DATA.acceptance.find(a => a['Control ID'] === cid);

    return `
      <div class="eyebrow">${escapeHtml(cid)} · ${linkTheme(c['Theme Code'])}</div>

  function renderPrinciples() {
    return `

    `;
  }

  function renderPrinciple(pn) {
    const p = idx.principle.get(pn);
    if (!p) return notFound('Principle', pn);
    const mappings = principleControlsMap.get(pn) || [];
    // Group mappings by theme
    const themeGroups = new Map();
    mappings.forEach(m => {
      const c = idx.control.get(m['Control ID']);
      if (!c) return;
      const tc = c['Theme Code'];
      if (!themeGroups.has(tc)) themeGroups.set(tc, []);
      themeGroups.get(tc).push({ map: m, control: c });
    });

    return `
      <div class="eyebrow">Principle ${escapeHtml(pn)}</div>
      <h1 class="page-title">${escapeHtml(p['Principle'])}</h1>
      <p class="page-subtitle">${escapeHtml(p['Definition'])}</p>
      ${renderDocPanel(_docQueriesForPrinciple(p), p['Principle Name'] || p['Principle'] || pn)}

      <div class="detail-block accent">
        <div class="detail-block-title">Rationale — why this principle exists</div>
        <div class="detail-block-body">${escapeHtml(p['Rationale'] || '')}</div>
      </div>

      <h2 class="section-title">
        <span class="section-title-num">i</span> Source alignment
        <span class="section-title-line"></span>
      </h2>
      <div class="alignment-block">${escapeHtml(p['Source Alignment'] || '')}</div>

      <h2 class="section-title">
        <span class="section-title-num">ii</span> Applied example
        <span class="section-title-line"></span>
      </h2>
      <div class="example-block">${escapeHtml(p['Application Example'] || '')}</div>

      <h2 class="section-title">
        <span class="section-title-num">iii</span> Controls that uphold this principle
        <span class="section-title-line"></span>
        <span class="muted small">${mappings.length}</span>
      </h2>

      ${Array.from(themeGroups.entries()).map(([tc, items]) => {
        const theme = idx.theme.get(tc);
        return `
          <div style="margin-bottom: 28px">
            <div class="label" style="margin-bottom: 10px">
              ${linkTheme(tc, `${tc} · ${theme ? theme['Theme Name'] : ''}`)}
            </div>
            <div class="entity-table" style="border-top: none">
              ${items.map(({map, control}) => `
                <div class="entity-row row-controls" data-view="control" data-id="${escapeHtml(control['Control ID'])}">

                  <div class="entity-row-meta">${escapeHtml(control['Responsible'] || '')}</div>
                  <div class="entity-row-meta">${escapeHtml(control['Frequency'] || '')}</div>
                </div>

            </div>

    `;

  function renderPurpose() {

    const topics = (DATA.related_topics[0] && DATA.related_topics[0]['Related Topics']) || '';

    return `

        <span class="section-title-line"></span>
      </h2>
      <div class="related-topics">
        ${(() => {
          // Split by paragraph breaks. Use a CRLF-tolerant pattern
          // because xlsx cells often contain Windows-style \r\n line
          // endings that openpyxl normalises but SheetJS preserves —
          // splitting only on /\n\n+/ would leave \r characters
          // between the newlines and miss the split entirely.
          const norm = String(topics || '').replace(/\r\n?/g, '\n');
          const blocks = norm.split(/\n\n+/).map(b => b.trim()).filter(Boolean);
          const isHeading = b => b.length < 90 && !b.includes('. ') && !b.endsWith('.');
          const items = [];
          let cur = null;
          for (const b of blocks) {
            if (isHeading(b)) {
              if (cur) items.push(cur);
              const theme = DATA.themes.find(t => (t['Theme Name'] || '').trim() === b);
              cur = { heading: b, bodies: [], themeCode: theme ? theme['Theme Code'] : null };
            } else {
              if (cur) cur.bodies.push(b);
              else items.push({ heading: '', bodies: [b], themeCode: null });
            }
          }
          if (cur) items.push(cur);
          if (!items.length) return '<p class="muted italic">No related topics specified.</p>';
          return items.map(it => `
            <section class="related-topic">
              ${it.heading ? `
                ${it.themeCode
                  ? `<h3 class="related-topic-heading related-topic-heading-link" data-view="theme" data-id="${escapeHtml(it.themeCode)}">
                       <span class="related-topic-title">${escapeHtml(it.heading)}</span>
                       <span class="related-topic-code">${escapeHtml(it.themeCode)}</span>
                       <span class="related-topic-arrow">&rarr;</span>
                     </h3>`
                  : `<h3 class="related-topic-heading">${escapeHtml(it.heading)}</h3>`}
              ` : ''}
              ${it.bodies.map(p => `<p class="related-topic-body">${escapeHtml(p)}</p>`).join('')}
            </section>
          `).join('');
        })()}
      </div>
    `;
  }

  function renderReferences() {
    const refs = (DATA.references[0] && DATA.references[0]['References and Documents']) || '';
    // Parse bullet list: lines starting with '-', '•', or '*' begin a new
    // reference. Other non-empty lines continue the previous one.
    const items = [];
    let cur = null;
    for (const raw of refs.split('\n')) {
      const line = raw.trim();
      if (!line) {
        if (cur) { items.push(cur); cur = null; }
        continue;
      }
      if (/^[-•*]\s+/.test(line)) {
        if (cur) items.push(cur);
        cur = line.replace(/^[-•*]\s+/, '');
      } else {
        if (cur) cur += ' ' + line;
        else cur = line;
      }
    }
    if (cur) items.push(cur);

    // For each item, extract URL, title (text before first em-dash),
    // and body (everything else).
    const parsed = items.map(item => {
      const urlMatch = item.match(/(https?:\/\/[^\s]+)/i);
      const url = urlMatch ? urlMatch[1].replace(/[.,;]+$/, '') : null;
      let textOnly = url ? item.replace(url, '').trim() : item;
      textOnly = textOnly.replace(/\.\s*$/, '').trim();
      const dashRe = /\s[\u2014\u2013-]\s/;
      const m = textOnly.match(dashRe);
      let title, body;
      if (m) {
        title = textOnly.slice(0, m.index).trim();
        body = textOnly.slice(m.index + m[0].length).trim();
      } else {
        title = textOnly;
        body = '';
      }
      const matched = matchReferenceToSource(title);
      return { title, body, url, matched };
    });

    return `
      <div class="eyebrow">Document</div>
      <h1 class="page-title">References</h1>
      <p class="page-subtitle">Cited regulations, guidelines, standards, and KSU policies${parsed.length ? ` &middot; ${parsed.length} entries` : ''}.</p>
      ${(() => {
        const code = LIBRARY.getActiveCode();
        if (!code || !ATTACHED_DOCS.has(code) || !ACTIVE_DOC_INDEX) return '';
        const found = [];
        const missing = [];
        for (const p of parsed) {
          if (!p.title) continue;
          const hits = DOCX_OUTLINE.search(ACTIVE_DOC_INDEX, _titleAliases(p.title));
          if (hits.length) found.push(p.title);
          else missing.push(p.title);
        }
        if (!found.length && !missing.length) return '';
        return `<aside class="doc-panel doc-panel-summary">
          <div class="doc-panel-title">
            <span class="doc-panel-icon">📄</span> References in the policy document
          </div>
          <div class="doc-panel-body">
            <p class="doc-summary-line">
              <strong>${found.length}</strong> of ${parsed.length} references mentioned in the document${missing.length ? `; <strong class="doc-missing-count">${missing.length}</strong> not found` : ''}.
            </p>
            ${missing.length ? `
              <details class="doc-missing-detail">
                <summary>Show ${missing.length} missing reference${missing.length === 1 ? '' : 's'}</summary>
                <ul class="doc-missing-list">
                  ${missing.map(m => `<li>${escapeHtml(m)}</li>`).join('')}
                </ul>
              </details>
            ` : ''}
            <div class="doc-panel-actions"><button class="doc-inline-btn" data-doc-open="${escapeHtml(code)}">📄 Open the policy document →</button></div>
          </div>
        </aside>`;
      })()}
      <div class="ref-list">
        ${parsed.map(p => {
          const ctrls = p.matched ? (sourceControlsMap.get(p.matched) || []) : [];
          return `
          <article class="ref-item">
            <h3 class="ref-title">
              ${p.matched
                ? `<span class="link" data-view="source" data-id="${escapeHtml(p.matched)}">${escapeHtml(p.title)}</span>`
                : escapeHtml(p.title)}
            </h3>
            ${p.body ? `<div class="ref-body">${escapeHtml(p.body)}</div>` : ''}
            ${p.url ? `<a class="ref-url" href="${escapeHtml(p.url)}" target="_blank" rel="noopener">${escapeHtml(p.url)}</a>` : ''}
            ${p.matched ? `
              <div class="ref-trace">
                <span class="ref-trace-label">Anchors</span>
                <span class="link" data-view="source" data-id="${escapeHtml(p.matched)}" data-scroll-to="source-controls">${ctrls.length} ${ctrls.length === 1 ? 'control cites' : 'controls cite'} this reference &rarr;</span>
              </div>
            ` : `<div class="ref-trace ref-trace-unmatched"><span class="ref-trace-label">Not matched to a Research Source in this policy</span></div>`}

  // -----------------------------------------------------------

  function buildSearchIndex() {

  let SEARCH_INDEX = [];

  function performSearch(q) {

    if (!query) return [];
    const tokens = query.split(/\s+/).filter(Boolean);
    const matches = [];
    SEARCH_INDEX.forEach(item => {
      let score = 0;
      let hits = 0;
      tokens.forEach(tok => {
        if (item.hay.includes(tok)) {
          hits++;
          // weight title hits higher
          if (item.title.toLowerCase().includes(tok)) score += 5;
          else score += 1;
        }
      });
      if (hits === tokens.length) {
        matches.push({ ...item, score });
      }
    });
    matches.sort((a, b) => b.score - a.score);
    return matches.slice(0, 40);
  }

  function highlight(text, q) {
    if (!q) return escapeHtml(text || '');
    const tokens = q.toLowerCase().trim().split(/\s+/).filter(Boolean);

    tokens.forEach(tok => {
      if (!tok) return;
      const re = new RegExp('(' + tok.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
      out = out.replace(re, '<mark>$1</mark>');
