function qKind(v){ const s=String(v==null?"":v).trim().toUpperCase(); if(!s||s==="\u2014"||s==="-"||s==="N/A"||s==="NA") return "na"; if(s==="PASS") return "pass"; if(s==="QUARANTINE"||s==="QUAR"||s==="FAIL") return "quar"; if(s.indexOf("WARN")>=0) return "warn"; if(s.indexOf("QUAR")>=0) return "quar"; if(s.indexOf("PASS")>=0) return "pass"; return "warn"; }
// Per-SPO quality score, derived from the 14 Level-1 checks: PASS=1, WARN=0.5, QUARANTINE=0,
// averaged over the populated checks and expressed 0-100. Returns null when no L1 data is present.
function spoScore(s){
  let sum=0,n=0,pass=0,warn=0,quar=0;
  L1_CHECKS.forEach((c)=>{ const v=s[c]; if(v==null||String(v).trim()==="") return; const k=qKind(v); if(k==="na") return; n++; if(k==="pass"){sum+=1;pass++;} else if(k==="warn"){sum+=0.5;warn++;} else {quar++;} });
  if(!n) return null;
  return { score: Math.round(100*sum/n), pass, warn, quar, n, overall: String(s.Validation||"").trim() || (quar?"QUARANTINE":warn?"PASS+WARN":"PASS") };
}

const LIFECYCLE = ["Draft","In Review","Approved","Deprecated","Retired"];
/* ---- Code-list storage compaction --------------------------------------
   Every glossary seeds the SAME ~244 reference code lists (~106 KB). Storing
   that copy in each glossary blob (and in the pre-apply snapshot) overruns the
   browser's localStorage budget once several glossaries exist — which then
   makes a save silently fail and a freshly-imported glossary never reach the
   sidebar. At the storage boundary we keep only the code lists that differ
   from the seed (plus the IDs of the unmodified seeds present) and re-hydrate
   the full set on load. Add / edit / delete are all preserved.                 */
const SEED_CL_BY_ID = (() => { const m = {}; SEED_CODE_LISTS.forEach((c) => { m[c["Code List ID"]] = c; }); return m; })();
// Store each seed-derived code list as only its DIFFERENCE from the seed (extra
// columns like Data Provider / Reconciliation Date, or any changed value) — the
// large shared fields (Description, …) are dropped and re-merged from the seed on
// load. Lists with no matching seed id are stored whole. Add / edit / delete and
// any extra columns all round-trip exactly.
function packCodeLists(list) {
  const custom = [], diffs = [];
  (Array.isArray(list) ? list : []).forEach((c) => {
    const id = c && c["Code List ID"]; const seed = id && SEED_CL_BY_ID[id];
    if (!seed) { custom.push(c); return; }
    const d = { "Code List ID": id };
    Object.keys(c).forEach((k) => {
      if (k === "Code List ID") return;
      const sv = seed[k], cv = c[k];
      if (sv === undefined) { if (cv !== "" && cv != null) d[k] = cv; }   // extra column — keep if non-empty
      else if (String(cv ?? "") !== String(sv ?? "")) d[k] = cv;          // changed seed field
    });
    diffs.push(d);
  });
  return { _clPacked: 2, custom, diffs };
}
function unpackCodeLists(packed) {
  if (!packed || !packed._clPacked) return packed;
  if (packed._clPacked === 2) {
    const out = (packed.diffs || []).map((d) => ({ ...(SEED_CL_BY_ID[d["Code List ID"]] || {}), ...d }));
    return [...out, ...(packed.custom || [])];
  }
  // legacy v1 packed form (seed ids + custom)
  const seeds = (packed.seedIds || []).map((id) => SEED_CL_BY_ID[id]).filter(Boolean).map((c) => ({ ...c }));
  return [...seeds, ...(packed.custom || [])];
}
function packGlossaryForStore(g) {
  if (!g) return g;
  if (g.codeLists && g.codeLists._clPacked) return g;   // already packed — keep idempotent
  return { ...g, codeLists: packCodeLists(g.codeLists) };
}
function unpackStoredGlossary(g) {
  if (g && g.codeLists && g.codeLists._clPacked) return { ...g, codeLists: unpackCodeLists(g.codeLists) };
  return g;
}

const DECISIONS = ["Accept","Reject","Amend"];

const ORDERS = ["01.00 (What)","02.00 (Why)","03.00 (Who/Result)","04.01 (Characteristic)","04.02 (Compositional)","05.00 (Conditional)","06.00 (Financial)","07.00 (Regulatory)","08.00 (Formula)","09.00 (Fact)"];
/* Normalise any Order value to its full "NN.NN (Category)" label.
   Statements stored as a bare "02.00" (no category) are matched to ORDERS by their numeric code. */
function orderLabel(order) {
  const raw = String(order == null ? "" : order).trim();
  if (!raw) return "";
  const code = (raw.match(/\d{2}\.\d{2}/) || [])[0];        // e.g. "02.00" from "02.00" or "02.00 (Why)"
  if (code) { const hit = ORDERS.find((o) => o.indexOf(code) === 0); if (hit) return hit; }
  return raw;
}
const TERM_TYPES = ["Entity","Attribute","Business Element","KPI","Relationship","FACT"];
// A FACT statement is an instance-level example of the term (FCO-IM style), authored as an
// SPO Rule in the "09.00 (Fact)" order band. It is shown to readers as a worked example and
// is deliberately excluded from definitions and the is-a hierarchy (it populates, not classifies).
function isFactSpo(s) {
  if (!s) return false;
  if (/\(\s*fact\b/i.test(orderLabel(s.Order))) return true;             // 09.00 (Fact) band
  return /\b(example|instance)\b/i.test(String(s.Predicate || ""));      // "is an example of" / "is an instance of"
}

/* Current-state SPO: for each term, keep only the rows at that term's current
   (Glossary) version. Superseded versions are history, not current state, so they
   are NOT written to the Excel by default. */
function currentSpo(glossary) {
  const verOf = {};
  (glossary.terms || []).forEach((t) => { verOf[norm(t.Term)] = String(t.Version == null ? 1 : t.Version); });
  return (glossary.spo || []).filter((s) => {
    const v = verOf[norm(s.Term)];
    if (v == null) return true;                 // SPO for a term not in Glossary: keep, don't silently drop
    return String(s.Version == null ? 1 : s.Version) === v;
  });
}

function buildWorkbook(glossary, opts) {
  const allVersions = opts && opts.allVersions;
  const wb = XLSX.utils.book_new();
  const sheet = (cols, rows) => XLSX.utils.aoa_to_sheet([cols, ...rows.map((r) => cols.map((c) => r[c] ?? ""))]);
  const spoRows = allVersions ? (glossary.spo || []) : currentSpo(glossary);
  XLSX.utils.book_append_sheet(wb, sheet(GLOSSARY_COLS, glossary.terms), "Glossary");
  if ((glossary.subcats || []).length) XLSX.utils.book_append_sheet(wb, sheet(SUBCAT_COLS, glossary.subcats), "Sub-Categories");
  // Sign-off Progress — computed per-term roll-up of the sign-off state (an output sheet;
  // ignored on import since it is derived live).
  const signoffRows = (glossary.terms || []).map((t) => { const r = signoffRowFor(glossary, t); return {
    "Glossary ID": r.id, "Term": r.term, "Subject Area": r.area, "Version": r.version, "Lifecycle": r.life,
    "Live Statements": r.live, "Decided: Accept": r.accept, "Decided: Reject": r.reject, "Decided: Amend": r.amend,
    "Awaiting Decision": r.awaiting, "Signed-off Accepted": r.signedAccepted, "Open Decision Notes": r.openNotes,
    "Progress": r.progress + "%", "Next Action": r.next }; });
  XLSX.utils.book_append_sheet(wb, sheet(SIGNOFF_COLS, signoffRows), "Sign-off Progress");
  XLSX.utils.book_append_sheet(wb, sheet(SPO_COLS, spoRows), "SPO");
  XLSX.utils.book_append_sheet(wb, sheet(HISTORY_COLS, glossary.history), "History");
  XLSX.utils.book_append_sheet(wb, sheet(NOTES_COLS, glossary.notes || []), "Decision Notes");
  XLSX.utils.book_append_sheet(wb, sheet(CODELIST_COLS, glossary.codeLists || []), "Code Lists");
  XLSX.utils.book_append_sheet(wb, sheet(CROSSWALK_COLS, glossary.crosswalks || []), "Cross-Walks");
  XLSX.utils.book_append_sheet(wb, sheet(RDCHANGE_COLS, glossary.rdChanges || []), "RD Change Requests");
  return wb;
}

/* Self-test: build the workbook, read it back, and verify the SPO sheet is sound.
   Returns { ok, spoRows, termCount, issues: [...] }. Pure check — writes nothing. */
function verifyWorkbook(glossary) {
  const issues = [];
  let rb = [];
  try {
    const wb = buildWorkbook(glossary);
    const out = XLSX.write(wb, { bookType: "xlsx", type: "array" });
    const back = XLSX.read(out, { type: "array" });
    rb = XLSX.utils.sheet_to_json(back.Sheets["SPO"], { defval: "" });
  } catch (e) {
    return { ok: false, spoRows: 0, termCount: (glossary.terms || []).length, issues: ["Could not write/read workbook: " + e.message] };
  }
  // expected = current-state rows we intended to write
  const expected = currentSpo(glossary);
  if (rb.length !== expected.length)
    issues.push("Row count mismatch: wrote " + rb.length + ", expected " + expected.length);
  // duplicate SPO IDs
  const ids = rb.map((r) => String(r["SPO ID"]));
  const dupe = ids.filter((v, i) => v && ids.indexOf(v) !== i);
  if (dupe.length) issues.push("Duplicate SPO IDs: " + Array.from(new Set(dupe)).join(", "));
  // any superseded rows leaked in (a term appearing at >1 version)
  const verByTerm = {};
  rb.forEach((r) => { (verByTerm[norm(r.Term)] = verByTerm[norm(r.Term)] || new Set()).add(String(r.Version == null ? 1 : r.Version)); });
  const multi = Object.keys(verByTerm).filter((t) => verByTerm[t].size > 1);
  if (multi.length) issues.push("Multiple versions present for: " + multi.length + " term(s)");
  // compound predicates remaining
  const comp = rb.filter((r) => / and /i.test(String(r.Predicate || "")));
  if (comp.length) issues.push(comp.length + " compound predicate(s) still present");
  // referential: every SPO term must exist in Glossary
  const terms = new Set((glossary.terms || []).map((t) => norm(t.Term)));
  const orphan = rb.filter((r) => !terms.has(norm(r.Term)));
  if (orphan.length) issues.push(orphan.length + " SPO row(s) reference a term not in Glossary");
  return { ok: issues.length === 0, spoRows: rb.length, termCount: (glossary.terms || []).length, issues };
}
function exportGlossary(glossary) {
  const wb = buildWorkbook(glossary);
  const out = XLSX.write(wb, { bookType: "xlsx", type: "array" });
  const blob = new Blob([out], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const base = (glossary.name || "business_glossary").replace(/[^\w.-]+/g, "_");
  const d = new Date();
  const stamp = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0")
    + "_" + String(d.getHours()).padStart(2, "0") + String(d.getMinutes()).padStart(2, "0");
  a.href = url;
  a.download = base + "_" + stamp + ".xlsx";   // unique per export — never collides with the imported file
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1500);
  return a.download;
}

/* Export the Semantic Model's challenges (Duplicates, Orphans, Missing terms) as a
   multi-sheet Excel. Reuses analyzeCorpus so the file matches the on-screen tabs exactly. */
function exportChallenges(corpus) {
  const an = analyzeCorpus(corpus || []);
  const wb = XLSX.utils.book_new();
  const sheet = (cols, rows) => XLSX.utils.aoa_to_sheet([cols, ...rows]);

  // Is-a unresolved parents — a term states "is a <Parent>" but <Parent> is not defined.
  const unresolved = (an.isa || []).filter((e) => !e.parent);
  const byParent = {};
  unresolved.forEach((e) => { const p = (e.parent_raw || "").trim(); if (p) (byParent[p] = byParent[p] || []).push(e.term); });
  const unresolvedParentCount = Object.keys(byParent).length;

  // Retired terms are excluded from the model; count them from the raw corpus for transparency.
  const retiredCount = (corpus || []).filter((r) => r && r.term && smNorm(r.term.Lifecycle) === "retired" && String(r.term.Term || "").trim()).length;

  // Summary
  const s = an.summary;
  const summaryRows = [
    ["Generated", today()],
    ["Glossaries analysed", (s.glossaries || []).length],
    ["Glossaries", (s.glossaries || []).join(", ")],
    ["Canonical terms (in model)", s.canonical_terms],
    ["Excluded (retired)", retiredCount],
    ["Reference edges", s.edges],
    ["", ""],
    ["Challenge", "Count"],
    ["Duplicates", s.duplicates],
    ["Orphans", s.orphans],
    ["Missing terms", s.missing],
    ["Is-a unresolved parents", unresolvedParentCount],
  ];
  XLSX.utils.book_append_sheet(wb, sheet(["Metric", "Value"], summaryRows), "Summary");

  // Duplicates — a canonical term defined in more than one glossary
  const dupRows = (an.duplicates || []).map((d) => [d.term, (d.glossaries || []).length, (d.glossaries || []).join(", ")]);
  XLSX.utils.book_append_sheet(wb, sheet(["Term", "# Glossaries", "Defined in glossaries"], dupRows), "Duplicates");

  // Orphans — a defined term with no inbound or outbound references
  const orphRows = (an.orphans || []).map((o) => [o.term, o.glossary || "", o.type || "", o.area || "", o.id || "", o.lifecycle || ""]);
  XLSX.utils.book_append_sheet(wb, sheet(["Term", "Glossary", "Type", "Subject Area", "Identifier", "Lifecycle"], orphRows), "Orphans");

  // Missing terms — referenced in definitions but not defined anywhere; ranked by demand
  const missRows = (an.missing || []).map((m) => [m.term, m.count, (m.referenced_by || []).join(", ")]);
  XLSX.utils.book_append_sheet(wb, sheet(["Missing term", "Referenced by (count)", "Referenced by terms"], missRows), "Missing Terms");

  // Is-a unresolved parents — a term states "is a <Parent>" but <Parent> is not a defined term.
  // Group by the unresolved parent class and list the child terms that claim it.
  const isaRows = Object.keys(byParent)
    .sort((a, b) => byParent[b].length - byParent[a].length || a.localeCompare(b))
    .map((p) => [p, byParent[p].length, byParent[p].sort().join(", ")]);
  XLSX.utils.book_append_sheet(wb, sheet(["Unresolved parent class", "# Child terms", "Stated by terms"], isaRows), "Is-a Unresolved");

  const out = XLSX.write(wb, { bookType: "xlsx", type: "array" });
  const blob = new Blob([out], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const d = new Date();
  const stamp = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0")
    + "_" + String(d.getHours()).padStart(2, "0") + String(d.getMinutes()).padStart(2, "0");
  a.href = url;
  a.download = "semantic_model_challenges_" + stamp + ".xlsx";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1500);
  return { filename: a.download, counts: { duplicates: s.duplicates, orphans: s.orphans, missing: s.missing, isaUnresolved: unresolvedParentCount } };
}
/* ============================================================
   RDF / Turtle + SKOS export — promote the glossary to a lightweight
   enterprise ontology. Mirrors the Python skill's `rdf` command exactly:
     Entities -> owl:Class (rdfs:subClassOf from Hypernym)
     Attributes -> owl:DatatypeProperty (xsd range) or owl:ObjectProperty
                   (range skos:Concept + gov:codeList) when coded
     SPO predicates -> 'is a' = rdfs:subClassOf; entity->entity verbs = owl:ObjectProperty + assertion
     Code Lists -> skos:ConceptScheme ; Cross-Walks -> SKOS mapping relations
     Governance (lifecycle/registration/owner/steward/version) -> annotations
============================================================ */
const RDF_XSD = { Integer: "xsd:integer", Decimal: "xsd:decimal", Currency: "xsd:decimal",
  Float: "xsd:double", Double: "xsd:double", Boolean: "xsd:boolean", Date: "xsd:date",
  DateTime: "xsd:dateTime", Time: "xsd:time", String: "xsd:string", Text: "xsd:string", Enumerated: "xsd:string" };
const RDF_XW = { "Equivalent to": "skos:exactMatch", "Broader than": "skos:broadMatch",
  "Narrower than": "skos:narrowMatch", "Derived from": "skos:narrowMatch", "Subset of": "skos:narrowMatch",
  "Superset of": "skos:broadMatch", "Supersedes": "dcterms:replaces", "Overlaps with": "skos:relatedMatch" };
function rdfSlug(s, pascal) {
  const parts = String(s || "").replace(/[^A-Za-z0-9]+/g, " ").trim().split(/\s+/).filter(Boolean);
  if (!parts.length) return "";
  if (pascal) return parts.map((w) => w[0].toUpperCase() + w.slice(1)).join("");
  return parts[0].toLowerCase() + parts.slice(1).map((w) => w[0].toUpperCase() + w.slice(1)).join("");
}
function rdfLit(s) {
  return '"' + String(s).replace(/\\/g, "\\\\").replace(/"/g, '\\"').replace(/[\r\n]+/g, " ").trim() + '"';
}
function buildTurtle(glossary, base) {
  base = (base || "https://glossary.modelware.example/def").replace(/[#/]+$/, "");
  const B = base + "#";
  const terms = (glossary.terms || []).filter((t) => String(t.Term || "").trim());
  const codeLists = glossary.codeLists || [];
  const crosswalks = glossary.crosswalks || [];
  const used = {};
  const mint = (label, pascal, kind) => {
    const baseLn = rdfSlug(label, pascal) || kind; let ln = baseLn, n = 2, key = ln.toLowerCase() + "|" + kind;
    while (used[key] && used[key] !== norm(label)) { ln = baseLn + n; n++; key = ln.toLowerCase() + "|" + kind; }
    used[key] = norm(label); return ln;
  };
  const entIri = {}, attrIri = {}, schemeIri = {};
  terms.forEach((t) => { if (String(t["Term Type"]).trim() === "Entity") entIri[norm(t.Term)] = "ent:" + mint(t.Term, true, "Class"); });
  terms.forEach((t) => { const tt = String(t["Term Type"]).trim(); if (tt === "Attribute" || tt === "Business Element") attrIri[norm(t.Term)] = "prop:" + mint(t.Term, false, "Property"); });
  codeLists.forEach((c) => { if (String(c.Name || "").trim()) schemeIri[norm(c.Name)] = "scheme:" + mint(c.Name, true, "Scheme"); });

  const L = [], w = (s) => L.push(s);
  const S = (r, k) => String((r && r[k] != null ? r[k] : "")).trim();
  w("@prefix rdf: <http://www.w3.org/1999/02/22-rdf-syntax-ns#> .");
  w("@prefix rdfs: <http://www.w3.org/2000/01/rdf-schema#> .");
  w("@prefix owl: <http://www.w3.org/2002/07/owl#> .");
  w("@prefix xsd: <http://www.w3.org/2001/XMLSchema#> .");
  w("@prefix skos: <http://www.w3.org/2004/02/skos/core#> .");
  w("@prefix dcterms: <http://purl.org/dc/terms/> .");
  w(`@prefix ent: <${B}entity/> .`);
  w(`@prefix prop: <${B}property/> .`);
  w(`@prefix rel: <${B}relationship/> .`);
  w(`@prefix scheme: <${B}scheme/> .`);
  w(`@prefix gov: <${B}governance/> .`);
  w(`@base <${base}> .`);
  w("");
  w(`<${base}> a owl:Ontology ;`);
  w(`    dcterms:title ${rdfLit(glossary.name ? glossary.name + " Semantic Model" : "Enterprise Semantic Model")} ;`);
  w(`    dcterms:created ${rdfLit(today())} ;`);
  w('    owl:versionInfo "1.0" .');
  w("");
  [["lifecycle", "Lifecycle"], ["registrationStatus", "ISO 11179 registration status"], ["owner", "Owner"],
   ["steward", "Steward (BDS)"], ["subjectArea", "Subject area"], ["version", "Version"], ["authority", "Reference-data authority"],
   ["standard", "Reference-data standard"], ["codeList", "Bound code list (value domain)"], ["unitOfMeasure", "Unit of measure"],
   ["minInclusive", "Minimum (inclusive)"], ["maxInclusive", "Maximum (inclusive)"], ["qualityScore", "ISO 11179 quality score"],
   ["property", "Property (data element concept)"], ["qualifier", "Qualifier (data element concept)"]]
    .forEach(([ap, lbl]) => w(`gov:${ap} a owl:AnnotationProperty ; rdfs:label ${rdfLit(lbl)} .`));
  w("");
  const govLines = (r) => {
    const out = [];
    [["Lifecycle", "lifecycle"], ["Registration Status", "registrationStatus"], ["Owner", "owner"],
     ["Steward (BDS)", "steward"], ["Subject Area", "subjectArea"], ["Unit of Measure", "unitOfMeasure"]]
      .forEach(([col, ap]) => { if (S(r, col)) out.push(`    gov:${ap} ${rdfLit(S(r, col))} ;`); });
    if (S(r, "Glossary ID")) out.push(`    dcterms:identifier ${rdfLit(S(r, "Glossary ID"))} ;`);
    if (S(r, "Version")) out.push(`    gov:version ${rdfLit(S(r, "Version"))} ;`);
    return out;
  };
  const closeDot = () => { L[L.length - 1] = L[L.length - 1].replace(/\s*;$/, "") + " ."; };

  w("#  Classes (from Entities)");
  terms.forEach((t) => {
    if (String(t["Term Type"]).trim() !== "Entity") return;
    const iri = entIri[norm(t.Term)];
    w(`${iri} a owl:Class ;`);
    w(`    rdfs:label ${rdfLit(t.Term)} ;`);
    if (S(t, "Definition")) w(`    skos:definition ${rdfLit(S(t, "Definition"))} ;`);
    S(t, "Aliases").replace(/;/g, ",").split(",").map((a) => a.trim()).filter(Boolean).forEach((al) => w(`    skos:altLabel ${rdfLit(al)} ;`));
    const hyp = norm(S(t, "Hypernym"));
    if (hyp && entIri[hyp]) w(`    rdfs:subClassOf ${entIri[hyp]} ;`);
    govLines(t).forEach(w); closeDot(); w("");
  });

  w("#  Properties (from ISO/IEC 11179 data elements)");
  terms.forEach((t) => {
    const tt = String(t["Term Type"]).trim();
    if (tt !== "Attribute" && tt !== "Business Element") return;
    const iri = attrIri[norm(t.Term)];
    const coded = !!S(t, "Code List") || S(t, "Representation") === "Code" || ["Code", "Enumerated"].includes(S(t, "Datatype"));
    w(`${iri} a ${coded ? "owl:ObjectProperty" : "owl:DatatypeProperty"} ;`);
    w(`    rdfs:label ${rdfLit(t.Term)} ;`);
    if (S(t, "Definition")) w(`    skos:definition ${rdfLit(S(t, "Definition"))} ;`);
    const oc = norm(S(t, "Object Class"));
    if (oc && entIri[oc]) w(`    rdfs:domain ${entIri[oc]} ;`);
    if (S(t, "Property")) w(`    gov:property ${rdfLit(S(t, "Property"))} ;`);
    if (S(t, "Qualifier")) w(`    gov:qualifier ${rdfLit(S(t, "Qualifier"))} ;`);
    if (coded) {
      w("    rdfs:range skos:Concept ;");
      const cl = norm(S(t, "Code List"));
      if (cl && schemeIri[cl]) w(`    gov:codeList ${schemeIri[cl]} ;`);
    } else {
      w(`    rdfs:range ${RDF_XSD[S(t, "Datatype")] || "xsd:string"} ;`);
    }
    [["Minimum", "minInclusive"], ["Maximum", "maxInclusive"]].forEach(([col, ap]) => { if (S(t, col)) w(`    gov:${ap} ${rdfLit(S(t, col))} ;`); });
    govLines(t).forEach(w); closeDot();
    const pvs = !coded ? S(t, "Permissible Values").split(",").map((p) => p.trim()).filter(Boolean) : [];
    if (pvs.length) {
      const sch = "scheme:" + mint(t.Term + " Domain", true, "Scheme");
      w(`${sch} a skos:ConceptScheme ; rdfs:label ${rdfLit(t.Term + " value domain")} .`);
      w(`${iri} gov:codeList ${sch} .`);
      pvs.forEach((pv) => { const cpt = sch.split(":")[1] + "-" + rdfSlug(pv, true); w(`<${B}concept/${cpt}> a skos:Concept ; skos:prefLabel ${rdfLit(pv)} ; skos:inScheme ${sch} .`); });
    }
    w("");
  });

  w("#  Relationships (from SPO predicates)");
  const relIri = {}, asserts = [];
  (glossary.spo || []).forEach((s) => {
    const subj = norm(S(s, "Subject")), obj = norm(S(s, "Object")), pred = S(s, "Predicate");
    if (!subj || !pred) return;
    if (["is a", "is an", "is a type of", "subtype of"].includes(norm(pred))) {
      if (entIri[subj] && entIri[obj]) asserts.push(`${entIri[subj]} rdfs:subClassOf ${entIri[obj]} .`);
      return;
    }
    if (entIri[subj] && entIri[obj]) {
      if (!relIri[norm(pred)]) relIri[norm(pred)] = ["rel:" + mint(pred, false, "Rel"), pred];
      asserts.push(`${entIri[subj]} ${relIri[norm(pred)][0]} ${entIri[obj]} .`);
    }

  Object.values(relIri).forEach(([iri, lbl]) => w(`${iri} a owl:ObjectProperty ; rdfs:label ${rdfLit(lbl)} .`));
  if (Object.keys(relIri).length) w("");
  Array.from(new Set(asserts)).sort().forEach(w);
  if (asserts.length) w("");

  w("#  Reference Data (Code Lists -> SKOS Concept Schemes)");
  codeLists.forEach((c) => {
    if (!S(c, "Name")) return;
    const iri = schemeIri[norm(c.Name)];
    w(`${iri} a skos:ConceptScheme ;`);
    w(`    dcterms:title ${rdfLit(S(c, "Name"))} ;`);
    if (S(c, "Code List ID")) w(`    dcterms:identifier ${rdfLit(S(c, "Code List ID"))} ;`);
    if (S(c, "Description")) w(`    skos:note ${rdfLit(S(c, "Description"))} ;`);
    if (S(c, "Authority")) w(`    gov:authority ${rdfLit(S(c, "Authority"))} ;`);
    if (S(c, "Standard")) w(`    gov:standard ${rdfLit(S(c, "Standard"))} ;`);
    [["Owner", "owner"], ["Steward", "steward"]].forEach(([col, ap]) => { if (S(c, col)) w(`    gov:${ap} ${rdfLit(S(c, col))} ;`); });
    if (S(c, "Reference")) w(`    rdfs:seeAlso <${S(c, "Reference")}> ;`);
    closeDot(); w("");
  });

  if (crosswalks.length) {
    w("#  Cross-Walks (SKOS mapping relations between schemes)");
    crosswalks.forEach((x) => {
      const fr = norm(S(x, "From Code List")), to = norm(S(x, "To Code List"));
      if (schemeIri[fr] && schemeIri[to]) w(`${schemeIri[fr]} ${RDF_XW[S(x, "Relationship")] || "skos:relatedMatch"} ${schemeIri[to]} .`);
    });
    w("");
  }
  return L.join("\n") + "\n";
}
function exportRdf(glossary) {
  const ttl = buildTurtle(glossary);
  const blob = new Blob([ttl], { type: "text/turtle" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = (glossary.name || "semantic_model").replace(/[^\w.-]+/g, "_") + ".ttl";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1500);
}
/* ============================================================
   RDF / Turtle IMPORT — the return trip. A compact Turtle parser
   (handles @prefix/@base + PREFIX/BASE, <iri>, prefixed names, the `a`
   keyword, "literals" with lang/datatype, ; and , lists, [] blank nodes,
   () collections) plus the inverse of buildTurtle's mapping. Mirrors the
   Python skill's `rdf-import` so a model edited in Protégé / TopBraid /
   GraphDB round-trips straight back into a glossary.
============================================================ */
const RDF_NS = "http://www.w3.org/1999/02/22-rdf-syntax-ns#";
const RDFS_NS = "http://www.w3.org/2000/01/rdf-schema#";
const OWL_NS = "http://www.w3.org/2002/07/owl#";
const SKOS_NS = "http://www.w3.org/2004/02/skos/core#";
const DCT_NS = "http://purl.org/dc/terms/";
const XSD_NS = "http://www.w3.org/2001/XMLSchema#";
const RDF_XSD_BACK = { integer: "Integer", decimal: "Decimal", double: "Float", float: "Float",
  boolean: "Boolean", date: "Date", datetime: "DateTime", time: "Time", string: "String" };

function tokenizeTurtle(s) {
  const toks = []; let i = 0; const n = s.length;
  const WS = (c) => c === " " || c === "\t" || c === "\n" || c === "\r";
  const unesc = (c) => ({ n: "\n", t: "\t", r: "\r", '"': '"', "'": "'", "\\": "\\" }[c] || c);
  while (i < n) {
    const c = s[i];
    if (WS(c)) { i++; continue; }
    if (c === "#") { while (i < n && s[i] !== "\n") i++; continue; }
    if (c === "<") { let j = i + 1, b = ""; while (j < n && s[j] !== ">") { b += s[j]; j++; } i = j + 1; toks.push({ t: "iri", v: b }); continue; }
    if (c === '"' || c === "'") {
      const q = c; let str = "";
      if (s.substr(i, 3) === q + q + q) { let j = i + 3; while (j < n && s.substr(j, 3) !== q + q + q) { if (s[j] === "\\") { str += unesc(s[j + 1]); j += 2; } else { str += s[j]; j++; } } i = j + 3; }
      else { let j = i + 1; while (j < n && s[j] !== q) { if (s[j] === "\\") { str += unesc(s[j + 1]); j += 2; } else { str += s[j]; j++; } } i = j + 1; }
      if (s[i] === "@") { i++; while (i < n && /[A-Za-z-]/.test(s[i])) i++; }
      else if (s.substr(i, 2) === "^^") { i += 2; if (s[i] === "<") { let j = i + 1; while (j < n && s[j] !== ">") j++; i = j + 1; } else { while (i < n && !WS(s[i]) && !";,.()[]".includes(s[i])) i++; } }
      toks.push({ t: "lit", v: str }); continue;
    }
    if (".;,[]()".includes(c)) { toks.push({ t: "punc", v: c }); i++; continue; }
    if (c === "@") { let j = i + 1, b = ""; while (j < n && /[A-Za-z]/.test(s[j])) { b += s[j]; j++; } i = j; toks.push({ t: "dir", v: "@" + b.toLowerCase() }); continue; }
    let j = i, b = "";
    while (j < n && !WS(s[j]) && !"#;,()[]".includes(s[j]) && s[j] !== ".") { b += s[j]; j++; }
    i = j;
    if (b) toks.push({ t: "word", v: b });
  }
  return toks;
}

function parseTurtle(text) {
  const toks = tokenizeTurtle(text);
  const prefixes = {}; let base = "";
  const triples = []; let bnodeId = 0;
  let p = 0;
  const peek = () => toks[p];
  const next = () => toks[p++];
  const expandPName = (w) => {
    const ci = w.indexOf(":"); if (ci === -1) return null;
    const pfx = w.slice(0, ci), local = w.slice(ci + 1);
    const ns = prefixes[pfx]; if (ns == null) return base + w; // unknown prefix: best-effort
    return ns + local;
  };
  const termOf = (tok) => {
    if (tok.t === "iri") return { iri: /^[a-z][a-z0-9+.-]*:/i.test(tok.v) ? tok.v : base + tok.v };
    if (tok.t === "lit") return { lit: tok.v };
    if (tok.t === "word") {
      if (tok.v === "a") return { iri: RDF_NS + "type" };
      if (tok.v === "true" || tok.v === "false") return { lit: tok.v };
      if (/^[+-]?[0-9][0-9.eE+-]*$/.test(tok.v)) return { lit: tok.v };
      const ex = expandPName(tok.v); return ex ? { iri: ex } : { lit: tok.v };
    }
    return null;
  };
  const parseObject = () => {
    const tok = peek();
    if (tok.t === "punc" && tok.v === "[") { next(); const bn = "_:b" + (bnodeId++); parsePredObjList(bn); if (peek() && peek().t === "punc" && peek().v === "]") next(); return { iri: bn }; }
    if (tok.t === "punc" && tok.v === "(") { next(); const items = []; while (peek() && !(peek().t === "punc" && peek().v === ")")) items.push(parseObject()); if (peek()) next(); const bn = "_:l" + (bnodeId++); return { iri: bn, list: items }; }
    return termOf(next());
  };
  const parsePredObjList = (subj) => {
    while (true) {
      const t = peek();
      if (!t || (t.t === "punc" && (t.v === "." || t.v === "]"))) break;
      if (t.t === "punc" && t.v === ";") { next(); continue; }
      const pTok = next(); const pred = termOf(pTok); if (!pred || !pred.iri) { continue; }
      while (true) {
        const o = parseObject();
        if (o && (o.iri || o.lit != null)) triples.push({ s: subj, p: pred.iri, o });
        const nx = peek();
        if (nx && nx.t === "punc" && nx.v === ",") { next(); continue; }
        break;
      }
      const nx = peek();
      if (nx && nx.t === "punc" && nx.v === ";") { next(); continue; }
      break;
    }
  };
  while (p < toks.length) {
    const t = peek();
    if (t.t === "dir" && (t.v === "@prefix" || t.v === "@base")) {
      const dir = next().v;
      if (dir === "@prefix") { const pn = next(); const iri = next(); const pfx = pn.v.replace(/:$/, ""); prefixes[pfx] = iri.v; }
      else { base = next().v; }
      if (peek() && peek().t === "punc" && peek().v === ".") next();
      continue;
    }
    if (t.t === "word" && /^prefix$/i.test(t.v)) { next(); const pn = next(); const iri = next(); prefixes[pn.v.replace(/:$/, "")] = iri.v; continue; }
    if (t.t === "word" && /^base$/i.test(t.v)) { next(); base = next().v; continue; }
    // subject
    let subj;
    if (t.t === "punc" && t.v === "[") { next(); subj = "_:b" + (bnodeId++); parsePredObjList(subj); if (peek() && peek().t === "punc" && peek().v === "]") next(); }
    else { const st = termOf(next()); if (!st) { continue; } subj = st.iri || st.lit; }
    parsePredObjList(subj);
    if (peek() && peek().t === "punc" && peek().v === ".") next();
  }
  return { triples, prefixes, base };
}

function rdfToGlossary(text) {
  const { triples } = parseTurtle(text);
  // index: subject -> predicate -> [objects]
  const byS = new Map();
  for (const tr of triples) {
    if (!byS.has(tr.s)) byS.set(tr.s, {});
    const m = byS.get(tr.s); (m[tr.p] = m[tr.p] || []).push(tr.o);
  }
  const A = RDF_NS + "type";
  const lit = (s, pred) => { const v = (byS.get(s) || {})[pred]; return v && v[0] && v[0].lit != null ? v[0].lit : ""; };
  const litAll = (s, pred) => ((byS.get(s) || {})[pred] || []).filter((o) => o.lit != null).map((o) => o.lit);
  const iri1 = (s, pred) => { const v = (byS.get(s) || {})[pred]; return v && v[0] && v[0].iri ? v[0].iri : ""; };
  const hasType = (s, ty) => ((byS.get(s) || {})[A] || []).some((o) => o.iri === ty);
  const local = (iri) => String(iri || "").split(/[#/]/).pop();
  const labelOf = (s) => lit(s, RDFS_NS + "label") || local(s);
  const govLocal = (s, name) => {
    const m = byS.get(s) || {};
    for (const pred in m) { if (pred.includes("governance/" + name) || pred.endsWith("#" + name)) { const o = m[pred][0]; if (o && o.lit != null) return o.lit; } }
    return "";
  };
  const govIri = (s, name) => {
    const m = byS.get(s) || {};
    for (const pred in m) { if (pred.includes("governance/" + name)) { const o = m[pred][0]; if (o && o.iri) return o.iri; } }
    return "";
  };

  const subjects = [...byS.keys()];
  const classLabel = {}; const schemeTitle = {};
  for (const s of subjects) if (hasType(s, OWL_NS + "Class")) classLabel[s] = labelOf(s);
  for (const s of subjects) if (hasType(s, SKOS_NS + "ConceptScheme")) schemeTitle[s] = lit(s, DCT_NS + "title") || labelOf(s);

  const entities = [], attributes = [], codeLists = [], crosswalks = [], spo = [];

  for (const s of subjects) {
    if (!hasType(s, OWL_NS + "Class")) continue;
    const sup = iri1(s, RDFS_NS + "subClassOf");
    entities.push({ Term: labelOf(s), "Term Type": "Entity",
      Definition: lit(s, SKOS_NS + "definition") || lit(s, RDFS_NS + "comment"),
      Aliases: litAll(s, SKOS_NS + "altLabel").join(", "),
      Hypernym: sup ? (classLabel[sup] || local(sup)) : "",
      "Glossary ID": lit(s, DCT_NS + "identifier"),
      Lifecycle: govLocal(s, "lifecycle"), Owner: govLocal(s, "owner"),
      "Steward (BDS)": govLocal(s, "steward"), "Subject Area": govLocal(s, "subjectArea"),
      Version: govLocal(s, "version") });
    if (sup && classLabel[sup]) spo.push({ Subject: labelOf(s), Predicate: "is a", Object: classLabel[sup] });
  }

  for (const s of subjects) {
    const isDP = hasType(s, OWL_NS + "DatatypeProperty"), isOP = hasType(s, OWL_NS + "ObjectProperty");
    if (!isDP && !isOP) continue;
    if (String(s).includes("relationship/")) continue;        // rel: predicate, handled via assertions
    const dom = iri1(s, RDFS_NS + "domain");
    const rng = iri1(s, RDFS_NS + "range");
    const coded = isOP && rng === SKOS_NS + "Concept";
    const clScheme = govIri(s, "codeList");
    const row = { Term: labelOf(s), "Term Type": govLocal(s, "registrationStatus") ? "Business Element" : "Attribute",
      Definition: lit(s, SKOS_NS + "definition") || lit(s, RDFS_NS + "comment"),
      "Object Class": dom ? (classLabel[dom] || local(dom)) : "",
      Property: govLocal(s, "property"), Qualifier: govLocal(s, "qualifier"),
      "Glossary ID": lit(s, DCT_NS + "identifier"),
      Representation: coded ? "Code" : "",
      Datatype: coded ? "Enumerated" : (rng ? (RDF_XSD_BACK[local(rng).toLowerCase()] || "") : ""),
      "Code List": clScheme ? (schemeTitle[clScheme] || "") : "",
      Minimum: govLocal(s, "minInclusive"), Maximum: govLocal(s, "maxInclusive"),
      "Unit of Measure": govLocal(s, "unitOfMeasure"),
      "Registration Status": govLocal(s, "registrationStatus"),
      Lifecycle: govLocal(s, "lifecycle"), Owner: govLocal(s, "owner"),
      "Steward (BDS)": govLocal(s, "steward"), "Subject Area": govLocal(s, "subjectArea"),
      Version: govLocal(s, "version") };
    // inline value-domain scheme (no dcterms:title) -> Permissible Values
    if (clScheme && !lit(clScheme, DCT_NS + "title") && hasType(clScheme, SKOS_NS + "ConceptScheme")) {
      const pvs = subjects.filter((c) => ((byS.get(c) || {})[SKOS_NS + "inScheme"] || []).some((o) => o.iri === clScheme))
        .map((c) => lit(c, SKOS_NS + "prefLabel")).filter(Boolean);
      if (pvs.length && !row["Code List"]) { row["Permissible Values"] = pvs.join(", "); row["Code List"] = ""; }
    }
    attributes.push(row);
  }

  for (const s of subjects) {
    if (!hasType(s, SKOS_NS + "ConceptScheme")) continue;
    const title = lit(s, DCT_NS + "title"); if (!title) continue;  // inline value-domain scheme -> skip
    codeLists.push({ Name: title, "Code List ID": lit(s, DCT_NS + "identifier"),
      Description: lit(s, SKOS_NS + "note"), Authority: govLocal(s, "authority"), Standard: govLocal(s, "standard"),
      Owner: govLocal(s, "owner"), Steward: govLocal(s, "steward"), Reference: iri1(s, RDFS_NS + "seeAlso") });
  }

  const MAP_BACK = [[SKOS_NS + "exactMatch", "Equivalent to"], [SKOS_NS + "broadMatch", "Broader than"],
    [SKOS_NS + "narrowMatch", "Narrower than"], [SKOS_NS + "relatedMatch", "Overlaps with"], [DCT_NS + "replaces", "Supersedes"]];
  for (const [pred, rel] of MAP_BACK) {
    for (const tr of triples) {
      if (tr.p === pred && tr.o.iri && schemeTitle[tr.s] && schemeTitle[tr.o.iri])
        crosswalks.push({ "From Code List": schemeTitle[tr.s], "To Code List": schemeTitle[tr.o.iri], Relationship: rel });
    }
  }
  for (const tr of triples) {
    if (!String(tr.p).includes("relationship/")) continue;
    if (tr.o.iri && classLabel[tr.s] && classLabel[tr.o.iri])
      spo.push({ Subject: classLabel[tr.s], Predicate: labelOf(tr.p), Object: classLabel[tr.o.iri] });
  }
  return { entities, attributes, codeLists, crosswalks, spo };
}

// Build a fresh glossary object from a parsed Turtle model.
function glossaryFromRdf(name, parsed) {
  const g = emptyGlossary(name);
  g.terms = [...parsed.entities, ...parsed.attributes];
  g.spo = parsed.spo.map((t, i) => ({ "SPO ID": i + 1, Term: t.Subject, Subject: t.Subject, Predicate: t.Predicate, Object: t.Object, "Sign-off": "Imported" }));
  g.codeLists = parsed.codeLists.length ? parsed.codeLists.map((c, i) => ({ ...c, "Code List ID": c["Code List ID"] || ("CL_" + String(i + 1).padStart(3, "0")) })) : SEED_CODE_LISTS.map((c) => ({ ...c }));
  g.crosswalks = parsed.crosswalks.map((x, i) => ({ ...x, "Crosswalk ID": "XW_" + String(i + 1).padStart(3, "0"), Status: "Active", "Last Updated": today() }));
  return g;
}

// Merge a parsed Turtle model into an existing glossary (upsert by Glossary ID then Term).
function mergeRdfIntoGlossary(g, parsed) {
  const added = { terms: 0, updated: 0, codeLists: 0, crosswalks: 0, spo: 0 };
  const findRow = (term, gid) => g.terms.find((t) => (gid && String(t["Glossary ID"] || "").trim() === gid)) ||
    g.terms.find((t) => norm(t.Term) === norm(term));
  let gmx = 0;
  g.terms.forEach((t) => { const d = String(t["Glossary ID"] || "").replace(/\D/g, ""); if (d) gmx = Math.max(gmx, +d); });
  const nextGid = () => "DG_BG_" + String(++gmx).padStart(3, "0");
  for (const row of [...parsed.entities, ...parsed.attributes]) {
    if (!String(row.Term || "").trim()) continue;
    let t = findRow(row.Term, String(row["Glossary ID"] || "").trim());
    if (!t) { t = { "Glossary ID": String(row["Glossary ID"] || "").trim() || nextGid(), Term: row.Term, Version: row.Version || 1, Lifecycle: row.Lifecycle || "Draft" }; g.terms.push(t); added.terms++; }
    else added.updated++;
    for (const k in row) { if (k === "Term") continue; if (String(row[k] ?? "").trim()) t[k] = row[k]; }
    t["Last Updated"] = today();
  }
  const haveCl = (nm) => (g.codeLists || []).some((c) => norm(c.Name) === norm(nm));
  let clmx = 0; (g.codeLists || []).forEach((c) => { const d = String(c["Code List ID"] || "").replace(/\D/g, ""); if (d) clmx = Math.max(clmx, +d); });
  parsed.codeLists.forEach((c) => { if (!c.Name || haveCl(c.Name)) return; g.codeLists.push({ ...c, "Code List ID": c["Code List ID"] || ("CL_" + String(++clmx).padStart(3, "0")) }); added.codeLists++; });
  const haveXw = (f, t) => (g.crosswalks || []).some((x) => norm(x["From Code List"]) === norm(f) && norm(x["To Code List"]) === norm(t));
  let xmx = 0; (g.crosswalks || []).forEach((x) => { const d = String(x["Crosswalk ID"] || "").replace(/\D/g, ""); if (d) xmx = Math.max(xmx, +d); });
  parsed.crosswalks.forEach((x) => { if (haveXw(x["From Code List"], x["To Code List"])) return; g.crosswalks.push({ ...x, "Crosswalk ID": "XW_" + String(++xmx).padStart(3, "0"), Status: "Active", "Last Updated": today() }); added.crosswalks++; });
  let smx = (g.spo || []).reduce((m, s) => Math.max(m, +String(s["SPO ID"] || 0) || 0), 0);
  const haveSpo = (a, p, o) => (g.spo || []).some((s) => norm(s.Subject) === norm(a) && norm(s.Predicate) === norm(p) && norm(s.Object) === norm(o));
  parsed.spo.forEach((t) => { if (haveSpo(t.Subject, t.Predicate, t.Object)) return; g.spo.push({ "SPO ID": ++smx, Term: t.Subject, Subject: t.Subject, Predicate: t.Predicate, Object: t.Object, "Sign-off": "Imported" }); added.spo++; });
  return added;
}

async function importRdfFile(file) {
  const text = await file.text();
  return rdfToGlossary(text);
}

// corpus row: {gId, gName, areas, term}
function analyzeCorpus(corpus){
  // Retired terms are decommissioned: they are excluded from the semantic model entirely,
  // so they don't count as defined terms, can't resolve references (masking real gaps), and
  // can't appear as duplicates/orphans. (Draft / In Review / Approved / Deprecated all remain.)
  const rows=(corpus||[]).filter(r=>r&&r.term&&String(r.term.Term||"").trim() && smNorm(r.term.Lifecycle)!=="retired");
  // canonical index (term + aliases) -> canonical Term, with article/plural folding

  rows.forEach(r=>{
    const t=r.term, c=t.Term;
    byTerm[c]={glossary:r.gName,gId:r.gId,type:t["Term Type"]||"",area:t["Subject Area"]||"",id:t["Glossary ID"]||"",lifecycle:t.Lifecycle||"",aliases:t.Aliases||"",hypernym:t.Hypernym||"",definition:t.Definition||""};

    const names=[c].concat(String(t.Aliases||"").split(/[;,]/).map(s=>s.trim()).filter(Boolean));

  const orphans=Object.keys(byTerm).filter(t=>!indeg[t]&&!outdeg[t]).sort().map(t=>({term:t,...byTerm[t]}));

  return {
    summary:{ glossaries:[...new Set(rows.map(r=>r.gName))], canonical_terms:Object.keys(byTerm).length, edges:edges.size, duplicates:dups.length, orphans:orphans.length, missing:missingList.length, isa:isa.length },
    duplicates:dups, orphans, missing:missingList, isa, byTerm, graph:{nodes,links}, subjectAreas

}

const SM_CORE_GLOSSARY="Core / Semantic Model";
function computeModelDiff(corpus){
  const live=(corpus||[]).filter(r=>r&&r.term&&smNorm(r.term.Lifecycle)!=="retired");  // retired terms are out of the model
  const present={}; live.forEach(r=>{ present[smNorm(r.term.Term)]={gId:r.gId,gName:r.gName,term:r.term}; });
  const aliasTo={}; live.forEach(r=>{ String(r.term.Aliases||"").split(/[;,]/).map(s=>s.trim()).filter(Boolean).forEach(a=>aliasTo[smNorm(a)]=r.term.Term); });
  const P=CURATED_MODEL.parent;
  const isDefined=(n)=> (smNorm(n) in present) || (smNorm(n) in aliasTo);
  const added=[], repointed=[], unchanged=[];
  Object.keys(P).forEach(name=>{
    const parent=P[name]||""; // "" = branch root
    const rec=present[smNorm(name)] || (aliasTo[smNorm(name)] ? present[smNorm(aliasTo[smNorm(name)])] : null);
    if(rec){
      const cur=String(rec.term.Hypernym||"").trim();
      if(parent && smNorm(cur)!==smNorm(parent)) repointed.push({term:name,from:cur||"(none)",to:parent,gName:rec.gName});
      else unchanged.push(name);
    } else {
      added.push({term:name,parent:parent,assoc:false});
    }
  });
  // associative entity
  const assoc=(CURATED_MODEL.assoc||[]).map(a=>({name:a.name,present:isDefined(a.name),attrs:(a.attributes||[]).length}));
  return {added,repointed,unchanged,assoc,coreGlossary:SM_CORE_GLOSSARY};
