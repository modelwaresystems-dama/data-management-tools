function smB64ToStr(b64){
  if(typeof atob==="function"){ const bin=atob(b64); try{ return decodeURIComponent(escape(bin)); }catch(e){ return bin; } }
  return Buffer.from(b64,"base64").toString("utf8");
}
function buildSiteData(an){
  const terms={}; Object.keys(an.byTerm).forEach(n=>{ const m=an.byTerm[n]; terms[n]={glossary:m.glossary,type:m.type,area:m.area,id:m.id,lifecycle:m.lifecycle,aliases:m.aliases,definition:m.definition,link:""}; });
  return {
    summary:{glossaries:an.summary.glossaries,canonical_terms:an.summary.canonical_terms,alias_rows:0,edges:an.summary.edges,orphans:an.summary.orphans,duplicates:an.summary.duplicates,missing:an.summary.missing,isa:an.summary.isa},
    duplicates:an.duplicates.map(d=>({term:d.term,glossaries:d.glossaries,ids:[]})),
    alias_collisions:[],
    orphans:an.orphans.map(o=>({term:o.term,glossary:o.glossary,type:o.type,area:o.area,id:o.id,lifecycle:o.lifecycle})),
    missing:an.missing, isa:an.isa, terms, graph:an.graph, subject_areas:an.subjectAreas
  };
}
function buildSiteCurated(an){
  const P=CURATED_MODEL.parent; const defined={}, glossary={}, type={}, classification={};
  const chain=(n)=>{ const out=[n]; let x=n; while(P[x]){ x=P[x]; out.push(x); } return out; };
  const ORG=new Set(); (function(){ const stack=["Organisation Role"]; ORG.add("Organisation Role"); for(const c in P){ let x=c; while(P[x]){ if(P[x]==="Organisation Role"||ORG.has(P[x])){ORG.add(c);break;} x=P[x]; } } })();
  Object.keys(P).forEach(n=>{
    const m=an.byTerm[n]||(an.byTerm[n.replace(/ ID$/,"")]); 
    defined[n]=!!an.byTerm[n]; glossary[n]=an.byTerm[n]?an.byTerm[n].glossary:""; type[n]=an.byTerm[n]?an.byTerm[n].type:"";
    const ch=chain(n); const top=ch[ch.length-1];
    classification[n]= top==="Actor" ? (ch.includes("Party Group")?"Party Group":ch.includes("Automated Agent")?"Automated Agent":ch.includes("Party")?"Party":"Actor")
                      : (ORG.has(n)?"Organisation Role": ch.includes("Oversight & Accountability Role")?"Oversight Role":"Party Role");
  });
  return {parent:P,roots:CURATED_MODEL.roots,defined,glossary,type,classification,assoc:CURATED_MODEL.assoc};
}
function buildSiteHtml(corpus){
  const an=analyzeCorpus(corpus||[]);
  const tmpl=smB64ToStr(SM_SITE_TEMPLATE_B64);
  return tmpl.replace("__DATA__", JSON.stringify(buildSiteData(an))).replace("__CURATED__", JSON.stringify(buildSiteCurated(an)));
}

/* ---- RDF/Turtle patch: the WHOLE curated model as a mergeable Turtle file ----
   Unlike applyModelFixes([]) (which only emits the brand-new abstract classes),
   this synthesises a glossary containing every taxonomy node — existing terms
   included — each typed as an owl:Class carrying its curated hypernym, plus the
   Group Membership associative entity (as a class so its properties get a domain),
   its 10 attributes and 3 code lists. Because buildTurtle only emits
   rdfs:subClassOf when BOTH ends are Entities in the same file, having every node
   present is what makes the patch complete: merging it (Import RDF → merge) both
   creates the new classes AND re-points the hypernyms of existing terms, since
   mergeRdfIntoGlossary upserts and overwrites non-empty fields. Importing it as a
   new glossary instead yields a stand-alone RDF rendering of the Core model. */
const PATCH_DT = { Boolean: "Boolean", Date: "Date", DateTime: "DateTime", Integer: "Integer", Decimal: "Decimal" };
function buildModelPatchGlossary(){
  const P = CURATED_MODEL.parent;
  const g = emptyGlossary(SM_CORE_GLOSSARY);
  g.codeLists = [];   // the patch carries only the curated code lists, not the seed reference-data registry
  const seen = new Set();
  const add = (row) => {
    const k = norm(row.Term); if (!k || seen.has(k)) return; seen.add(k);
    const full = {}; GLOSSARY_COLS.forEach((c) => { full[c] = row[c] != null ? row[c] : ""; });
    g.terms.push(full);
  };
  // every taxonomy node as a class carrying its curated hypernym (roots: blank)
  Object.keys(P).forEach((name) => add({ Term: name, "Term Type": "Entity", "Subject Area": "", Hypernym: P[name] || "", Lifecycle: "Draft", Version: 1 }));
  // the associative entity + its attributes + its code lists
  (CURATED_MODEL.assoc || []).forEach((a) => {
    add({ Term: a.name, "Term Type": "Entity", "Subject Area": "", Definition: a.purpose, Lifecycle: "Draft", Version: 1 });
    (a.attributes || []).forEach((at) => {
      const coded = !!at.code_list;
      add({ Term: at.name, "Term Type": "Attribute", "Object Class": a.name, Definition: at.desc,
        Representation: coded ? "Code" : "", Datatype: coded ? "Enumerated" : (PATCH_DT[at.datatype] || "String"),
        "Code List": at.code_list || "", Lifecycle: "Draft", Version: 1 });
    });
    g.codeLists = g.codeLists || [];
    Object.entries(a.vocab || {}).forEach(([cl, vals]) => {
      if (!g.codeLists.some((c) => norm(c.Name) === norm(cl)))
        g.codeLists.push({ Name: cl, "Code List ID": "", Description: vals.join(", "), Authority: "Curated", Standard: "" });
    });
  });
  return g;
}
function buildModelPatchTtl(){
  return buildTurtle(buildModelPatchGlossary(), "https://glossary.modelware.example/def");
}

function buildChangeSetCsv(diff){
  const rows=[["Change","Term","From / Parent","To / Detail","Status"]];
  diff.added.forEach(a=>rows.push(["Add class",a.term,"",a.parent||"(root)","NEW — define"]));
  diff.repointed.forEach(r=>rows.push(["Re-point hypernym",r.term,r.from,r.to,"update ("+r.gName+")"]));
  (diff.assoc||[]).forEach(a=>rows.push(["Associative entity",a.name,"",a.attrs+" attributes",a.present?"present":"NEW — define"]));
  return rows.map(r=>r.map(csvCell).join(",")).join("\r\n")+"\r\n";
}

/* Apply the curated model to live glossary objects (pure; caller persists).
   `glossaries` is an array of full glossary objects (with .terms). Mutates and
   returns {coreCreated, added, repointed, assocAdded, touched:Set(gId)}. New
   abstract classes + the Group Membership associative entity land in a dedicated
   Core glossary so they don't pollute the domain glossaries. */
function applyModelFixes(glossaries, opts){
  opts=opts||{};
  const P=CURATED_MODEL.parent;
  const touched=new Set();
  const norm=smNorm;
  // index every existing term across all glossaries
  const termIndex={}; // norm(name) -> {g, term}
  glossaries.forEach(g=>{ (g.terms||[]).forEach(t=>{ termIndex[norm(t.Term)]={g,term:t}; }); });
  const aliasIndex={}; glossaries.forEach(g=>{ (g.terms||[]).forEach(t=>{ String(t.Aliases||"").split(/[;,]/).map(s=>s.trim()).filter(Boolean).forEach(a=>aliasIndex[norm(a)]={g,term:t}); }); });
  const exists=(n)=> (norm(n) in termIndex) || (norm(n) in aliasIndex);

  // 1. ensure a Core glossary
  let core=glossaries.find(g=>g.name===SM_CORE_GLOSSARY);
  let coreCreated=false;
  if(!core){ core=emptyGlossary(SM_CORE_GLOSSARY); glossaries.push(core); coreCreated=true; }
  const coreSeq=()=>{ let n=core.terms.length+1; return "SM_"+String(n).padStart(3,"0"); };
  const addClass=(name,parent,type)=>{
    const row={}; GLOSSARY_COLS.forEach(c=>row[c]="");
    row["Glossary ID"]=coreSeq(); row["Term"]=name; row["Term Type"]=type||"Entity";
    row["Subject Area"]="Semantic Model"; row["Hypernym"]=parent||""; row["Lifecycle"]="Draft";
    row["Definition"]=""; row["Version"]=1; row["Last Updated"]=today();
    core.terms.push(row); termIndex[norm(name)]={g:core,term:row}; touched.add(core.id);
    return row;
  };

  // 2. add new classes (in dependency order: parents before children isn't required for a flat list)
  const added=[];
  CURATED_MODEL.new_classes.forEach(name=>{
    if(exists(name)) return;
    addClass(name, P[name]||"", "Entity"); added.push({term:name,parent:P[name]||""});
  });

  // 3. re-point hypernyms on existing terms per the curated parent map
  const repointed=[];
  Object.keys(P).forEach(name=>{
    const parent=P[name]; if(!parent) return;
    const rec=termIndex[norm(name)]; if(!rec) return;
    const cur=String(rec.term.Hypernym||"").trim();
    if(norm(cur)!==norm(parent)){
      rec.term.Hypernym=parent; rec.term["Last Updated"]=today();
      touched.add(rec.g.id); repointed.push({term:name,from:cur||"(none)",to:parent,gName:rec.g.name});
    }
  });

  // 4. add the Group Membership associative entity + its attributes + code lists
  let assocAdded=0;
  (CURATED_MODEL.assoc||[]).forEach(a=>{
    if(exists(a.name)) return;
    addClass(a.name, "", "Associative Entity"); assocAdded++;
    (a.attributes||[]).forEach(at=>{
      if(exists(at.name)) return;
      const row={}; GLOSSARY_COLS.forEach(c=>row[c]="");
      row["Glossary ID"]=coreSeq(); row["Term"]=at.name; row["Term Type"]="Attribute";
      row["Subject Area"]="Semantic Model"; row["Object Class"]=a.name; row["Definition"]=at.desc||"";
      row["Datatype"]=at.datatype||""; row["Code List"]=at.code_list||""; row["Lifecycle"]="Draft";
      row["Version"]=1; row["Last Updated"]=today();
      core.terms.push(row); termIndex[norm(at.name)]={g:core,term:row};
    });
    // code lists onto the Core glossary
    core.codeLists=core.codeLists||[];
    Object.entries(a.vocab||{}).forEach(([cl,vals])=>{
      if(!core.codeLists.some(c=>norm(c.name||c.Name||"")===norm(cl)))
        core.codeLists.push({name:cl, values:vals.map((v,i)=>({code:String(i+1),label:v}))});
    });
    touched.add(core.id);
  });

  return {coreCreated, added, repointed, assocAdded, touched:[...touched]};
}

function downloadCsv(filename, text) {
  const blob = new Blob([text], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1500);
}
function downloadText(filename, text, mime) {
  const blob = new Blob([text], { type: (mime || "text/plain") + ";charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1500);
}
async function importWorkbook(file) {
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf);
  const readSheet = (name, cols) => {
    const ws = wb.Sheets[name];
    if (!ws) return [];
    const rows = XLSX.utils.sheet_to_json(ws, { defval: "" });
    return rows.map((row) => {
      const o = {};
      cols.forEach((c) => { o[c] = row[c] ?? ""; });
      return o;
    }).filter((r) => Object.values(r).some((v) => String(v).trim() !== ""));
  };
  const codeLists = readSheet("Code Lists", CODELIST_COLS);
  return {
    terms: readSheet("Glossary", GLOSSARY_COLS),
    spo: readSheet("SPO", SPO_COLS),
    history: readSheet("History", HISTORY_COLS),
    subcats: readSheet("Sub-Categories", SUBCAT_COLS),
    notes: readSheet("Decision Notes", NOTES_COLS),
    codeLists: codeLists.length ? codeLists : SEED_CODE_LISTS.map((c) => ({ ...c })),
    crosswalks: readSheet("Cross-Walks", CROSSWALK_COLS),
    rdChanges: readSheet("RD Change Requests", RDCHANGE_COLS),
  };
}

/* ============================================================
   SPO Audit import — reads an audit workbook produced by the
   Intralign skill ("audit an existing glossary to flag definition
   quality issues"). One "Audit" sheet, one row per flagged SPO.
============================================================ */
const AUDIT_COLS = ["Severity", "Term", "Version", "SPO ID", "Order", "Subject", "Predicate", "Object", "Issue", "Suggested Fix"];
async function importAuditFile(file) {
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf);
  const wsName = wb.SheetNames.find((n) => String(n).trim().toLowerCase() === "audit");
  const ws = wsName ? wb.Sheets[wsName] : null;
  if (!ws) return { hasAuditSheet: false, findings: [] };   // genuinely wrong file shape
  const rows = XLSX.utils.sheet_to_json(ws, { defval: "" });
  const findings = rows
    .map((row) => { const o = {}; AUDIT_COLS.forEach((c) => { o[c] = row[c] ?? ""; }); return o; })
    .filter((r) => String(r.Term).trim() !== "" || String(r.Issue).trim() !== "");
  return { hasAuditSheet: true, findings };                 // valid audit; findings may be empty (clean bill of health)
}

/* ============================================================
   Undefined-Terms Worklist import — reads the corpus-wide gap
   worklist (the "Worklist" sheet produced for the CDS). One row
   per referenced-but-undefined term; the CDS sets a decision
   (Accept / Reject / Undefined-default) which persists on the glossary.
============================================================ */
const WORKLIST_COLS = ["Ref ID", "Referenced Term", "Category", "Suggested Bucket", "Matches / Canonical", "Score", "Referenced By", "# Refs", "CDS Decision", "Assigned Steward", "Priority", "Status", "Notes"];
const UNDEF_DECISIONS = ["Undefined", "Accept", "Reject"];   // Undefined is the default
function mapWorklistDecision(v) {
  const s = String(v || "").trim().toLowerCase();
  if (s === "accept" || s === "accepted") return "Accept";
  if (s === "reject" || s === "rejected") return "Reject";
  return "Undefined";   // blank / Open / any suggested-bucket value starts undecided
}
async function importWorklistFile(file) {
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf);
  const wsName = wb.SheetNames.find((n) => String(n).trim().toLowerCase() === "worklist");
  const ws = wsName ? wb.Sheets[wsName] : null;
  if (!ws) return { hasWorklist: false, items: [] };
  const rows = XLSX.utils.sheet_to_json(ws, { defval: "" });
  const items = rows
    .map((row) => { const o = {}; WORKLIST_COLS.forEach((c) => { o[c] = row[c] ?? ""; }); o.decision = mapWorklistDecision(o["CDS Decision"]); return o; })
    .filter((r) => String(r["Referenced Term"]).trim() !== "");
  return { hasWorklist: true, items };
}

/* Parse a Reconciliation_Signoff_Summary workbook (output of the reconcile step).
   Returns the new terms (for sign-off), revised terms, retirements and rejected statements,
   grouped Foundational-first with each glossary's terms grouped by hypernym. */
async function importReconSummaryFile(file) {
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf);
  const find = (n) => wb.SheetNames.find((s) => String(s).trim().toLowerCase() === n);
  const sheet = (n) => { const w = find(n); return w ? XLSX.utils.sheet_to_json(wb.Sheets[w], { defval: "" }) : null; };
  const ntRaw = sheet("new terms for sign-off");
  if (!ntRaw) return { ok: false };   // not a reconciliation summary
  const nt = ntRaw.filter((r) => String(r.Term || "").trim());   // drop "— Foundational —" section rows
  const rev = sheet("revised terms") || [];
  const ret = sheet("retirements") || [];
  const rej = sheet("rejected statements") || [];

  // glossary order: Foundational first, then domains in first-seen order
  const order = [];
  nt.forEach((r) => { const g = r.Glossary; if (g && !order.includes(g)) order.push(g); });
  const ordered = ["Foundational", ...order.filter((g) => g !== "Foundational")].filter((g) => order.includes(g));

  const glossaries = {};
  ordered.forEach((g) => {
    const terms = nt.filter((r) => r.Glossary === g).map((r) => ({
      term: String(r.Term).trim(), gid: r["Glossary ID"] || "", type: r["Term Type"] || "",
      hypernym: r["Hypernym (is a)"] || "(no parent)", version: r.Version || 1,
      spos: Number(r["Pending SPOs"] || 0), lifecycle: r.Lifecycle || "In Review",
      definition: r.Definition || "",
    }));
    // group by hypernym, ordered by count desc then name
    const byH = {}; terms.forEach((t) => { (byH[t.hypernym] = byH[t.hypernym] || []).push(t); });
    const hyps = Object.keys(byH).sort((a, b) => byH[b].length - byH[a].length || a.localeCompare(b));
    const groups = hyps.map((h) => ({ hypernym: h, terms: byH[h].slice().sort((a, b) => a.term.localeCompare(b.term)) }));
    glossaries[g] = {
      groups, count: terms.length,
      revised: rev.filter((r) => r.Glossary === g).map((r) => ({
        term: String(r.Term).trim(), change: r.Change || "", before: r["Parent before"] || "",
        after: r["Parent after"] || "", version: r["New Version"] || "", spos: Number(r["Pending SPOs"] || 0),
        definition: r["Definition (new)"] || "",
      })),
      retired: ret.filter((r) => (r["Glossary (retired in)"] || r.Glossary) === g).map((r) => ({
        term: String(r.Term).trim(), reason: r["Reason / canonical home"] || "",
      })),
      rejected: rej.filter((r) => r.Glossary === g).map((r) => ({
        term: String(r.Term).trim(), predicate: r.Predicate || "", object: r.Object || "", reason: r.Reason || "",
      })),
    };
  });
  const totals = {
    new: nt.length, revised: rev.length, retired: ret.length, rejected: rej.length,
    spos: ordered.reduce((n, g) => n + glossaries[g].groups.reduce((m, gr) => m + gr.terms.reduce((k, t) => k + t.spos, 0), 0), 0),
  };
  return { ok: true, order: ordered, glossaries, totals, file: file.name };
}

/* ============================================================
   Glossary domain operations (mirror glossary.py semantics)
============================================================ */
const emptyGlossary = (name) => ({ id: uid(), name: name || "Untitled Glossary", terms: [], spo: [], history: [], notes: [], subcats: [], codeLists: SEED_CODE_LISTS.map((c) => ({ ...c })), crosswalks: [], rdChanges: [], updated: Date.now() });

/* Display label for a glossary: derived from the Subject Area(s) of its terms.
   One area -> that area; a few -> joined; many -> "N subject areas"; none -> the stored name. */
function subjectAreaLabel(glossary) {
  const areas = [];
  const seen = new Set();
  (glossary.terms || []).forEach((t) => {
    const a = String(t["Subject Area"] || "").trim();
    if (a && !seen.has(a.toLowerCase())) { seen.add(a.toLowerCase()); areas.push(a); }
  });
  if (areas.length === 0) return glossary.name || "Untitled Glossary";
  if (areas.length <= 3) return areas.join(" · ");
  return `${areas.slice(0, 2).join(" · ")} +${areas.length - 2} more`;
}
/* Same, from a lightweight index entry that caches the areas (see saveGlossary). */
function entryLabel(entry) {
  const areas = entry.areas || [];
  if (areas.length === 0) return entry.name || "Untitled Glossary";
  if (areas.length <= 3) return areas.join(" · ");
  return `${areas.slice(0, 2).join(" · ")} +${areas.length - 2} more`;
}

function nextGlossaryId(terms) {
  let mx = 0;
  terms.forEach((t) => { const m = /DG_BG_(\d+)/.exec(t["Glossary ID"] || ""); if (m) mx = Math.max(mx, +m[1]); });
  return "DG_BG_" + String(mx + 1).padStart(3, "0");
}
function nextSpoId(spo) {
  let mx = 0; spo.forEach((s) => { const n = parseInt(s["SPO ID"], 10); if (!isNaN(n)) mx = Math.max(mx, n); });
  return mx + 1;
}
function nextNoteId(notes) {
  let mx = 0; (notes || []).forEach((n) => { const v = parseInt(n["Note ID"], 10); if (!isNaN(v)) mx = Math.max(mx, v); });
  return mx + 1;
}
/* A term that is managed as an ISO/IEC 11179 data element: either explicitly a Business Element,
   or an Attribute (the two are the same idea at attribute level). */
function isElement(t) {
  const tt = String((t && t["Term Type"]) || "").trim();
  return tt === "Business Element" || tt === "Attribute";
}
/* ISO/IEC 11179-5 naming check. A data element name reads Object Class + [Qualifier] Property +
   Representation term. The representation term may be IMPLIED by the property (ISO 11179-5 allows
   dropping it to avoid redundancy, e.g. "Country of Origin" already implies a Code; you don't write
   "Country of Origin Code Code"). So we credit the name when the Property is present AND the name
   carries the representation term either literally or via an accepted synonym, or the property itself
   already denotes that representation. */
const REP_TERM_SYNONYMS = {
  code: ["code", "type", "category", "class", "status", "country", "currency", "language", "indicator"],
  identifier: ["identifier", "id", "number", "no", "reference", "key", "code"],
  name: ["name", "title", "label", "description", "text"],
  text: ["text", "description", "note", "comment", "name"],
  amount: ["amount", "value", "balance", "fee", "cost", "price", "charge", "sum"],
  date: ["date", "day", "expiry", "deadline", "maturity"],
  time: ["time", "timestamp", "moment"],
  count: ["count", "number", "quantity", "qty", "total"],
  quantity: ["quantity", "qty", "count", "number", "volume", "weight"],
  measure: ["measure", "rate", "ratio", "percentage", "percent", "score", "index", "level", "size", "duration"],
  percent: ["percent", "percentage", "rate", "ratio"],
  ratio: ["ratio", "rate", "proportion", "percentage"],
  indicator: ["indicator", "flag", "is", "has"],
};
function namingOk(t) {
  const term = String(t.Term || "").trim().toLowerCase();
  const oc = String(t["Object Class"] || "").trim().toLowerCase();
  const prop = String(t.Property || "").trim().toLowerCase();
  const rep = String(t.Representation || "").trim().toLowerCase();
  if (!term || !oc || !rep) return false;
  // 1) the property (the distinguishing part) must be reflected in the name
  const propOk = !prop || prop.split(/\s+/).some((w) => w.length > 2 && term.includes(w));
  // 2) the representation term: literal, an accepted synonym, or implied by the property/name
  const syns = REP_TERM_SYNONYMS[rep] || [rep];
  const repOk = syns.some((s) => new RegExp("\\b" + s + "\\b").test(term));
  // 3) the object class should be scoped by the name OR by the property (which often names the class's role)
  const ocWords = oc.split(/\s+/).filter((w) => w.length > 2 && !["the", "of", "and"].includes(w));
  const ocOk = ocWords.length === 0 || ocWords.some((w) => term.includes(w)) || (!!prop && term.includes(prop));
  return propOk && repOk && ocOk;
}
/* Is this attribute's Object Class an actually-defined Entity in the glossary? */
function objectClassIsEntity(t, allTerms) {
  const oc = String(t["Object Class"] || "").trim();
  if (!oc) return false;
  return (allTerms || []).some((x) => String(x["Term Type"] || "").trim() === "Entity" && norm(x.Term) === norm(oc));
}
/* ISO/IEC 11179 completeness/quality checklist. Pass allTerms so Object Class can be checked
   against real Entities. Weights sum to 100. */
function isoQualityChecks(t, allTerms) {
  const defWords = String(t.Definition || "").trim().split(/\s+/).filter(Boolean).length;
  const dt = String(t.Datatype || "").trim();
  const needsPV = ["Enumerated", "Code"].includes(dt);
  const needsRange = RANGE_DATATYPES.includes(dt);
  const hasRange = !!String(t.Minimum || "").trim() || !!String(t.Maximum || "").trim();
  const hasUoM = !!String(t["Unit of Measure"] || "").trim();
  return [
    { key: "Definition", label: "Definition (\u2265 5 words)", ok: defWords >= 5, pts: 16, field: "Definition" },
    { key: "Object Class", label: "Object Class is a defined Entity", ok: objectClassIsEntity(t, allTerms), pts: 14, field: "Object Class" },
    { key: "Property", label: "Property set", ok: !!String(t.Property || "").trim(), pts: 10, field: "Property" },
    { key: "Representation", label: "Representation class set", ok: !!String(t.Representation || "").trim(), pts: 8, field: "Representation" },
    { key: "Datatype", label: "Datatype set (derivable from definition)", ok: !!dt, pts: 10, field: "Datatype" },
    { key: "Value Domain", label: needsPV ? "Code List or Permissible Values (enumerated domain)" : (needsRange ? "Min/Max range set" : "Value domain populated"), ok: needsPV ? (!!String(t["Code List"] || "").trim() || !!String(t["Permissible Values"] || "").trim()) : (needsRange ? hasRange : true), pts: 10, field: needsPV ? "Code List" : "Minimum" },
    { key: "Unit of Measure", label: "Unit of Measure (UCUM / ISO 80000)", ok: needsRange ? (hasUoM || dt === "Date" || dt === "DateTime" || dt === "Time") : true, pts: 6, field: "Unit of Measure" },
    { key: "Stewardship", label: "Steward or Owner assigned", ok: !!String(t["Steward (BDS)"] || "").trim() || !!String(t.Owner || "").trim(), pts: 8, field: "Steward (BDS)" },
    { key: "Naming", label: "Name follows ISO 11179-5 (Object Class + [Qualifier] Property + Representation)", ok: namingOk(t), pts: 10, field: "Term" },
    { key: "Registration", label: "Registration Status is Qualified or Standard", ok: ["Qualified", "Standard"].includes(String(t["Registration Status"] || "").trim()), pts: 8, field: "Registration Status" },
  ];
}
/* ISO/IEC 11179 completeness/quality score (0-100). */
function isoQualityScore(t, allTerms) {
  return isoQualityChecks(t, allTerms).reduce((s, c) => s + (c.ok ? c.pts : 0), 0);
}

/* Common qualifier (modifier) terms that make a Property unique under ISO 11179. */
const QUALIFIER_TERMS = ["Opening", "Closing", "Start", "End", "Expiry", "Effective", "Maximum", "Minimum",
  "Gross", "Net", "Total", "Current", "Original", "Issue", "Issued", "Due", "Settlement", "Maturity",
  "Birth", "Registration", "Approval", "Created", "Modified", "First", "Last", "Primary", "Secondary"];

/* Derive a Datatype from the definition wording + representation class. */
function deriveDatatype(t, representation) {
  const def = String(t.Definition || "").toLowerCase();
  const rep = String(representation || t.Representation || "").toLowerCase();
  if (rep === "indicator" || /\b(true|false|yes\/no|boolean|flag|whether)\b/.test(def)) return "Boolean";
  if (rep === "time" || /time of day|timestamp|datetime/.test(def)) return /timestamp|datetime/.test(def) ? "DateTime" : "Time";
  if (rep === "date" || /\bdate\b/.test(def)) return "Date";
  if (rep === "amount" || /\b(amount|sum of money|monetary|currency|price|cost|fee|value in )\b/.test(def)) return "Currency";
  if (rep === "percent" || rep === "ratio" || /\b(percentage|percent|ratio|rate)\b/.test(def)) return "Decimal";
  if (rep === "count" || /\b(number of|count of|quantity of|how many)\b/.test(def)) return "Integer";
  if (rep === "measure" || rep === "quantity" || /\b(measured in|weight|length|height|volume|distance)\b/.test(def)) return "Decimal";
  if (rep === "code" || /\b(code|coded value|one of)\b/.test(def)) return "Enumerated";
  if (rep === "identifier" || rep === "name" || rep === "text") return "String";
  return "";
}

/* Suggest the full ISO 11179 element profile for an attribute, using the glossary's defined Entities. */
function suggestIso(t, spos, allTerms, codeLists) {
  const term = String(t.Term || "").trim();
  const words = term.split(/\s+/).filter(Boolean);
  const hypernym = String(t.Hypernym || "").trim();
  const cls = (spos || []).find((s) => String(s.Order || "").startsWith("01") || norm(s.Predicate) === norm("is a"));
  const clsObj = cls ? String(cls.Object || "").trim() : "";

  // --- Object Class: STRICTLY the defined Entity that contains this attribute ---
  const entities = (allTerms || []).filter((x) => String(x["Term Type"] || "").trim() === "Entity");
  const entityNames = entities.map((e) => String(e.Term || "").trim()).filter(Boolean);
  let objectClass = "", objectClassResolved = false;
  // 1) an SPO link where a defined Entity is Subject/Object of this attribute (e.g. "Credit Terms specify Expiry Date")
  for (const s of (spos || [])) {
    const other = norm(s.Subject) === norm(term) ? s.Object : (norm(s.Object) === norm(term) ? s.Subject : "");
    const match = entityNames.find((e) => norm(e) === norm(other));
    if (match) { objectClass = match; objectClassResolved = true; break; }
  }
  // 2) a defined Entity whose name is the leading words of the attribute (e.g. "Letter of Credit" in "Letter of Credit Amount")
  if (!objectClassResolved) {
    const cand = entityNames
      .filter((e) => norm(term).startsWith(norm(e)) && norm(term) !== norm(e))
      .sort((a, b) => b.length - a.length)[0];
    if (cand) { objectClass = cand; objectClassResolved = true; }
  }
  // 3) the classification object, if it happens to be a defined Entity
  if (!objectClassResolved && clsObj && entityNames.some((e) => norm(e) === norm(clsObj))) {
    objectClass = clsObj; objectClassResolved = true;
  }

  // --- Reference Data: a value domain bound to a governed code list is, by definition, coded ---
  const codeList = suggestCodeList(t, codeLists);

  // --- Representation ---
  const repWords = REPRESENTATION_CLASSES.map((r) => r.toLowerCase());
  let representation = "";
  for (let i = words.length - 1; i >= 0; i--) {
    if (repWords.includes(words[i].toLowerCase())) { representation = REPRESENTATION_CLASSES[repWords.indexOf(words[i].toLowerCase())]; break; }
  }
  if (!representation) {
    const hay = (hypernym + " " + clsObj + " " + String(t.Definition || "")).toLowerCase();
    const map = [["date", "Date"], ["time", "Time"], ["amount", "Amount"], ["money", "Amount"], ["currency", "Amount"],
      ["code", "Code"], ["count", "Count"], ["number", "Count"], ["identifier", "Identifier"], ["percent", "Percent"],
      ["ratio", "Ratio"], ["name", "Name"], ["indicator", "Indicator"], ["flag", "Indicator"],
      ["quantity", "Quantity"], ["measure", "Measure"]];
    for (const [k, v] of map) { if (hay.includes(k)) { representation = v; break; } }
  }
  // A resolved reference-data code list overrides: such an attribute is always Representation = Code.
  if (codeList) representation = "Code";

  // --- Property + Qualifier (uniqueness modifier) from the words between Object Class and Representation ---
  const lw = words.map((w) => w.toLowerCase());
  const repIdx = representation && lw.includes(representation.toLowerCase())
    ? lw.length - 1 - lw.slice().reverse().indexOf(representation.toLowerCase()) : words.length;
  // strip the resolved object class from the front
  let mid = words.slice(0, repIdx);
  if (objectClass) {
    const ocw = objectClass.split(/\s+/).length;
    if (norm(words.slice(0, ocw).join(" ")) === norm(objectClass)) mid = words.slice(ocw, repIdx);
  }
  let property = "", qualifier = "";
  const qSet = new Set(QUALIFIER_TERMS.map((q) => q.toLowerCase()));
  const quals = mid.filter((w) => qSet.has(w.toLowerCase()));
  const bases = mid.filter((w) => !qSet.has(w.toLowerCase()));
  qualifier = quals.join(" ");
  if (bases.length) property = bases.join(" ");
  else if (representation) property = representation;
  else if (mid.length) property = mid[mid.length - 1];

  // --- Datatype, derived from the definition (a coded value domain is Enumerated) ---
  const datatype = codeList ? "Enumerated" : deriveDatatype(t, representation);

  // --- Range + UoM hints for numeric/temporal datatypes ---
  let unitOfMeasure = "";
  if (datatype === "Currency") unitOfMeasure = "[ZAR] — South African Rand";
  else if (representation === "Percent") unitOfMeasure = "% — percent";
  else if (representation === "Count") unitOfMeasure = "{count} — count";

  return {
    "Object Class": objectClass,
    objectClassResolved,
    "Property": property,
    "Qualifier": qualifier,
    "Representation": representation,
    "Datatype": datatype,
    "Unit of Measure": unitOfMeasure,
    "Code List": codeList,
    needsRange: RANGE_DATATYPES.includes(datatype),
    isReferenceData: representation === "Code" || datatype === "Enumerated" || !!codeList,
  };
}

/* Suggest a governed code list (by name) for a reference-data attribute, from name keywords.
   Resolves against the glossary's registered code lists where possible, else a standard name. */
function suggestCodeList(t, codeLists) {
  const hay = (String(t.Term || "") + " " + String(t.Definition || "")).toLowerCase();
  const map = [
    [/\b(country|countries|nationality|origin|domicile|jurisdiction)\b/, "ISO 3166-1 alpha-2", "country"],
    [/\b(currency|currencies|denomination)\b/, "ISO 4217", "currency"],
    [/\b(language|languages)\b/, "ISO 639-1", "language"],
  ];
  let standard = "";
  for (const [re, std] of map) { if (re.test(hay)) { standard = std; break; } }
  if (!standard) return "";
  // prefer the registered list whose Standard matches
  const reg = codeLists || [];
  const hit = reg.find((c) => norm(c.Standard) === norm(standard) || norm(c.Name).includes(norm(standard)));
  return hit ? hit.Name : standard;
}

const termRefs = (triples, self) => {
  const sn = norm(self), seen = new Set(), out = [];
  triples.forEach((t) => ["Subject", "Object"].forEach((role) => {
    const e = String(t[role] || "").trim(); const n = norm(e);
    if (e && n !== sn && !seen.has(n)) { seen.add(n); out.push(e); }
  }));
  return out;
};

/* known names (terms + aliases) -> canonical */
function knownMap(terms) {
  const m = {};
  terms.forEach((t) => {
    const c = String(t["Term"] || "").trim(); if (!c) return;
    m[norm(c)] = c;
    String(t["Aliases"] || "").split(",").forEach((a) => { if (a.trim()) m[norm(a)] = c; });
  });
  return m;
}
/* Resolver spanning every loaded glossary, so a Subject/Object that is defined in another
   glossary (e.g. a Foundational/upper-ontology term like "Concept") still renders as a link.
   The current glossary is applied last so its canonical spelling wins on any clash. */
function corpusKnownMap(corpus, currentTerms) {
  const m = {};
  (corpus || []).forEach((r) => {
    const t = r.term; const c = String(t["Term"] || "").trim(); if (!c) return;
    if (m[norm(c)] === undefined) m[norm(c)] = c;
    String(t["Aliases"] || "").split(",").forEach((a) => { if (a.trim() && m[norm(a)] === undefined) m[norm(a)] = c; });
  });
  Object.assign(m, knownMap(currentTerms || []));   // current glossary takes precedence
  return m;
}
/* Resolve a term by its canonical name OR any of its aliases/synonyms.
   Navigation (deep links, search hits, synonym links) may carry an alias such
   as "Documentary Credit"; this finds the term it actually belongs to so the
   view can canonicalise it to e.g. "Letter of Credit". */
function findTerm(terms, name) {
  const n = norm(name);
  return (terms || []).find((t) => norm(t.Term) === n) ||
    (terms || []).find((t) => String(t.Aliases || "").split(/[;,]/).some((a) => norm(a) === n)) ||
    null;
}
/* Build a knowledge graph: nodes = defined terms, edges = SPO links between two defined terms.
   If focusTerm is given, return only that term plus its immediate neighbours (the "local graph"). */
function buildGraph(glossary, focusTerm, hideRetired, hideExamples) {
  const terms = (glossary.terms || []).filter((t) => {
    if (hideRetired && String(t.Lifecycle || "") === "Retired") return false;
    if (hideExamples && isExampleTerm(t)) return false;
    return true;
  });
  const resolver = knownMap(terms);
  const allNodes = terms.map((t) => ({
    id: t.Term, life: t.Lifecycle || "Draft", type: t["Term Type"] || "", area: String(t["Subject Area"] || "").trim() || "(no subject area)", deg: 0,
  }));
  const allIndex = {}; allNodes.forEach((n, i) => (allIndex[norm(n.id)] = i));
  const allEdges = [];
  const seen = new Set();
  glossary.spo.forEach((s) => {
    if (String(s["Sign-off"]) === "Rejected") return;          // don't wire rejected statements
    const sc = resolver[norm(s.Subject)], oc = resolver[norm(s.Object)];
    if (!sc || !oc) return;                                     // both ends must be defined terms
    if (norm(sc) === norm(oc)) return;                          // skip self-loops
    const key = norm(sc) + "→" + norm(oc) + "→" + norm(s.Predicate || "");
    if (seen.has(key)) return; seen.add(key);
    allEdges.push({ source: norm(sc), target: norm(oc), label: s.Predicate || "" });
  });

  let nodes = allNodes, edges = allEdges;
  if (focusTerm) {
    const f = norm(resolver[norm(focusTerm)] || focusTerm);
    const keep = new Set([f]);
    allEdges.forEach((e) => { if (e.source === f) keep.add(e.target); if (e.target === f) keep.add(e.source); });
    nodes = allNodes.filter((n) => keep.has(norm(n.id))).map((n) => ({ ...n }));
    edges = allEdges.filter((e) => keep.has(e.source) && keep.has(e.target) && (e.source === f || e.target === f));
  } else {
    nodes = allNodes.map((n) => ({ ...n }));
  }
  const nodeIndex = {}; nodes.forEach((n, i) => (nodeIndex[norm(n.id)] = i));
  edges.forEach((e) => {
    const si = nodeIndex[e.source], oi = nodeIndex[e.target];
    if (si != null) nodes[si].deg++; if (oi != null) nodes[oi].deg++;
  });
  return { nodes, edges, nodeIndex };
}
/* gap detection with fuzzy matching */
function ratio(a, b) {
  // Dice coefficient on bigrams — light fuzzy match
  if (a === b) return 1;
  const bg = (s) => { const r = []; for (let i = 0; i < s.length - 1; i++) r.push(s.slice(i, i + 2)); return r; };
  const A = bg(a), B = bg(b); if (!A.length || !B.length) return 0;
  const map = {}; A.forEach((x) => map[x] = (map[x] || 0) + 1);
  let inter = 0; B.forEach((x) => { if (map[x] > 0) { inter++; map[x]--; } });
  return (2 * inter) / (A.length + B.length);
}
function detectGaps(glossary, triples, self, threshold = 0.78) {
  const known = knownMap(glossary.terms);
  const names = Object.keys(known);
  const sn = norm(self), seen = new Set(), newTerms = [], syn = [], resolved = [];
  triples.forEach((t) => ["Subject", "Object"].forEach((role) => {
    const e = String(t[role] || "").trim(); const n = norm(e);
    if (!e || n === sn || seen.has(n)) return; seen.add(n);
    if (known[n]) { if (known[n].toLowerCase() !== e.toLowerCase()) resolved.push({ ref: e, canon: known[n] }); return; }
    let best = null, sc = 0; names.forEach((k) => { const r = ratio(n, k); if (r > sc) { sc = r; best = k; } });
    if (best && sc >= threshold) syn.push({ ref: e, match: known[best], score: Math.round(sc * 100) / 100 });
    else newTerms.push(e);
  }));
  return { newTerms, syn, resolved };
}

function ScorePill({ score }) {

function LifecycleDot({ state }) {

}
/* A Subject/Object value: a clickable link when it resolves to a defined term
   (by canonical name or alias), otherwise plain text. `resolver` maps norm(name)->canonical. */
function EntityLink({ name, resolver, onJump, style, plainStyle }) {
  const raw = String(name || "");
  const canon = resolver ? resolver[norm(raw)] : null;
  if (!canon) return <span style={plainStyle}>{raw}</span>;
  const isSelf = false;
  return (
    <button
      onClick={(e) => { e.stopPropagation(); onJump(canon); }}
      title={canon === raw ? `Go to "${canon}"` : `Go to "${canon}" (defined term)`}
      style={{
        background: "none", border: "none", padding: 0, cursor: "pointer", font: "inherit",
        color: C.teal, textDecorationLine: "underline", textDecorationStyle: "dotted",
        textUnderlineOffset: 3, textDecorationColor: "#8fc4bd", ...style,
      }}
      onMouseEnter={(e) => { e.currentTarget.style.textDecorationStyle = "solid"; e.currentTarget.style.color = C.tealDeep; }}
      onMouseLeave={(e) => { e.currentTarget.style.textDecorationStyle = "dotted"; e.currentTarget.style.color = C.teal; }}
    >{raw}</button>
  );
}
function Btn({ children, onClick, kind = "ghost", icon: Icon, disabled, title, small }) {
  const styles = {
    primary: { background: C.teal, color: "#fff", border: "1px solid " + C.tealDeep },
    solid: { background: C.ink, color: C.paper, border: "1px solid " + C.ink },

    accept: { background: C.green, color: "#fff", border: "1px solid #246b41" },
    reject: { background: C.red, color: "#fff", border: "1px solid #8f3022" },

  return (
    <button onClick={onClick} disabled={disabled} title={title} style={{
      ...styles, opacity: disabled ? 0.45 : 1, cursor: disabled ? "not-allowed" : "pointer",
      display: "inline-flex", alignItems: "center", gap: 7, fontFamily: FONT_UI,

      onMouseLeave={(e) => (e.currentTarget.style.transform = "translateY(0)")}
    >{Icon && <Icon size={small ? 14 : 16} strokeWidth={2.2} />}{children}</button>

}
function Field({ label, value, onChange, placeholder, area, options, mono }) {
  const base = {
    width: "100%", fontFamily: mono ? FONT_MONO : FONT_UI, fontSize: 13.5, color: C.ink,
    background: "#fff", border: "1px solid " + C.line, borderRadius: 8, padding: "8px 10px",

  return (

      {options ? (

      ) : (
        <input value={value} onChange={(e) => onChange(e.target.value)} placeholder={placeholder} style={base} />

}
