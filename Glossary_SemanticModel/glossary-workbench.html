      (g.terms || []).forEach((t) => {
        const a = String(t["Subject Area"] || "").trim();
        if (a && !seen.has(a.toLowerCase())) { seen.add(a.toLowerCase()); areas.push(a); }
      });
      changed = true;
      return { ...e, areas, termCount: (g.terms || []).length };
    }));
    setIndex(idx);
    if (changed) await sSet(wsIndexKey(), idx);

    // ---- Deep link: ?term=Name (&glossary=Subject Area or id) or #term=Name ----
    // Lets the glossary be navigated from the outside by a business term.
    try {
      const qs = new URLSearchParams(window.location.search || "");
      const hash = (window.location.hash || "").replace(/^#/, "");
      const hp = new URLSearchParams(hash.includes("=") ? hash : "");
      const wantTerm = qs.get("term") || hp.get("term");
      const wantGloss = qs.get("glossary") || hp.get("glossary");
      const wantLex = qs.get("lex") || hp.get("lex");
      const wantLexId = qs.get("lexid") || hp.get("lexid");
      if (wantTerm) {
        // pick the glossary: explicit match by id / name / subject area, else the one containing the term
        let chosen = null;
        for (const e of idx) {
          const g = await loadGlossaryBlob(e.id);
          if (!g) continue;
          const hasTerm = (g.terms || []).some((t) => norm(t.Term) === norm(wantTerm) ||
            String(t.Aliases || "").split(",").some((a) => norm(a) === norm(wantTerm)));
          const glossMatch = !wantGloss || norm(e.id) === norm(wantGloss) || norm(e.name) === norm(wantGloss) ||
            (e.areas || []).some((a) => norm(a) === norm(wantGloss));
          if (hasTerm && glossMatch) { chosen = { g, term: wantTerm }; break; }
          if (!chosen && hasTerm) chosen = { g, term: wantTerm };
        }
        if (chosen) {
          if (!chosen.g.history) chosen.g.history = []; if (!chosen.g.codeLists) chosen.g.codeLists = SEED_CODE_LISTS.map((c) => ({ ...c })); if (!chosen.g.crosswalks) chosen.g.crosswalks = []; if (!chosen.g.rdChanges) chosen.g.rdChanges = [];
          if (!chosen.g.notes) chosen.g.notes = [];
          const canonical = (findTerm(chosen.g.terms, chosen.term) || {}).Term || chosen.term;
          setCurrent(chosen.g); setActiveTerm(canonical); setView("term");
        }
      } else if (wantLex || wantLexId) {
        // Deep link from the Cockpit's Level-0 view: open the Lexicon focused on this string.
        // Prefer the string (always matches the inventory's String/Label) over the id, which may differ.
        setView("lexicon"); setLexFocus(wantLex || wantLexId);
      }
    } catch (e) { /* no-op: deep link is best-effort */ }
  })(); }, []);

  // surface any existing pre-apply snapshot so "Restore" is offered across reloads
  useEffect(() => { (async () => {
    const snap = await sGet(wsSnapKey());
    if (snap && Array.isArray(snap.glossaries)) setSnapshot({ ts: snap.ts, count: snap.glossaries.length });
  })(); }, []);

  const saveGlossary = useCallback(async (g, idx) => {
    g.updated = Date.now();
    const ok = await saveGlossaryBlob(g);
    if (!ok) {
      // The glossary blob didn't persist (browser storage is full). Do NOT write an
      // index entry for it — an entry whose data is missing is what produces the
      // "stale entry" on open. Surface the real cause instead.
      flash("Couldn\u2019t save \u201C" + (g.name || "glossary") + "\u201D \u2014 browser storage looks full. Export a glossary (Write back to Excel) or a customer bundle to free space, then retry.", "err");
      return false;
    }
    const baseIdx = idx || index || [];
    const areas = []; const seen = new Set();
    (g.terms || []).forEach((t) => {
      const a = String(t["Subject Area"] || "").trim();
      if (a && !seen.has(a.toLowerCase())) { seen.add(a.toLowerCase()); areas.push(a); }
    });
    const entry = { id: g.id, name: g.name, areas, termCount: g.terms.length, updated: g.updated };
    const next = baseIdx.some((e) => e.id === g.id)
      ? baseIdx.map((e) => (e.id === g.id ? entry : e))
      : [...baseIdx, entry];
    setIndex(next); await sSet(wsIndexKey(), next);
    return true;
  }, [index]);

  // Re-write every stored glossary in compacted form (drops the duplicated seed
  // code lists). Used to reclaim localStorage when a save hits the quota.
  const compactAllGlossaries = useCallback(async () => {
    for (const e of (index || [])) {
      try { const g = await loadGlossaryBlob(e.id); if (g) await saveGlossaryBlob(g); } catch {}
    }
  }, [index]);

  const openGlossary = async (id) => {
    const g = await loadGlossaryBlob(id);
    if (g) { if (!g.history) g.history = []; if (!g.notes) g.notes = []; if (!g.codeLists) g.codeLists = SEED_CODE_LISTS.map((c) => ({ ...c })); if (!g.crosswalks) g.crosswalks = []; if (!g.rdChanges) g.rdChanges = []; setCurrent(g); setView("terms"); }
    else {
      // Orphaned index entry — the underlying data is gone. Remove the stale entry so the list self-heals.
      const stale = (index || []).find((e) => e.id === id);
      const next = (index || []).filter((e) => e.id !== id);
      setIndex(next); await sSet(wsIndexKey(), next);
      if (current && current.id === id) { setCurrent(null); setView("home"); }
      await buildCorpus();
      flash(stale ? `Removed stale entry \u201C${stale.name}\u201D — its data was missing` : "Removed a stale glossary entry", "err");
    }
  };

  /* ---- Global search across ALL glossaries ---- */
  // Build a flat corpus of every term in every glossary, re-built whenever the index
  // changes (create / import / delete / any save all replace the index array).
  const buildCorpus = useCallback(async () => {
    const idx = index || [];
    const all = [];
    for (const e of idx) {
      const g = await loadGlossaryBlob(e.id);
      if (!g) continue;
      (g.terms || []).forEach((t) => all.push({ gId: e.id, gName: g.name, areas: e.areas || [], term: t, spo: termSpos(g, t.Term) }));
    }
    setCorpus(all);
  }, [index]);
  useEffect(() => { if (index) buildCorpus(); }, [index, buildCorpus]);

  const enterSearch = useCallback(() => {
    setView((v) => { if (v !== "search") setPrevView(v); return "search"; });
  }, []);
  const exitSearch = useCallback(() => {
    setQuery("");
    setView(current ? (prevView === "search" ? "terms" : prevView) : "home");
  }, [current, prevView]);

  // open a search hit: load its glossary (whichever it lives in) and jump to the term
  const openTermAnywhere = async (gId, termName) => {
    const g = await loadGlossaryBlob(gId);
    if (!g) { flash("Could not load glossary", "err"); return; }
    if (!g.history) g.history = []; if (!g.notes) g.notes = []; if (!g.codeLists) g.codeLists = SEED_CODE_LISTS.map((c) => ({ ...c })); if (!g.crosswalks) g.crosswalks = []; if (!g.rdChanges) g.rdChanges = [];
    const canonical = (findTerm(g.terms, termName) || {}).Term || termName;
    setCurrent(g); setActiveTerm(canonical); setView("term");
  };

  // Jump to a term by name. If it isn't in the current glossary (or the current copy
  // has no statements — e.g. a Foundational/upper-ontology term referenced from a domain
  // glossary), find the glossary that actually holds it and open it there.
  // Restore a remembered {gId, term} location (same glossary = quick swap; else load it).
  const restoreTerm = (entry) => {
    if (!entry) return;
    if (current && entry.gId === current.id) { setActiveTerm(entry.term); setView("term"); }
    else openTermAnywhere(entry.gId, entry.term);
  };
  const goBackTerm = () => {
    if (!termBack.length) { setTermFwd([]); setActiveTerm(null); setView("terms"); return; }
    const prev = termBack[termBack.length - 1];
    if (activeTerm && current) setTermFwd((f) => [...f, { gId: current.id, term: activeTerm }]);
    setTermBack((s) => s.slice(0, -1));
    restoreTerm(prev);
  };
  const goForwardTerm = () => {
    if (!termFwd.length) return;
    const nxt = termFwd[termFwd.length - 1];
    if (activeTerm && current) setTermBack((s) => [...s, { gId: current.id, term: activeTerm }]);
    setTermFwd((f) => f.slice(0, -1));
    restoreTerm(nxt);
  };
  const goAllTerms = () => { setTermBack([]); setTermFwd([]); setActiveTerm(null); setView("terms"); };
  // Jump to crumb i within the Back trail; the terms after it (and the current one) become Forward.
  const goToCrumb = (i) => {
    const target = termBack[i];
    if (!target) return;
    const skipped = termBack.slice(i + 1);
    const curEntry = (activeTerm && current) ? [{ gId: current.id, term: activeTerm }] : [];
    setTermFwd((f) => [...f, ...curEntry, ...skipped.slice().reverse()]);
    setTermBack(termBack.slice(0, i));
    restoreTerm(target);
  };

  const jumpToLexicon = (focus) => { setLexFocus(focus || ""); if (view !== "lexicon") setPrevView(view); setView("lexicon"); };
  const jumpToTerm = (name) => {
    // remember where we're leaving so Back returns here
    if (activeTerm && current && norm(name) !== norm(activeTerm)) { setTermBack((s) => [...s, { gId: current.id, term: activeTerm }]); setTermFwd([]); }
    const inCurrent = current && findTerm(current.terms || [], name);
    const curHasStatements = inCurrent && (current.spo || []).some((s) => norm(s.Term) === norm(inCurrent.Term));
    if (inCurrent && curHasStatements) { setActiveTerm(inCurrent.Term); setView("term"); return; }
    // search the whole corpus for a glossary that has this term WITH statements; prefer Foundational
    const matches = (corpus || []).filter((r) => norm(r.term.Term) === norm(name)
      || String(r.term.Aliases || "").split(/[;,]/).some((a) => norm(a.trim()) === norm(name)));
    if (matches.length) {
      const isFoundational = (r) => /foundational|upper ontology|core ontology/i.test((r.gName || "") + " " + (r.areas || []).join(" "));
      const score = (r) => {
        let s = 0;
        // a copy that actually carries SPO statements wins
        // (corpus rows don't include spo, so prefer foundational + the current glossary as tie-breakers)
        if (isFoundational(r)) s += 4;
        if (current && r.gId === current.id) s += 1;
        return s;
      };
      const best = matches.slice().sort((a, b) => score(b) - score(a))[0];
      if (current && best.gId === current.id) { setActiveTerm(best.term.Term); setView("term"); return; }
      openTermAnywhere(best.gId, best.term.Term);
      return;
    }
    // not found anywhere — fall back to opening in the current glossary (shows the not-found notice)
    setActiveTerm(name); setView("term");
  };

  /* ---- Semantic-model: apply the curated fixes to all loaded glossaries ---- */
  const applyModelToGlossaries = useCallback(async () => {
    const full = [];
    for (const e of (index || [])) { const g = await loadGlossaryBlob(e.id); if (g) full.push(g); }
    // Snapshot-before-apply safeguard: stash a deep copy of every glossary + the
    // index so the structural changes can be rolled back in one click.
    try {
      const snap = { ts: Date.now(), index: JSON.parse(JSON.stringify(index || [])), glossaries: full.map((g) => packGlossaryForStore(JSON.parse(JSON.stringify(g)))) };
      await sSet(wsSnapKey(), snap);
      setSnapshot({ ts: snap.ts, count: full.length });
    } catch (e) { console.error("snapshot failed", e); }
    const res = applyModelFixes(full);
    let savedIdx = index || [];
    for (const g of full) {
      if (res.touched.includes(g.id) || (res.coreCreated && g.name === SM_CORE_GLOSSARY)) {
        const okSave = await saveGlossary(g, savedIdx);
        if (!okSave) continue;   // blob didn't persist (storage full) — don't index a missing glossary
        savedIdx = (savedIdx.some((e) => e.id === g.id)
          ? savedIdx.map((e) => (e.id === g.id ? { id: g.id, name: g.name, areas: e.areas || [], termCount: g.terms.length, updated: Date.now() } : e))
          : [...savedIdx, { id: g.id, name: g.name, areas: [], termCount: g.terms.length, updated: Date.now() }]);
      }
    }
    await buildCorpus();
    flash(`Applied — +${res.added.length} classes, ${res.repointed.length} hypernyms re-pointed, Group Membership ${res.assocAdded ? "added" : "present"}`);
    return res;
  }, [index, saveGlossary, buildCorpus]);

  /* ---- Restore the pre-apply snapshot (undo the structural changes) ---- */
  const restoreSnapshot = useCallback(async () => {
    const snap = await sGet(wsSnapKey());
    if (!snap || !Array.isArray(snap.glossaries)) { flash("No snapshot to restore", "err"); return; }
    // write each backed-up glossary back; remove any glossary created after the snapshot
    const keepIds = new Set();
    for (const g of snap.glossaries) { await saveGlossaryBlob(g); keepIds.add(g.id); }
    for (const e of (index || [])) { if (!keepIds.has(e.id)) await sDel(wsGKey(e.id)); }
    const idx = snap.index || [];
    setIndex(idx); await sSet(wsIndexKey(), idx);
    if (current && !keepIds.has(current.id)) { setCurrent(null); setView("home"); }
    else if (current) { const g = await loadGlossaryBlob(current.id); if (g) setCurrent(g); }
    await buildCorpus();
    flash(`Restored ${snap.glossaries.length} glossaries from snapshot`);
  }, [index, current, buildCorpus]);

  const generateSite = useCallback(() => {
    downloadText("semantic_model_site.html", buildSiteHtml(corpus || []), "text/html");
    flash("Interactive site generated (HTML)");
  }, [corpus]);

  const downloadModelPatch = useCallback(() => {
    downloadText("semantic_model_patch.ttl", buildModelPatchTtl(), "text/turtle");
    flash("Model patch generated (RDF/Turtle) — import & merge to apply");
  }, []);

  const downloadChangeSet = useCallback(() => {
    const diff = computeModelDiff(corpus);
    downloadCsv("semantic_model_change_set.csv", buildChangeSetCsv(diff));
    flash("Change-set exported (CSV)");
  }, [corpus]);

  const createGlossary = async (name) => {
    const g = emptyGlossary(name);
    await saveGlossary(g);
    setCurrent(g); setView("terms"); flash("Glossary created");
  };

  /* ============================================================
     Multi-customer (workspace) management
  ============================================================ */
  // Switch the active customer. Setting ACTIVE_WS + setIndex re-scopes every
  // namespaced key; the index effect rebuilds the corpus for the new customer.
  const switchWorkspace = async (id) => {
    if (id === ACTIVE_WS) return;
    ACTIVE_WS = id;
    await sSet(ACTIVE_WS_KEY, id);
    setWsId(id);
    setCurrent(null); setActiveTerm(null); setFocusTerm(null); setView("home");
    const idx = (await sGet(wsIndexKey())) || [];
    setIndex(idx);
    const w = (workspaces || []).find((x) => x.id === id);
    flash("Switched to " + (w ? w.name : "customer"));
  };

  // Create a new customer. Optionally seed a *copy* of the current customer's
  // Upper Ontology (Foundational) glossary — reference data travels inside the blob.
  const createCustomer = async (name, seedUpper) => {
    const nm = String(name || "").trim() || "New Customer";
    // read the seed from the CURRENT customer first (wsGKey resolves against the current ACTIVE_WS)
    let seedBlob = null;
    if (seedUpper) {
      const upperEntry = (index || []).find((e) => isUpperOntologyName(e.name, e.areas));
      if (upperEntry) seedBlob = await loadGlossaryBlob(upperEntry.id);
    }
    const w = { id: uid(), name: nm, created: Date.now() };
    const nextList = [...(workspaces || []), w];
    setWorkspaces(nextList); await sSet(WS_LIST_KEY, nextList);
    // switch namespace to the new customer, then write its starter content
    ACTIVE_WS = w.id; await sSet(ACTIVE_WS_KEY, w.id); setWsId(w.id);
    let newIdx = [];
    if (seedBlob) {
      const copy = JSON.parse(JSON.stringify(seedBlob));   // keep id, name, terms, spo, codeLists, crosswalks…
      await saveGlossaryBlob(copy);
      const areas = []; const seen = new Set();
      (copy.terms || []).forEach((t) => { const a = String(t["Subject Area"] || "").trim(); if (a && !seen.has(a.toLowerCase())) { seen.add(a.toLowerCase()); areas.push(a); } });
      newIdx = [{ id: copy.id, name: copy.name, areas, termCount: (copy.terms || []).length, updated: Date.now() }];
    }
    await sSet(wsIndexKey(), newIdx);
    setCurrent(null); setActiveTerm(null); setFocusTerm(null); setView("home");
    setIndex(newIdx);
    flash("Customer \u201C" + nm + "\u201D created" + (seedBlob ? " with a copy of the Upper Ontology" : ""));
  };

  const renameCustomer = async (id, newName) => {
    const nm = String(newName || "").trim(); if (!nm) return;
    const nextList = (workspaces || []).map((w) => (w.id === id ? { ...w, name: nm } : w));
    setWorkspaces(nextList); await sSet(WS_LIST_KEY, nextList);
    flash("Customer renamed to \u201C" + nm + "\u201D");
  };

  const deleteCustomer = async (id) => {
    if ((workspaces || []).length <= 1) { flash("Can't delete the only customer", "err"); return; }
    // delete every namespaced key for this customer
    const savedWs = ACTIVE_WS; ACTIVE_WS = id;
    const idx = (await sGet(wsIndexKey())) || [];
    for (const e of idx) await sDel(wsGKey(e.id));
    await sDel(wsIndexKey()); await sDel(wsSnapKey());
    ACTIVE_WS = savedWs;
    const nextList = (workspaces || []).filter((w) => w.id !== id);
    setWorkspaces(nextList); await sSet(WS_LIST_KEY, nextList);
    const w = (workspaces || []).find((x) => x.id === id);
    if (id === savedWs) { await switchWorkspace(nextList[0].id); }   // switched away from the deleted one
    flash("Deleted customer \u201C" + (w ? w.name : id) + "\u201D");
  };

  // Export the current customer as one portable JSON bundle (index + every glossary blob).
  const exportCustomer = async () => {
    const idx = (await sGet(wsIndexKey())) || [];
    const glossaries = [];
    for (const e of idx) { const g = await loadGlossaryBlob(e.id); if (g) glossaries.push(g); }
    const w = (workspaces || []).find((x) => x.id === ACTIVE_WS);
    const bundle = { type: "modelware-customer-bundle", v: 1, exported: new Date().toISOString(),
      customer: { name: w ? w.name : "Customer" }, index: idx, glossaries };
    const blob = new Blob([JSON.stringify(bundle, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const base = (w ? w.name : "customer").replace(/[^\w.-]+/g, "_");
    const d = new Date();
    const stamp = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0")
      + "_" + String(d.getHours()).padStart(2, "0") + String(d.getMinutes()).padStart(2, "0");
    a.href = url; a.download = base + "_glossaries_" + stamp + ".json";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1500);
    flash("Exported \u201C" + (w ? w.name : "customer") + "\u201D \u2014 " + glossaries.length + " glossaries");
  };

  // Import a customer bundle as a brand-new customer (does not overwrite any existing one).
  const importCustomer = async (file) => {
    let bundle;
    try { bundle = JSON.parse(await file.text()); }
    catch { flash("That file isn't a valid customer bundle", "err"); return; }
    if (!bundle || bundle.type !== "modelware-customer-bundle" || !Array.isArray(bundle.glossaries)) {
      flash("Not a Modelware customer bundle", "err"); return;
    }
    const nm = (bundle.customer && bundle.customer.name) || file.name.replace(/\.json$/i, "") || "Imported Customer";
    const w = { id: uid(), name: nm, created: Date.now() };
    const nextList = [...(workspaces || []), w];
    setWorkspaces(nextList); await sSet(WS_LIST_KEY, nextList);
    ACTIVE_WS = w.id; await sSet(ACTIVE_WS_KEY, w.id); setWsId(w.id);
    for (const g of bundle.glossaries) { if (g && g.id) await saveGlossaryBlob(g); }
    const idx = (Array.isArray(bundle.index) && bundle.index.length)
      ? bundle.index
      : bundle.glossaries.map((g) => ({ id: g.id, name: g.name, areas: [], termCount: (g.terms || []).length, updated: Date.now() }));
    await sSet(wsIndexKey(), idx);
    setCurrent(null); setActiveTerm(null); setFocusTerm(null); setView("home");
    setIndex(idx);
    flash("Imported customer \u201C" + nm + "\u201D \u2014 " + bundle.glossaries.length + " glossaries");
  };

  const deleteGlossary = async (id) => {
    await sDel(wsGKey(id));
    const next = (index || []).filter((e) => e.id !== id);
    setIndex(next); await sSet(wsIndexKey(), next);
    if (current && current.id === id) { setCurrent(null); setView("home"); }
    flash("Glossary deleted");
  };

  // Rename a glossary — updates both the stored glossary and its index entry.
  const renameGlossary = async (id, newName) => {
    const name = String(newName || "").trim();
    if (!name) return;
    const g = await loadGlossaryBlob(id);
    if (g) { g.name = name; g.updated = Date.now(); await saveGlossaryBlob(g); if (current && current.id === id) setCurrent(g); }
    const next = (index || []).map((e) => (e.id === id ? { ...e, name } : e));
    setIndex(next); await sSet(wsIndexKey(), next);
    await buildCorpus();
    flash("Renamed to \u201C" + name + "\u201D");
  };

  const onImport = async (file, asNew = true) => {
    try {
      const parsed = await importWorkbook(file);
      const g = emptyGlossary(file.name.replace(/\.xlsx?$/i, ""));
      g.terms = parsed.terms; g.spo = parsed.spo; g.history = parsed.history; g.notes = parsed.notes || [];
      g.subcats = parsed.subcats || [];
      g.codeLists = parsed.codeLists || SEED_CODE_LISTS.map((c) => ({ ...c }));
      g.crosswalks = parsed.crosswalks || [];
      g.rdChanges = parsed.rdChanges || [];
      let ok = await saveGlossary(g);
      if (!ok) { await compactAllGlossaries(); ok = await saveGlossary(g); }   // reclaim space from duplicated seed code lists, then retry once
      if (ok) {
        setCurrent(g); setView("terms");
        flash(`Imported ${g.terms.length} terms, ${g.spo.length} statements`);
      } else {
        setCurrent(g); setView("terms");   // let them view / export it, but it is NOT saved
        flash(`Loaded ${g.terms.length} terms, but couldn\u2019t save \u2014 browser storage is full even after compacting. Export or delete a glossary to free space, then re-import. (This glossary is not yet saved.)`, "err");
      }
    } catch (e) { console.error(e); flash("Import failed — check the file format", "err"); }
  };

  // Reload reconciled glossaries: parse the chosen CHANGED workbooks, then open a mapping
  // dialog so the user confirms which existing glossary each one replaces (defaults to a
  // best-guess match that ignores timestamp/version suffixes). Replacement = delete + load.
  const reloadReconciled = async (files) => {
    const list = Array.from(files || []);
    if (!list.length) return;
    // strip extension, trailing timestamps (_2026-06-02_1811 / _2026-06-02), and common suffixes
    const baseKey = (n) => norm(String(n).replace(/\.xlsx?$/i, "")
      .replace(/[_\- ]+\d{4}-\d{2}-\d{2}([_\- ]+\d{3,4})?$/i, "")
      .replace(/[_\- ]+(clean|reconciled|final|v\d+|copy)$/i, "")
      .trim());
    const incoming = [];
    for (const file of list) {
      try {
        const parsed = await importWorkbook(file);
        const name = file.name.replace(/\.xlsx?$/i, "");
        const k = baseKey(file.name);
        // best-guess existing target: exact name, else same stripped base key
        const exact = (index || []).find((e) => norm(e.name) === norm(name));
        const fuzzy = (index || []).find((e) => baseKey(e.name) === k);
        const target = exact || fuzzy || null;
        incoming.push({ fileName: name, key: k, parsed, termCount: parsed.terms.length, targetId: target ? target.id : "__new__" });
      } catch (e) { console.error(e); incoming.push({ fileName: file.name, parsed: null, error: true, targetId: "__new__", termCount: 0 }); }
    }
    setReconPlan({ incoming, candidates: (index || []).map((e) => ({ id: e.id, name: e.name, termCount: e.termCount })) });
  };

  // Apply the confirmed mapping from the reload dialog.
  const applyReconPlan = async (rows) => {
    let idx = (index || []).slice();
    let replaced = 0, added = 0, lastId = null; const errs = [];
    for (const r of rows) {
      if (!r.parsed) { errs.push(r.fileName); continue; }
      const isReplace = r.targetId && r.targetId !== "__new__";
      const target = isReplace ? idx.find((e) => e.id === r.targetId) : null;
      // Replace = keep the EXISTING glossary's id and name, swap only the content.
      // Add  = a brand-new glossary named after the file.
      const g = emptyGlossary(isReplace && target ? target.name : r.fileName);
      if (isReplace && target) g.id = target.id;
      g.terms = r.parsed.terms; g.spo = r.parsed.spo; g.history = r.parsed.history; g.notes = r.parsed.notes || [];
      g.subcats = r.parsed.subcats || [];
      g.codeLists = r.parsed.codeLists || SEED_CODE_LISTS.map((c) => ({ ...c }));
      g.crosswalks = r.parsed.crosswalks || []; g.rdChanges = r.parsed.rdChanges || [];
      g.updated = Date.now();
      const areas = []; const seen = new Set();
      g.terms.forEach((t) => { const a = String(t["Subject Area"] || "").trim(); if (a && !seen.has(a.toLowerCase())) { seen.add(a.toLowerCase()); areas.push(a); } });
      await saveGlossaryBlob(g);                         // write the blob (overwrites in place on replace)
      const entry = { id: g.id, name: g.name, areas, termCount: g.terms.length, updated: g.updated };
      idx = idx.some((e) => e.id === g.id) ? idx.map((e) => (e.id === g.id ? entry : e)) : [...idx, entry];
      if (isReplace) replaced++; else added++;
      lastId = g.id;
    }
    setIndex(idx); await sSet(wsIndexKey(), idx);            // single, authoritative index write — no orphans
    if (lastId) { const g = await loadGlossaryBlob(lastId); if (g) { setCurrent(g); setView("terms"); setActiveTerm(null); } }
    else if (current && !idx.some((e) => e.id === current.id)) setCurrent(null);
    await buildCorpus();
    setReconPlan(null);
    const parts = []; if (replaced) parts.push(`${replaced} replaced in place`); if (added) parts.push(`${added} added`); if (errs.length) parts.push(`${errs.length} failed`);
    flash(`Reconciled glossaries reloaded — ${parts.join(", ")}`, errs.length ? "err" : "ok");
  };

  const onImportRdf = async (file, mode) => {
    try {
      const parsed = await importRdfFile(file);
      const total = parsed.entities.length + parsed.attributes.length;
      if (total === 0 && parsed.codeLists.length === 0) { flash("No classes or properties found in that Turtle file", "err"); return; }
      if (mode === "merge" && current) {
        let added;
        await mutate((g) => { added = mergeRdfIntoGlossary(g, parsed); return g; });
        setView("terms"); setActiveTerm(null);
        flash(`Merged: +${added.terms} terms, ${added.updated} updated, +${added.codeLists} code lists, +${added.crosswalks} cross-walks`);
      } else {
        const g = glossaryFromRdf(file.name.replace(/\.(ttl|rdf|n3|nt|txt)$/i, ""), parsed);
        await saveGlossary(g);
        setCurrent(g); setView("terms"); setActiveTerm(null);
        flash(`Imported ${total} terms from RDF (${parsed.entities.length} entities, ${parsed.attributes.length} properties)`);
      }
    } catch (e) { console.error(e); flash("Could not parse the Turtle/RDF file", "err"); }
  };

  const importAudit = async (file) => {
    if (!current) { flash("Open a glossary first, then import its audit", "err"); return; }
    try {
      const { hasAuditSheet, findings } = await importAuditFile(file);
      if (!hasAuditSheet) { flash("That file has no \u201CAudit\u201D sheet \u2014 check it's an audit workbook", "err"); return; }
      await mutate((g) => { g.audit = findings; g.auditFile = file.name; g.auditImported = Date.now(); return g; });
      setView("audit"); setActiveTerm(null); setFocusTerm(null);
      flash(findings.length
        ? `Imported ${findings.length} audit finding${findings.length === 1 ? "" : "s"}`
        : "Audit imported \u2014 no findings, the glossary passed clean \u2713");
    } catch (e) { console.error(e); flash("Audit import failed — check the file", "err"); }
  };

  const importWorklist = async (file) => {
    if (!current) { flash("Open a glossary first, then import its worklist", "err"); return; }
    try {
      const { hasWorklist, items } = await importWorklistFile(file);
      if (!hasWorklist) { flash("That file has no \u201CWorklist\u201D sheet \u2014 check it's the Undefined-Terms worklist", "err"); return; }
      await mutate((g) => { g.undefWorklist = items; g.undefFile = file.name; g.undefImported = Date.now(); return g; });
      setView("undef"); setActiveTerm(null); setFocusTerm(null);
      flash(`Imported ${items.length} undefined-term row${items.length === 1 ? "" : "s"}`);
    } catch (e) { console.error(e); flash("Worklist import failed \u2014 check the file", "err"); }
  };

  const importReconSummary = async (file) => {
    if (!current) { flash("Open the reconciled glossary first, then upload the summary", "err"); return; }
    try {
      const parsed = await importReconSummaryFile(file);
      if (!parsed || !parsed.ok) { flash("That isn't a Reconciliation Summary — expecting a \u201CNew Terms for Sign-off\u201D sheet", "err"); return; }
      await mutate((g) => { g.recon = parsed; if (!g.reconDecisions) g.reconDecisions = {}; return g; });
      setView("recon"); setActiveTerm(null); setFocusTerm(null);
      flash(`Loaded reconciliation summary — ${parsed.totals.new} new, ${parsed.totals.revised} revised across ${parsed.order.length} glossaries`);
    } catch (e) { console.error(e); flash("Could not read the reconciliation summary", "err"); }
  };

  // Record a decision and, for an Accept on a term present in this glossary, promote it to Approved.
  const reconApprove = (action) => {
    if (action.type === "decide") {
      const key = action.gname + "\u00A7" + action.term;
      mutate((g) => {
        g.reconDecisions = g.reconDecisions || {};
        if (g.reconDecisions[key] && g.reconDecisions[key].decision === action.kind) { delete g.reconDecisions[key]; return g; }
        g.reconDecisions[key] = { decision: action.kind, note: (g.reconDecisions[key] || {}).note || "", at: Date.now() };
        if (action.kind === "accept") promoteTermInGlossary(g, action.term);
        return g;
      });
    } else if (action.type === "note") {
      const key = action.gname + "\u00A7" + action.term;
      mutate((g) => { g.reconDecisions = g.reconDecisions || {}; g.reconDecisions[key] = Object.assign({ decision: "amend" }, g.reconDecisions[key], { note: action.note }); return g; });
    } else if (action.type === "approveAllAccepted") {
      mutate((g) => {
        const d = g.reconDecisions || {}; let n = 0;
        Object.keys(d).forEach((k) => { if (d[k].decision === "accept") { const term = k.split("\u00A7")[1]; if (promoteTermInGlossary(g, term)) n++; } });
        return g;
      }).then(() => flash("Promoted all accepted terms present in this glossary to Approved"));
    }
  };
  // promote a term (by name) in glossary g to Approved if it exists and isn't already; returns true if changed
  function promoteTermInGlossary(g, term) {
    const t = (g.terms || []).find((x) => norm(x.Term) === norm(term));
    if (!t || norm(t.Lifecycle) === "approved") return false;
    t.Lifecycle = "Approved"; t["Last Updated"] = today();
    if (!t["Effective Date"]) t["Effective Date"] = today();
    (g.history = g.history || []).push({ "Term": t.Term, "Version": t.Version, "Lifecycle": "Approved", "Definition": t.Definition, "Date": today(), "Changed By": "", "Note": "Approved via reconciliation sign-off" });
    return true;
  }

  /* ---- mutation helper ---- */
  const mutate = useCallback(async (fn) => {
    if (!current) return;
    const g = JSON.parse(JSON.stringify(current));
    fn(g);
    setCurrent(g);
    await saveGlossary(g);
  }, [current, saveGlossary]);

  if (index === null) {
    return <Splash text="Opening workbench…" />;
  }

  return (
    <div style={{ minHeight: "100vh", background: C.paper, fontFamily: FONT_UI, color: C.ink, display: "flex" }}>
      <GlobalStyle />
      {/* SIDEBAR */}
      <aside style={{ width: 270, flexShrink: 0, background: C.ink, color: C.paper, minHeight: "100vh", padding: "22px 18px", position: "sticky", top: 0, height: "100vh", boxSizing: "border-box", display: "flex", flexDirection: "column" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 4 }}>
          <div style={{ width: 34, height: 34, borderRadius: 9, background: C.teal, display: "grid", placeItems: "center", boxShadow: "0 2px 0 " + C.tealDeep }}>
            <Layers size={19} color="#fff" strokeWidth={2.2} />
          </div>
          <div>
            <div style={{ fontFamily: FONT_DISP, fontSize: 19, fontWeight: 600, lineHeight: 1 }}>Lexicon</div>
            <div style={{ fontSize: 10.5, color: "#9aa0a6", letterSpacing: 1.5, textTransform: "uppercase", marginTop: 2 }}>SPO Workbench</div>
            <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 5 }}>
              <span title={"Build " + APP_BUILD} style={{ fontSize: 11, fontWeight: 800, fontFamily: FONT_MONO, color: "#ffffff", background: C.teal, border: "1px solid " + C.tealDeep, borderRadius: 999, padding: "2px 9px", letterSpacing: 0.4, boxShadow: "0 1px 0 " + C.tealDeep }}>{"v" + APP_VERSION}</span>
              <span style={{ fontSize: 10, color: C.ink2, fontFamily: FONT_MONO, letterSpacing: 0.2 }}>{APP_BUILD}</span>
            </div>
          </div>
        </div>

        {/* Customer (workspace) switcher */}
        <div style={{ marginTop: 16 }}>
          <div style={{ fontSize: 10, fontWeight: 700, color: "#7e858c", letterSpacing: 1.2, textTransform: "uppercase", marginBottom: 6 }}>Customer</div>
          <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
            <select value={wsId} onChange={(e) => switchWorkspace(e.target.value)} title="Switch customer"
              style={{ flex: 1, minWidth: 0, padding: "8px 9px", borderRadius: 8, background: "#23292f", color: C.paper, border: "1px solid #2c333a", fontFamily: FONT_UI, fontSize: 12.5, outline: "none", cursor: "pointer" }}>
              {(workspaces || []).map((w) => <option key={w.id} value={w.id} style={{ background: "#23292f" }}>{w.name}</option>)}
            </select>
            <button onClick={() => { const w = (workspaces || []).find((x) => x.id === wsId); setEditCust({ id: wsId, name: w ? w.name : "", confirmDel: false }); setNewCust(null); }}
              title="Rename or remove this customer"
              style={{ flexShrink: 0, display: "grid", placeItems: "center", width: 34, height: 34, borderRadius: 8, background: "#23292f", border: "1px solid #2c333a", color: "#c7ccd1", cursor: "pointer" }}>
              <PencilLine size={14} strokeWidth={2.2} />
            </button>
          </div>
          <div style={{ display: "flex", gap: 6, marginTop: 6 }}>
            {(() => {
              const ib = { flex: 1, display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 5, padding: "6px 4px", borderRadius: 7, background: "#23292f", border: "1px solid #2c333a", color: "#c7ccd1", cursor: "pointer", fontFamily: FONT_UI, fontWeight: 600, fontSize: 11 };
              return (
                <>
                  <button onClick={() => setNewCust({ name: "", seedUpper: (index || []).some((e) => isUpperOntologyName(e.name, e.areas)) })} title="Add a new customer" style={ib}><Plus size={13} strokeWidth={2.4} /> New</button>
                  <button onClick={exportCustomer} title="Export this customer as a portable bundle file" style={ib}><Download size={13} strokeWidth={2.4} /> Export</button>
                  <button onClick={() => custFileRef.current && custFileRef.current.click()} title="Import a customer bundle file" style={ib}><Upload size={13} strokeWidth={2.4} /> Import</button>
                </>
              );
            })()}
          </div>
          <input ref={custFileRef} type="file" accept=".json,application/json" style={{ display: "none" }}
            onChange={(e) => { const f = e.target.files && e.target.files[0]; if (f) importCustomer(f); e.target.value = ""; }} />

          {editCust && (
            <div style={{ marginTop: 8, background: "#23292f", border: "1px solid #2c333a", borderRadius: 9, padding: 11 }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: "#7e858c", letterSpacing: 1, textTransform: "uppercase", marginBottom: 6 }}>Rename customer</div>
              <input autoFocus value={editCust.name} onChange={(e) => setEditCust((c) => ({ ...c, name: e.target.value }))}
                onKeyDown={(e) => { if (e.key === "Enter" && editCust.name.trim()) { renameCustomer(editCust.id, editCust.name); setEditCust(null); } if (e.key === "Escape") setEditCust(null); }}
                placeholder="Customer name"
                style={{ width: "100%", boxSizing: "border-box", padding: "7px 9px", borderRadius: 7, background: "#1b2025", color: C.paper, border: "1px solid #343b42", fontFamily: FONT_UI, fontSize: 12.5, outline: "none" }} />
              <div style={{ display: "flex", gap: 6, marginTop: 9 }}>
                <button onClick={() => { if (editCust.name.trim()) { renameCustomer(editCust.id, editCust.name); setEditCust(null); } }}
                  style={{ flex: 1, padding: "7px", borderRadius: 7, background: C.teal, color: "#fff", border: "none", cursor: "pointer", fontFamily: FONT_UI, fontWeight: 700, fontSize: 12 }}>Save</button>
                <button onClick={() => setEditCust(null)}
                  style={{ padding: "7px 12px", borderRadius: 7, background: "transparent", color: "#9aa0a6", border: "1px solid #343b42", cursor: "pointer", fontFamily: FONT_UI, fontWeight: 600, fontSize: 12 }}>Cancel</button>
              </div>
              {(workspaces || []).length > 1 && (
                <div style={{ borderTop: "1px solid #343b42", marginTop: 11, paddingTop: 10 }}>
                  {!editCust.confirmDel ? (
                    <button onClick={() => setEditCust((c) => ({ ...c, confirmDel: true }))}
                      style={{ display: "inline-flex", alignItems: "center", gap: 6, background: "none", border: "none", color: "#c98b8b", cursor: "pointer", fontFamily: FONT_UI, fontWeight: 600, fontSize: 11.5, padding: 0 }}>
                      <Trash2 size={13} strokeWidth={2.2} /> Delete this customer
                    </button>
                  ) : (
                    <div>
                      <div style={{ fontSize: 11.5, color: "#d7b0b0", lineHeight: 1.5, marginBottom: 8 }}>
                        Permanently delete this customer and all its glossaries? Export first if you want a backup.
                      </div>
                      <div style={{ display: "flex", gap: 6 }}>
                        <button onClick={() => { const id = editCust.id; setEditCust(null); deleteCustomer(id); }}
                          style={{ flex: 1, padding: "7px", borderRadius: 7, background: C.red, color: "#fff", border: "none", cursor: "pointer", fontFamily: FONT_UI, fontWeight: 700, fontSize: 12 }}>Delete</button>
                        <button onClick={() => setEditCust((c) => ({ ...c, confirmDel: false }))}
                          style={{ padding: "7px 12px", borderRadius: 7, background: "transparent", color: "#9aa0a6", border: "1px solid #343b42", cursor: "pointer", fontFamily: FONT_UI, fontWeight: 600, fontSize: 12 }}>Keep</button>
                      </div>
                    </div>
                  )}
                </div>
              )}
            </div>
          )}

          {newCust && (
            <div style={{ marginTop: 8, background: "#23292f", border: "1px solid #2c333a", borderRadius: 9, padding: 11 }}>
              <input autoFocus value={newCust.name} onChange={(e) => setNewCust((c) => ({ ...c, name: e.target.value }))}
                onKeyDown={(e) => { if (e.key === "Enter" && newCust.name.trim()) { createCustomer(newCust.name, newCust.seedUpper); setNewCust(null); } if (e.key === "Escape") setNewCust(null); }}
                placeholder="Customer name"
                style={{ width: "100%", boxSizing: "border-box", padding: "7px 9px", borderRadius: 7, background: "#1b2025", color: C.paper, border: "1px solid #343b42", fontFamily: FONT_UI, fontSize: 12.5, outline: "none" }} />
              {(index || []).some((e) => isUpperOntologyName(e.name, e.areas)) && (
                <label style={{ display: "flex", alignItems: "center", gap: 7, marginTop: 8, fontSize: 11.5, color: "#c7ccd1", cursor: "pointer" }}>
                  <input type="checkbox" checked={newCust.seedUpper} onChange={(e) => setNewCust((c) => ({ ...c, seedUpper: e.target.checked }))} style={{ accentColor: C.teal, width: 14, height: 14 }} />
                  Copy the Upper Ontology into this customer
                </label>
              )}
              <div style={{ display: "flex", gap: 6, marginTop: 9 }}>
                <button onClick={() => { if (newCust.name.trim()) { createCustomer(newCust.name, newCust.seedUpper); setNewCust(null); } }}
                  style={{ flex: 1, padding: "7px", borderRadius: 7, background: C.teal, color: "#fff", border: "none", cursor: "pointer", fontFamily: FONT_UI, fontWeight: 700, fontSize: 12 }}>Create</button>
                <button onClick={() => setNewCust(null)}
                  style={{ padding: "7px 12px", borderRadius: 7, background: "transparent", color: "#9aa0a6", border: "1px solid #343b42", cursor: "pointer", fontFamily: FONT_UI, fontWeight: 600, fontSize: 12 }}>Cancel</button>
              </div>
            </div>
          )}
        </div>

        <div style={{ height: 1, background: "#2c333a", margin: "18px 0 14px" }} />
        <div style={{ position: "relative", marginBottom: 14 }}>
          <Search size={14} strokeWidth={2.4} style={{ position: "absolute", left: 10, top: "50%", transform: "translateY(-50%)", color: "#7e858c", pointerEvents: "none" }} />
          <input
            value={query}
            onChange={(e) => { setQuery(e.target.value); enterSearch(); }}
            onFocus={enterSearch}
            onKeyDown={(e) => { if (e.key === "Enter" && query) enterSearch(); if (e.key === "Escape") exitSearch(); }}
            placeholder="Search all glossaries…"
            style={{
              width: "100%", boxSizing: "border-box", padding: "9px 28px 9px 30px", borderRadius: 9,
              background: "#23292f", border: "1px solid " + (view === "search" ? C.teal : "#2c333a"),
              color: C.paper, fontFamily: FONT_UI, fontSize: 13, outline: "none",
            }}
          />
          {query && (
            <button onClick={exitSearch} title="Clear" style={{
              position: "absolute", right: 7, top: "50%", transform: "translateY(-50%)", background: "none",
              border: "none", color: "#8b9197", cursor: "pointer", padding: 2, display: "grid", placeItems: "center",
            }}><X size={14} strokeWidth={2.4} /></button>
          )}
        </div>
        <button onClick={() => { if (view !== "lexicon") setPrevView(view); setView("lexicon"); }} style={{
          width: "100%", boxSizing: "border-box", marginBottom: 14, padding: "9px 12px", borderRadius: 9,
          background: view === "lexicon" ? C.teal : "#23292f", border: "1px solid " + (view === "lexicon" ? C.tealDeep : "#2c333a"),
          color: view === "lexicon" ? "#fff" : C.paper, cursor: "pointer", fontFamily: FONT_UI, fontWeight: 600, fontSize: 13,
          display: "flex", alignItems: "center", gap: 8,
        }}><Tag size={15} strokeWidth={2.2} /> Lexicon
          {lexObjects.length > 0 && <span style={{ marginLeft: "auto", fontSize: 11, fontWeight: 700, background: "#2c333a", color: "#c7ccd1", borderRadius: 999, padding: "1px 8px" }}>{lexObjects.filter((o) => o.status === "Active").length}/{lexObjects.length}</span>}
        </button>
        <button onClick={() => { if (view !== "model") setPrevView(view); setView("model"); }} style={{
          width: "100%", boxSizing: "border-box", marginBottom: 14, padding: "9px 12px", borderRadius: 9,
          background: view === "model" ? C.teal : "#23292f", border: "1px solid " + (view === "model" ? C.tealDeep : "#2c333a"),
          color: view === "model" ? "#fff" : C.paper, cursor: "pointer", fontFamily: FONT_UI, fontWeight: 600, fontSize: 13,
          display: "flex", alignItems: "center", gap: 8,
        }}><Share2 size={15} strokeWidth={2.2} /> Semantic model</button>
        <button onClick={() => openHelp(helpSection)} style={{
          width: "100%", boxSizing: "border-box", marginBottom: 14, padding: "9px 12px", borderRadius: 9,
          background: view === "help" ? C.teal : "#23292f", border: "1px solid " + (view === "help" ? C.tealDeep : "#2c333a"),
          color: view === "help" ? "#fff" : C.paper, cursor: "pointer", fontFamily: FONT_UI, fontWeight: 600, fontSize: 13,
          display: "flex", alignItems: "center", gap: 8,
        }}><BookMarked size={15} strokeWidth={2.2} /> User Guide</button>
        <button onClick={() => setShowSettings(true)} style={{
          width: "100%", boxSizing: "border-box", marginBottom: 14, padding: "9px 12px", borderRadius: 9,
          background: "#23292f", border: "1px solid #2c333a",
          color: C.paper, cursor: "pointer", fontFamily: FONT_UI, fontWeight: 600, fontSize: 13,
          display: "flex", alignItems: "center", gap: 8,
        }}><Gauge size={15} strokeWidth={2.2} /> Settings</button>
        <a href={validatorUrl()} target="_blank" rel="noreferrer" title="Open the Validation Cockpit" style={{
          width: "100%", boxSizing: "border-box", marginBottom: 14, padding: "9px 12px", borderRadius: 9, textDecoration: "none",
          background: "#23292f", border: "1px solid #2c333a",
          color: C.paper, cursor: "pointer", fontFamily: FONT_UI, fontWeight: 600, fontSize: 13,
          display: "flex", alignItems: "center", gap: 8,
        }}><ShieldCheck size={15} strokeWidth={2.2} /> Open Validator</a>
        <div style={{ fontSize: 10.5, fontWeight: 700, color: "#7e858c", letterSpacing: 1, textTransform: "uppercase", marginBottom: 10 }}>Your Glossaries</div>
        <div style={{ flex: 1, overflowY: "auto", margin: "0 -6px", padding: "0 6px" }}>
          {index.length === 0 && <div style={{ fontSize: 12.5, color: "#7e858c", lineHeight: 1.6 }}>No glossaries yet. Create one or import an Excel file to begin.</div>}
          {index.slice().sort((a, b) => b.updated - a.updated).map((e) => {
            const on = current && current.id === e.id;
            const isRen = renaming && renaming.id === e.id;
            const commit = () => { const v = (renaming?.value || "").trim(); if (v && v !== e.name) renameGlossary(e.id, v); setRenaming(null); };
            return (
              <div key={e.id} onClick={() => { if (!isRen) openGlossary(e.id); }} style={{
                width: "100%", textAlign: "left", marginBottom: 7, padding: "10px 11px", borderRadius: 9,
                background: on ? C.teal : "#23292f", border: "1px solid " + (on ? C.tealDeep : "#2c333a"),
                color: on ? "#fff" : C.paper, cursor: isRen ? "default" : "pointer", fontFamily: FONT_UI,
              }}>
                {isRen ? (
                  <input autoFocus value={renaming.value}
                    onClick={(ev) => ev.stopPropagation()}
                    onChange={(ev) => setRenaming({ id: e.id, value: ev.target.value })}
                    onKeyDown={(ev) => { if (ev.key === "Enter") commit(); if (ev.key === "Escape") setRenaming(null); }}
                    onBlur={commit}
                    style={{ width: "100%", boxSizing: "border-box", padding: "6px 8px", borderRadius: 7, border: "1px solid " + C.teal, background: "#1b2025", color: "#fff", fontFamily: FONT_UI, fontSize: 13.5, fontWeight: 600, outline: "none" }} />
                ) : (
                  <>
                    <div style={{ display: "flex", alignItems: "center", gap: 7, fontWeight: 600, fontSize: 13.5 }}>
                      <BookMarked size={14} strokeWidth={2.2} style={{ flexShrink: 0 }} />
                      <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", flex: 1 }}>{e.name || "Untitled Glossary"}</span>
                      <span role="button" title="Rename glossary"
                        onClick={(ev) => { ev.stopPropagation(); setRenaming({ id: e.id, value: e.name }); }}

============================================================ */
function addTerm(g, meta, triples, notes) {
  const gid = nextGlossaryId(g.terms);
  const term = meta.Term.trim();
  let sid = nextSpoId(g.spo);
  const row = {};
  GLOSSARY_COLS.forEach((c) => (row[c] = meta[c] || ""));
  row["Glossary ID"] = gid; row["Term"] = term; row["Version"] = 1;
  row["Lifecycle"] = "In Review"; row["References"] = termRefs(triples, term).join(", ");
  row["Last Updated"] = today();
  if (isElement(row)) {
    if (!row["Registration Status"]) row["Registration Status"] = "Candidate";
    row["Quality Score"] = isoQualityScore(row, g.terms);
  }
  g.terms.push(row);
  triples.forEach((t) => {
    g.spo.push({
      "SPO ID": sid++, "Term": term, "Version": 1, "Order": t.Order || "",
      "Subject": t.Subject || "", "Predicate": t.Predicate || "", "Object": t.Object || "",
      "Decision": "", "Comment": "", "Sign-off": "Pending", "Signed By": "", "Signed Role": "", "Signed Date": "", "Note": "",
    });
  });
  if (!g.notes) g.notes = [];
  let nid = nextNoteId(g.notes);
  (notes || []).forEach((n) => {
    if (!n.Note && !n.Note) return;
    g.notes.push({
      "Note ID": nid++, "Term": term, "Version": 1, "Kind": n.Kind || "Other",
      "Note": n.Note || "", "Alternative": n.Alternative || "", "Resolution": "",
      "Date": today(), "Added By": meta.Owner || meta.Identifier || "",
    });
  });
  g.history.push({ "Term": term, "Version": 1, "Lifecycle": "In Review", "Definition": meta.Definition || "", "Date": today(), "Changed By": meta.Owner || meta.Identifier || "", "Note": "Proposed for sign-off" });
}

function currentVersion(g, term) {
  const t = g.terms.find((x) => norm(x.Term) === norm(term));
  return t ? t.Version : 1;
}
function termSpos(g, term) {
  const v = currentVersion(g, term);
  return g.spo.filter((s) => norm(s.Term) === norm(term) && String(s.Version) === String(v));
}
