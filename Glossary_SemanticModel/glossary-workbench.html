// Functional Group controlled vocabulary (DAMA lifecycle groups).
const FUNCTIONAL_GROUPS = ["Oversight (Data Governance)", "Plan & Design", "Enable & Maintain", "Use & Enhance", "Foundational Activities"];
// Intralign cross-reference → expected SPO role. Fact excluded by design (no role asserted).
const TERM_TYPE_ROLE = { Entity: ["Subject", "Object"], Attribute: ["Object"], Relationship: ["Predicate"] };

// ---- Lexicon grouping dimensions ----
const lexX = (o, c) => (o && o._extra && o._extra[c] != null ? String(o._extra[c]) : "");
const LEX_GROUP_DIMS = ["Q6 Facet", "Quant Class", "Quant Level", "Quant Type", "Subject Area", "Sub-Category", "Functional Group", "Quality"];
const LEX_DIM_GET = {
  "Q6 Facet": (o) => o.q6, "Quant Class": (o) => o.quantClass, "Quant Level": (o) => o.quantLevel, "Quant Type": (o) => o.quantType,
  "Subject Area": (o) => lexX(o, "Subject Area"), "Sub-Category": (o) => lexX(o, "Sub-Category"), "Functional Group": (o) => lexX(o, "Functional Group"),
  "Quality": (o) => (lexX(o, "Audit Verdict") || "").toUpperCase(),
};
const LEX_DIM_ORDER = { "Q6 Facet": Q6_ORDER, "Quant Class": QUANT_CLASSES, "Quant Level": QUANT_LEVELS, "Quant Type": QUANT_TYPES, "Functional Group": FUNCTIONAL_GROUPS, "Quality": ["PASS", "WARN", "QUARANTINE"] };
const LEX_DIM_BLANK = { "Q6 Facet": "(unassigned)", "Quant Class": "(unclassified)", "Quant Level": "(no level)", "Quant Type": "(no type)", "Subject Area": "(no subject area)", "Sub-Category": "(no sub-category)", "Functional Group": "(no functional group)", "Quality": "(not audited)" };

// ---- Per-string Quality Indicator, derived from the Level-0 auditor's verdict + dimension columns ----
const LEX_QUAL = { PASS: { c: "#1f7d43", bg: "#e7f3ec", short: "PASS" }, WARN: { c: "#9a6a00", bg: "#fbf1dd", short: "WARN" }, QUARANTINE: { c: "#b3261e", bg: "#fbe9e7", short: "QUAR" } };
const LEX_AUDIT_DIMS = [["Q6", "Audit Q6 Facet"], ["Class/Type/Level", "Audit Class/Type/Level"], ["Abstraction", "Audit Abstraction"], ["Sense", "Audit Sense"], ["Edge/Node", "Audit Edge/Node"], ["Acronym/N-Gram", "Audit Acronym/N-Gram"]];
function lexQualityInfo(o) {
  const v = (lexX(o, "Audit Verdict") || "").toUpperCase();
  const meta = LEX_QUAL[v]; if (!meta) return null;
  const fails = LEX_AUDIT_DIMS.map(([lab, col]) => { const cv = lexX(o, col).trim(); return cv && cv !== "\u2713" ? lab + ": " + cv : null; }).filter(Boolean);
  return { v, ...meta, fails, notes: lexX(o, "Audit Notes").trim() };
}
function lexBuildTree(rows, dims) {
  if (!dims.length) return { leaf: true, rows };
  const [dim, ...rest] = dims;
  const get = LEX_DIM_GET[dim], order = LEX_DIM_ORDER[dim] || [];
  const buckets = new Map();
  for (const o of rows) { const v = get(o) || ""; if (!buckets.has(v)) buckets.set(v, []); buckets.get(v).push(o); }
  const keys = [...buckets.keys()].sort((a, b) => {
    if (a === b) return 0;
    if (a === "") return 1; if (b === "") return -1;
    const ia = order.indexOf(a), ib = order.indexOf(b);
    return (ia < 0 ? 999 : ia) - (ib < 0 ? 999 : ib) || a.localeCompare(b);
  });
  return { leaf: false, dim, groups: keys.map((k) => ({ key: k, label: k === "" ? LEX_DIM_BLANK[dim] : k, rows: buckets.get(k), child: lexBuildTree(buckets.get(k), rest) })) };
}

const LEX_INV_COLS = ["Lexical Object ID", "String / Label", "Quant Type", "Primary Equivalent", "Quant Class", "Q6 Facet", "Quant Level", "Term Type", "Sense", "Is Plural", "Language", "Status", "Disambiguation Notes", "Contributor", "Source", "Create Date", "Last Change Date"];
const LEX_STORE_KEY = "intralign:lexicon:v1";
const LEX_SHEETS_KEY = "intralign:lexicon:sheets:v1";
const ANTHROPIC_KEY_LS = "intralign:anthropic_key";

// ---- IndexedDB key-value store (lexicon is too large for the localStorage budget) ----
function idbOpen() {
  return new Promise((res, rej) => {
    let r;
    try { r = indexedDB.open("intralign", 1); } catch (e) { return rej(e); }
    r.onupgradeneeded = () => { try { r.result.createObjectStore("kv"); } catch {} };
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error || new Error("indexedDB open failed"));
  });
}
async function idbGet(key) {
  const db = await idbOpen();
  return new Promise((res, rej) => { const t = db.transaction("kv", "readonly").objectStore("kv").get(key); t.onsuccess = () => res(t.result == null ? null : t.result); t.onerror = () => rej(t.error); });
}
async function idbSet(key, val) {
  const db = await idbOpen();
  return new Promise((res, rej) => { const t = db.transaction("kv", "readwrite").objectStore("kv").put(val, key); t.onsuccess = () => res(true); t.onerror = () => rej(t.error); });
}
async function idbDel(key) {
  const db = await idbOpen();
  return new Promise((res, rej) => { const t = db.transaction("kv", "readwrite").objectStore("kv").delete(key); t.onsuccess = () => res(true); t.onerror = () => rej(t.error); });
}

// ---- Anthropic API key (standalone deployment: no artifact proxy, so bring-your-own-key) ----
function getAnthropicKey() { try { return (localStorage.getItem(ANTHROPIC_KEY_LS) || "").trim(); } catch { return ""; } }
function setAnthropicKeyLS(k) { try { if (k && k.trim()) localStorage.setItem(ANTHROPIC_KEY_LS, k.trim()); else localStorage.removeItem(ANTHROPIC_KEY_LS); } catch {} }

// ---- row <-> object ----
function lexRowToObj(r) {
  const _extra = {}; for (const k in r) if (!LEX_INV_COLS.includes(k)) _extra[k] = r[k];
  return {
    _extra,
    id: r["Lexical Object ID"] || "",
    string: r["String / Label"] || "",
    quantType: r["Quant Type"] || "",
    primaryEquivalent: r["Primary Equivalent"] || "",
    quantClass: r["Quant Class"] || "",
    q6: r["Q6 Facet"] || (r["Quant Class"] ? (QUANT_CLASS_FACET[r["Quant Class"]] || "") : ""),
    quantLevel: r["Quant Level"] || "",
    termType: r["Term Type"] || "",
    sense: r["Sense"] || "",
    isPlural: String(r["Is Plural"] || "").toUpperCase() === "TRUE",
    language: r["Language"] || "EN",
    status: r["Status"] || "Draft",
    notes: r["Disambiguation Notes"] || "",
    contributor: r["Contributor"] || "",
    source: r["Source"] || "",
    createDate: r["Create Date"] || "",
    lastChangeDate: r["Last Change Date"] || "",
  };
}
function lexObjToRow(o) {
  return {
    "Lexical Object ID": o.id, "String / Label": o.string, "Quant Type": o.quantType,
    "Primary Equivalent": o.primaryEquivalent, "Quant Class": o.quantClass, "Q6 Facet": o.q6,
    "Quant Level": o.quantLevel, "Term Type": o.termType, "Sense": o.sense,
    "Is Plural": o.isPlural ? "TRUE" : "FALSE", "Language": o.language || "EN", "Status": o.status,
    "Disambiguation Notes": o.notes, "Contributor": o.contributor, "Source": o.source,
    "Create Date": o.createDate, "Last Change Date": o.lastChangeDate,
  };
}
function lexParseWorkbook(arrayBuffer) {
  const wb = XLSX.read(arrayBuffer, { type: "array" });
  const inv = wb.Sheets["Inventory"];
  if (!inv) throw new Error("No 'Inventory' sheet found — is this a lexical inventory workbook?");
  const rows = XLSX.utils.sheet_to_json(inv, { defval: "" });
  const objects = rows.map(lexRowToObj).filter((o) => o.string);
  // preserve original header order (incl. any extra columns) and every non-Inventory sheet verbatim
  const invAoa = XLSX.utils.sheet_to_json(inv, { header: 1, defval: "" });
  const invHeader = (invAoa[0] || []).map((h) => String(h));
  const sheets = {};
  for (const name of wb.SheetNames) if (name !== "Inventory") sheets[name] = XLSX.utils.sheet_to_json(wb.Sheets[name], { header: 1, defval: "" });
  const known = new Set(LEX_INV_COLS);
  const report = {
    sheets: wb.SheetNames.slice(),
    extraCols: invHeader.filter((h) => h && !known.has(h)),
    missingCols: LEX_INV_COLS.filter((c) => !invHeader.includes(c)),
    carriedSheets: Object.keys(sheets),
    total: objects.length,
    classified: objects.filter((o) => o.quantClass).length,
    active: objects.filter((o) => o.status === "Active").length,
  };
  return { objects, carry: { invHeader, sheets }, report };
}
// constant-generated reference sheets, used only when the imported workbook lacks them
function lexDefaultRefSheets() {
  return {
    "Quant Classes": [["Quant Class (19 — MECE)", "Q6 Facet"], ...QUANT_CLASSES.map((c) => [c, QUANT_CLASS_FACET[c]])],
    "Quant Levels": [["Quant Level (3)"], ...QUANT_LEVELS.map((l) => [l])],
    "Quant Types": [["Quant Type (12 — fixed)"], ...QUANT_TYPES.map((t) => [t])],
    "Term Types": [["Term Type (Intralign glossary)", "Expected SPO role", "Note"],
      ["Entity", "Subject or Object", "A thing the business models"],
      ["Attribute", "Object", "A property of an Entity"],
      ["Relationship", "Predicate", "The relating verb itself"],
      ["Fact", "Predicate = 'is an example of'", "Attachment unresolved — excluded from auto role-check"]],
    "Quant Edges": [["Quant Edge (6 — fixed)", "Meaning"], ...QUANT_EDGES],
    "Gate Log": [["Run Date", "Checked File", "String", "Used As", "Verdict", "Reason"]],
  };
}
function lexNextId(objects) {
  let max = 10000;
  for (const o of objects) { const m = /LEX-(\d+)/.exec(o.id || ""); if (m) max = Math.max(max, +m[1]); }
  return "LEX-" + (max + 1);
}
function lexBuildIndex(objects) {
  const byString = new Map(), byId = new Map();
  for (const o of objects) {
    if (o.id) byId.set(o.id, o);
    const k = (o.string || "").trim().toLowerCase();
    if (k && !byString.has(k)) byString.set(k, o);
  }
  return { objects, byString, byId };
}
// provenance + lineage: index the cross-glossary corpus by normalised string
function lexBuildLinkIndex(corpus) {
  const defByName = new Map(); // norm(string) -> [{glossaryId, term, gName, type}]  (string IS a governed Term)
  const useByName = new Map(); // norm(string) -> [{role, glossaryId, term, gName}]   (string used in a triple)
  const push = (m, k, v) => { if (!k) return; if (!m.has(k)) m.set(k, []); m.get(k).push(v); };
  for (const r of (corpus || [])) {
    const t = r.term; if (!t) continue;
    const gid = t["Glossary ID"] || "";
    push(defByName, norm(t.Term), { glossaryId: gid, term: t.Term, gName: r.gName, type: t["Term Type"] || "" });
    for (const s of (r.spo || [])) for (const role of ["Subject", "Predicate", "Object"]) if (norm(s[role])) push(useByName, norm(s[role]), { role, glossaryId: gid, term: t.Term, gName: r.gName });
  }
  return { defByName, useByName, ready: !!(corpus && corpus.length) };
}
// resolve a Term's Level-0 binding state. lexMatches=null means no lexicon loaded.
function lexTermBinding(lexMatches, lexActive, stored) {
  if (lexMatches === null) return { state: "no-lexicon" };
  if (!lexMatches.length) return { state: "violation" };                 // Term name is not a Lexical Object
  if (stored && !lexMatches.some((o) => o.id === stored)) return { state: "stale", stored };
  if (lexActive.length === 0) return { state: "not-active" };
  if (lexActive.length === 1) return { state: stored === lexActive[0].id ? "bound" : "bindable", lexId: lexActive[0].id };
  return { state: "polysemy", options: lexActive, stored };
}
// Gate one string used as role ('Subject'|'Predicate'|'Object'). Returns null if no inventory / empty input.
function lexGate(idx, raw, role) {
  if (!idx) return null;
  const k = (raw || "").trim().toLowerCase();
  if (!k) return null;
  const o = idx.byString.get(k);
  if (!o) return { verdict: "QUARANTINE", reason: "not in inventory" };
  if ((o.status || "") !== "Active") return { verdict: "QUARANTINE", reason: (o.status || "Draft").toLowerCase() + " — not Active" };
  if (!o.quantClass) return { verdict: "QUARANTINE", reason: "no Quant Class" };
  if (o.primaryEquivalent) {
    const p = idx.byId.get(o.primaryEquivalent);
    return { verdict: "WARN", reason: "alias", primary: p ? p.string : o.primaryEquivalent };
  }
  const expect = TERM_TYPE_ROLE[o.termType];
  if (expect && !expect.includes(role)) return { verdict: "WARN", reason: o.termType + " as " + role };
  return { verdict: "PASS", reason: o.quantClass + " · " + o.q6 };
}

// ---- module-level store so deep SPO editors can read the gate without prop-drilling ----
const _lexStore = { idx: null, subs: new Set() };
function lexSetStore(idx) { _lexStore.idx = idx; _lexStore.subs.forEach((f) => { try { f(); } catch {} }); }
function useLexGate() {
  const [, force] = useState(0);
  useEffect(() => { const f = () => force((x) => x + 1); _lexStore.subs.add(f); return () => _lexStore.subs.delete(f); }, []);
  return _lexStore.idx;
}

// ---- export 7-sheet inventory workbook ----
function lexExportWorkbook(objects, carry) {
  const wb = XLSX.utils.book_new();
  const aoa = (rows) => XLSX.utils.aoa_to_sheet(rows);
  // Inventory: preserve original header order + any extra columns; overwrite only app-owned cells
  let header = (carry && carry.invHeader && carry.invHeader.length) ? carry.invHeader.slice() : LEX_INV_COLS.slice();
  for (const c of LEX_INV_COLS) if (!header.includes(c)) header.push(c); // ensure all known cols present
  const rows = objects.map((o) => {
    const full = Object.assign({}, o._extra || {}, lexObjToRow(o));
    return header.map((h) => (full[h] != null ? full[h] : ""));
  });
  XLSX.utils.book_append_sheet(wb, aoa([header, ...rows]), "Inventory");
  // other sheets: re-emit preserved sheets verbatim (incl. the skill's Gate Log); fill gaps from defaults
  const carried = (carry && carry.sheets) || {};
  const defaults = lexDefaultRefSheets();
  const seen = new Set();
  for (const name of Object.keys(carried)) { XLSX.utils.book_append_sheet(wb, aoa(carried[name]), name); seen.add(name); }
  for (const name of ["Quant Classes", "Quant Levels", "Quant Types", "Term Types", "Quant Edges", "Gate Log"]) {
    if (!seen.has(name)) XLSX.utils.book_append_sheet(wb, aoa(defaults[name]), name);
  }
  const fn = "DAMA_lexical_inventory_" + today() + ".xlsx";
  XLSX.writeFile(wb, fn);
  return fn;
}

// ---- AI-assist: propose a classification dimension for a batch of strings (Claude API; never auto-Active) ----
const LEX_AI_DIMS = {
  quantClass: { label: "Quant Class", values: QUANT_CLASSES, hint: (v) => v + " (" + QUANT_CLASS_FACET[v] + ")", fallback: "Abstract Thing",
    guide: "Classify each business vocabulary string onto exactly one of the 19 Semantium Quant Classes — its essential nature." },
  quantLevel: { label: "Quant Level", values: QUANT_LEVELS, hint: (v) => v, fallback: "Business Concept",
    guide: "Classify each string's Quant Level: Business Concept (the concept itself), Metadata (data describing a concept), or Instance Data (an actual instance or value)." },
  quantType: { label: "Quant Type", values: QUANT_TYPES, hint: (v) => v, fallback: "Term",
    guide: "Classify each string's representation as one Quant Type. Most multi-word business labels are 'Phrase'; a single canonical business word is a 'Term'; ALL-CAPS short tokens are usually 'Acronym' or 'Abbreviation'." },
  termType: { label: "Term Type", values: LEX_TERM_TYPES, hint: (v) => v, fallback: "",
    guide: "Classify each string's Intralign Term Type: Entity (a thing the business models), Attribute (a property of an entity), Relationship (a relating verb), or Fact (an example/instance assertion)." },
};
async function lexAiClassify(rows, dim, apiKey) {
  const cfg = LEX_AI_DIMS[dim];
  const list = rows.map((o, i) => (i + 1) + ". " + o.string + (o.termType && dim !== "termType" ? " [" + o.termType + "]" : "")).join("\n");
  const vals = cfg.values.map((v) => cfg.hint(v)).join(", ");
  const sys = cfg.guide + " Return ONLY a JSON array, no prose, no markdown fences. Each item: {\"n\": <number>, \"value\": <one allowed value>}. "
    + "Allowed values: " + vals + ". " + (cfg.fallback ? ("If genuinely unclear, use \"" + cfg.fallback + "\".") : "If genuinely unclear, omit that item entirely.");
  const headers = { "Content-Type": "application/json" };
  if (apiKey) { headers["x-api-key"] = apiKey; headers["anthropic-version"] = "2023-06-01"; headers["anthropic-dangerous-direct-browser-access"] = "true"; }
  let resp;
  try {
    resp = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST", headers,
      body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 1000, messages: [{ role: "user", content: sys + "\n\nStrings:\n" + list }] }),
    });
  } catch (e) { throw new Error("network/CORS — check the API key and that the browser may call api.anthropic.com"); }
  if (!resp.ok) {
    let detail = ""; try { detail = (await resp.json()).error?.message || ""; } catch {}
    throw new Error("API " + resp.status + (detail ? " — " + detail : ""));
  }
  const data = await resp.json();
  const text = (data.content || []).filter((b) => b.type === "text").map((b) => b.text).join("");
  const clean = text.replace(/```json|```/g, "").trim();
  const arr = JSON.parse(clean);
  const allowed = new Set(cfg.values);
  const out = new Map();
  for (const it of arr) {
    const v = it.value;
    if (allowed.has(v) && Number.isInteger(it.n) && rows[it.n - 1]) out.set(rows[it.n - 1].id, v);
  }
  return out; // id -> value
}

// ---- small gate chip used in SPO editors ----
function GateChip({ result }) {
  if (!result) return null;
  const map = {
    PASS: { bg: C.greenSoft, fg: C.green, icon: Check },
    WARN: { bg: C.amberSoft, fg: C.amber, icon: AlertCircle },
    QUARANTINE: { bg: C.redSoft, fg: C.red, icon: ShieldCheck },
  };
  const s = map[result.verdict] || map.QUARANTINE;
  const Icon = s.icon;
  const label = result.verdict === "PASS" ? "PASS"
    : result.verdict === "WARN" ? (result.primary ? "→ " + result.primary : "WARN")

  return (
    <span title={result.verdict + " · " + result.reason} style={{

// table and drops focus — so the Quant Edges fields were effectively uneditable. This isolates typing.
function LexTextCell({ value, onCommit, placeholder, title, style }) {
  const [v, setV] = useState(value || "");
  useEffect(() => { setV(value || ""); }, [value]);
  const commit = () => { const t = (v || "").trim(); if (t !== (value || "")) onCommit(t); };
  return <input value={v} title={title} placeholder={placeholder} style={style}
    onChange={(e) => setV(e.target.value)} onBlur={commit}
    onKeyDown={(e) => { if (e.key === "Enter") { e.preventDefault(); e.currentTarget.blur(); } }} />;
}

    const chipS = { display: "inline-flex", alignItems: "center", gap: 3, padding: "1px 7px", borderRadius: 999, fontFamily: FONT_UI, fontSize: 10.5, fontWeight: 700 };
    const main = (
      <tr key={o.id} style={{ background: unclassified ? "#fffaf0" : "transparent" }}>
        <td style={{ ...td, minWidth: 200, paddingLeft: 8 + depth * 18 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
            <span style={{ fontWeight: 600, color: C.ink }}>{o.string}</span>
            {(() => { const ql = lexQualityInfo(o); return ql ? <span title={"Quality: " + ql.v + (ql.fails.length ? " — " + ql.fails.join("; ") : "") + (ql.notes ? " · " + ql.notes : "")} style={{ display: "inline-flex", alignItems: "center", padding: "0 6px", borderRadius: 999, background: ql.bg, color: ql.c, fontFamily: FONT_UI, fontSize: 9, fontWeight: 800, letterSpacing: 0.4, lineHeight: 1.8 }}>{ql.short}</span> : null; })()}
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontFamily: FONT_MONO, fontSize: 10, color: C.muted }}>{o.id}</span>
            <span onClick={() => setEditOpen((m) => ({ ...m, [o.id]: !m[o.id] }))} title="Edit all fields"
              style={{ cursor: "pointer", fontFamily: FONT_UI, fontSize: 10, fontWeight: 700, color: C.tealDeep }}>{editOpen[o.id] ? "close ▴" : "edit ▾"}</span>
          </div>
        </td>
        <td style={td}><select value={o.quantLevel} onChange={(e) => patch(o.id, { quantLevel: e.target.value })} style={sel}><option value=""></option>{QUANT_LEVELS.map((l) => <option key={l} value={l}>{l}</option>)}</select></td>
        <td style={td}><select value={o.q6} onChange={(e) => patch(o.id, { q6: e.target.value })} title="Auto-fills from Quant Class; editable override" style={{ ...sel, color: C.muted, fontWeight: 600 }}><option value=""></option>{Q6_ORDER.map((f) => <option key={f} value={f}>{f}</option>)}</select></td>
        <td style={td}><select value={o.quantClass} onChange={(e) => setClass(o.id, e.target.value)} style={{ ...sel, border: "1px solid " + (unclassified ? C.amber : C.line) }}><option value=""></option>{Q6_ORDER.map((f) => (<optgroup key={f} label={f}>{QUANT_CLASSES.filter((c) => QUANT_CLASS_FACET[c] === f).map((c) => <option key={c} value={c}>{c}</option>)}</optgroup>))}</select></td>
        <td style={td}><select value={o.quantType} onChange={(e) => patch(o.id, { quantType: e.target.value })} style={sel}><option value=""></option>{QUANT_TYPES.map((t) => <option key={t} value={t}>{t}</option>)}</select></td>
        <td style={td}><select value={o.termType} onChange={(e) => patch(o.id, { termType: e.target.value })} style={sel}><option value=""></option>{LEX_TERM_TYPES.map((t) => <option key={t} value={t}>{t}</option>)}</select></td>
        <td style={td}><QuantEdgeCell compact value={(o._extra && o._extra["Quant Edge"]) || ""} onChange={(v) => patch(o.id, { _extra: Object.assign({}, o._extra || {}, { "Quant Edge": v }) })} /></td>
        <td style={td}>
          <select value={o.status} onChange={(e) => patch(o.id, { status: e.target.value })}
            disabled={!o.quantClass}
            title={!o.quantClass ? "Assign a Quant Class before activating" : ""}
            style={{ ...sel, fontWeight: 700, color: o.status === "Active" ? C.green : (o.status === "Deprecated" || o.status === "Quarantined") ? C.red : C.amber }}>
            {(o.status && !LEX_STATUSES.includes(o.status) ? [...LEX_STATUSES, o.status] : LEX_STATUSES).map((s) => <option key={s} value={s} disabled={s === "Active" && !o.quantClass}>{s}</option>)}
          </select>
        </td>
        <td style={td}>
          {(defN || useN) ? (
            <span style={{ display: "inline-flex", gap: 4, flexWrap: "wrap", alignItems: "center" }}>
              {defN > 0 && <span
                onClick={(e) => { e.stopPropagation(); if (defN === 1 && onJumpTerm) onJumpTerm(lk.defined[0].term); else setLinkOpen((m) => ({ ...m, [o.id]: !m[o.id] })); }}
                title={defN === 1 ? ("Open \u201C" + lk.defined[0].term + "\u201D in the glossary") : ("Defined as " + defN + " terms — click to list them")}
                style={{ ...chipS, background: C.tealSoft, color: C.tealDeep, cursor: "pointer", textDecoration: "underline", textDecorationStyle: "dotted", textUnderlineOffset: 2 }}>
                <BookMarked size={10} strokeWidth={2.4} />Term{defN > 1 ? " ×" + defN : ""}</span>}
              {useN > 0 && <span
                onClick={(e) => { e.stopPropagation(); setLinkOpen((m) => ({ ...m, [o.id]: !m[o.id] })); }}
                title="Show where this string is used (lineage)"
                style={{ ...chipS, background: C.amberSoft, color: C.amber, cursor: "pointer" }}>
                <Share2 size={10} strokeWidth={2.4} />used ×{useN}</span>}
            </span>
          ) : <span style={{ color: C.muted, fontFamily: FONT_UI, fontSize: 11 }}>{linkIndex.ready ? "—" : ""}</span>}
        </td>
      </tr>
    );
    const out = [main];
    if (eOpen) out.push(
      <tr key={o.id + "#edit"}>
        <td colSpan={9} style={{ padding: "10px 16px 14px", paddingLeft: 26 + depth * 18, background: "#f7f5ef", borderTop: "1px solid " + C.lineSoft }}>
          <div style={{ fontFamily: FONT_UI, fontSize: 10.5, fontWeight: 700, color: C.tealDeep, marginBottom: 8, textTransform: "uppercase", letterSpacing: 0.4 }}>Edit all fields · {o.string}</div>
          <LexEditForm o={o} patch={patch} setClass={setClass} />
        </td>
      </tr>
    );
    if (open) out.push(
      <tr key={o.id + "#lk"}>
        <td colSpan={9} style={{ padding: "8px 14px 10px", paddingLeft: 26 + depth * 18, background: "#f6f8f7", borderTop: "1px solid " + C.lineSoft }}>
          <div style={{ fontFamily: FONT_UI, fontSize: 12.5, color: C.ink2, lineHeight: 1.6 }}>
            <b style={{ color: C.teal }}>Provenance</b> — defined as a governed Term:
            {lk.defined.length ? lk.defined.map((d, i) => (
              <span key={i} style={{ marginLeft: 6, display: "inline-flex", alignItems: "center", gap: 5 }}>
                <span onClick={() => onJumpTerm && onJumpTerm(d.term)} title={"Open \u201C" + d.term + "\u201D in the glossary"} style={{ fontWeight: 700, cursor: onJumpTerm ? "pointer" : "default", color: C.teal, textDecoration: "underline", textDecorationStyle: "dotted", textUnderlineOffset: 2 }}>{d.term}</span>
                <span style={{ fontFamily: FONT_MONO, fontSize: 10.5, color: C.muted }}>{d.glossaryId || "(no ID)"}</span>
                <span style={{ color: C.sub }}>· {d.gName}{d.type ? " · " + d.type : ""}</span>
              </span>
            )) : <span style={{ color: C.muted, marginLeft: 6 }}>not yet defined as a Term — ungoverned string</span>}
            <div style={{ marginTop: 6 }}>
              <b style={{ color: C.amber }}>Lineage</b> — used in the definitions of:
              {lk.used.length ? <span style={{ marginLeft: 6 }}>{lk.used.slice(0, 40).map((u, i) => (
                <span key={i} style={{ display: "inline-block", marginRight: 8 }}><span onClick={() => onJumpTerm && onJumpTerm(u.term)} title={"Open \u201C" + u.term + "\u201D in the glossary"} style={{ fontWeight: 600, cursor: onJumpTerm ? "pointer" : "default", color: C.teal, textDecoration: "underline", textDecorationStyle: "dotted", textUnderlineOffset: 2 }}>{u.term}</span> <span style={{ fontSize: 10.5, color: C.muted }}>({u.role}{u.glossaryId ? " · " + u.glossaryId : ""})</span></span>
              ))}{lk.used.length > 40 ? <span style={{ color: C.muted }}>+{lk.used.length - 40} more</span> : null}</span>
                : <span style={{ color: C.muted, marginLeft: 6 }}>not referenced in any triple</span>}
            </div>
            <div style={{ marginTop: 6, color: C.muted, fontSize: 11.5 }}>The authoritative link is stored on the Term (its <i>Lexical Object ID</i>), not here — this view is derived.</div>
          </div>
        </td>
      </tr>
    );
    return out;
  }
  function renderLeaf(rows, path, depth) {
    const cap = caps[path] || LEAF_CAP;
    const out = rows.slice(0, cap).map((o) => renderRow(o, depth));
    if (rows.length > cap) out.push(
      <tr key={path + "#more"}><td colSpan={9} style={{ padding: 7, textAlign: "center", background: "#faf7ef", borderTop: "1px solid " + C.lineSoft }}>
        <Btn small kind="ghost" onClick={() => setCaps((c) => ({ ...c, [path]: cap + LEAF_CAP }))}>Show {Math.min(LEAF_CAP, rows.length - cap)} more here</Btn>
      </td></tr>
    );
    return out;
  }
  function renderTree(node, depth, path) {
    if (node.leaf) return renderLeaf(node.rows, path || "root", depth);
    const out = [];
    for (const g of node.groups) {
      const gp = path + "\u203a" + node.dim + "=" + g.key;
      const open = !!expanded[gp];
      const st = groupStat(g.rows);
      out.push(
        <tr key={gp + "#h"} onClick={() => toggle(gp)} style={{ cursor: "pointer", background: depth === 0 ? "#eaf1ef" : "#f4f1ea", borderTop: "1px solid " + C.line }}>
          <td colSpan={9} style={{ padding: "5px 10px", paddingLeft: 10 + depth * 18 }}>
            <span style={{ display: "inline-flex", alignItems: "center", gap: 8 }}>
              <span style={{ width: 9, color: C.muted, fontSize: 11 }}>{open ? "\u25be" : "\u25b8"}</span>
              <span style={{ fontSize: 9, fontWeight: 800, color: C.teal, textTransform: "uppercase", letterSpacing: 0.4, background: C.tealSoft, padding: "1px 6px", borderRadius: 5 }}>{node.dim}</span>
              <span style={{ fontFamily: FONT_UI, fontWeight: 700, color: g.key === "" ? C.amber : C.ink, fontSize: 13 }}>{g.label}</span>
              <span style={{ fontFamily: FONT_UI, fontSize: 11.5, color: C.muted }}>{st.n}</span>
              {st.active > 0 && <span style={{ fontFamily: FONT_UI, fontSize: 10.5, fontWeight: 700, color: C.green }}>· {st.active} active</span>}
            </span>
          </td>
        </tr>
      );
      if (open) out.push(...renderTree(g.child, depth + 1, gp));
    }
    return out;
  }

  return (
    <div style={{ flex: 1, overflowY: "auto", padding: "26px 30px", background: C.paper }}>
      <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 12, marginBottom: 18, flexWrap: "wrap" }}>
        <div>
          <div style={{ display: "inline-flex", alignItems: "center", gap: 8, fontFamily: FONT_UI, fontSize: 11, fontWeight: 700, color: C.teal, textTransform: "uppercase", letterSpacing: 0.8 }}>
            <Tag size={13} strokeWidth={2.4} /> Level 0 · Lexical Gate
          </div>
          <h1 style={{ fontFamily: FONT_DISP, fontSize: 28, fontWeight: 600, color: C.ink, margin: "4px 0 2px" }}>Lexicon</h1>
          <div style={{ fontFamily: FONT_UI, fontSize: 13, color: C.sub, maxWidth: 620 }}>
            Govern strings before they become things. A string clears the gate only when it is <b>Active</b>, carries a <b>Quant Class</b>, and is a primary (not an alias).
          </div>
        </div>
        <div style={{ display: "flex", gap: 8, flexShrink: 0 }}>
          <Btn small kind="ghost" icon={PencilLine} onClick={() => setShowCols((s) => !s)}>Editable columns</Btn>
          <Btn small kind="ghost" icon={Upload} onClick={onImport}>Load inventory</Btn>
          <Btn small kind="ghost" icon={Download} onClick={() => { const fn = lexExportWorkbook(objects, carry); flash("Saved " + fn + (carry && carry.sheets ? " · preserved " + Object.keys(carry.sheets).length + " other sheets" : "")); }} disabled={!objects.length}>Export</Btn>
          <Btn small kind="ghost" icon={X} onClick={onClose}>Close</Btn>
        </div>
      </div>

      {showCols && (
        <div style={{ border: "1px solid " + C.line, borderRadius: 12, background: "#fff", padding: "12px 16px", marginBottom: 16 }}>
          <div style={{ fontFamily: FONT_UI, fontSize: 12.5, fontWeight: 700, color: C.ink, marginBottom: 2 }}>What you can edit in the Lexical Inventory</div>
          <div style={{ fontFamily: FONT_UI, fontSize: 11.5, color: C.muted, marginBottom: 10 }}>Columns are shown in the order a steward assigns Semantium elements.</div>
          <div style={{ display: "flex", gap: 16, fontFamily: FONT_UI, fontSize: 10.5, color: C.muted, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.4, padding: "0 0 4px", borderBottom: "1px solid " + C.lineSoft, marginBottom: 4 }}>
            <div style={{ width: 132 }}>Column</div><div style={{ width: 84 }}>Edit</div><div style={{ flex: 1 }}>Note</div>
          </div>
          {LEX_COL_EDIT.map(([name, kind, note]) => {
            const badge = kind === "edit" ? { bg: C.greenSoft, fg: C.green, txt: "Editable" } : kind === "auto" ? { bg: C.panel, fg: C.muted, txt: "Derived" } : { bg: C.amberSoft, fg: C.amber, txt: "Locked" };
            return (
              <div key={name} style={{ display: "flex", gap: 16, alignItems: "baseline", padding: "4px 0", fontFamily: FONT_UI, fontSize: 12.5 }}>
                <div style={{ width: 132, fontWeight: 600, color: C.ink }}>{name}</div>
                <div style={{ width: 84 }}><span style={{ display: "inline-block", padding: "1px 9px", borderRadius: 999, background: badge.bg, color: badge.fg, fontSize: 11, fontWeight: 700 }}>{badge.txt}</span></div>
                <div style={{ flex: 1, color: C.sub, lineHeight: 1.45 }}>{note}</div>
              </div>
            );
          })}
        </div>
      )}

      {!objects.length ? (
        <div style={{ border: "1px dashed " + C.line, borderRadius: 14, padding: "44px 20px", textAlign: "center", background: C.panel }}>
          <Tag size={26} color={C.muted} strokeWidth={1.8} />
          <div style={{ fontFamily: FONT_DISP, fontSize: 19, color: C.ink, marginTop: 10 }}>No inventory loaded</div>
          <div style={{ fontFamily: FONT_UI, fontSize: 13, color: C.muted, margin: "6px 0 16px" }}>Load <code>DAMA_lexical_inventory.xlsx</code> (or any workbook with an Inventory sheet).</div>
          <Btn kind="primary" icon={Upload} onClick={onImport}>Load inventory</Btn>
        </div>
      ) : (
        <>
          <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 16 }}>
            {chip("Total", summary.total)}
            {chip("Active", summary.active, C.green)}
            {chip("Draft", summary.draft, C.amber)}
            {chip("Classified", summary.classified, summary.classified === summary.total ? C.green : C.ink)}
            {chip("Gate-ready", summary.active, summary.active ? C.green : C.red)}
            {chip("Aliases", summary.aliases)}
            {linkIndex.ready && chip("Defined as Term", linkStats.defined, linkStats.defined ? C.teal : C.muted)}
          </div>

          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center", marginBottom: 12 }}>
            <div style={{ position: "relative", flex: "1 1 220px", minWidth: 180 }}>
              <Search size={15} color={C.muted} style={{ position: "absolute", left: 10, top: 9 }} />
              <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="Search string or LEX ID…"
                style={{ width: "100%", boxSizing: "border-box", padding: "8px 10px 8px 32px", border: "1px solid " + C.line, borderRadius: 8, fontFamily: FONT_UI, fontSize: 13, background: "#fff" }} />
            </div>
            <select value={fStatus} onChange={(e) => setFStatus(e.target.value)} style={sel}><option value="">All status</option>{LEX_STATUSES.map((s) => <option key={s} value={s}>{s}</option>)}</select>
            <select value={fFacet} onChange={(e) => setFFacet(e.target.value)} style={sel}><option value="">All Q6</option>{Q6_ORDER.map((f) => <option key={f} value={f}>{f}</option>)}</select>
            <select value={fType} onChange={(e) => setFType(e.target.value)} style={sel}><option value="">All Term Types</option>{LEX_TERM_TYPES.map((t) => <option key={t} value={t}>{t}</option>)}</select>
            <select value={fLink} onChange={(e) => setFLink(e.target.value)} title="Provenance / lineage to the glossary" style={sel}><option value="">All links</option><option value="defined">Defined as Term</option><option value="used">Used in SPO</option><option value="unlinked">Unlinked</option></select>
            {subjAreas.length > 0 && <select value={fSubject} onChange={(e) => setFSubject(e.target.value)} title="Subject Area" style={sel}><option value="">All Subject Areas</option>{subjAreas.map((s) => <option key={s} value={s}>{s}</option>)}</select>}
            {subCats.length > 0 && <select value={fSubCat} onChange={(e) => setFSubCat(e.target.value)} title="Sub-Category" style={sel}><option value="">All Sub-Categories</option>{subCats.map((s) => <option key={s} value={s}>{s}</option>)}</select>}
            {funcGroups.length > 0 && <select value={fFunc} onChange={(e) => setFFunc(e.target.value)} title="Functional Group" style={sel}><option value="">All Functional Groups</option>{funcGroups.map((s) => <option key={s} value={s}>{s}</option>)}</select>}
            {hasQuality && <select value={fQual} onChange={(e) => setFQual(e.target.value)} title="Quality (Level-0 audit verdict)" style={sel}><option value="">All quality</option><option value="PASS">● Pass</option><option value="WARN">● Warn</option><option value="QUARANTINE">● Quarantine</option></select>}
            <label style={{ display: "inline-flex", alignItems: "center", gap: 6, fontFamily: FONT_UI, fontSize: 12.5, color: C.ink2, cursor: "pointer" }}>
              <input type="checkbox" checked={onlyUnclassified} onChange={(e) => setOnlyUnclassified(e.target.checked)} style={{ accentColor: C.teal, width: 14, height: 14 }} /> Unclassified only
            </label>
            <span style={{ display: "inline-flex", alignItems: "center", gap: 0, border: "1px solid " + C.tealDeep, borderRadius: 8, overflow: "hidden" }}>
              <select value={aiDim} onChange={(e) => setAiDim(e.target.value)} title="Which dimension to suggest" style={{ fontFamily: FONT_UI, fontSize: 12, fontWeight: 700, padding: "5px 6px", border: "none", borderRight: "1px solid " + C.tealDeep, background: C.tealSoft, color: C.tealDeep, cursor: "pointer" }}>
                <option value="quantClass">Quant Class</option>
                <option value="quantLevel">Quant Level</option>
                <option value="quantType">Quant Type</option>
                <option value="termType">Term Type</option>
                <option value="all">All (Class→Level→Type→Term Type)</option>
              </select>
              <button onClick={() => runAi(aiDim === "all" ? ["quantClass", "quantLevel", "quantType", "termType"] : [aiDim])} disabled={busy}
                style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "5px 11px", border: "none", background: C.teal, color: "#fff", fontFamily: FONT_UI, fontSize: 12.5, fontWeight: 700, cursor: busy ? "not-allowed" : "pointer", opacity: busy ? 0.5 : 1 }}>
                <Gauge size={14} strokeWidth={2.4} /> {busy ? "Proposing…" : "AI suggest"}
              </button>
            </span>
            <span onClick={promptForKey} title="The AI assist calls api.anthropic.com directly from this browser with your key. Stored in localStorage on this machine only."
              style={{ cursor: "pointer", fontFamily: FONT_UI, fontSize: 11, fontWeight: 700, color: keySet ? C.green : C.amber, display: "inline-flex", alignItems: "center", gap: 4 }}>
              <ShieldCheck size={12} strokeWidth={2.4} /> {keySet ? "API key set" : "set API key"}
            </span>
          </div>

          {report && !reportSeen && (
            <div style={{ display: "flex", alignItems: "flex-start", gap: 10, marginBottom: 12, padding: "9px 12px", borderRadius: 9, background: report.missingCols.length ? C.amberSoft : C.tealSoft, border: "1px solid " + (report.missingCols.length ? C.amber : C.teal) }}>
              <FileSpreadsheet size={15} color={report.missingCols.length ? C.amber : C.teal} strokeWidth={2.2} style={{ marginTop: 1, flexShrink: 0 }} />
              <div style={{ fontFamily: FONT_UI, fontSize: 12.5, color: C.ink2, lineHeight: 1.5, flex: 1 }}>
                <b>Imported losslessly.</b> {report.total} objects · {report.classified} classified · {report.active} Active.
                {" "}Preserved {report.carriedSheets.length ? report.carriedSheets.join(", ") : "no other sheets"} verbatim{report.extraCols.length ? " and " + report.extraCols.length + " extra column(s): " + report.extraCols.join(", ") : ""}. Export writes these back unchanged.
                {report.missingCols.length > 0 && <div style={{ color: C.amber, fontWeight: 700, marginTop: 4 }}>⚠ Missing expected column(s): {report.missingCols.join(", ")} — those fields import blank.</div>}
              </div>
              <button onClick={() => setReportSeen(true)} style={{ border: "none", background: "none", cursor: "pointer", color: C.muted, fontFamily: FONT_UI, fontSize: 12, fontWeight: 700, flexShrink: 0 }}>Dismiss</button>
            </div>
          )}

          <div style={{ display: "flex", gap: 7, flexWrap: "wrap", alignItems: "center", marginBottom: 10 }}>
            <span style={{ fontFamily: FONT_UI, fontSize: 11, fontWeight: 700, color: C.muted, textTransform: "uppercase", letterSpacing: 0.5 }}>Group by</span>
            {groupBy.map((d, i) => (
              <span key={d} style={{ display: "inline-flex", alignItems: "center", gap: 3, background: C.tealSoft, border: "1px solid " + C.teal, borderRadius: 8, padding: "3px 5px 3px 9px", fontFamily: FONT_UI, fontSize: 12, fontWeight: 700, color: C.tealDeep }}>
                <span style={{ opacity: 0.7 }}>{i + 1}.</span> {d}
                <button title="Move up" disabled={i === 0} onClick={() => moveDim(i, -1)} style={dimBtn(i === 0)}>{"\u25b4"}</button>
                <button title="Move down" disabled={i === groupBy.length - 1} onClick={() => moveDim(i, 1)} style={dimBtn(i === groupBy.length - 1)}>{"\u25be"}</button>
                <button title="Remove" onClick={() => setGroupBy((g) => g.filter((x) => x !== d))} style={dimBtn(false)}>{"\u00d7"}</button>
              </span>
            ))}
            {LEX_GROUP_DIMS.filter((d) => !groupBy.includes(d)).map((d) => (
              <button key={d} onClick={() => setGroupBy((g) => [...g, d])} style={{ background: "#fff", border: "1px dashed " + C.line, borderRadius: 8, padding: "3px 9px", fontFamily: FONT_UI, fontSize: 12, color: C.muted, cursor: "pointer" }}>+ {d}</button>
            ))}
            {groupBy.length > 0 && <><Btn small kind="ghost" onClick={expandTop}>Expand top</Btn><Btn small kind="ghost" onClick={() => setExpanded({})}>Collapse all</Btn><Btn small kind="ghost" onClick={() => setGroupBy([])}>Flat</Btn></>}
          </div>

          <div style={{ fontFamily: FONT_UI, fontSize: 12, color: C.muted, marginBottom: 6 }}>
            {filtered.length} objects{filtered.length !== objects.length ? " (filtered from " + objects.length + ")" : ""}{groupBy.length ? " · grouped by " + groupBy.join(" \u203a ") : ""}
            <span style={{ marginLeft: 8, color: C.amber }}>AI proposals fill the field but stay Draft — a steward sets Active. Q6 Facet follows Quant Class automatically.</span>
          </div>

          <div style={{ border: "1px solid " + C.line, borderRadius: 10, overflow: "auto", maxHeight: "62vh", background: "#fff" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontFamily: FONT_UI, fontSize: 12.5 }}>
              <thead><tr>
                {["String", "Quant Level", "Q6 Facet", "Quant Class", "Quant Type", "Term Type", "Quant Edge", "Status", "Provenance"].map((h) => <th key={h} style={th}>{h}</th>)}
              </tr></thead>
              <tbody>
                {(groupBy.length > 0 && !q.trim())
                  ? renderTree(tree, 0, "")
                  : filtered.slice(0, limit).map((o) => renderRow(o, 0))}
              </tbody>
            </table>
          </div>
          {(groupBy.length === 0 || q.trim()) && limit < filtered.length && (
            <div style={{ textAlign: "center", marginTop: 10 }}>
              <Btn small kind="ghost" onClick={() => setLimit((l) => l + PAGE)}>Show {Math.min(PAGE, filtered.length - limit)} more</Btn>
            </div>
          )}
        </>
      )}
    </div>
  );
}

function GraphView({ glossary, onJump, focusTerm, onClearFocus }) {
  const hideRet = hideRetiredPref(), hideEx = hideExamplesPref();
  const { nodes, edges, nodeIndex } = useMemo(() => buildGraph(glossary, focusTerm, hideRet, hideEx), [glossary, focusTerm, hideRet, hideEx]);
  const [hover, setHover] = useState(null);     // norm(id) of hovered node
  const [sel, setSel] = useState(null);
  const [tick, setTick] = useState(0);
  const [colorBy, setColorBy] = useState("lifecycle");   // lifecycle | area
  const areaColors = useMemo(() => areaColorMap(nodes.map((n) => n.area)), [nodes]);
  const areaList = useMemo(() => Object.keys(areaColors), [areaColors]);
  const nodeFill = (nd) => colorBy === "area" ? (areaColors[nd.area] || C.muted) : lifeColor(nd.life);
  const posRef = useRef(null);
  const scopeRef = useRef(null);
  const dragRef = useRef(null);
  const W = 900, H = 580;
  // (re)seed positions synchronously whenever the scope (full vs local term) or node count changes,
  // so the first paint is never blank and switching views re-lays-out cleanly.
  const scopeKey = (focusTerm || "*ALL*") + ":" + nodes.length;
  if (!posRef.current || scopeRef.current !== scopeKey) {
    scopeRef.current = scopeKey;
    const n = nodes.length;
    const fIdx = focusTerm ? nodeIndex[norm(knownMap(glossary.terms)[norm(focusTerm)] || focusTerm)] : -1;
    posRef.current = nodes.map((nd, i) => {
      if (i === fIdx) return { x: W / 2, y: H / 2, vx: 0, vy: 0 };   // focus term in the centre
      const a = (i / Math.max(1, n)) * Math.PI * 2;
      return { x: W / 2 + Math.cos(a) * 200, y: H / 2 + Math.sin(a) * 200, vx: 0, vy: 0 };
    });
  }

  // run a short force simulation to settle the layout
  useEffect(() => {
    const adj = edges.map((e) => [nodeIndex[e.source], nodeIndex[e.target]]).filter(([a, b]) => a != null && b != null);
    // When grouping by Subject Area (whole-graph only), pull each node toward its area's
    // anchor so areas settle into visible clusters; otherwise pull toward the centre.
    const cluster = colorBy === "area" && !focusTerm;
    const anchorOf = cluster ? (() => {
      const areas = [...new Set(nodes.map((n) => n.area))].sort((a, b) => a.localeCompare(b));
      const K = areas.length, R = Math.min(W, H) * 0.34, an = {};
      areas.forEach((a, k) => { const ang = (k / Math.max(1, K)) * Math.PI * 2 - Math.PI / 2; an[a] = { x: W / 2 + Math.cos(ang) * R, y: H / 2 + Math.sin(ang) * R }; });
      return nodes.map((n) => an[n.area] || { x: W / 2, y: H / 2 });
    })() : null;
    let frame = 0, raf;
    const step = () => {
      const p = posRef.current; const N = p.length;
      for (let i = 0; i < N; i++) {
        for (let j = i + 1; j < N; j++) {
          let dx = p[i].x - p[j].x, dy = p[i].y - p[j].y;
          let d2 = dx * dx + dy * dy + 0.01; let d = Math.sqrt(d2);
          const rep = 6000 / d2; const fx = (dx / d) * rep, fy = (dy / d) * rep;
          p[i].vx += fx; p[i].vy += fy; p[j].vx -= fx; p[j].vy -= fy;
        }
      }
      adj.forEach(([a, b]) => {
        let dx = p[b].x - p[a].x, dy = p[b].y - p[a].y; let d = Math.sqrt(dx * dx + dy * dy) + 0.01;
        const k = (d - 130) * 0.02; const fx = (dx / d) * k, fy = (dy / d) * k;
        p[a].vx += fx; p[a].vy += fy; p[b].vx -= fx; p[b].vy -= fy;
      });
      for (let i = 0; i < N; i++) {
        if (anchorOf) { p[i].vx += (anchorOf[i].x - p[i].x) * 0.022; p[i].vy += (anchorOf[i].y - p[i].y) * 0.022; }
        else { p[i].vx += (W / 2 - p[i].x) * 0.005; p[i].vy += (H / 2 - p[i].y) * 0.005; }
        p[i].vx *= 0.85; p[i].vy *= 0.85;
        if (dragRef.current !== i) { p[i].x += p[i].vx; p[i].y += p[i].vy; }
        p[i].x = Math.max(40, Math.min(W - 40, p[i].x)); p[i].y = Math.max(36, Math.min(H - 36, p[i].y));
      }
      setTick((t) => t + 1);
      frame++; if (frame < 260) raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, [glossary, focusTerm, colorBy]);   // eslint-disable-line

  const pos = posRef.current;
  if (!pos.length && nodes.length) return null;

  const connected = (nid) => {
    const set = new Set([nid]);
    edges.forEach((e) => { if (e.source === nid) set.add(e.target); if (e.target === nid) set.add(e.source); });
    return set;
  };
  const focus = hover || sel;
  const lit = focus ? connected(focus) : null;

  // drag handlers (move a node)
  const svgRef = useRef(null);
  const toSvg = (evt) => {
    const r = svgRef.current.getBoundingClientRect();
    return { x: (evt.clientX - r.left) / r.width * W, y: (evt.clientY - r.top) / r.height * H };
  };
  const onDown = (i) => (e) => { e.preventDefault(); dragRef.current = i; };
  const onMove = (e) => {
    if (dragRef.current == null || !pos[dragRef.current]) return;
    const m = toSvg(e); pos[dragRef.current].x = m.x; pos[dragRef.current].y = m.y;
    pos[dragRef.current].vx = 0; pos[dragRef.current].vy = 0; setTick((t) => t + 1);
  };
  const onUp = () => { dragRef.current = null; };

  return (
    <div style={{ padding: "26px 32px 50px" }} className="rise">
      <div style={{ display: "flex", alignItems: "flex-end", gap: 16, flexWrap: "wrap", marginBottom: 14 }}>
        <div>
          <div style={{ fontFamily: FONT_MONO, fontSize: 12, color: C.teal, letterSpacing: 1.5, textTransform: "uppercase" }}>
            {focusTerm ? "Local Graph" : "Knowledge Graph"}
          </div>
          <h1 style={{ fontFamily: FONT_DISP, fontSize: 32, fontWeight: 600, margin: "4px 0 0" }}>
            {focusTerm ? focusTerm : subjectAreaLabel(glossary)}
          </h1>
          {focusTerm ? <div style={{ fontSize: 13, color: C.muted, marginTop: 4 }}>This term and its immediate connections.</div> : null}
        </div>
        <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 12 }}>
          {focusTerm && onClearFocus ? <Btn small kind="ghost" icon={Layers} onClick={onClearFocus}>See whole graph</Btn> : null}
          <div style={{ fontSize: 12.5, color: C.muted }}>
            {nodes.length} term{nodes.length !== 1 ? "s" : ""} · {edges.length} link{edges.length !== 1 ? "s" : ""} · drag · click a term to open it
          </div>
        </div>
      </div>

      {/* colour-by control + legend */}
      <div style={{ display: "flex", gap: 14, flexWrap: "wrap", alignItems: "center", marginBottom: 12 }}>
        <div style={{ display: "inline-flex", border: "1px solid " + C.line, borderRadius: 9, overflow: "hidden" }}>
          {[["lifecycle", "Lifecycle"], ["area", "Subject Area"]].map(([k, label], i) => (
            <button key={k} onClick={() => setColorBy(k)} style={{
              padding: "5px 12px", fontFamily: FONT_UI, fontSize: 12, fontWeight: 600, cursor: "pointer",
              border: "none", borderLeft: i ? "1px solid " + C.line : "none",
              background: colorBy === k ? C.teal : "#fff", color: colorBy === k ? "#fff" : C.ink2,
            }}>{label}</button>
          ))}
        </div>
        <span style={{ fontSize: 11.5, color: C.muted }}>{colorBy === "area" ? (focusTerm ? "Coloured by Subject Area" : "Grouped & coloured by Subject Area") : "Coloured by lifecycle"}</span>
        <div style={{ display: "flex", gap: 14, flexWrap: "wrap", marginLeft: "auto" }}>
          {colorBy === "area"
            ? areaList.map((a) => (
                <span key={a} style={{ display: "inline-flex", alignItems: "center", gap: 6, fontSize: 12, color: C.muted }}>
                  <span style={{ width: 11, height: 11, borderRadius: 9, background: areaColors[a], display: "inline-block" }} /> {a}
                </span>
              ))
            : LIFECYCLE.map((l) => (
                <span key={l} style={{ display: "inline-flex", alignItems: "center", gap: 6, fontSize: 12, color: C.muted }}>
                  <span style={{ width: 11, height: 11, borderRadius: 9, background: lifeColor(l), display: "inline-block" }} /> {l}
                </span>
              ))}
        </div>
      </div>

      {nodes.length === 0 ? (
        <div style={{ color: C.muted, fontSize: 14.5, padding: 30 }}>No terms yet — define some to see the graph.</div>
      ) : edges.length === 0 ? (
        <div style={{ background: C.panel, border: "1px solid " + C.line, borderRadius: 14, padding: 28, color: C.muted, fontSize: 14 }}>
          No links yet. Links appear when a term's Subject or Object is itself a defined term — define more of the referenced terms and they'll connect here.
        </div>
      ) : (
        <div style={{ background: C.panel, border: "1px solid " + C.line, borderRadius: 16, overflow: "hidden" }}>
          <svg ref={svgRef} viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", display: "block", background: "radial-gradient(circle at 50% 40%, #fbfaf6, #f1ece0)", cursor: dragRef.current != null ? "grabbing" : "default" }}
            onMouseMove={onMove} onMouseUp={onUp} onMouseLeave={onUp}>
            <defs>
              <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
                <path d="M0,0 L10,5 L0,10 z" fill="#b9b2a2" />
              </marker>
              <marker id="arrowLit" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
                <path d="M0,0 L10,5 L0,10 z" fill={C.teal} />
              </marker>
            </defs>
            {/* edges */}
            {(() => {
              // One readable label per unordered pair. Reciprocal or multi-predicate edges
              // otherwise stack their labels at the same midpoint and render as garbled,
              // upside-down-looking text. Collect the distinct predicates per pair and draw
              // a single combined label on the first edge of that pair.
              const pairPreds = {}, pairFirst = {};
              edges.forEach((e, i) => {
                const key = e.source < e.target ? e.source + "\u0000" + e.target : e.target + "\u0000" + e.source;
                if (pairFirst[key] == null) pairFirst[key] = i;
                const lab = String(e.label || "").trim();
                if (lab) { pairPreds[key] = pairPreds[key] || []; if (!pairPreds[key].includes(lab)) pairPreds[key].push(lab); }
              });
              return edges.map((e, i) => {
                const a = pos[nodeIndex[e.source]], b = pos[nodeIndex[e.target]];
                if (!a || !b) return null;
                const on = lit && lit.has(e.source) && lit.has(e.target) && (e.source === focus || e.target === focus);
                const dim = lit && !on;
                const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
                // angle the label along the edge, keeping it upright (never upside-down)
                let ang = Math.atan2(b.y - a.y, b.x - a.x) * 180 / Math.PI;
                if (ang > 90) ang -= 180; if (ang < -90) ang += 180;
                const key = e.source < e.target ? e.source + "\u0000" + e.target : e.target + "\u0000" + e.source;
                const labelText = (pairFirst[key] === i && pairPreds[key]) ? pairPreds[key].join(" \u00B7 ") : "";
                return (
                  <g key={i} opacity={dim ? 0.13 : 1}>
                    <line x1={a.x} y1={a.y} x2={b.x} y2={b.y} stroke={on ? C.teal : "#c6bda9"} strokeWidth={on ? 2.2 : 1.3} markerEnd={on ? "url(#arrowLit)" : "url(#arrow)"} />
                    {labelText ? (
                      <text x={mx} y={my} transform={`rotate(${ang} ${mx} ${my})`} textAnchor="middle"
                        dy={-3} fontFamily={FONT_MONO} fontSize={on ? "11" : "10"}
                        fill={on ? C.tealDeep : "#8a8472"}
                        style={{ fontStyle: "italic", paintOrder: "stroke", stroke: "#f4efe4", strokeWidth: 4, strokeLinejoin: "round" }}>
                        {labelText}
                      </text>
                    ) : null}
                  </g>
                );
              });
            })()}
            {/* nodes */}
            {nodes.map((nd, i) => {
              const p = pos[i]; if (!p) return null;
              const nid = norm(nd.id);
              const r = 7 + Math.min(10, nd.deg * 1.6);
              const dim = lit && !lit.has(nid);
              const isFocus = focus === nid;
              return (
                <g key={i} transform={`translate(${p.x},${p.y})`} opacity={dim ? 0.22 : 1}
                  style={{ cursor: "pointer" }}
                  onMouseEnter={() => setHover(nid)} onMouseLeave={() => setHover(null)}
                  onMouseDown={onDown(i)}
                  onClick={() => { if (dragRef.current == null) onJump(nd.id); }}>
                  <circle r={r + (isFocus ? 4 : 0)} fill={nodeFill(nd)} stroke="#fff" strokeWidth={2} />
                  <text y={-r - 7} textAnchor="middle" fontFamily={FONT_UI} fontWeight={isFocus ? 700 : 600}
                    fontSize={isFocus ? 13 : 11.5} fill={C.ink} style={{ pointerEvents: "none", paintOrder: "stroke", stroke: "#f3efe6", strokeWidth: 3 }}>{nd.id}</text>
                </g>
              );
            })}
            {/* hover tooltip — the term's narrative, then its SPO statements */}
            {(() => {
              if (!hover) return null;
              const hi = nodeIndex[hover]; const p = pos[hi]; if (!p) return null;
              const term = glossary.terms.find((t) => norm(t.Term) === hover);
              if (!term) return null;
              const defText = String(term["Definition (Soft)"] || term.Definition || "").trim();
              const srcText = String(term.Source || "").trim();
              const spos = termSpos(glossary, term.Term).slice()
                .sort((a, b) => String(a.Order || "").localeCompare(String(b.Order || "")));
              const FW = 314;
              const shown = spos.slice(0, 7);
              const more = spos.length - shown.length;
              const estDefLines = Math.min(5, Math.max(1, Math.ceil((defText.length || 1) / 44)));
              const srcLines = srcText ? Math.min(2, Math.max(1, Math.ceil(srcText.length / 46))) : 0;
              const FH = Math.min(384, 92 + estDefLines * 16 + (shown.length ? 22 + shown.length * 30 : 24) + (more > 0 ? 18 : 0) + (srcText ? 16 + srcLines * 15 : 0));
              let fx = p.x + 18, fy = p.y - 14;
              if (fx + FW > W - 6) fx = p.x - 18 - FW;
              if (fx < 6) fx = 6;
              if (fy + FH > H - 6) fy = H - FH - 6;
              if (fy < 6) fy = 6;
              const lc = lifeColor(term.Lifecycle || "Draft");
              const label = (s) => { const parts = String(orderLabel(s.Order || "")).split(" "); return parts[0] || "--"; };
              return (
                <foreignObject x={fx} y={fy} width={FW} height={FH} style={{ pointerEvents: "none", overflow: "visible" }}>
                  <div style={{
                    fontFamily: FONT_UI, background: "#ffffff", border: "1px solid " + C.line,
                    borderRadius: 12, boxShadow: "0 14px 38px rgba(28,33,38,.22)", padding: "11px 13px",
                    boxSizing: "border-box", width: FW + "px",
                  }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 7 }}>
                      <span style={{ width: 10, height: 10, borderRadius: 9, background: lc, flexShrink: 0 }} />
                      <span style={{ fontFamily: FONT_DISP, fontWeight: 600, fontSize: 15, color: C.ink, lineHeight: 1.15 }}>{term.Term}</span>
                      <span style={{ marginLeft: "auto", fontSize: 9, fontWeight: 700, letterSpacing: 0.6, textTransform: "uppercase", color: lc }}>{term.Lifecycle || "Draft"}</span>
                    </div>
                    <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: 1, textTransform: "uppercase", color: C.teal, marginBottom: 3 }}>Narrative</div>
                    <div style={{
                      fontSize: 12, color: defText ? C.ink2 : C.muted, lineHeight: 1.4, marginBottom: 9,
                      display: "-webkit-box", WebkitLineClamp: 5, WebkitBoxOrient: "vertical", overflow: "hidden",
                      fontStyle: defText ? "normal" : "italic",
                    }}>{defText || "No narrative definition yet."}</div>
                    <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: 1, textTransform: "uppercase", color: C.teal, marginBottom: 4 }}>
                      SPO statements{spos.length ? " \u00B7 " + spos.length : ""}
                    </div>
                    {shown.length === 0 ? (
                      <div style={{ fontSize: 12, color: C.muted, fontStyle: "italic" }}>No statements at this version.</div>
                    ) : shown.map((s, k) => (
                      <div key={k} style={{ display: "flex", gap: 7, marginBottom: 4, alignItems: "baseline" }}>
                        <span style={{ fontFamily: FONT_MONO, fontSize: 9, color: C.muted, flexShrink: 0, width: 30, textAlign: "right" }}>{label(s)}</span>
                        <span style={{ fontSize: 11.5, color: C.ink, lineHeight: 1.35 }}>
                          <span style={{ fontWeight: 600 }}>{s.Subject}</span>
                          <span style={{ color: C.teal, fontStyle: "italic" }}>{" " + (s.Predicate || "") + " "}</span>
                          <span style={{ fontWeight: 600 }}>{s.Object}</span>
                        </span>
                      </div>
                    ))}
                    {more > 0 ? <div style={{ fontSize: 10.5, color: C.muted, marginTop: 2 }}>{"+" + more + " more\u2026"}</div> : null}
                    {srcText ? (
                      <div style={{ marginTop: 9, paddingTop: 8, borderTop: "1px solid " + C.lineSoft }}>
                        <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: 1, textTransform: "uppercase", color: C.teal, marginBottom: 2 }}>Source</div>
                        <div style={{ fontSize: 11, color: C.muted, lineHeight: 1.35, display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical", overflow: "hidden" }}>{srcText}</div>
                      </div>
                    ) : null}
                  </div>
                </foreignObject>
              );
            })()}
          </svg>
        </div>
      )}
      {focus && (
        <div style={{ marginTop: 12, fontSize: 13, color: C.muted }}>
          <b style={{ color: C.ink, fontFamily: FONT_MONO }}>{nodes.find((n) => norm(n.id) === focus)?.id}</b> — click to open, or hover another to trace its links.
        </div>
      )}
    </div>
  );
}

function ReconcileMapModal({ plan, onApply, onClose }) {
  const [rows, setRows] = useState(() => plan.incoming.map((it) => ({ ...it })));
  const setTarget = (i, targetId) => setRows((rs) => rs.map((r, j) => (j === i ? { ...r, targetId } : r)));
  // a target may only be claimed by one incoming file
  const claimed = {}; rows.forEach((r, i) => { if (r.targetId && r.targetId !== "__new__") claimed[r.targetId] = i; });
  const replaceCount = rows.filter((r) => r.parsed && r.targetId && r.targetId !== "__new__").length;
  const addCount = rows.filter((r) => r.parsed && (!r.targetId || r.targetId === "__new__")).length;
  const failCount = rows.filter((r) => !r.parsed).length;

  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(20,24,28,.5)", zIndex: 200, display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
      <div onClick={(e) => e.stopPropagation()} style={{ background: C.paper, borderRadius: 16, width: "min(820px,100%)", maxHeight: "86vh", overflowY: "auto", boxShadow: "0 24px 70px rgba(0,0,0,.3)", padding: "26px 28px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 11, marginBottom: 6 }}>
          <GitMerge size={20} color={C.teal} strokeWidth={2.2} />
          <span style={{ fontFamily: FONT_DISP, fontSize: 22, fontWeight: 600, color: C.ink }}>Reload reconciled glossaries</span>
          <button onClick={onClose} style={{ marginLeft: "auto", border: "none", background: "none", cursor: "pointer", color: C.muted }}><X size={20} /></button>
        </div>
        <p style={{ color: C.muted, fontSize: 13, margin: "0 0 18px", lineHeight: 1.6 }}>
          For each changed file, choose the existing glossary it replaces — the old copy is <b>deleted</b> and the changed one loaded in its place. Names are matched ignoring date/version suffixes; fix any that guessed wrong, or set <b>Add as new</b>.
        </p>
        <div style={{ border: "1px solid " + C.line, borderRadius: 12, overflow: "hidden" }}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 22px 1fr", gap: 0, background: "#f1ece0", padding: "9px 14px", fontSize: 10.5, fontWeight: 700, letterSpacing: 0.5, textTransform: "uppercase", color: C.muted }}>
            <span>Changed file (incoming)</span><span></span><span>Replaces — existing glossary</span>
          </div>
          {rows.map((r, i) => (
            <div key={i} style={{ display: "grid", gridTemplateColumns: "1fr 22px 1fr", alignItems: "center", gap: 0, padding: "11px 14px", borderTop: "1px solid " + C.lineSoft, background: r.error ? C.redSoft : "transparent" }}>
              <div>
                <div style={{ fontWeight: 700, fontSize: 13.5, color: r.error ? C.red : C.ink }}>{r.fileName}</div>
                <div style={{ fontSize: 11.5, color: C.muted, marginTop: 1 }}>{r.error ? "could not read this file" : r.termCount + " terms"}</div>
              </div>
              <div style={{ textAlign: "center", color: C.muted }}><ArrowRight size={15} /></div>
              <div>
                <select disabled={r.error} value={r.targetId} onChange={(e) => setTarget(i, e.target.value)}
                  style={{ width: "100%", fontFamily: FONT_UI, fontSize: 13, fontWeight: 600, padding: "8px 10px", borderRadius: 8, border: "1px solid " + C.line, background: "#fff", color: C.ink, outline: "none" }}>
                  <option value="__new__">— Add as new glossary —</option>
                  {plan.candidates.map((c) => {
                    const takenBy = claimed[c.id];
                    const taken = takenBy != null && takenBy !== i;
                    return <option key={c.id} value={c.id} disabled={taken}>{c.name} ({c.termCount} terms){taken ? " — already chosen" : ""}</option>;
                  })}
                </select>
              </div>
            </div>
          ))}
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginTop: 20 }}>
          <span style={{ fontSize: 12.5, color: C.muted }}>
            {replaceCount} will replace · {addCount} added{failCount ? " · " + failCount + " skipped" : ""}
          </span>
          <span style={{ marginLeft: "auto", display: "flex", gap: 9 }}>
            <Btn kind="ghost" onClick={onClose}>Cancel</Btn>
            <Btn kind="primary" icon={GitMerge} onClick={() => onApply(rows)} disabled={replaceCount + addCount === 0}>
              {replaceCount ? `Replace ${replaceCount} & load` : "Load glossaries"}
            </Btn>
          </span>
        </div>
      </div>
    </div>
  );
}

function LinkMapModal({ glossary, corpus, flash, onClose }) {
  const allCorpus = corpus || [];
  const glossaryIds = useMemo(() => new Set(allCorpus.map((r) => r.gId)), [allCorpus]);
  const multi = glossaryIds.size > 1;
  const [scope, setScope] = useState(glossary ? "this" : "all");   // "this" | "all"
  const [base, setBase] = useState(defaultLinkBase());
  const [aliases, setAliases] = useState(false);

  const aliasesIn = (list) => list.reduce((n, t) => n + String(t.Aliases || "").split(/[;,]/).map((a) => a.trim()).filter(Boolean).length, 0);
  const thisTerms = (glossary && glossary.terms) || [];
  const allTerms = allCorpus.map((r) => r.term);
  const isAll = scope === "all" || !glossary;

  const termCount = isAll ? allTerms.length : thisTerms.length;
  const aliasCount = isAll ? aliasesIn(allTerms) : aliasesIn(thisTerms);
  const rowCount = termCount + (aliases ? aliasCount : 0);

  const sampleRow = allCorpus.find((r) => r.term && r.term.Term);
  const preview = isAll
    ? (sampleRow ? corpusLink(base.trim(), sampleRow, sampleRow.term.Term) : (base.trim() || "") + "#glossary=…&term=…")
    : deepLinkUrl(base.trim(), glossary, (thisTerms.find((t) => t.Term) || { Term: "Example Term", "Subject Area": glossary.name }), (thisTerms.find((t) => t.Term) || {}).Term || "Example Term");

  const go = () => {
    let csv, fname;
    if (isAll) { csv = buildAllLinksCsv(allCorpus, base.trim(), aliases); fname = "all_glossaries_deep_links.csv"; }
    else { csv = buildLinkMapCsv(glossary, base.trim(), aliases); fname = (glossary.name || "glossary").replace(/[^\w.-]+/g, "_") + "_deep_links.csv"; }
    downloadCsv(fname, csv);
    flash(`Deep-link map exported — ${rowCount} link${rowCount !== 1 ? "s" : ""}${isAll ? ` across ${glossaryIds.size} glossaries` : ""} (CSV)`);
    onClose();
  };

  const scopeBtn = (k, label) => (
    <button onClick={() => setScope(k)} style={{
      flex: 1, padding: "9px 12px", borderRadius: 9, cursor: "pointer", fontFamily: FONT_UI, fontWeight: 600, fontSize: 13,
      border: "1px solid " + (scope === k ? C.tealDeep : C.line), background: scope === k ? C.teal : "#fff", color: scope === k ? "#fff" : C.ink2,
    }}>{label}</button>
  );

  return (
    <Modal title="Download deep-link map" onClose={onClose}>
      {glossary && multi && (
        <div style={{ display: "flex", gap: 9, marginBottom: 16 }}>
          {scopeBtn("this", "This glossary")}
          {scopeBtn("all", `All glossaries (${glossaryIds.size})`)}
        </div>
      )}

      <div style={{ fontSize: 13.5, color: C.ink2, lineHeight: 1.6, marginBottom: 18 }}>
        A CSV with one row per term {isAll ? <>across <strong>all {glossaryIds.size} loaded glossaries</strong></> : <>in <strong>{glossary.name}</strong></>} and its
        shareable deep link — so your business architecture (ArchiMate, a CMDB, Confluence, a spreadsheet) can link each element
        straight to its definition here. {isAll ? <>A leading <em>Glossary</em> column tells you which glossary each term belongs to. </> : null}
        Exports all <strong>{termCount}</strong> term{termCount !== 1 ? "s" : ""}.
      </div>

      <label style={{ display: "block", fontSize: 12, fontWeight: 700, color: C.muted, letterSpacing: .5, textTransform: "uppercase", marginBottom: 6 }}>Canonical workbench URL</label>
      <textarea value={base} onChange={(e) => setBase(e.target.value)} placeholder={DEFAULT_WORKBENCH_URL}
        onFocus={(e) => e.target.select()} spellCheck={false} rows={3}
        style={{ width: "100%", boxSizing: "border-box", padding: "10px 12px", borderRadius: 9, border: "1px solid " + C.line, background: "#fff", fontFamily: FONT_MONO, fontSize: 12.5, outline: "none", resize: "vertical", lineHeight: 1.5, wordBreak: "break-all" }} />
      <div style={{ display: "flex", gap: 8, marginTop: 9, flexWrap: "wrap" }}>
        <Btn small kind="primary" onClick={() => { setWorkbenchUrl(base); flash("Saved \u2014 every deep link now points to this workbench"); }}>Save as default</Btn>
        <Btn small kind="ghost" onClick={() => setBase(DEFAULT_WORKBENCH_URL)}>Reset to SharePoint link</Btn>
      </div>
      <div style={{ fontSize: 12, color: C.muted, marginTop: 9, lineHeight: 1.55 }}>
        The single workbench every deep link resolves to — not the local copy you happen to have open. Pre-filled with your SharePoint-hosted workbench. <strong>Save as default</strong> makes every term&rsquo;s &ldquo;Copy link&rdquo; and all future link exports use it. The <code style={{ fontFamily: FONT_MONO }}>glossary</code> &amp; <code style={{ fontFamily: FONT_MONO }}>term</code> are added to the URL <strong>fragment</strong> (<code style={{ fontFamily: FONT_MONO }}>#…</code>) so SharePoint opens the page rather than downloading it.
      </div>

      <label style={{ display: "flex", alignItems: "center", gap: 9, marginTop: 16, cursor: "pointer", fontSize: 13.5, color: C.ink }}>
        <input type="checkbox" checked={aliases} onChange={(e) => setAliases(e.target.checked)} style={{ width: 16, height: 16, accentColor: C.teal }} />
        Add a row for each alias / synonym{aliasCount > 0 ? ` (+${aliasCount})` : ""} — so a synonym in your architecture still resolves
      </label>

      <div style={{ marginTop: 18, padding: "12px 14px", background: C.panel, border: "1px solid " + C.line, borderRadius: 10 }}>
        <div style={{ fontSize: 11, fontWeight: 700, color: C.muted, letterSpacing: .5, textTransform: "uppercase", marginBottom: 5 }}>Example link</div>
        <div style={{ fontFamily: FONT_MONO, fontSize: 12, color: C.ink2, wordBreak: "break-all" }}>{preview}</div>
      </div>

      <div style={{ display: "flex", gap: 10, marginTop: 22, justifyContent: "flex-end", alignItems: "center" }}>
        <span style={{ fontSize: 12.5, color: C.muted, marginRight: "auto" }}>{rowCount} link{rowCount !== 1 ? "s" : ""} will be exported{isAll ? ` · ${glossaryIds.size} glossaries` : ""}</span>
        <Btn kind="ghost" onClick={onClose}>Cancel</Btn>
        <Btn kind="solid" icon={Download} onClick={go}>Download CSV</Btn>
      </div>
    </Modal>
  );
}
