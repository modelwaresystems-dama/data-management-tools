/* ===== Strategic Alignment Maturity (SAMM, after Luftman \u2014 adapted for Data & Technology Management) ===== */
const SAM_AREAS=[
  {key:"communication",name:"Communication",short:"Comms",blurb:"Understanding between the business and the data & technology team \u2014 liaison effectiveness, shared learning, knowledge sharing.",
   levels:["Business & data teams lack understanding of each other","Limited business / data understanding","Good understanding; relaxed communication emerging","Bonding, unified communication","Informal, pervasive across the organisation"]},
  {key:"value",name:"Value Measurement",short:"Value",blurb:"Metrics & value: data metrics, business metrics, balanced metrics, SLAs, benchmarking, formal reviews, continuous improvement.",
   levels:["Some technical measurements only","Measures functional cost efficiency","Measures some cost effectiveness; dashboard established","Measures cost effectiveness; some partner value; dashboard managed","Measurement extended to external partners"]},
  {key:"governance",name:"Governance",short:"Gov",blurb:"Business & data strategic planning, budgetary control, steering committees, prioritisation process.",
   levels:["No formal process; cost centre; reactive priorities","Tactical at functional level; occasionally responsive","Relevant process across the organisation","Managed across the organisation","Integrated across the firm and partners"]},
  {key:"partnership",name:"Partnership",short:"Partner",blurb:"Business perception of data value, role of data in strategic planning, shared goals/risks/rewards, sponsor / champion.",
   levels:["Conflict; data is a cost of doing business","Data emerging as an asset; process enabler","Data is an asset; process driver; conflict seen as creative","Data enables / drives business strategy","Data & business adaptive and improvise together"]},
  {key:"architecture",name:"Scope & Architecture",short:"Scope/Arch",blurb:"Traditional \u2192 enabler/driver, standards articulation, architectural integration & transparency, flexibility with emerging tech.",
   levels:["Traditional (e.g. accounting, email)","Transactional (e.g. ESS, DSS)","Integrated across the organisation","Integrated with partners","Evolves with partners"]},
  {key:"skills",name:"Skills",short:"Skills",blurb:"Locus of power, change readiness, innovation/entrepreneurship, management style, career crossover, training, hiring & retaining.",
   levels:["Data takes risk, little reward; technical training only","Differs across functional organisations","Emerging value service provider; balanced technical & business hiring","Shared risks and rewards","Education / careers / rewards across the organisation"]}
];
function samDeptScores(){ return Object.entries((MGR.maturity&&MGR.maturity.assess)||{}).map(([dept,s])=>({dept,s})).filter(x=>SAM_AREAS.some(a=>num(x.s[a.key])>0)); }
function samAreaStats(areaKey){ const ds=samDeptScores().map(x=>num(x.s[areaKey])).filter(v=>v>0); if(!ds.length) return {avg:0,min:0,max:0,n:0}; return {avg:ds.reduce((a,b)=>a+b,0)/ds.length, min:Math.min(...ds), max:Math.max(...ds), n:ds.length}; }
function samAreaAvg(areaKey){ return samAreaStats(areaKey).avg; }
function samOverall(){ const a=SAM_AREAS.map(x=>samAreaAvg(x.key)).filter(v=>v>0); return a.length? a.reduce((p,c)=>p+c,0)/a.length : 0; }
function samLevelLabel(v){ if(!v) return "Not yet assessed"; const names=["","Initial / Ad-hoc","Committed","Established / Focused","Improved / Managed","Optimised"]; return v.toFixed(1)+" \u2014 "+(names[Math.round(v)]||""); }
function samRadar(){

  return `<div class="help"><b>Stakeholder feedback for each initiative.</b> This pulls the <b>Project Feedback</b> every team member captured in their workbook \u2014 including each stakeholder's <b>role / department</b> \u2014 and groups it by initiative so you can manage how stakeholders rate the work and chase open follow-ups.</div>
    <div class="grid-stats">${statHtml}</div>
    <div class="card" style="margin-bottom:20px"><div class="card-head"><div><h3>By role / department</h3><div class="sub">Who is giving feedback, and how they rate the work</div></div></div>
      <div class="tbl-wrap"><table class="grid"><thead><tr><th>Role / Department</th><th style="text-align:center">Feedback items</th><th style="text-align:center">Avg score</th><th style="text-align:center">Open follow-ups</th></tr></thead><tbody>${roleRows}</tbody></table></div></div>
    ${filterBar}
    ${groupHtml}`;
}
window.renderStakeFb=renderStakeFb;
function render(){
  $("navBox").innerHTML=navItems();
  { const lp=$("leadPill"); if(lp) lp.textContent=(MGR.dept&&MGR.dept.name)?("Leading: "+MGR.dept.name):"Set your department \u2192"; }
  let crumb,title,desc,body;
  if(CURRENT==="overview"){ crumb="Department"; title=(MGR.dept&&MGR.dept.name)?(MGR.dept.name+" \u2014 Overview"):"Department Overview"; desc="Your team's combined value picture \u2014 work mix, alignment, value delivered and where the company's asks are covered."; body=renderOverview(); }
  else if(CURRENT==="team"){ crumb="People"; title="Team & Workbooks"; desc="Every staff workbook you've brought together. Click a person to see their value story and give feedback."; body=renderTeam(); }
  else if(CURRENT==="asks"){ crumb="The company asks"; title="Company Value Asks"; desc="The strategic themes the organisation expects value against \u2014 set the company priority for each."; body=renderAsks(); }
  else if(CURRENT==="strategy"){ crumb="Executive"; title="Strategy Alignment"; desc="Top-down line of sight: the CEO's Business Objectives (lagging metrics), the CIO's Digital priorities, and the CDO's Data Initiatives \u2014 each carrying a leading metric, aligning up to a business objective, and tagged to the DM knowledge areas. The single source every Workbook reads."; body=renderStrategyEditor(); }
  else if(CURRENT==="initiatives"){ crumb="Business Value-Add"; title="Data Initiatives \u00B7 Work Alignment"; desc="The company's Data Initiatives are what counts as Business Value-Add. See which ones your team's work is aligned to \u2014 and where the gaps are."; body=renderInitiatives(); }
  else if(CURRENT==="maturity"){ crumb="Alignment"; title="Strategic Alignment Maturity"; desc="How well each practice's data work aligns with the business \u2014 six criteria scored 1\u20135, rolled up to an organisational maturity level against your target."; body=renderMaturity(); }
  else if(CURRENT==="stakefb"){ crumb="Stakeholders"; title="Stakeholder Feedback by Initiative"; desc="The Project Feedback your team collected from stakeholders \u2014 organised by initiative and broken down by the stakeholder's role / department."; body=renderStakeFb(); }
  else if(CURRENT==="trends"){ crumb="Month on month"; title="Change Over Time"; desc="Import each person's workbook every month, then track how their value-add and the department's delivery shift over time."; body=renderTrends(); }
  else if(CURRENT==="org"){ crumb="Across departments"; title="Organisation"; desc="Roll up every department \u2014 value-add, delivery, initiative coverage and the feedback each department is getting."; body=renderOrg(); }
  else if(CURRENT==="orgchart"){ crumb="Structure"; title="Org Chart"; desc="Executives, the departments they oversee, each department's Growth Architect and its team members."; body=renderOrgChart(); }
  else if(CURRENT==="product"){ crumb="Know Your Value"; title="The Product"; desc="The Know Your Value methodology \u2014 share this with your teams so they understand the journey."; body=renderProduct(); }
  else if(CURRENT==="effectiveness"){ crumb="My scorecard"; title="My Effectiveness"; desc="How well you understand the value the company asks of you, and how that translates into your department's work."; body=renderEffectiveness(); }
  else if(CURRENT==="guide"){ crumb="Help"; title="User Guide"; desc="How the Know Your Value Workbook and this Console work together \u2014 Business Value-Add by department, and the stakeholder-feedback loop."; body=renderGuide(); }
  else { crumb="Stakeholder"; title="Feedback I've Given"; desc="Your value-feedback ledger \u2014 exportable for each person to import."; body=renderFeedback(); }
  const guideBtn = (CURRENT!=="guide") ? `<button onclick="openManualAt('${manualAnchorFor(CURRENT)}')" title="Open the User Guide for this" style="float:right;margin:2px 0 0;background:#eaf5ee;border:1px solid var(--accent);color:var(--accent);font-family:'IBM Plex Sans';font-weight:700;font-size:12px;border-radius:999px;padding:6px 13px;cursor:pointer">\u24D8 Guide</button>` : "";
  $("topbar").innerHTML=guideBtn+`<div class="tt"><div class="crumb">${esc(crumb)}</div><h2>${esc(title)}</h2><p>${esc(desc)}</p></div>`;
  $("content").innerHTML=body;
  if(CURRENT==="guide") wireManualJumps();
}
window.render=render;
function shell(){ return `<div class="app">
  <aside class="sidebar">
    <div class="brand"><div class="brand-row"><div class="brand-logo"><img src="${LOGO}" alt="Modelware"></div><div><div class="co">Modelware Systems Int'l</div><h1>Growth Architect Console</h1></div></div>
      <button onclick="openSettings()" title="Set the department you lead" style="margin-top:13px;display:flex;align-items:center;gap:8px;width:100%;background:rgba(240,160,32,.14);border:1px solid rgba(240,160,32,.32);color:#f6d79a;border-radius:8px;padding:8px 11px;font-size:12px;font-weight:600;text-align:left">\u2302 <span id="leadPill" style="flex:1">${(MGR&&MGR.dept&&MGR.dept.name)?("Leading: "+esc(MGR.dept.name)):"Set your department \u2192"}</span><span style="opacity:.75">\u270E</span></button>
      <p style="margin-top:11px">Bring your teams' Know Your Value workbooks together \u2014 see each department, the organisation, give feedback, and measure your effectiveness.</p></div>
    <nav class="nav" id="navBox"></nav>
    <div class="side-foot">
      <button class="side-btn primary" onclick="addMemberPrompt()">\u2795 Add person</button>
      <button class="side-btn primary" style="background:var(--accent);color:#fff" onclick="triggerImport()">\u2911 Import &amp; assign workbook</button>
      <button class="side-btn ghost" onclick="openSettings()">\u2302 Department &amp; profile</button>
      <button class="side-btn ghost" onclick="exportFeedback()">\u2913 Export feedback</button>
      <button class="side-btn ghost" onclick="exportConsole()">\u2913 Export everything (backup)</button>
      <button class="side-btn ghost" onclick="triggerImportConsole()">\u2912 Import a backup</button>
      <button class="side-btn ghost" onclick="resetAll()">\u21BA Reset console</button>
      <div class="saved" id="savedLabel">Ready</div>
      <div class="ver" title="Growth Architect Console build">Growth Console <b>v${APP_VERSION}</b> \u00B7 ${APP_BUILD}</div>
    </div>
  </aside>
  <main class="main"><div class="topbar" id="topbar"></div><div class="content" id="contentScroll"><div id="content"></div></div></main>
  </div><div id="toast" class="toast"></div><div id="modalRoot"></div>`; }
function resetAll(){ showModal("Reset the console?","This clears all imported workbooks, your understanding assessment and feedback ledger. This can't be undone.","Reset","danger",async()=>{ MGR=defaultState(); await saveState(true); go("overview"); toast("Console reset","ok"); }); }
window.resetAll=resetAll;
/* ===== Full console backup: export everything as JSON, import to replace ===== */
function consoleSnapshot(){ return {app:"KYV-Growth-Console",version:APP_VERSION,build:APP_BUILD,exported:new Date().toISOString(),state:MGR}; }
function exportConsole(){
  try{
    const blob=new Blob([JSON.stringify(consoleSnapshot(),null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download=`KYV_Console_${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1200);
    toast("Everything exported \u2014 share the .json file; others import it here","ok");
  }catch(err){ toast("Export failed"); }
}
function triggerImportConsole(){
  const inp=document.createElement("input"); inp.type="file"; inp.accept=".json,application/json";
  inp.onchange=()=>{ if(inp.files[0]) importConsole(inp.files[0]); };
  inp.click();
}
function importConsole(file){
  const reader=new FileReader();
  reader.onload=e=>{
    let snap;
    try{ snap=JSON.parse(e.target.result); }catch(err){ toast("That isn't a valid backup file"); return; }
    const state=(snap&&snap.state&&typeof snap.state==="object")?snap.state:snap;
    if(!state||typeof state!=="object"||(!Array.isArray(state.staff)&&!state.strategy&&!state.asks)){ toast("That file doesn't look like a KYV console backup"); return; }
    const who=snap&&snap.exported?new Date(snap.exported).toLocaleString():"unknown date";
    const vtxt=snap&&snap.version?` (v${esc(snap.version)}, exported ${esc(who)})`:"";
    const n=Array.isArray(state.staff)?state.staff.length:0;
    showModal("Import this console?",
      `This replaces <b>everything</b> in your console \u2014 people, imported workbooks, the strategy, maturity assessments and feedback \u2014 with the backup${vtxt}. It contains <b>${n}</b> ${n===1?"person":"people"}. This can't be undone, so export your own backup first if you want to keep it.`,
      "Replace &amp; import","danger", async()=>{
        try{
          await KVS.set(STORE_KEY, JSON.stringify(state));
          await loadState();
          go("overview");
          toast("Console imported \u2014 "+((MGR.staff||[]).length)+" people loaded","ok");
        }catch(err){ toast("Import failed"); }
      });
  };
  reader.readAsText(file);
}
window.consoleSnapshot=consoleSnapshot; window.exportConsole=exportConsole; window.triggerImportConsole=triggerImportConsole; window.importConsole=importConsole;
async function boot(){ document.getElementById("root").innerHTML=shell(); await loadState(); render(); const el=$("savedLabel"); if(el)el.textContent="All changes saved"; }
boot();
</script>
</body>
</html>
