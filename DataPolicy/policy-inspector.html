// =============================================================
//  CODE BLOCK 3.5: DOCX OUTLINE PARSER + DOC PANEL
//  (lives inside the main app IIFE so it can use escapeHtml,
//   LIBRARY, ATTACHED_DOCS, and trigger render() on completion)
// =============================================================
// =============================================================
//  DOCX_OUTLINE — parse a Word document into a structured
//  section index and provide search/snippet helpers.
//
//  Used by the entity detail pages to show "In the policy
//  document" panels that cross-reference workbook items with
//  the published policy text.
// =============================================================

const DOCX_OUTLINE = (() => {

  // ---------- Lazy CDN load of Mammoth.js ----------
  let _mammothPromise = null;
  function loadMammoth() {
    if (_mammothPromise) return _mammothPromise;
    _mammothPromise = new Promise((resolve, reject) => {
      if (typeof mammoth !== 'undefined') { resolve(mammoth); return; }
      const sources = [
        'https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.11.0/mammoth.browser.min.js',
        'https://cdn.jsdelivr.net/npm/mammoth@1.9.0/mammoth.browser.min.js',
        'https://unpkg.com/mammoth@1.9.0/mammoth.browser.min.js'
      ];
      let i = 0;
      const tryNext = () => {
        if (i >= sources.length) {
          reject(new Error('Could not load Mammoth.js from any CDN — check your network connection'));
          return;
        }
        const url = sources[i++];
        const script = document.createElement('script');
        script.src = url;
        script.onload = () => {
          if (typeof mammoth !== 'undefined') resolve(mammoth);
          else tryNext();
        };
        script.onerror = () => tryNext();
        document.head.appendChild(script);
      };
      tryNext();
    });
    return _mammothPromise;
  }

  // ---------- Parse a Word doc blob into a section list ----------
  async function parseBlob(blob, opts = {}) {
    await loadMammoth();
    const arrayBuffer = await blob.arrayBuffer();
    const result = await mammoth.convertToHtml({ arrayBuffer });
    const html = result.value || '';

    const wrap = document.createElement('div');
    wrap.innerHTML = html;

    const sections = [];
    let path = []; // [{level, text}]
    let current = null;

    function commit() {
      if (current && (current.text.trim().length > 0 || current.headingPath.length > 0)) {
        sections.push(current);
      }
    }

    for (const node of Array.from(wrap.children)) {
      const tag = node.tagName.toLowerCase();
      if (/^h[1-6]$/.test(tag)) {
        commit();
        const level = parseInt(tag[1]);
        const headingText = (node.textContent || '').trim();
        while (path.length > 0 && path[path.length - 1].level >= level) path.pop();
        path.push({ level, text: headingText });
        current = {
          headingPath: path.map(p => p.text),
          headingLevel: level,
          text: ''
        };
      } else {
        if (!current) current = { headingPath: [], headingLevel: 0, text: '' };
        const text = (node.textContent || '').trim();
        if (text) current.text += (current.text ? '\n' : '') + text;
      }
    }
    commit();

    return {
      sections,
      parsedAt: new Date().toISOString()
    };
  }

  // ---------- Build a search index from an outline ----------
  function buildIndex(outline) {
    if (!outline || !outline.sections) return { sections: [] };
    const sections = outline.sections.map((s, i) => ({
      idx: i,
      headingPath: s.headingPath || [],
      headingLevel: s.headingLevel || 0,
      text: s.text || '',
      textLower: (s.text || '').toLowerCase(),
      headingLower: (s.headingPath || []).join(' › ').toLowerCase()
    }));
    return { sections };
  }

  // ---------- Search the index ----------
  // queries: array of strings (entity ID, name aliases…). Returns
  // sections that contain any of them, with the matched terms attached.
  function search(index, queries) {
    if (!index || !index.sections.length || !queries || !queries.length) return [];
    const lower = queries
      .map(q => (q == null ? '' : String(q).trim()))
      .filter(q => q.length >= 3)
      .map(q => q.toLowerCase());
    if (!lower.length) return [];

    const out = [];
    for (const s of index.sections) {
      const hits = [];
      for (const q of lower) {
        if (s.textLower.includes(q) || s.headingLower.includes(q)) {
          hits.push(q);
        }
      }
      if (hits.length) out.push({ ...s, matchedTerms: hits });
    }
    return out;
  }

  // ---------- Build a snippet around the first match ----------
  function makeSnippet(text, queries, maxLength = 280) {
    if (!text) return '';
    const lower = text.toLowerCase();
    let firstHit = -1, hitLen = 0;
    for (const q of queries) {
      const qs = String(q || '').toLowerCase();
      if (qs.length < 3) continue;
      const i = lower.indexOf(qs);
      if (i >= 0 && (firstHit < 0 || i < firstHit)) {
        firstHit = i;
        hitLen = qs.length;
      }
    }
    if (firstHit < 0) {
      return text.length > maxLength ? text.slice(0, maxLength) + '…' : text;
    }
    const before = Math.max(0, firstHit - 90);
    const after = Math.min(text.length, firstHit + hitLen + 190);
    let snippet = text.slice(before, after);
    if (before > 0) snippet = '…' + snippet;
    if (after < text.length) snippet = snippet + '…';
    return snippet;
  }

  // ---------- Highlight matched terms in HTML ----------
  function highlightMatches(text, queries) {
    if (!text) return '';
    // Escape HTML first
    const escaped = String(text)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    if (!queries || !queries.length) return escaped;
    // Sort longest first so we don't mangle nested matches
    const sorted = [...queries]
      .filter(q => q && String(q).length >= 3)
      .sort((a, b) => b.length - a.length);
    let out = escaped;
    for (const q of sorted) {
      const escQ = String(q)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      try {
        const re = new RegExp('(' + escQ + ')', 'gi');
        out = out.replace(re, '<mark>$1</mark>');
      } catch (_) { /* bad regex char – skip */ }
    }
    return out;
  }

  return { loadMammoth, parseBlob, buildIndex, search, makeSnippet, highlightMatches };
})();

// =============================================================
//  ACTIVE DOC INDEX — in-memory cache keyed by policy code.
//  Re-populated on policy activation and after doc attach.
// =============================================================

let ACTIVE_DOC_INDEX = null;     // {sections: [...]} for current active policy
let ACTIVE_DOC_STATUS = null;    // 'ready' | 'indexing' | 'error' | 'pdf' | null
let ACTIVE_DOC_ERROR = null;     // human-readable error string when status === 'error'

async function ensureActiveDocIndex() {
  ACTIVE_DOC_INDEX = null;
  ACTIVE_DOC_STATUS = null;
  ACTIVE_DOC_ERROR = null;
  const code = LIBRARY.getActiveCode();
  if (!code || !ATTACHED_DOCS.has(code)) return;
  let rec;
  try {
    rec = await DOCS_DB.get(code);
  } catch (err) {
    console.warn('Could not load attached doc:', err);
    return;
  }
  if (!rec) return;
  // PDFs aren't indexed (would need pdf.js, ~1MB) — leave panel hidden
  if ((rec.type || '').includes('pdf') || /\.pdf$/i.test(rec.filename || '')) {
    ACTIVE_DOC_STATUS = 'pdf';
    return;
  }
  if (rec.outline) {
    ACTIVE_DOC_INDEX = DOCX_OUTLINE.buildIndex(rec.outline);
    ACTIVE_DOC_STATUS = 'ready';
    return;
  }
  if (!rec.blob) return;
  ACTIVE_DOC_STATUS = 'indexing';
  // Trigger an immediate re-render so the "indexing…" state shows
  if (typeof render === 'function') render();
  // Parse asynchronously — trigger re-render when done
  try {
    const outline = await DOCX_OUTLINE.parseBlob(rec.blob);
    await DOCS_DB.updateOutline(code, outline);
    ACTIVE_DOC_INDEX = DOCX_OUTLINE.buildIndex(outline);
    ACTIVE_DOC_STATUS = 'ready';
    if (typeof render === 'function') render();
  } catch (err) {
    console.error('Could not parse document outline:', err);
    ACTIVE_DOC_STATUS = 'error';
    ACTIVE_DOC_ERROR = err && err.message ? err.message : String(err);
    if (typeof render === 'function') render();
  }
}

// ---------- Doc panel renderer ----------
// Renders the "In the policy document" block on entity detail pages.
function renderDocPanel(queries, entityLabel) {
  const code = LIBRARY.getActiveCode();
  if (!code || !ATTACHED_DOCS.has(code)) return '';
  if (ACTIVE_DOC_STATUS === 'pdf') {
    return `<aside class="doc-panel doc-panel-pdf">
      <div class="doc-panel-title"><span class="doc-panel-icon">📄</span> Attached document is a PDF</div>
      <div class="doc-panel-body">
        PDF text indexing isn't supported. Attach a <code>.docx</code> version of the policy to enable cross-referencing.
        <div class="doc-panel-actions"><button class="doc-inline-btn" data-doc-open="${escapeHtml(code)}">Open PDF →</button></div>
      </div>
    </aside>`;
  }
  if (ACTIVE_DOC_STATUS === 'indexing' || !ACTIVE_DOC_INDEX) {
    return `<aside class="doc-panel doc-panel-loading">
      <div class="doc-panel-title"><span class="doc-panel-icon">⏳</span> Indexing policy document…</div>
      <div class="doc-panel-body">This happens once per attached document and may take a few seconds.</div>
    </aside>`;
  }
  if (ACTIVE_DOC_STATUS === 'error') {
    return `<aside class="doc-panel doc-panel-error">
      <div class="doc-panel-title"><span class="doc-panel-icon">⚠</span> Could not read the attached document</div>
      <div class="doc-panel-body">${escapeHtml(ACTIVE_DOC_ERROR || 'Unknown error')}</div>
    </aside>`;
  }
  const matches = DOCX_OUTLINE.search(ACTIVE_DOC_INDEX, queries);
  // Dedupe by section idx (different queries may hit same section)
  const seen = new Set();
  const unique = [];
  for (const m of matches) {
    if (seen.has(m.idx)) continue;
    seen.add(m.idx);
    unique.push(m);
  }
  if (!unique.length) {
    return `<aside class="doc-panel doc-panel-missing">
      <div class="doc-panel-title">
        <span class="doc-panel-icon">⚠</span> Not found in the policy document
      </div>
      <div class="doc-panel-body">
        <em>${escapeHtml(entityLabel || 'This item')}</em> isn't mentioned in the attached Word document. The published policy may be out of sync with the workbook.
        <div class="doc-panel-actions"><button class="doc-inline-btn" data-doc-open="${escapeHtml(code)}">📄 Open document to verify →</button></div>
      </div>
    </aside>`;
  }
  const max = 5;
  const shown = unique.slice(0, max);
  const matchHtml = shown.map(m => {
    const heading = m.headingPath && m.headingPath.length
      ? m.headingPath.map(h => escapeHtml(h)).join(' <span class="doc-path-sep">›</span> ')
      : '<em class="muted">untitled section</em>';
    const snippet = DOCX_OUTLINE.makeSnippet(m.text, queries);
    const highlighted = DOCX_OUTLINE.highlightMatches(snippet, queries);
    return `<article class="doc-match">
      <div class="doc-match-heading">${heading}</div>
      <div class="doc-match-snippet">${highlighted}</div>
    </article>`;
  }).join('');
  return `<aside class="doc-panel">
    <div class="doc-panel-title">
      <span class="doc-panel-icon">📄</span> In the policy document
      <span class="doc-panel-count">${unique.length} ${unique.length === 1 ? 'mention' : 'mentions'}</span>
    </div>
    <div class="doc-panel-body">
      ${matchHtml}
      ${unique.length > max ? `<div class="doc-match-more">+ ${unique.length - max} more ${unique.length - max === 1 ? 'mention' : 'mentions'} of this item in the document</div>` : ''}
      <div class="doc-panel-actions">
        <button class="doc-inline-btn" data-doc-open="${escapeHtml(code)}">📄 Open the policy document →</button>
      </div>
    </div>
  </aside>`;
}

// Build query lists for each entity type (helpers used by renderers)
function _docQueriesForControl(c) {
  const queries = [c['Control ID']];
  for (const a of _titleAliases(c['Control Name'])) queries.push(a);
  return queries.filter(Boolean);
}
function _docQueriesForTheme(t) {
  const queries = [t['Theme Code']];
  for (const a of _titleAliases(t['Theme Name'])) queries.push(a);
  return queries.filter(Boolean);
}
function _docQueriesForPrinciple(p) {
  // Different policy workbooks name this column differently —
  // 'Principle' (DSDS) vs 'Principle Name' (DVAI). Try both.
  // Also include a "Principle N" form in case the doc uses numbered
  // references.
  const name = p['Principle Name'] || p['Principle'] || '';
  const num = parseInt(p['Number'] || '', 10);
  const qs = [];
  for (const a of _titleAliases(name)) qs.push(a);
  if (!isNaN(num)) {
    qs.push(`Principle ${num}`);
    qs.push(`Principle ${String(num).padStart(2, '0')}`);
  }
  return qs.filter(Boolean);
}
function _docQueriesForRole(roleName) {
  return _titleAliases(roleName);
}
function _docQueriesForSource(title) {
  return _titleAliases(title);
}

// =============================================================
//  TITLE ALIAS GENERATION
//  Documents often refer to a workbook entity by a shorter form
//  than the canonical title: e.g. the workbook says
//    "King Saud University Data Governance Policy (v0.1, Jan 2026)"
//  but the policy document just says "Data Governance Policy".
//  Without expansion, the literal-substring search misses these
//  legitimate citations and flags the reference as "not found".
//
//  This helper produces multiple search forms per title so the
//  match succeeds whichever form the document uses.
// =============================================================
function _titleAliases(title) {
  if (!title) return [];
  const t = String(title).trim();
  if (!t) return [];
  const aliases = new Set();
  aliases.add(t);

  // 1. Strip institutional prefixes ("King Saud University", "KSU")
  const noPrefix = t
    .replace(/^King Saud University\s+/i, '')
    .replace(/^KSU\s+/i, '')
    .trim();
  if (noPrefix && noPrefix !== t) aliases.add(noPrefix);

  // 2. Strip trailing version/date parenthesis: "(v0.1, Jan 2026)",
  //    "(2024)", "(version 3)", "(May 2026)"
  const versionRe = /\s*\([^)]*?(?:v\d|version|\b(?:jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)[a-z]*\b|\b\d{4}\b)[^)]*\)\s*$/i;
  const noVersion = t.replace(versionRe, '').trim();
  if (noVersion && noVersion !== t) aliases.add(noVersion);

  // 3. Both: stripped prefix AND no version suffix
  const both = noPrefix.replace(versionRe, '').trim();
  if (both && both !== t && both !== noPrefix && both !== noVersion) {
    aliases.add(both);
  }

  // 4. Codes inside parentheses: "(DGDC)", "(ECC-2:2024)", "(DCC-1:2022)"
  //    These often appear as standalone references in the doc body.
  const codeRe = /\(\s*([A-Z][A-Z0-9_\-:\.\s]{1,28}?)\s*\)/g;
  let m;
  while ((m = codeRe.exec(t)) !== null) {
    const code = m[1].trim();
    if (code.length >= 3) aliases.add(code);
  }

  // 5. Em-dash split — "Storage Resilience — Backup and Recovery"
  //    The doc may use just "Storage Resilience".
  const dashSplit = t.split(/\s+[—–]\s+/);
  if (dashSplit.length > 1) {
    const main = dashSplit[0].trim();
    if (main && main.length >= 5) aliases.add(main);
  }

  // Filter out anything too short to search reliably
  return Array.from(aliases).filter(s => s && s.length >= 3);
}

function wireLibraryControls() {
  // CTA link to workload view (note: the top-bar button is already wired
  // in renderPolicySwitcher; querySelectorAll picks up any in-content CTA
  // that shares the same data-attribute).
  document.querySelectorAll('#content [data-go-workload]').forEach(el => {
    el.addEventListener('click', e => {
      e.preventDefault();
      navigate('workload');
    });
  });

  // Open policy via card click
  document.querySelectorAll('[data-open]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.preventDefault();
      const code = el.getAttribute('data-open');
      openPolicy(code);
    });
  });

  // Remove from library
  document.querySelectorAll('[data-remove]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      const code = el.getAttribute('data-remove');
      const p = LIBRARY.get(code);
      if (!p) return;
      if (confirm(`Remove "${p.name || p.code}" from the library?\n\nYou'll need to re-load the .xlsx to bring it back.`)) {
        LIBRARY.remove(code);
        renderLibrary();
        renderPolicySwitcher();
      }
    });
  });

  // Per-card attach
  document.querySelectorAll('[data-attach-for]').forEach(el => {
    el.addEventListener('change', async (e) => {
      const code = el.getAttribute('data-attach-for');
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      await FILES.attachDocuments([file], code);
      e.target.value = '';
      renderLibrary();
    });
  });

  // Per-card open
  document.querySelectorAll('[data-open-doc]').forEach(el => {
    el.addEventListener('click', async (e) => {
      e.preventDefault();
      e.stopPropagation();
      const code = el.getAttribute('data-open-doc');
      await openPolicyDoc(code);
    });
  });

  // Per-card detach
  document.querySelectorAll('[data-detach-doc]').forEach(el => {
    el.addEventListener('click', async (e) => {
      e.preventDefault();
      e.stopPropagation();
      const code = el.getAttribute('data-detach-doc');
      if (!confirm(`Detach the policy document from ${code}?`)) return;
      await detachPolicyDoc(code);
      renderLibrary();
    });
  });

  // Global file input: docs
  const docIn = document.getElementById('lib-file-doc');
  if (docIn) {
    docIn.addEventListener('change', async (e) => {
      const files = Array.from(e.target.files || []);
      if (!files.length) return;
      await FILES.attachDocuments(files);
      e.target.value = '';
      renderLibrary();
      renderPolicySwitcher();
    });
  }

  // File input: xlsx
  const xlsxIn = document.getElementById('lib-file-xlsx');
  if (xlsxIn) {
    xlsxIn.addEventListener('change', async (e) => {
      const files = Array.from(e.target.files || []);
      if (!files.length) return;
      await FILES.loadWorkbooks(files);
      e.target.value = ''; // reset so same file can be re-selected
      renderLibrary();
      renderPolicySwitcher();
    });
  }

  // File input: bundle
  const bundleIn = document.getElementById('lib-file-bundle');
  if (bundleIn) {
    bundleIn.addEventListener('change', async (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      await FILES.importBundle(file);
      e.target.value = '';
      renderLibrary();
      renderPolicySwitcher();
    });
  }

  // Export
  const expBtn = document.getElementById('lib-export');
  if (expBtn) expBtn.addEventListener('click', () => FILES.exportBundle());

  // Clear
  const clrBtn = document.getElementById('lib-clear');
  if (clrBtn) clrBtn.addEventListener('click', () => {
    if (confirm('Remove all policies from the library? This cannot be undone (you\'ll need to re-load the workbooks).')) {
      LIBRARY.clear();
      renderLibrary();
      renderPolicySwitcher();
    }
  });

  // Drag and drop on the dropzone
  const dz = document.getElementById('lib-dropzone');
  if (dz) {
    ['dragenter', 'dragover'].forEach(ev => dz.addEventListener(ev, e => {
      e.preventDefault(); e.stopPropagation();
      dz.classList.add('dragging');
    }));
    ['dragleave', 'drop'].forEach(ev => dz.addEventListener(ev, e => {
      e.preventDefault(); e.stopPropagation();
      dz.classList.remove('dragging');
    }));
    dz.addEventListener('drop', async (e) => {
      const files = Array.from(e.dataTransfer.files || []);
      if (!files.length) return;
      const xlsx = files.filter(f => /\.xlsx$/i.test(f.name));
      const json = files.filter(f => /\.json$/i.test(f.name));
      const docs = files.filter(f => /\.(docx|pdf|doc)$/i.test(f.name));
      if (xlsx.length) await FILES.loadWorkbooks(xlsx);
      for (const j of json) await FILES.importBundle(j);
      if (docs.length) await FILES.attachDocuments(docs);
      renderLibrary();
      renderPolicySwitcher();
    });
  }
}

function escapeAttr(s) {
  return String(s == null ? '' : s).replace(/[&"<>]/g, m => ({
    '&': '&amp;', '"': '&quot;', '<': '&lt;', '>': '&gt;'
  })[m]);
}

        <span class="ps-caret">▾</span>

      <div class="ps-menu" id="ps-menu">

    </div>
    ${doc
      ? `<button class="ps-btn ps-btn-doc" data-doc-open="${escapeAttr(activeCode)}" title="Open the attached policy document: ${escapeAttr(doc.filename)}">
           <span class="ps-doc-icon">📄</span>
           <span class="ps-doc-label">Policy doc</span>
         </button>`
      : ''}

  // Wire library button
  document.querySelector('[data-go-library]').addEventListener('click', () => navigate('library'));
  // Wire workload button

  // Wire departments button

// ---------- opening a policy (sets it active and renders) ----------
function openPolicy(code) {
  const p = LIBRARY.setActive(code);
  if (!p) return;
  bindPolicy(p.data);
  rebuildSearchIndex();
  // Update the document title
  document.title = `${p.code} · ${p.name || 'Policy Inspector'}`;
  // Render policy switcher to reflect new active state
  renderPolicySwitcher();
  navigate('overview');
  // Refresh the policy-document index in the background — it triggers
  // a re-render when ready so doc panels appear without user action.
  ensureActiveDocIndex();
}

// =============================================================
//  CROSS-POLICY WORKLOAD VIEW
//  Aggregates Roles + their Activities/Controls/SOPs across
//  every loaded policy so you can see how work is distributed.
// =============================================================

function cleanRoleName(s) {
  // Strip trailing (R) / (O) suffix used in Compliance sheets
  return (s || '').replace(/\s*\([RO]\)\s*$/, '').trim();
}

function aggregateWorkload() {
  // Map<cleanName, { name, policies: Map<code, { code, name, responsibilities, activities[], controls[], sops[] }> }>
  const roles = new Map();

  function ensurePolicyEntry(roleRec, pCode, pName) {
    if (!roleRec.policies.has(pCode)) {
      roleRec.policies.set(pCode, {
        code: pCode, name: pName,
        responsibilities: null,
        activities: [],
        controls: [],
        sops: []
      });
    }
    return roleRec.policies.get(pCode);
  }

  function ensureRole(name) {
    if (!roles.has(name)) roles.set(name, { name, policies: new Map() });
    return roles.get(name);
  }

  for (const policy of LIBRARY.list()) {
    const data = policy.data || {};
    const pCode = policy.code;
    const pName = policy.name || policy.code;

    // 1. Narrative Responsibilities from "Roles and Responsibilities" sheet
    (data.roles || []).forEach(r => {
      const name = cleanRoleName(r['Role / Committee']);
      if (!name) return;
      const rec = ensureRole(name);
      const entry = ensurePolicyEntry(rec, pCode, pName);
      const narrative = r['Responsibilities (Narrative Summary)'];
      if (narrative) entry.responsibilities = narrative;
    });

    // 2. Activities from "Compliance & Impl" sheet
    (data.compliance || []).forEach(c => {
      const raw = c['Role (R = Responsible, O = Owner/Approver)'] || '';
      const name = cleanRoleName(raw);
      if (!name) return;
      const rec = ensureRole(name);
      const entry = ensurePolicyEntry(rec, pCode, pName);
      entry.activities.push({
        department: c['Department / Unit'] || '',
        roleType: /\(R\)\s*$/.test(raw) ? 'Responsible'
                : /\(O\)\s*$/.test(raw) ? 'Owner/Approver'
                : '',
        activity: c['Related Activity'] || ''
      });
    });

    // 3. Controls (Responsible / Owner) from "Controls" sheet
    (data.controls || []).forEach(ctrl => {
      ['Responsible', 'Owner'].forEach(field => {
        const name = cleanRoleName(ctrl[field]);
        if (!name) return;
        const rec = ensureRole(name);
        const entry = ensurePolicyEntry(rec, pCode, pName);
        entry.controls.push({
          id: ctrl['Control ID'],
          name: ctrl['Control Name'] || '',
          theme: ctrl['Theme Code'] || '',
          type: field // 'Responsible' or 'Owner'
        });
      });
    });

    // 4. SOPs (Responsible Role) from "List of SOPs" sheet
    (data.sops || []).forEach(s => {
      const name = cleanRoleName(s['Responsible Role']);
      if (!name) return;
      const rec = ensureRole(name);
      const entry = ensurePolicyEntry(rec, pCode, pName);
      entry.sops.push({
        id: s['SOP ID'],
        name: s['Procedure'] || '',
        frequency: s['Frequency'] || ''
      });
    });
  }

  return roles;
}

function summariseRole(rec) {
  let activities = 0, controls = 0, sops = 0;
  let responsiblePolicies = 0, ownerPolicies = 0;
  for (const p of rec.policies.values()) {
    activities += p.activities.length;
    controls += p.controls.length;
    sops += p.sops.length;
    if (p.controls.some(c => c.type === 'Responsible')) responsiblePolicies++;
    if (p.controls.some(c => c.type === 'Owner')) ownerPolicies++;
  }
  return {
    name: rec.name,
    policyCount: rec.policies.size,
    activities, controls, sops,
    totalWork: activities + controls + sops,
    responsiblePolicies, ownerPolicies
  };
}

function renderWorkload() {
  document.getElementById('breadcrumbs').innerHTML = '';
  const policies = LIBRARY.list();

  if (!policies.length) {
    document.getElementById('content').innerHTML = `
      <header class="lib-header">
        <p class="lib-eyebrow">Cross-Policy · Workload</p>
        <h1 class="lib-title">Roles &amp; Responsibilities</h1>
        <p class="lib-subtitle">Load some policies first to see how work is distributed across roles.</p>
      </header>
    `;
    return;
  }

  const rolesMap = aggregateWorkload();
  const summaries = Array.from(rolesMap.values())
    .map(summariseRole)
    .sort((a, b) => b.totalWork - a.totalWork);

  const totalActivities = summaries.reduce((s, r) => s + r.activities, 0);
  const totalControls = summaries.reduce((s, r) => s + r.controls, 0);
  const totalSops = summaries.reduce((s, r) => s + r.sops, 0);

  const cards = summaries.map(r => `
    <article class="lib-card role-card">
      <a class="lib-card-link" href="#" data-role-open="${escapeAttr(r.name)}">
        <div class="lib-card-meta">
          <span class="role-card-tag">Role</span>
          <span class="lib-card-domain">${r.policyCount} ${r.policyCount === 1 ? 'policy' : 'policies'}</span>
        </div>
        <h3 class="lib-card-title">${escapeHtml(r.name)}</h3>
        <div class="lib-card-counts">
          <span><strong>${r.activities}</strong> activities</span>
          <span><strong>${r.controls}</strong> controls</span>
          <span><strong>${r.sops}</strong> SOPs</span>
        </div>
      </a>
    </article>
  `).join('');

  document.getElementById('content').innerHTML = `
    <header class="lib-header">
      <p class="lib-eyebrow">Cross-Policy · Workload</p>
      <h1 class="lib-title">Roles &amp; Responsibilities</h1>
      <p class="lib-subtitle">
        ${summaries.length} unique ${summaries.length === 1 ? 'role' : 'roles'} across ${policies.length} loaded ${policies.length === 1 ? 'policy' : 'policies'}.
        <br/>${totalActivities} activities &middot; ${totalControls} control assignments &middot; ${totalSops} SOPs.
      </p>
    </header>
    <section class="lib-grid">
      ${cards}
    </section>
  `;

  document.querySelectorAll('[data-role-open]').forEach(el => {
    el.addEventListener('click', e => {
      e.preventDefault();
      const name = el.getAttribute('data-role-open');
      navigate('role-workload', name);
    });
  });
}

// =============================================================
//  TABLE SORTING
//  After each render that produces an entity-table, attach click
//  handlers to the header cells. State persists per view+row-class
//  so the chosen sort survives filter-typing re-renders.
// =============================================================

const tableSortState = new Map(); // key: `${view}:${rowClass}` -> {colIndex, dir}

function _sortCellText(rowEl, colIndex) {
  const cell = rowEl.children[colIndex];
  if (!cell) return '';
  // innerText respects rendered structure; trim to ignore stray whitespace
  return (cell.innerText || cell.textContent || '').trim();
}

function _sortCompare(a, b) {
  // Try numeric comparison first (RPN, # Mapped, etc.). Only when
  // BOTH sides parse cleanly as numbers.
  const numA = parseFloat(a);
  const numB = parseFloat(b);
  const aIsNum = !isNaN(numA) && /^-?\d/.test(a.trim());
  const bIsNum = !isNaN(numB) && /^-?\d/.test(b.trim());
  if (aIsNum && bIsNum) return numA - numB;
  // Put empty values at the bottom in ascending order
  if (!a && b) return 1;
  if (a && !b) return -1;
  if (!a && !b) return 0;
  return a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' });
}

function _applyTableSort(table, colIndex, dir) {
  const rows = Array.from(table.querySelectorAll('.entity-row:not(.entity-row-header)'));
  if (!rows.length) return;
  rows.sort((ra, rb) => {
    const cmp = _sortCompare(_sortCellText(ra, colIndex), _sortCellText(rb, colIndex));
    return dir === 'asc' ? cmp : -cmp;
  });
  // Append in new order — appendChild moves rather than copies
  rows.forEach(r => table.appendChild(r));
}

function _updateSortIndicators(header, colIndex, dir) {
  Array.from(header.children).forEach((cell, i) => {
    cell.classList.remove('sort-asc', 'sort-desc');
    if (i === colIndex) cell.classList.add(dir === 'asc' ? 'sort-asc' : 'sort-desc');
  });
}

function enhanceTableSorting() {
  document.querySelectorAll('.entity-table').forEach(table => {
    const header = table.querySelector('.entity-row-header');
    if (!header || header.dataset.sortWired === '1') return;
    header.dataset.sortWired = '1';

    // Pick a sort-state key that distinguishes this table from others
    // on the same page. We combine current view with the table's row
    // class (e.g. "controls:row-controls" vs "control:row-evidence").
    const sampleRow = table.querySelector('.entity-row:not(.entity-row-header)');
    const rowClass = sampleRow
      ? (Array.from(sampleRow.classList).find(c => c.startsWith('row-')) || 'row-x')
      : (Array.from(header.classList).find(c => c.startsWith('row-')) || 'row-x');
    const key = `${state.view}:${rowClass}`;

    // Re-apply any stored sort
    const stored = tableSortState.get(key);
    if (stored) {
      _applyTableSort(table, stored.colIndex, stored.dir);
      _updateSortIndicators(header, stored.colIndex, stored.dir);
    }

    // Wire each header cell as a sortable button
    Array.from(header.children).forEach((cell, i) => {
      cell.classList.add('sortable');
      cell.addEventListener('click', (e) => {
        e.stopPropagation();
        const current = tableSortState.get(key);
        let dir = 'asc';
        if (current && current.colIndex === i) {
          dir = current.dir === 'asc' ? 'desc' : 'asc';
        }
        tableSortState.set(key, { colIndex: i, dir });
        _applyTableSort(table, i, dir);
        _updateSortIndicators(header, i, dir);
      });
    });
  });
}

// =============================================================
//  CROSS-POLICY · SOPs BY DEPARTMENT
//  Departments come from Compliance & Impl (the only place that
//  pairs Department / Unit with Role). We build a Role→Department
//  map per policy, then join SOPs (via Responsible Role) to it.
// =============================================================

function _activityToDepartments(policyData) {
  // Build a map from Compliance's "Related Activity" → Set<department>.
  // Some policy workbooks prefix activity names with bullet characters
  // (e.g. "• Responsible AI Governance…") that wouldn't appear in the
  // Controls sheet's Control Name field. We strip these so the join
  // against Control Name works.
  const m = new Map();
  for (const row of policyData.compliance || []) {
    const dept = row['Department / Unit'];
    const activity = row['Related Activity'];
    if (!dept || !activity) continue;
    const key = _normaliseActivity(activity);
    if (!key) continue;
    if (!m.has(key)) m.set(key, new Set());
    m.get(key).add(String(dept).trim());
  }
  return m;
}

function _normaliseActivity(s) {
  if (!s) return '';
  return String(s)
    // strip common bullet/dash/quote characters from the start
    .replace(/^[\s•·●◦▪▫■□◆◇★☆\-\u2010-\u2015\u2022\u2023\u25cb\u25cf"'']+/, '')
    // strip the same from the end (defensive)
    .replace(/[\s•·●◦▪▫■□◆◇★☆\-\u2010-\u2015\u2022\u2023]+$/, '')
    .trim();
}

function _controlIdToName(policyData) {
  const m = new Map();
  for (const c of policyData.controls || []) {
    if (c['Control ID']) {
      m.set(c['Control ID'], _normaliseActivity(c['Control Name'] || ''));
    }
  }
  return m;
}

function _sopRelatedControlIds(sop) {
  // Tolerate cached data from older parsers
  const list = sop['Related Controls List'];
  if (list && list.length) return list;
  return String(sop['Related Controls'] || '')
    .split(/[;,]/)
    .map(s => s.trim())
    .filter(Boolean);
}

function aggregateSopsByDepartment() {
  // Map<departmentName, { name, policies: Map<code, { code, name, sops: [...] }> }>
  // A SOP is attached to a department whenever one of its Related
  // Controls is named as a Related Activity for that department in
  // Compliance & Impl. A SOP may belong to multiple departments.
  const depts = new Map();

  function ensureDept(name) {
    if (!depts.has(name)) depts.set(name, { name, policies: new Map() });
    return depts.get(name);
  }
  function ensurePolicyEntry(deptRec, pCode, pName) {
    if (!deptRec.policies.has(pCode)) {
      deptRec.policies.set(pCode, { code: pCode, name: pName, sops: new Map() });
    }
    return deptRec.policies.get(pCode);
  }

  for (const policy of LIBRARY.list()) {
    const data = policy.data || {};
    const pCode = policy.code;
    const pName = policy.name || policy.code;
    const act2dept = _activityToDepartments(data);
    const cid2name = _controlIdToName(data);

    for (const s of data.sops || []) {
      const relatedIds = _sopRelatedControlIds(s);
      // Collect which departments this SOP touches via its related controls
      const linkedDepts = new Map(); // dept → Set<controlId>
      for (const cid of relatedIds) {
        const cname = cid2name.get(cid);
        if (!cname) continue;
        const ds = act2dept.get(cname);
        if (!ds) continue;
        for (const d of ds) {
          if (!linkedDepts.has(d)) linkedDepts.set(d, new Set());
          linkedDepts.get(d).add(cid);
        }
      }
      if (!linkedDepts.size) {
        // Fallback: no Compliance match → use "(Department not assigned)"
        const rec = ensureDept('(Department not assigned)');
        const entry = ensurePolicyEntry(rec, pCode, pName);
        if (!entry.sops.has(s['SOP ID'])) {
          entry.sops.set(s['SOP ID'], {
            id: s['SOP ID'],
            procedure: s['Procedure'] || '',
            description: s['Procedure Description'] || '',
            role: cleanRoleName(s['Responsible Role']),
            frequency: s['Frequency'] || '',
            relatedControls: relatedIds,
            viaControls: []
          });
        }
        continue;
      }
      // Add the SOP under each department it touches, tracking via which
      // controls the link came from (useful for transparency).
      for (const [dept, controlSet] of linkedDepts.entries()) {
        const rec = ensureDept(dept);
        const entry = ensurePolicyEntry(rec, pCode, pName);
        if (!entry.sops.has(s['SOP ID'])) {
          entry.sops.set(s['SOP ID'], {
            id: s['SOP ID'],
            procedure: s['Procedure'] || '',
            description: s['Procedure Description'] || '',
            role: cleanRoleName(s['Responsible Role']),
            frequency: s['Frequency'] || '',
            relatedControls: relatedIds,
            viaControls: Array.from(controlSet)
          });
        }
      }
    }
  }
  // Convert nested .sops Maps into Arrays so callers can iterate easily
  for (const dept of depts.values()) {
    for (const p of dept.policies.values()) {
      p.sops = Array.from(p.sops.values());
    }
  }
  return depts;
}

function _summariseDept(rec) {
  let sopCount = 0;
  const roleSet = new Set();
  for (const p of rec.policies.values()) {
    sopCount += p.sops.length;
    for (const s of p.sops) roleSet.add(s.role);
  }
  return {
    name: rec.name,
    policyCount: rec.policies.size,
    sopCount,
    roleCount: roleSet.size,
  };
}

function renderDepartments() {
  document.getElementById('breadcrumbs').innerHTML = '';
  const policies = LIBRARY.list();

  if (!policies.length) {
    document.getElementById('content').innerHTML = `
      <header class="lib-header">
        <p class="lib-eyebrow">Cross-Policy · SOPs by Department</p>
        <h1 class="lib-title">Departments</h1>
        <p class="lib-subtitle">Load some policies first to see SOPs grouped by department.</p>
      </header>
    `;
    return;
  }

  const deptMap = aggregateSopsByDepartment();
  const summaries = Array.from(deptMap.values())
    .map(_summariseDept)
    .sort((a, b) => b.sopCount - a.sopCount);

  const totalSops = summaries.reduce((s, d) => s + d.sopCount, 0);

  const cards = summaries.map(d => `
    <article class="lib-card dept-card">
      <a class="lib-card-link" href="#" data-dept-open="${escapeAttr(d.name)}">
        <div class="lib-card-meta">
          <span class="role-card-tag">Department</span>
          <span class="lib-card-domain">${d.policyCount} ${d.policyCount === 1 ? 'policy' : 'policies'}</span>
        </div>
        <h3 class="lib-card-title">${escapeHtml(d.name)}</h3>
        <div class="lib-card-counts">
          <span><strong>${d.sopCount}</strong> SOPs</span>
          <span><strong>${d.roleCount}</strong> ${d.roleCount === 1 ? 'role' : 'roles'}</span>
        </div>
      </a>
    </article>
  `).join('');

  document.getElementById('content').innerHTML = `
    <header class="lib-header">
      <p class="lib-eyebrow">Cross-Policy · SOPs by Department</p>
      <h1 class="lib-title">Departments</h1>
      <p class="lib-subtitle">
        ${summaries.length} ${summaries.length === 1 ? 'department' : 'departments'} across ${policies.length} loaded ${policies.length === 1 ? 'policy' : 'policies'} &middot; ${totalSops} SOP&ndash;department links in total.
        <br/><span class="dept-subtitle-note">Each SOP is associated with the departments whose Related Activities (in Compliance &amp; Impl) match the SOP&rsquo;s related controls. A SOP may belong to more than one department.</span>
      </p>
    </header>
    <section class="lib-grid">
      ${cards}
    </section>
  `;

  document.querySelectorAll('[data-dept-open]').forEach(el => {
    el.addEventListener('click', e => {
      e.preventDefault();
      navigate('department', el.getAttribute('data-dept-open'));
    });
  });
}

function renderDepartmentDetail(deptName) {
  document.getElementById('breadcrumbs').innerHTML = '';
  const deptMap = aggregateSopsByDepartment();
  const rec = deptMap.get(deptName);

  if (!rec) {
    document.getElementById('content').innerHTML = `
      <header class="lib-header">
        <p class="lib-eyebrow"><a href="#" data-back-depts>&larr; All Departments</a></p>
        <h1 class="lib-title">Department not found</h1>
        <p class="lib-subtitle">&ldquo;${escapeHtml(deptName)}&rdquo; isn&rsquo;t referenced in any currently-loaded policy.</p>
      </header>
    `;
    const back = document.querySelector('[data-back-depts]');
    if (back) back.addEventListener('click', e => { e.preventDefault(); navigate('departments'); });
    return;
  }

  const summary = _summariseDept(rec);
  const policyEntries = Array.from(rec.policies.values())
    .sort((a, b) => (a.code || '').localeCompare(b.code || ''));

  const policyBlocks = policyEntries.map(p => {
    const sopRows = p.sops.map(s => `
      <tr class="dept-sop-row" data-policy="${escapeAttr(p.code)}" data-sop="${escapeAttr(s.id)}">
        <td><code class="role-control-id">${escapeHtml(s.id)}</code></td>
        <td>
          <div class="dept-sop-name">${escapeHtml(s.procedure)}</div>
          ${s.description ? `<div class="dept-sop-desc">${escapeHtml(s.description.slice(0, 180))}${s.description.length > 180 ? '…' : ''}</div>` : ''}
        </td>
        <td>${s.role ? `<span class="role-type-pill role-type-r">${escapeHtml(s.role)}</span>` : '<span class="muted">—</span>'}</td>
        <td>${escapeHtml(s.frequency || '—')}</td>
        <td>
          ${s.viaControls && s.viaControls.length
            ? `<span class="dept-sop-via" title="${escapeAttr(s.viaControls.join(', '))}">${s.viaControls.length} ctrl${s.viaControls.length === 1 ? '' : 's'} &middot; ${escapeHtml(s.viaControls.slice(0, 3).join(', '))}${s.viaControls.length > 3 ? '…' : ''}</span>`
            : '<span class="muted italic">no link</span>'}
        </td>
      </tr>
    `).join('');

    return `
      <section class="role-policy-block">
        <header class="role-policy-header">
          <a href="#" class="role-policy-link" data-policy-open="${escapeAttr(p.code)}" title="Open this policy">
            <span class="role-policy-code">${escapeHtml(p.code)}</span>
            <span class="role-policy-name">${escapeHtml(p.name)}</span>
          </a>
          <span class="role-policy-summary">${p.sops.length} ${p.sops.length === 1 ? 'SOP' : 'SOPs'}</span>
        </header>
        ${p.sops.length ? `
          <table class="dept-sops-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Procedure</th>
                <th>Responsible Role</th>
                <th>Frequency</th>
                <th>Linked via</th>
              </tr>
            </thead>
            <tbody>${sopRows}</tbody>
          </table>
        ` : '<p class="role-policy-empty">No SOPs for this department in this policy.</p>'}
      </section>
    `;
  }).join('');

  document.getElementById('content').innerHTML = `
    <header class="lib-header role-workload-header">
      <p class="lib-eyebrow"><a href="#" data-back-depts>&larr; All Departments</a></p>
      <h1 class="lib-title">${escapeHtml(rec.name)}</h1>
      <p class="lib-subtitle">
        ${summary.sopCount} ${summary.sopCount === 1 ? 'SOP' : 'SOPs'} across ${summary.policyCount} ${summary.policyCount === 1 ? 'policy' : 'policies'} &middot; ${summary.roleCount} ${summary.roleCount === 1 ? 'role' : 'roles'} involved.
      </p>
    </header>
    <div class="role-workload-policies">
      ${policyBlocks}
    </div>
  `;

  const back = document.querySelector('[data-back-depts]');
  if (back) back.addEventListener('click', e => { e.preventDefault(); navigate('departments'); });

  // Open the policy when its header is clicked
  document.querySelectorAll('[data-policy-open]').forEach(el => {
    el.addEventListener('click', e => {
      e.preventDefault();
      openPolicy(el.getAttribute('data-policy-open'));
    });
  });

  // Click a SOP row → open that policy AND navigate to the SOP detail page
  document.querySelectorAll('.dept-sop-row').forEach(tr => {
    tr.addEventListener('click', e => {
      e.preventDefault();
      const pCode = tr.getAttribute('data-policy');
      const sopId = tr.getAttribute('data-sop');
      const p = LIBRARY.get(pCode);
      if (!p) return;
      LIBRARY.setActive(pCode);
      bindPolicy(p.data);
      rebuildSearchIndex();
      document.title = `${p.code} · ${p.name || 'Policy Inspector'}`;
      renderPolicySwitcher();
      navigate('sop', sopId);
    });
  });
}


// =============================================================
//  CODE BLOCK 5: BOOT
// =============================================================
(function boot() {
  // Try to load the library from localStorage
  LIBRARY.load();
  // Refresh document index from IndexedDB (async, fire and forget — re-renders happen later)
  refreshAttachedDocsIndex().then(() => {
    // Re-render the switcher (now we know which policies have docs)
    renderPolicySwitcher();
    // Re-render the current view once docs index is populated
    if (state.view === 'library' || state.view === 'overview') render();
  });
  renderPolicySwitcher();

  const active = LIBRARY.getActive();
  if (active) {
    bindPolicy(active.data);
    rebuildSearchIndex();
    document.title = `${active.code} · ${active.name || 'Policy Inspector'}`;
    state.view = 'overview';
    state.id = null;
    state.history = [];
    render();
    // Async: load policy-document outline if attached, then re-render
    ensureActiveDocIndex();
  } else {
    state.view = 'library';
    state.id = null;
    state.history = [];
    render();
  }
})();

})();
</script>
</body>
</html>
