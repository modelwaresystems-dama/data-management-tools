/* Highlight every case-insensitive occurrence of `q` inside `text`. */
function Highlight({ text, q }) {
  const s = String(text || "");
  if (!q) return s;
  const lc = s.toLowerCase(), lq = q.toLowerCase();
  const parts = []; let i = 0, k = 0;
  while (true) {
    const at = lc.indexOf(lq, i);
    if (at === -1) { parts.push(s.slice(i)); break; }
    if (at > i) parts.push(s.slice(i, at));
    parts.push(<mark key={k++} style={{ background: C.amberSoft, color: C.ink, padding: "0 1px", borderRadius: 2 }}>{s.slice(at, at + q.length)}</mark>);
    i = at + q.length;
  }
  return <>{parts}</>;
}

/* Field definitions for faceted search. `get` returns the candidate values for a term. */
const SEARCH_FIELDS = {
  all:     { label: "All fields", get: null },
  term:    { label: "Term & definition", get: (t) => [t.Term, t.Aliases, t.Definition] },
  owner:   { label: "Owner", get: (t) => [t.Owner] },
  steward: { label: "Steward", get: (t) => [t["Steward (BDS)"]] },
  id:      { label: "Identifier", get: (t) => [t["Glossary ID"], t.Identifier] },
  area:    { label: "Subject Area", get: (t) => [t["Subject Area"]] },
  info:    { label: "Information Type", get: (t) => [t["Information Type"]] },
  status:  { label: "Status", get: (t) => [t.Lifecycle, t["Registration Status"]] },
};
const SEARCH_FIELD_ORDER = ["all", "term", "owner", "steward", "id", "area", "info", "status"];
// inline prefixes the user can type in "All fields" mode, e.g. owner:diesel status:approved
const SEARCH_PREFIX = { owner: "owner", steward: "steward", id: "id", identifier: "id",
  area: "area", subject: "area", info: "info", type: "info", status: "status", term: "term" };

function fieldValues(t, key) {
  const def = SEARCH_FIELDS[key];
  if (!def || !def.get) return [];
  return def.get(t).map((x) => String(x == null ? "" : x)).filter(Boolean);
}
function parseSearchQuery(q) {
  const tokens = String(q || "").trim().split(/\s+/).filter(Boolean);
  const constraints = [], free = [];
  for (const tk of tokens) {
    const m = tk.match(/^([A-Za-z]+):(.+)$/);
    if (m && SEARCH_PREFIX[m[1].toLowerCase()]) constraints.push({ key: SEARCH_PREFIX[m[1].toLowerCase()], value: m[2].toLowerCase() });
    else free.push(tk.toLowerCase());
  }
  return { constraints, free, allTokens: tokens.map((t) => t.toLowerCase()), rawQ: String(q || "").trim() };
}

function SearchView({ query, corpus, onOpen, onClose, onQuery }) {
  const [scope, setScope] = useState("all");
  const q = (query || "").trim();
  const loading = corpus === null;
  const parsed = useMemo(() => parseSearchQuery(q), [q]);

  // distinct values for the chosen facet (for browse-by-facet chips when query is empty)
  const facetValues = useMemo(() => {
    if (scope === "all" || scope === "term" || !corpus) return [];
    const counts = new Map();
    for (const row of corpus) {
      for (const v of fieldValues(row.term, scope)) {
        const key = v.trim(); if (!key) continue;
        counts.set(key, (counts.get(key) || 0) + 1);
      }
    }
    return [...counts.entries()].map(([value, count]) => ({ value, count }))
      .sort((a, b) => b.count - a.count || a.value.localeCompare(b.value));
  }, [scope, corpus]);

  const results = useMemo(() => {
    if (!corpus || (!q && scope === "all")) return [];
    if (!q) return [];
    const out = [];
    const globalKeys = ["Term", "Aliases", "Definition", "Object Class", "Property", "Term Type",
      "Subject Area", "Information Type", "Owner", "Steward (BDS)", "Glossary ID", "Identifier", "Lifecycle", "Registration Status"];
    for (const row of corpus) {
      const t = row.term;
      let rank;
      if (scope !== "all") {
        const vals = fieldValues(t, scope);
        const hay = vals.join("  ").toLowerCase();
        if (!parsed.allTokens.every((tk) => hay.includes(tk))) continue;
        const ql = q.toLowerCase(), lv = vals.map((v) => v.toLowerCase());
        rank = lv.some((v) => v === ql) ? 0 : lv.some((v) => v.startsWith(ql)) ? 1 : 2;
      } else {
        // constraints must all hold
        let ok = true;
        for (const c of parsed.constraints) {
          if (!fieldValues(t, c.key).join("  ").toLowerCase().includes(c.value)) { ok = false; break; }
        }
        if (!ok) continue;
        const globalHay = (globalKeys.map((k) => String(t[k] == null ? "" : t[k])).join("  ") + "  " + row.gName).toLowerCase();
        if (!parsed.free.every((tk) => globalHay.includes(tk))) continue;
        if (parsed.free.length) {
          const name = String(t.Term || "").toLowerCase(), fq = parsed.free.join(" ");
          rank = name === fq ? 0 : name.startsWith(fq) ? 1 : name.includes(fq) ? 2
            : String(t.Aliases || "").toLowerCase().includes(fq) ? 3 : 5;
        } else rank = 1; // constraints-only match
      }
      out.push({ ...row, rank });
    }
    out.sort((a, b) => a.rank - b.rank || String(a.term.Term).localeCompare(String(b.term.Term)) || a.gName.localeCompare(b.gName));
    return out;
  }, [q, scope, corpus, parsed]);

  const groups = useMemo(() => {
    const m = new Map();
    for (const r of results) {
      if (!m.has(r.gId)) m.set(r.gId, { gId: r.gId, gName: r.gName, areas: r.areas, items: [] });
      m.get(r.gId).items.push(r);
    }
    return [...m.values()].sort((a, b) => b.items.length - a.items.length || a.gName.localeCompare(b.gName));
  }, [results]);

  // which facets to surface on each result card
  const activeFields = scope !== "all" ? [scope] : parsed.constraints.map((c) => c.key);
  const FACET_META = { owner: "Owner", steward: "Steward", id: "Identifier", area: "Subject Area", info: "Information Type", status: "Status" };

  const showChips = scope !== "all" && scope !== "term" && !q && facetValues.length > 0;

  return (
    <div style={{ maxWidth: 920, margin: "0 auto", padding: "40px 32px 64px", width: "100%", boxSizing: "border-box" }}>
      <div style={{ display: "flex", alignItems: "baseline", gap: 12, marginBottom: 14 }}>
        <h1 style={{ fontFamily: FONT_DISP, fontSize: 28, fontWeight: 600, color: C.ink, margin: 0 }}>
          {q ? <>Results for &ldquo;{q}&rdquo;</> : "Search all glossaries"}
        </h1>
        <button onClick={onClose} style={{ marginLeft: "auto", ...searchLink }}>Close</button>
      </div>

      {/* field scope selector */}
      <div style={{ display: "flex", alignItems: "center", gap: 9, marginBottom: 18, flexWrap: "wrap" }}>
        <span style={{ fontSize: 12, fontWeight: 700, color: C.muted, letterSpacing: .5, textTransform: "uppercase" }}>Search in</span>
        {SEARCH_FIELD_ORDER.map((k) => (
          <button key={k} onClick={() => { setScope(k); onQuery(""); }} style={{
            padding: "5px 11px", borderRadius: 7, cursor: "pointer", fontFamily: FONT_UI, fontWeight: 600, fontSize: 12.5,
            border: "1px solid " + (scope === k ? C.tealDeep : C.line), background: scope === k ? C.teal : "#fff",
            color: scope === k ? "#fff" : C.ink2,
          }}>{SEARCH_FIELDS[k].label}</button>
        ))}
      </div>

      <div style={{ fontSize: 13, color: C.muted, marginBottom: 22 }}>
        {scope === "all" && !q ? <>Type to search across every glossary on this device. Tip: scope with a field above, or type <code style={{ fontFamily: FONT_MONO, background: C.amberSoft, padding: "1px 5px", borderRadius: 4 }}>owner:diesel status:approved</code> to combine facets.</>
          : showChips ? `Pick a value to list every term, or type to filter ${SEARCH_FIELDS[scope].label.toLowerCase()}.`
          : loading ? "Loading…"
          : !q ? `Type to filter by ${SEARCH_FIELDS[scope].label}.`
          : results.length === 0 ? "No matching terms."
          : `${results.length} term${results.length !== 1 ? "s" : ""} across ${groups.length} glossar${groups.length !== 1 ? "ies" : "y"}.`}
      </div>

      {/* browse-by-facet chips */}
      {showChips && (
        <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 8 }}>
          {facetValues.slice(0, 48).map((fv) => (
            <button key={fv.value} onClick={() => onQuery(fv.value)} style={{
              padding: "6px 11px", borderRadius: 999, cursor: "pointer", fontFamily: FONT_UI, fontSize: 12.5,
              border: "1px solid " + C.line, background: C.panel, color: C.ink,
            }}>
              {fv.value} <span style={{ color: C.muted, marginLeft: 3 }}>{fv.count}</span>
            </button>
          ))}
        </div>
      )}

      {q && !loading && groups.map((grp) => (
        <div key={grp.gId} style={{ marginBottom: 30 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
            <BookMarked size={15} strokeWidth={2.2} color={C.teal} />
            <span style={{ fontFamily: FONT_UI, fontWeight: 700, fontSize: 14.5, color: C.ink }}>{grp.gName}</span>
            <span style={{ fontSize: 11.5, color: C.muted, marginLeft: "auto" }}>{grp.items.length} match{grp.items.length !== 1 ? "es" : ""}</span>
          </div>
          <div style={{ display: "grid", gap: 8 }}>
            {grp.items.map((r, i) => {
              const t = r.term;
              const type = String(t["Term Type"] || "");
              const def = String(t.Definition || "");
              const ql = q.toLowerCase();
              let snip = def;
              const at = def.toLowerCase().indexOf(ql);
              if (scope === "all" && at > 60) snip = "…" + def.slice(at - 40);
              if (snip.length > 200) snip = snip.slice(0, 200) + "…";
              // facet chips for the fields being searched
              const facets = [];
              for (const f of activeFields) {
                const vals = fieldValues(t, f).filter(Boolean);
                if (vals.length) facets.push({ label: FACET_META[f] || SEARCH_FIELDS[f].label, value: vals.join(" · ") });
              }
              return (
                <button key={r.gId + "|" + t.Term + "|" + i} onClick={() => onOpen(r.gId, t.Term)} style={{
                  display: "block", width: "100%", textAlign: "left", padding: "13px 15px", borderRadius: 10,
                  background: C.panel, border: "1px solid " + C.line, cursor: "pointer", fontFamily: FONT_UI,
                }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 9 }}>
                    <span style={{ fontFamily: FONT_MONO, fontWeight: 600, fontSize: 14, color: C.ink }}>
                      {scope === "all" || scope === "term" ? <Highlight text={t.Term} q={q} /> : t.Term}
                    </span>
                    {type && <Badge color={C.ink2} soft={C.tealSoft}>{type}</Badge>}
                    {String(t.Lifecycle || "") && <span style={{ fontSize: 11, color: C.muted }}>{t.Lifecycle}</span>}
                    <ArrowRight size={14} strokeWidth={2.2} color={C.muted} style={{ marginLeft: "auto" }} />
                  </div>
                  {facets.length > 0 && (
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 12, marginTop: 6 }}>
                      {facets.map((f) => (
                        <span key={f.label} style={{ fontSize: 11.5, color: C.ink2 }}>
                          <span style={{ color: C.muted }}>{f.label}: </span><Highlight text={f.value} q={q} />
                        </span>
                      ))}
                    </div>
                  )}
                  {scope === "all" && String(t.Aliases || "").trim() && (
                    <div style={{ fontSize: 11.5, color: C.muted, marginTop: 4 }}>aka <Highlight text={t.Aliases} q={q} /></div>
                  )}
                  {snip.trim() && (
                    <div style={{ fontSize: 12.5, color: C.ink2, marginTop: 5, lineHeight: 1.5 }}>
                      {scope === "all" ? <Highlight text={snip} q={q} /> : snip}
                    </div>
                  )}
                </button>
              );
            })}
          </div>
        </div>
      ))}
    </div>
  );
}
const searchLink = { background: "none", border: "none", color: C.muted, cursor: "pointer", fontFamily: FONT_UI, fontWeight: 600, fontSize: 13 };

function TopBar({ glossary, view, activeTerm, onHome, onTerms, onGraph, onRefData, onAudit, onUndef, onSignoff, onRecon, auditCount, undefCount, signoffCount, onExport, onVerify, onExportRdf, onImportRdf, onDeepLinks, onDelete, onRename }) {
  const [confirmDel, setConfirmDel] = useState(false);
  const [renameVal, setRenameVal] = useState(null);   // string while editing the glossary name, else null
  const commitRename = () => { const v = (renameVal || "").trim(); if (v && glossary && v !== glossary.name) onRename(v); setRenameVal(null); };
  const seg = (label, active, onClick, Icon) => (
    <button onClick={onClick} style={{
      display: "inline-flex", alignItems: "center", gap: 6, padding: "6px 12px", borderRadius: 8,
      border: "1px solid " + (active ? C.tealDeep : C.line), background: active ? C.teal : "#fff",
      color: active ? "#fff" : C.ink2, cursor: "pointer", fontFamily: FONT_UI, fontWeight: 600, fontSize: 12.5,
    }}>{Icon && <Icon size={14} strokeWidth={2.2} />}{label}</button>
  );
  return (
    <div style={{ borderBottom: "1px solid " + C.line, background: C.panel, padding: "16px 32px", display: "flex", alignItems: "center", gap: 14, position: "sticky", top: 0, zIndex: 20 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 13.5, color: C.muted, fontWeight: 500 }}>
        <button onClick={onHome} style={navlink}>Home</button>
        <span style={{ color: C.line }}>/</span>
        {renameVal !== null ? (
          <input autoFocus value={renameVal}
            onChange={(e) => setRenameVal(e.target.value)}
            onKeyDown={(e) => { if (e.key === "Enter") commitRename(); if (e.key === "Escape") setRenameVal(null); }}
            onBlur={commitRename}
            style={{ padding: "4px 8px", borderRadius: 7, border: "1px solid " + C.teal, background: "#fff", color: C.ink, fontFamily: FONT_UI, fontWeight: 700, fontSize: 13.5, outline: "none", minWidth: 200 }} />
        ) : (
          <span style={{ display: "inline-flex", alignItems: "center", gap: 6 }}>
            <button onClick={onTerms} style={{ ...navlink, color: (view === "terms" || view === "graph") ? C.ink : C.muted, fontWeight: 700 }}>{(glossary && glossary.name) || subjectAreaLabel(glossary) || "Untitled Glossary"}</button>
            {glossary && onRename && (
              <span role="button" title="Rename this glossary" onClick={() => setRenameVal(glossary.name)}
                style={{ cursor: "pointer", color: C.muted, display: "grid", placeItems: "center", padding: 1 }}>
                <PencilLine size={13} strokeWidth={2.2} />
              </span>
            )}
          </span>
        )}
        {activeTerm && (view === "term" || view === "review") && (<>
          <span style={{ color: C.line }}>/</span>
          <span style={{ color: C.ink, fontWeight: 700, fontFamily: FONT_MONO, fontSize: 13 }}>{activeTerm}</span>
          {view === "review" && <Badge color={C.amber} soft={C.amberSoft}>SME Review</Badge>}
        </>)}
      </div>
      <div style={{ display: "flex", gap: 7, marginLeft: 6 }}>
        {seg("Terms", view === "terms", onTerms, Tag)}
        {seg(view === "review" ? "Sign-off" : (signoffCount ? "Sign-off \u00B7 " + signoffCount : "Sign-off"), view === "signoff" || view === "review", onSignoff, ShieldCheck)}
        {seg("Graph", view === "graph", onGraph, Layers)}
        {seg("Reference data", view === "refdata", onRefData, BookMarked)}
        {seg(auditCount ? "Audit \u00B7 " + auditCount : "Audit", view === "audit", onAudit, ClipboardCheck)}
        {seg(undefCount ? "Undefined \u00B7 " + undefCount : "Undefined", view === "undef", onUndef, AlertCircle)}
      </div>
      <div style={{ marginLeft: "auto", display: "flex", gap: 9 }}>
        <Btn icon={LinkIcon} kind="ghost" small onClick={onDeepLinks} title="Download a CSV of every term and its deep link — to wire your business architecture to these definitions">Download links</Btn>
        <Btn icon={BookMarked} kind="ghost" small onClick={onImportRdf} title="Import an RDF/Turtle model and merge it into this glossary (the return trip)">Import RDF</Btn>
        <Btn icon={BookMarked} kind="ghost" small onClick={onExportRdf} title="Export an RDF/Turtle + SKOS semantic model (for triple stores / ontology tools)">Export RDF</Btn>
        <Btn icon={ShieldCheck} kind="ghost" small onClick={onVerify} title="Build the workbook in memory, read it back, and check the SPO sheet is sound (no duplicates, no superseded rows, no compound predicates)">Verify Excel</Btn>
        <Btn icon={Download} kind="primary" small onClick={onExport}>Write back to Excel</Btn>
        {!confirmDel ? (
          <Btn icon={Trash2} kind="ghost" small onClick={() => setConfirmDel(true)} title="Delete glossary" />
        ) : (
          <span style={{ display: "inline-flex", gap: 6, alignItems: "center" }}>
            <Btn kind="danger" small onClick={onDelete}>Delete</Btn>
            <Btn kind="ghost" small onClick={() => setConfirmDel(false)}>Cancel</Btn>
          </span>
        )}
      </div>
    </div>
  );
}
const navlink = { background: "none", border: "none", color: C.muted, cursor: "pointer", fontFamily: FONT_UI, fontSize: 13.5, fontWeight: 500, padding: 0 };

/* ============================================================
   Terms view — table + stats + add term
============================================================ */
function TermsView({ glossary, onOpenTerm, onReview, onAddTerm, onDeepLinks, onRefData, mutate, flash }) {
  const [q, setQ] = useState("");
  const [lifeFilter, setLifeFilter] = useState("");
  const [hideRetired, setHideRetired] = useState(() => hideRetiredPref());
  const [hideExamples, setHideExamples] = useState(() => hideExamplesPref());
  const [adding, setAdding] = useState(false);
  const [showCodeLists, setShowCodeLists] = useState(false);
  const [sort, setSort] = useState({ key: "term", dir: 1 });  // { key, dir: 1 asc / -1 desc }
  const [groupArea, setGroupArea] = useState(() => groupAreaPref());   // group the list under Subject Area headers (remembered)
  const [groupSub, setGroupSub] = useState(() => groupSubPref());      // group under Sub-Category headers (remembered)
  const [collapsed, setCollapsed] = useState(() => collapsedGroupsPref());   // collapsed Subject Area groups (remembered)
  useEffect(() => { setCollapsedGroupsPref(collapsed); }, [collapsed]);
  const toggleGroup = (area) => setCollapsed((s) => { const n = new Set(s); n.has(area) ? n.delete(area) : n.add(area); return n; });

  const stats = useMemo(() => {
    const by = {}; LIFECYCLE.forEach((l) => (by[l] = 0));
    glossary.terms.forEach((t) => { by[t.Lifecycle || "Draft"] = (by[t.Lifecycle || "Draft"] || 0) + 1; });
    return by;
  }, [glossary.terms]);

  // breakdown by Term Type for the dashboard (Attribute and Business Element are both attribute-level)
  const typeStats = useMemo(() => {
    let entities = 0, attributes = 0, other = 0;
    glossary.terms.forEach((t) => {
      const tt = String(t["Term Type"] || "").trim();
      if (tt === "Entity") entities++;
      else if (tt === "Attribute" || tt === "Business Element") attributes++;
      else other++;
    });
    return { entities, attributes, other };
  }, [glossary.terms]);

  const pendingReview = useMemo(() => glossary.terms.filter((t) => (t.Lifecycle || "") === "In Review"), [glossary.terms]);

  // an ISO 11179 score applies only to attribute-level terms (Entities have no data-element metadata)
  const isAttr = (t) => { const tt = String(t["Term Type"] || "").trim(); return tt === "Attribute" || tt === "Business Element"; };
  const scoreOf = useCallback((t) => isAttr(t) ? isoQualityScore(t, glossary.terms) : null, [glossary.terms]);

  // Sortable columns for the terms table. Ver / Lifecycle / ISO sort numerically
  // (Lifecycle by its stage order); the rest case-insensitively.
  const lifeRank = (l) => { const i = LIFECYCLE.indexOf(l || "Draft"); return i < 0 ? 99 : i; };
  const COLS = useMemo(() => [
    { key: "id", h: "ID", get: (t) => String(t["Glossary ID"] || "").toLowerCase() },
    { key: "term", h: "Term", get: (t) => String(t.Term || "").toLowerCase() },
    { key: "type", h: "Type", get: (t) => String(t["Term Type"] || "").toLowerCase() },
    { key: "area", h: "Subject Area", get: (t) => String(t["Subject Area"] || "").toLowerCase() },
    { key: "subcat", h: "Sub-Category", get: (t) => String(t["Sub-Category"] || "").toLowerCase() },
    { key: "rank", h: "Rank", num: true, get: (t) => { const n = parseInt(t["Concept Rank"], 10); return isNaN(n) ? 9999 : n; } },
    { key: "ver", h: "Ver", num: true, get: (t) => Number(t.Version) || 0 },
    { key: "lifecycle", h: "Lifecycle", num: true, get: (t) => lifeRank(t.Lifecycle) },
    { key: "iso", h: "ISO 11179", num: true, iso: true, get: (t) => scoreOf(t) },
  ], [scoreOf]);

  const rows = useMemo(() => {
    const filtered = glossary.terms.filter((t) => {
      const life = t.Lifecycle || "Draft";
      if (hideRetired && life === "Retired") return false;
      if (hideExamples && isExampleTerm(t)) return false;
      if (lifeFilter && life !== lifeFilter) return false;
      if (!q) return true;
      const hay = [t.Term, t["Subject Area"], t["Term Type"], t.Aliases, t.Hypernym].join(" ").toLowerCase();
      return hay.includes(q.toLowerCase());
    });
    const byTerm = (a, b) => String(a.Term || "").localeCompare(String(b.Term || ""), undefined, { sensitivity: "base" });
    const col = COLS.find((c) => c.key === sort.key) || COLS[1];
    return filtered.slice().sort((a, b) => {
      if (col.iso) {
        // attributes ordered by score; entities (null score) always sink to the bottom
        const sa = col.get(a), sb = col.get(b);
        if (sa == null && sb == null) return byTerm(a, b);
        if (sa == null) return 1; if (sb == null) return -1;
        return sa !== sb ? (sa - sb) * sort.dir : byTerm(a, b);
      }
      const av = col.get(a), bv = col.get(b);
      let r = col.num ? (av - bv) : String(av).localeCompare(String(bv));
      if (r === 0) return byTerm(a, b);
      return r * sort.dir;
    });
  }, [glossary.terms, q, lifeFilter, hideRetired, hideExamples, sort, COLS]);

  return (
    <div style={{ padding: "30px 32px 60px" }}>
      {/* dashboard: composition by term type */}
      {glossary.terms.length > 0 && (() => {
        const total = glossary.terms.length;
        const { entities, attributes, other } = typeStats;
        const pct = (n) => total ? Math.round((n / total) * 100) : 0;
        const seg = [
          { label: "Entities", n: entities, color: C.teal },
          { label: "Attributes", n: attributes, color: C.amber },
          { label: "Other", n: other, color: "#9a9482" },
        ].filter((s) => s.n > 0);
        return (
          <div style={{ background: C.panel, border: "1px solid " + C.line, borderRadius: 14, padding: "18px 20px", marginBottom: 18 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
              <Boxes size={16} color={C.teal} strokeWidth={2.2} />
              <span style={{ fontSize: 11.5, fontWeight: 700, color: C.muted, textTransform: "uppercase", letterSpacing: 0.6 }}>Glossary composition</span>
            </div>
            <div style={{ display: "flex", gap: 14, flexWrap: "wrap", marginBottom: 16 }}>
              <DashCard label="Total terms" value={total} color={C.ink} />
              <DashCard label="Entities" value={entities} sub={pct(entities) + "%"} color={C.teal} />
              <DashCard label="Attributes" value={attributes} sub={pct(attributes) + "%"} color={C.amber} hint="Attribute + Business Element" />
              {other > 0 && <DashCard label="Other types" value={other} sub={pct(other) + "%"} color="#9a9482" />}
            </div>
            {/* composition bar */}
            <div style={{ display: "flex", height: 12, borderRadius: 6, overflow: "hidden", background: "#e7e0d2" }}>
              {seg.map((s, i) => <div key={i} title={`${s.label}: ${s.n}`} style={{ width: pct(s.n) + "%", background: s.color }} />)}
            </div>
            <div style={{ display: "flex", gap: 16, marginTop: 10, flexWrap: "wrap" }}>
              {seg.map((s, i) => (
                <span key={i} style={{ display: "inline-flex", alignItems: "center", gap: 6, fontSize: 12, color: C.muted }}>
                  <span style={{ width: 10, height: 10, borderRadius: 3, background: s.color, display: "inline-block" }} />
                  {s.label} · <b style={{ color: C.ink }}>{s.n}</b>
                </span>
              ))}
            </div>
          </div>
        );
      })()}

      {/* stat strip (lifecycle) */}
      <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 22 }}>
        <StatCard label="Terms" value={glossary.terms.length} icon={Tag} />
        {LIFECYCLE.map((l) => <StatCard key={l} label={l} value={stats[l] || 0} dot={lifeColor(l)} soft={lifeSoft(l)}
          active={lifeFilter === l} onClick={() => setLifeFilter(lifeFilter === l ? "" : l)} />)}
      </div>

      {pendingReview.length > 0 && (
        <div style={{ background: C.amberSoft, border: "1px solid #e7d6ad", borderRadius: 12, padding: "14px 18px", marginBottom: 22, display: "flex", alignItems: "center", gap: 12 }}>
          <ClipboardCheck size={20} color={C.amber} strokeWidth={2.2} />
          <div style={{ fontSize: 13.5, color: "#7a5606", fontWeight: 600 }}>
            {pendingReview.length} term{pendingReview.length !== 1 ? "s" : ""} awaiting SME sign-off.
          </div>
          <div style={{ display: "flex", gap: 7, marginLeft: "auto", flexWrap: "wrap" }}>
            {pendingReview.slice(0, 4).map((t) => (
              <button key={t.Term} onClick={() => onReview(t.Term)} style={{
                background: "#fff", border: "1px solid #e7d6ad", borderRadius: 7, padding: "5px 10px",
                fontFamily: FONT_MONO, fontSize: 12, color: "#7a5606", cursor: "pointer", fontWeight: 600,
              }}>{t.Term} →</button>
            ))}
          </div>
        </div>
      )}

      {/* toolbar */}
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 14 }}>
        <div style={{ position: "relative", flex: 1, maxWidth: 380 }}>
          <Search size={16} color={C.muted} style={{ position: "absolute", left: 12, top: 11 }} />
          <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="Search terms, subject areas, aliases…"
            style={{ width: "100%", padding: "9px 12px 9px 36px", borderRadius: 9, border: "1px solid " + C.line, background: "#fff", fontSize: 13.5, fontFamily: FONT_UI, outline: "none", boxSizing: "border-box" }} />
        </div>
        <div style={{ marginLeft: "auto", display: "flex", gap: 9 }}>
          <Btn icon={LinkIcon} kind="ghost" onClick={onDeepLinks} title="Download a CSV of every term and its deep link — to wire your business architecture to these definitions">Download links</Btn>
          <Btn icon={BookMarked} kind="ghost" onClick={onRefData} title="Open the Reference Data Manager — code lists, cross-walks and change management">Reference Data</Btn>
          <Btn icon={Plus} kind="solid" onClick={() => setAdding(true)}>Propose a term</Btn>
        </div>
      </div>

      {/* lifecycle filter chips */}
      {glossary.terms.length > 0 && (() => {
        const chip = (active, onClick, label, count, color) => (
          <button onClick={onClick} style={{
            display: "inline-flex", alignItems: "center", gap: 7, padding: "5px 12px", borderRadius: 999, cursor: "pointer",
            fontFamily: FONT_UI, fontWeight: 600, fontSize: 12.5,
            border: "1px solid " + (active ? (color || C.teal) : C.line),
            background: active ? (color || C.teal) : "#fff", color: active ? "#fff" : C.ink2,
          }}>
            {label}
            {count != null && <span style={{ fontSize: 11, fontWeight: 700, opacity: active ? 0.85 : 0.6, fontFamily: FONT_MONO }}>{count}</span>}
          </button>
        );
        const lifeColor = (l) => ({ "Approved": C.green, "Retired": C.red, "Deprecated": C.amber, "In Review": C.amber, "Draft": C.muted }[l] || C.teal);
        return (
          <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap", marginBottom: 16 }}>
            {chip(!lifeFilter, () => setLifeFilter(""), "All", glossary.terms.length, C.ink)}
            {LIFECYCLE.filter((l) => (stats[l] || 0) > 0).map((l) =>
              <span key={l}>{chip(lifeFilter === l, () => { setLifeFilter((cur) => cur === l ? "" : l); if (l === "Retired") setHideRetired(false); }, l, stats[l] || 0, lifeColor(l))}</span>
            )}
            <label style={{ marginLeft: "auto", display: "inline-flex", alignItems: "center", gap: 7, cursor: "pointer", fontSize: 12.5, fontWeight: 600, color: C.ink2, userSelect: "none" }}>
              <input type="checkbox" checked={groupArea} onChange={(e) => { const v = e.target.checked; setGroupArea(v); setGroupAreaPref(v); if (!v) { setGroupSub(false); setGroupSubPref(false); } setCollapsed(new Set()); }} style={{ accentColor: C.teal, width: 15, height: 15 }} />
              Group by area
            </label>
            <label style={{ display: "inline-flex", alignItems: "center", gap: 7, cursor: "pointer", fontSize: 12.5, fontWeight: 600, color: C.ink2, userSelect: "none" }}>
              <input type="checkbox" checked={groupSub} onChange={(e) => { const v = e.target.checked; setGroupSub(v); setGroupSubPref(v); if (v) { setGroupArea(true); setGroupAreaPref(true); } setCollapsed(new Set()); }} style={{ accentColor: C.teal, width: 15, height: 15 }} />
              Group by sub-category
            </label>
            {(groupArea || groupSub) && (() => {
              const keys = groupSub
                ? [...new Set(rows.map((t) => "sub::" + (String(t["Subject Area"] || "").trim() || "(no subject area)") + "::" + (String(t["Sub-Category"] || "").trim() || "(no sub-category)")))]
                : [...new Set(rows.map((t) => "area::" + (String(t["Subject Area"] || "").trim() || "(no subject area)")))];
              const anyCol = keys.some((k) => collapsed.has(k));
              const label = groupSub ? (anyCol ? "Expand sub-categories" : "Collapse sub-categories") : (anyCol ? "Expand all" : "Collapse all");
              return (
                <button onClick={() => setCollapsed((s) => { const n = new Set(s); anyCol ? keys.forEach((k) => n.delete(k)) : keys.forEach((k) => n.add(k)); return n; })}
                  style={{ display: "inline-flex", alignItems: "center", gap: 5, background: "none", border: "1px solid " + C.line, borderRadius: 8, padding: "5px 10px", cursor: "pointer", fontFamily: FONT_UI, fontWeight: 600, fontSize: 12, color: C.ink2 }}>
                  {label}
                </button>
              );
            })()}
            {(stats["Retired"] || 0) > 0 && (
              <label style={{ display: "inline-flex", alignItems: "center", gap: 7, cursor: "pointer", fontSize: 12.5, fontWeight: 600, color: C.ink2, userSelect: "none" }}>
                <input type="checkbox" checked={hideRetired} onChange={(e) => { setHideRetired(e.target.checked); setHideRetiredPref(e.target.checked); if (e.target.checked && lifeFilter === "Retired") setLifeFilter(""); }} style={{ accentColor: C.teal, width: 15, height: 15 }} />
                Hide Retired
              </label>
            )}
            <label style={{ display: "inline-flex", alignItems: "center", gap: 7, cursor: "pointer", fontSize: 12.5, fontWeight: 600, color: C.ink2, userSelect: "none" }}>
              <input type="checkbox" checked={hideExamples} onChange={(e) => { setHideExamples(e.target.checked); setHideExamplesPref(e.target.checked); }} style={{ accentColor: C.teal, width: 15, height: 15 }} />
              Hide Examples
            </label>
          </div>
        );
      })()}

      {/* table */}
      <div style={{ background: C.panel, border: "1px solid " + C.line, borderRadius: 14, overflow: "hidden" }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13.5 }}>
          <thead>
            <tr style={{ background: "#f1ece0", textAlign: "left" }}>
              {COLS.map((c) => {
                const active = sort.key === c.key;
                return (
                  <th key={c.key}
                    onClick={() => setSort((s) => s.key === c.key ? (s.dir === 1 ? { key: c.key, dir: -1 } : { key: "term", dir: 1 }) : { key: c.key, dir: 1 })}
                    title={"Sort by " + c.h}
                    style={{ padding: "11px 14px", fontSize: 11, fontWeight: 700, color: active ? C.teal : C.muted, textTransform: "uppercase", letterSpacing: 0.6, borderBottom: "1px solid " + C.line, cursor: "pointer", userSelect: "none", whiteSpace: "nowrap" }}>
                    {c.h}{active ? (sort.dir === 1 ? " \u2191" : " \u2193") : " \u21C5"}
                  </th>
                );
              })}
              <th style={{ padding: "11px 14px", borderBottom: "1px solid " + C.line }}></th>
            </tr>
          </thead>
          <tbody>
            {rows.length === 0 && <tr><td colSpan={10} style={{ padding: 30, textAlign: "center", color: C.muted }}>No terms match.</td></tr>}
            {(() => {
              const renderRow = (t, i) => {
                const sc = scoreOf(t);
                return (
                  <tr key={t.Term + "·" + i} style={{ borderBottom: "1px solid " + C.lineSoft, cursor: "pointer" }}
                    onClick={() => onOpenTerm(t.Term)}
                    onMouseEnter={(e) => (e.currentTarget.style.background = "#f7f3ea")}
                    onMouseLeave={(e) => (e.currentTarget.style.background = "transparent")}>
                    <td style={{ padding: "11px 14px", fontFamily: FONT_MONO, fontSize: 12, color: C.muted }}>{t["Glossary ID"]}</td>
                    <td style={{ padding: "11px 14px", fontWeight: 600 }}>
                      {t.Term}
                      {String(t["Key Concept"] || "").trim() ? <span title="Key concept in its sub-category" style={{ marginLeft: 7, fontSize: 9.5, fontWeight: 800, letterSpacing: 0.4, color: C.amber, background: "#fbf1d9", border: "1px solid #ecd9a8", borderRadius: 999, padding: "1px 6px", verticalAlign: "middle", textTransform: "uppercase" }}>Key</span> : null}
                      {t.Aliases ? <span style={{ color: C.muted, fontWeight: 400, fontSize: 12 }}> · aka {t.Aliases}</span> : null}
                    </td>
                    <td style={{ padding: "11px 14px", color: C.ink2 }}>{t["Term Type"]}</td>
                    <td style={{ padding: "11px 14px", color: C.ink2 }}>{t["Subject Area"]}</td>
                    <td style={{ padding: "11px 14px", color: C.ink2 }}>{t["Sub-Category"]}</td>
                    <td style={{ padding: "11px 14px", fontFamily: FONT_MONO, fontSize: 12.5, color: C.muted, textAlign: "right" }}>{String(t["Concept Rank"] || "").trim() || "\u2014"}</td>
                    <td style={{ padding: "11px 14px", fontFamily: FONT_MONO, fontSize: 12.5, color: C.muted }}>v{t.Version}</td>
                    <td style={{ padding: "11px 14px" }}><LifecycleDot state={t.Lifecycle} /></td>
                    <td style={{ padding: "11px 14px" }}>{sc == null ? <span style={{ color: "#c3bcab" }}>—</span> : <ScorePill score={sc} />}</td>
                    <td style={{ padding: "11px 14px", textAlign: "right" }}>
                      {(t.Lifecycle || "") === "In Review"
                        ? <Btn small kind="amber" icon={ClipboardCheck} onClick={(e) => { e.stopPropagation(); onReview(t.Term); }}>Review</Btn>
                        : <ArrowRight size={16} color={C.muted} />}
                    </td>
                  </tr>
                );
              };
              if (!groupArea && !groupSub) return rows.map(renderRow);
              const areaName = (t) => String(t["Subject Area"] || "").trim() || "(no subject area)";
              const subName = (t) => String(t["Sub-Category"] || "").trim() || "(no sub-category)";
              const rankCmp = (x, y) => {
                const rx = parseInt(x["Concept Rank"], 10), ry = parseInt(y["Concept Rank"], 10);
                return (isNaN(rx) ? 9999 : rx) - (isNaN(ry) ? 9999 : ry) || String(x.Term).localeCompare(String(y.Term));
              };
              const chevron = (open) => <span style={{ fontSize: 10, color: C.tealDeep, width: 10, display: "inline-block", transition: "transform .12s", transform: open ? "rotate(90deg)" : "rotate(0deg)" }}>{"\u25B8"}</span>;
              const areaHeader = (key, label, count) => {
                const isCol = collapsed.has(key);
                return (
                  <tr key={"h·" + key} onClick={() => toggleGroup(key)} style={{ cursor: "pointer" }}>
                    <td colSpan={10} style={{ background: C.tealSoft, borderTop: "1px solid #cfe3de", borderBottom: "1px solid #cfe3de", padding: "8px 14px" }}>
                      <span style={{ display: "inline-flex", alignItems: "center", gap: 8 }}>
                        {chevron(!isCol)}
                        <Layers size={13} color={C.tealDeep} strokeWidth={2.3} />
                        <span style={{ fontFamily: FONT_UI, fontWeight: 700, fontSize: 12.5, color: C.tealDeep, letterSpacing: 0.3 }}>{label}</span>
                        <span style={{ fontSize: 11, fontWeight: 700, color: C.tealDeep, background: "#ffffff", border: "1px solid #cfe3de", borderRadius: 999, padding: "1px 8px" }}>{count}</span>
                        {isCol ? <span style={{ fontSize: 11, color: C.muted, fontStyle: "italic" }}>collapsed</span> : null}
                      </span>
                    </td>
                  </tr>
                );
              };
              const subMeta = {};
              (glossary.subcats || []).forEach((r) => { subMeta[norm(r["Subject Area"]) + "||" + norm(r["Sub-Category"])] = { desc: String(r.Description || "").trim(), anchor: String(r.Anchor || "").trim() }; });
              const metaFor = (a, s) => subMeta[norm(a) + "||" + norm(s)] || null;
              const subHeader = (key, label, count, meta) => {
                const isCol = collapsed.has(key);
                return (
                  <tr key={"h·" + key} onClick={() => toggleGroup(key)} style={{ cursor: "pointer" }}>
                    <td colSpan={10} style={{ background: "#faf7ef", borderBottom: "1px solid " + C.lineSoft, padding: "6px 14px 8px 36px" }}>
                      <span style={{ display: "inline-flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                        {chevron(!isCol)}
                        <Tag size={12} color={C.muted} strokeWidth={2.2} />
                        <span style={{ fontFamily: FONT_UI, fontWeight: 700, fontSize: 11.5, color: C.ink2, letterSpacing: 0.2 }}>{label}</span>
                        <span style={{ fontSize: 10.5, fontWeight: 700, color: C.muted, background: "#ffffff", border: "1px solid " + C.line, borderRadius: 999, padding: "1px 7px" }}>{count}</span>
                        {meta && meta.anchor ? <span title="Anchor concept for this sub-category" style={{ fontSize: 10, fontWeight: 700, color: C.tealDeep, background: "#eef5f3", border: "1px solid #cfe3de", borderRadius: 999, padding: "1px 7px" }}>{"\u2693 " + meta.anchor}</span> : null}
                        {isCol ? <span style={{ fontSize: 10.5, color: C.muted, fontStyle: "italic" }}>collapsed</span> : null}
                      </span>
                      {meta && meta.desc ? <div style={{ marginLeft: 18, marginTop: 3, fontSize: 11.5, color: C.muted, lineHeight: 1.45, maxWidth: 820 }}>{meta.desc}</div> : null}
                    </td>
                  </tr>
                );
              };
              // one level: Subject Area (Category) only
              if (!groupSub) {
                const m = new Map();
                rows.forEach((t) => { const a = areaName(t); if (!m.has(a)) m.set(a, []); m.get(a).push(t); });
                return [...m.entries()].sort((x, y) => x[0].localeCompare(y[0])).map(([a, items]) => (
                  <React.Fragment key={"grp·" + a}>
                    {areaHeader("area::" + a, a, items.length)}
                    {collapsed.has("area::" + a) ? null : items.map(renderRow)}
                  </React.Fragment>
                ));
              }
              // two levels: Subject Area (Category) > Sub-Category > terms (rank-ordered)
              const A = new Map();
              rows.forEach((t) => { const a = areaName(t), s = subName(t); if (!A.has(a)) A.set(a, new Map()); const sm = A.get(a); if (!sm.has(s)) sm.set(s, []); sm.get(s).push(t); });
              A.forEach((sm) => sm.forEach((items) => items.sort(rankCmp)));
              return [...A.entries()].sort((x, y) => x[0].localeCompare(y[0])).map(([a, sm]) => {
                const aKey = "area::" + a;
                const aCount = [...sm.values()].reduce((n, it) => n + it.length, 0);
                const subs = [...sm.entries()].sort((x, y) => x[0].localeCompare(y[0]));
                return (
                  <React.Fragment key={"grp·" + a}>
                    {areaHeader(aKey, a, aCount)}
                    {collapsed.has(aKey) ? null : subs.map(([s, items]) => {
                      const sKey = "sub::" + a + "::" + s;
                      return (
                        <React.Fragment key={"sgrp·" + a + "·" + s}>
                          {subHeader(sKey, s, items.length, metaFor(a, s))}
                          {collapsed.has(sKey) ? null : items.map(renderRow)}
                        </React.Fragment>
                      );
                    })}
                  </React.Fragment>
                );
              });
            })()}
          </tbody>
        </table>
      </div>

      {adding && <AddTermModal glossary={glossary} onClose={() => setAdding(false)}
        onSave={(meta, triples) => { onAddTerm(meta, triples); setAdding(false); }} />}
      {showCodeLists && <CodeListsModal glossary={glossary} mutate={mutate} flash={flash} onClose={() => setShowCodeLists(false)} />}
    </div>
  );
}

/* ============================================================
   Code Lists registry — Reference Data governed by a standard (ISO 3166, 4217, 639…)
============================================================ */
function CodeListsModal({ glossary, mutate, flash, onClose }) {
  const lists = glossary.codeLists || [];
  const blank = { Name: "", Authority: "", Industry: "", Concept: "", Standard: "", Edition: "", Reference: "", Description: "", Owner: "", Steward: "" };
  const [form, setForm] = useState(blank);
  const [showAdd, setShowAdd] = useState(false);
  const [q, setQ] = useState("");
  const [concept, setConcept] = useState("");
  const [tab, setTab] = useState("sets");
  const setF = (k) => (v) => setForm((f) => ({ ...f, [k]: v }));
  const usage = useMemo(() => {
    const m = {};
    (glossary.terms || []).forEach((t) => {
      const cl = String(t["Code List"] || "").trim();
      if (cl) (m[norm(cl)] = m[norm(cl)] || []).push(t.Term);
    });
    return m;
  }, [glossary.terms]);
  const concepts = useMemo(() => Array.from(new Set(lists.map((c) => String(c.Concept || "").trim()).filter(Boolean))).sort(), [lists]);
  const rows = useMemo(() => lists.filter((c) => {
    if (concept && String(c.Concept || "").trim() !== concept) return false;
    if (!q) return true;
    const hay = [c.Name, c.Authority, c.Industry, c.Concept, c.Standard, c.Owner, c.Steward, c.Description].join(" ").toLowerCase();
    return hay.includes(q.toLowerCase());
  }), [lists, q, concept]);

  const add = () => {
    if (!form.Name.trim()) { flash("Give the code list a name", "err"); return; }
    mutate((g) => {
      g.codeLists = g.codeLists || [];
      let mx = 0; g.codeLists.forEach((c) => { const n = parseInt(String(c["Code List ID"] || "").replace(/\D/g, ""), 10); if (!isNaN(n)) mx = Math.max(mx, n); });
      g.codeLists.push({ ...form, "Code List ID": "CL_" + String(mx + 1).padStart(3, "0"), "Last Updated": today() });
    }).then(() => { setForm(blank); setShowAdd(false); flash("Code list added"); });
  };

  const tabBtn = (id, label, n) => (
    <button onClick={() => setTab(id)} style={{ display: "inline-flex", alignItems: "center", gap: 7, padding: "8px 14px", border: "none", background: "none", cursor: "pointer",
      color: tab === id ? C.ink : C.muted, fontWeight: 700, fontSize: 13, borderBottom: "2.5px solid " + (tab === id ? C.teal : "transparent") }}>
      {label}<span style={{ fontSize: 11, fontFamily: FONT_MONO, background: tab === id ? C.teal : "#e7e0d2", color: tab === id ? "#fff" : C.muted, borderRadius: 999, padding: "1px 7px" }}>{n}</span>
    </button>
  );

  return (
    <Modal onClose={onClose} title="Reference Data Manager" wide>
      <div style={{ display: "flex", gap: 4, borderBottom: "1px solid " + C.line, marginBottom: 14 }}>
        {tabBtn("sets", "Data Sets", lists.length)}
        {tabBtn("crosswalks", "Cross-Walks", (glossary.crosswalks || []).length)}
        {tabBtn("changes", "Change Mgmt", (glossary.rdChanges || []).filter((c) => c.Stage && c.Stage !== "Closed").length)}
      </div>

      {tab === "sets" && <>
      <div style={{ fontSize: 13, color: C.muted, marginBottom: 12 }}>
        A governed registry of {lists.length} reference-data sets (DMBOK Ch.10). Coded attributes reference a set here instead of holding values inline. For the full metadata editor (data provider, versions, ownership) use the standalone Reference Data Manager.
      </div>
      <div style={{ display: "flex", gap: 10, marginBottom: 12, flexWrap: "wrap", alignItems: "center" }}>
        <div style={{ position: "relative", flex: 1, minWidth: 220 }}>
          <Search size={15} color={C.muted} style={{ position: "absolute", left: 11, top: 10 }} />
          <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="Search name, authority, owner, steward, concept…"
            style={{ width: "100%", padding: "8px 11px 8px 33px", borderRadius: 9, border: "1px solid " + C.line, background: "#fff", fontSize: 13, fontFamily: FONT_UI, outline: "none", boxSizing: "border-box" }} />
        </div>
        <select value={concept} onChange={(e) => setConcept(e.target.value)}
          style={{ padding: "8px 11px", borderRadius: 9, border: "1px solid " + C.line, background: "#fff", fontSize: 13, fontFamily: FONT_UI }}>
          <option value="">All concepts ({lists.length})</option>
          {concepts.map((c) => <option key={c} value={c}>{c}</option>)}
        </select>
        <Btn small kind="solid" icon={Plus} onClick={() => setShowAdd((s) => !s)}>Add custom</Btn>
      </div>

      {showAdd && (
        <div style={{ background: C.panel, border: "1px solid " + C.line, borderRadius: 10, padding: "14px 16px", marginBottom: 14 }}>
          <div style={{ display: "grid", gridTemplateColumns: "1.6fr 0.8fr 1fr 1fr", gap: 10, marginBottom: 10 }}>
            <Field label="Name *" value={form.Name} onChange={setF("Name")} placeholder="e.g. Internal Product Category Codes" />
            <Field label="Authority" value={form.Authority} onChange={setF("Authority")} placeholder="e.g. ISO" />
            <Field label="Industry" value={form.Industry} onChange={setF("Industry")} placeholder="e.g. Financial Services" />
            <Field label="Concept" value={form.Concept} onChange={setF("Concept")} placeholder="e.g. Geography" />
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 0.6fr 1.4fr", gap: 10, marginBottom: 10 }}>
            <Field label="Standard" value={form.Standard} onChange={setF("Standard")} placeholder="e.g. ISO 3166-1 alpha-2" />
            <Field label="Edition" value={form.Edition} onChange={setF("Edition")} placeholder="2020" />
            <Field label="Reference (URL)" value={form.Reference} onChange={setF("Reference")} placeholder="https://…" />
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 10 }}>
            <Field label="Owner" value={form.Owner} onChange={setF("Owner")} placeholder="Accountable" />
            <Field label="Steward" value={form.Steward} onChange={setF("Steward")} placeholder="Maintains" />
          </div>
          <div style={{ marginBottom: 10 }}>
            <Field label="Description" value={form.Description} onChange={setF("Description")} area={2} />
          </div>
          <div style={{ display: "flex", gap: 9, justifyContent: "flex-end" }}>
            <Btn small kind="ghost" onClick={() => setShowAdd(false)}>Cancel</Btn>
            <Btn small kind="primary" icon={Plus} onClick={add}>Add code list</Btn>
          </div>
        </div>
      )}

      <div style={{ border: "1px solid " + C.line, borderRadius: 10, overflow: "hidden", maxHeight: 380, overflowY: "auto" }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12.5 }}>
          <thead><tr style={{ background: "#f1ece0", textAlign: "left", position: "sticky", top: 0 }}>
            {["Code Table", "Authority", "Concept", "Ownership", "Used by"].map((h, i) => <th key={i} style={{ padding: "8px 11px", fontSize: 10.5, color: C.muted, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.5 }}>{h}</th>)}
          </tr></thead>
          <tbody>
            {rows.length === 0 && <tr><td colSpan={5} style={{ padding: 20, textAlign: "center", color: C.muted }}>No code lists match.</td></tr>}
            {rows.map((c, i) => {
              const used = usage[norm(c.Name)] || [];
              return (
                <tr key={i} style={{ borderTop: "1px solid " + C.line, background: used.length ? "#f4f9f7" : "transparent" }}>
                  <td style={{ padding: "9px 11px" }}>
                    <div style={{ fontWeight: 600 }}>{c.Name}</div>
                    <div style={{ fontSize: 11, color: C.muted }}>{[c.Standard, c.Edition && ("ed. " + c.Edition)].filter(Boolean).join(" · ")}{c.Reference ? <> · <a href={c.Reference} target="_blank" rel="noreferrer" style={{ color: C.teal }}>link</a></> : null}</div>
                  </td>
                  <td style={{ padding: "9px 11px" }}>{c.Authority || "—"}</td>
                  <td style={{ padding: "9px 11px" }}>{c.Concept || "—"}</td>
                  <td style={{ padding: "9px 11px", fontSize: 11.5 }}>{c.Owner || <span style={{ color: C.red, fontWeight: 700 }}>* owner</span>}{c.Steward ? <div style={{ color: C.muted }}>{c.Steward}</div> : null}</td>
                  <td style={{ padding: "9px 11px", color: used.length ? C.tealDeep : "#b8b2a4", fontWeight: used.length ? 600 : 400 }}>{used.length ? used.join(", ") : "—"}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      <div style={{ fontSize: 11.5, color: C.muted, marginTop: 10 }}>Showing {rows.length} of {lists.length}. Rows in teal are referenced by an attribute. <span style={{ color: C.red, fontWeight: 700 }}>*</span> marks missing ownership.</div>
      </>}

      {tab === "crosswalks" && <RdCrosswalksPanel glossary={glossary} mutate={mutate} flash={flash} />}
      {tab === "changes" && <RdChangesPanel glossary={glossary} mutate={mutate} flash={flash} />}

      <div style={{ display: "flex", gap: 9, justifyContent: "flex-end", marginTop: 14 }}>
        <Btn kind="ghost" onClick={onClose}>Close</Btn>
      </div>
    </Modal>
  );
}

/* Cross-walks panel inside the workbench modal (list-level mappings) */
function RdCrosswalksPanel({ glossary, mutate, flash }) {
  const names = (glossary.codeLists || []).map((c) => c.Name).filter(Boolean);
  const xs = glossary.crosswalks || [];
  const [f, setF] = useState({ "From Code List": "", "To Code List": "", Relationship: "Equivalent to", Description: "", Owner: "", Steward: "", Status: "Active" });
  const set = (k) => (v) => setF((x) => ({ ...x, [k]: v }));
  const add = () => {
    if (!f["From Code List"] || !f["To Code List"]) { flash("Pick both reference sets", "err"); return; }
    mutate((g) => {
      g.crosswalks = g.crosswalks || [];
      let mx = 0; g.crosswalks.forEach((c) => { const n = parseInt(String(c["Crosswalk ID"] || "").replace(/\D/g, ""), 10); if (!isNaN(n)) mx = Math.max(mx, n); });
      g.crosswalks.push({ ...f, "Crosswalk ID": "XW_" + String(mx + 1).padStart(3, "0"), "Last Updated": today() });
    }).then(() => { setF({ "From Code List": "", "To Code List": "", Relationship: "Equivalent to", Description: "", Owner: "", Steward: "", Status: "Active" }); flash("Cross-walk added"); });
  };
  const del = (id) => mutate((g) => { g.crosswalks = (g.crosswalks || []).filter((c) => c["Crosswalk ID"] !== id); }).then(() => flash("Removed"));
  return (
    <>
      <div style={{ fontSize: 13, color: C.muted, marginBottom: 12 }}>List-level mappings between reference data sets (e.g. an internal list derived from an ISO standard).</div>
      <div style={{ border: "1px solid " + C.line, borderRadius: 10, overflow: "hidden", marginBottom: 14 }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12.5 }}>
          <thead><tr style={{ background: "#f1ece0", textAlign: "left" }}>{["From", "Relationship", "To", "Owner / Steward", "Status", ""].map((h, i) => <th key={i} style={{ padding: "8px 11px", fontSize: 10.5, color: C.muted, fontWeight: 700, textTransform: "uppercase" }}>{h}</th>)}</tr></thead>
          <tbody>
            {xs.length === 0 && <tr><td colSpan={6} style={{ padding: 18, textAlign: "center", color: C.muted }}>No cross-walks yet.</td></tr>}
            {xs.map((x) => (
              <tr key={x["Crosswalk ID"]} style={{ borderTop: "1px solid " + C.line }}>
                <td style={{ padding: "9px 11px", fontWeight: 600 }}>{x["From Code List"]}</td>
                <td style={{ padding: "9px 11px" }}><span style={{ background: C.tealSoft, color: C.tealDeep, borderRadius: 6, padding: "2px 8px", fontSize: 11.5, fontWeight: 600 }}>{x.Relationship}</span></td>
                <td style={{ padding: "9px 11px", fontWeight: 600 }}>{x["To Code List"]}</td>
                <td style={{ padding: "9px 11px", fontSize: 11.5 }}>{x.Owner || "—"}{x.Steward ? <div style={{ color: C.muted }}>{x.Steward}</div> : null}</td>
                <td style={{ padding: "9px 11px" }}>{x.Status || "Active"}</td>

/* Change-management panel inside the workbench modal (5-step workflow) */
function RdChangesPanel({ glossary, mutate, flash }) {
  const names = (glossary.codeLists || []).map((c) => c.Name).filter(Boolean);
  const cs = glossary.rdChanges || [];
  const [f, setF] = useState({ "Code List": "", Stage: "Receive Change Request", Request: "", "Requested By": "" });
  const set = (k) => (v) => setF((x) => ({ ...x, [k]: v }));
  const add = () => {
    if (!f["Code List"]) { flash("Pick a reference set", "err"); return; }
    mutate((g) => {
      g.rdChanges = g.rdChanges || [];
      let mx = 0; g.rdChanges.forEach((c) => { const n = parseInt(String(c["Change ID"] || "").replace(/\D/g, ""), 10); if (!isNaN(n)) mx = Math.max(mx, n); });
      g.rdChanges.push({ ...f, "Change ID": "RDC_" + String(mx + 1).padStart(3, "0"), "Requested Date": today(), "Updated Date": today() });
    }).then(() => { setF({ "Code List": "", Stage: "Receive Change Request", Request: "", "Requested By": "" }); flash("Change request logged"); });
  };
  const advance = (id) => mutate((g) => { const t = (g.rdChanges || []).find((c) => c["Change ID"] === id); if (t) { const i = RD_STAGES.indexOf(t.Stage); t.Stage = RD_STAGES[Math.min(i + 1, RD_STAGES.length - 1)]; t["Updated Date"] = today(); } }).then(() => flash("Stage advanced"));

/* ============================================================
   ISO/IEC 11179 panel — view + edit a term's data-element metadata
============================================================ */
function IsoPanel({ term, spos, allTerms, codeLists, mutate, flash }) {
  const [editing, setEditing] = useState(false);
  const [showScore, setShowScore] = useState(false);
  const [d, setD] = useState({});
  // Guard against edit state bleeding between terms: if the term identity changes, drop any in-progress edit.
  const termKey = term["Glossary ID"] || term.Term;
  const lastKey = useRef(termKey);
  useEffect(() => { if (lastKey.current !== termKey) { lastKey.current = termKey; setEditing(false); setShowScore(false); setD({}); } }, [termKey]);
  const suggestion = useMemo(() => suggestIso(term, spos, allTerms, codeLists), [term, spos, allTerms, codeLists]);
  const entityNames = useMemo(() => (allTerms || []).filter((x) => String(x["Term Type"] || "").trim() === "Entity").map((e) => e.Term), [allTerms]);
  const codeListNames = useMemo(() => (codeLists || []).map((c) => c.Name).filter(Boolean), [codeLists]);
  const isEnumerated = (t) => ["Code", "Enumerated"].includes(String(t.Datatype || "").trim()) || String(t.Representation || "").trim() === "Code"
    || !!String(t["Code List"] || "").trim() || !!suggestion["Code List"];

  const startEdit = () => {
    setD({
      "Object Class": term["Object Class"] || "", "Property": term.Property || "", "Qualifier": term.Qualifier || "",
      "Representation": term.Representation || "", "Datatype": term.Datatype || "",
      "Format": term.Format || "", "Unit": term.Unit || "",
      "Minimum": term.Minimum || "", "Maximum": term.Maximum || "", "Unit of Measure": term["Unit of Measure"] || "",
      "Code List": term["Code List"] || "",
      "Permissible Values": term["Permissible Values"] || "", "Value Meanings": term["Value Meanings"] || "",
      "Registration Status": term["Registration Status"] || "Candidate",
    });
    setEditing(true);
  };
  const setF = (k) => (v) => setD((x) => ({ ...x, [k]: v }));
  const applySuggestion = () => setD((x) => ({
    ...x,
    "Object Class": x["Object Class"] || suggestion["Object Class"],
    "Property": x.Property || suggestion.Property,
    "Qualifier": x.Qualifier || suggestion.Qualifier,
    "Representation": x.Representation || suggestion.Representation,
    "Datatype": x.Datatype || suggestion.Datatype,
    "Unit of Measure": x["Unit of Measure"] || suggestion["Unit of Measure"],
    "Code List": x["Code List"] || suggestion["Code List"],
  }));
  const save = () => mutate((g) => {
    const t = g.terms.find((x) => norm(x.Term) === norm(term.Term));
    if (!t) return;
    Object.keys(d).forEach((k) => { t[k] = d[k]; });
    if (t["Term Type"] !== "Attribute") t["Term Type"] = "Business Element";
    t["Quality Score"] = isoQualityScore(t, g.terms);
    t["Last Updated"] = today();
  }).then(() => { setEditing(false); flash("ISO 11179 metadata saved"); });

  // live preview term used for score/naming while editing
  const preview = editing ? { ...term, ...d } : term;
  const checks = isoQualityChecks(preview, allTerms);
  const score = preview["Quality Score"] !== "" && preview["Quality Score"] != null && !editing
    ? Number(preview["Quality Score"]) : isoQualityScore(preview, allTerms);
  const sc = score >= 80 ? C.green : score >= 50 ? C.amber : C.red;
  const reg = preview["Registration Status"] || "Candidate";
  const regColor = REGISTRATION_COLOR[reg] || C.muted;
  const nm = namingOk(preview);

  const star = (bad) => bad ? <span style={{ color: C.red, fontWeight: 700, marginLeft: 3 }} title="Non-compliant with ISO/IEC 11179">*</span> : null;
  const cell = (label, v, checkKey) => {
    const bad = checkKey ? failOf(checkKey) : false;
    return (
      <div style={{ background: C.panel, padding: "10px 13px" }}>
        <div style={{ fontSize: 10, fontWeight: 700, color: bad ? C.red : C.muted, textTransform: "uppercase", letterSpacing: 0.5 }}>{label}{star(bad)}</div>
        <div style={{ fontSize: 13, marginTop: 3, color: v ? C.ink : (bad ? C.red : "#b8b2a4"), fontFamily: ["Datatype", "Format", "Unit"].includes(label) ? FONT_MONO : FONT_UI }}>
          {v || (bad && suggestion[label] ? <span style={{ fontStyle: "italic", color: C.amber }}>suggest: {suggestion[label]}</span> : v || "\u2014")}
        </div>
      </div>
    );
  };

  const missingCore = !String(term["Object Class"] || "").trim() || !String(term.Property || "").trim() || !String(term.Representation || "").trim();
  const haveSuggestions = suggestion["Object Class"] || suggestion.Property || suggestion.Representation;

  return (
    <div style={{ marginBottom: 26 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10, flexWrap: "wrap" }}>
        <Boxes size={17} color={C.teal} strokeWidth={2.1} />
        <span style={{ fontFamily: FONT_DISP, fontSize: 18, fontWeight: 600, color: C.ink }}>ISO/IEC 11179 — Data Element</span>
        <span style={{ marginLeft: "auto", display: "inline-flex", alignItems: "center", gap: 12 }}>
          <span style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "3px 11px", borderRadius: 999, background: regColor, color: "#fff", fontSize: 12, fontWeight: 700 }}>{reg}</span>
          <button onClick={() => setShowScore((s) => !s)} title="Show how the score is calculated"
            style={{ display: "inline-flex", alignItems: "center", gap: 7, background: "none", border: "none", cursor: "pointer", padding: 0 }}>
            <Gauge size={17} color={sc} />
            <span style={{ fontFamily: FONT_MONO, fontSize: 16, fontWeight: 700, color: sc }}>{score}/100</span>
          </button>
          {!editing && <Btn small kind="ghost" icon={PencilLine} onClick={startEdit}>Edit</Btn>}
        </span>
      </div>
      <div style={{ height: 7, borderRadius: 4, background: "#e7e0d2", overflow: "hidden", marginBottom: 14 }}>
        <div style={{ width: score + "%", height: "100%", background: sc, borderRadius: 4 }} />
      </div>

      {/* scoring breakdown (toggle) */}
      {showScore && (
        <div style={{ background: "#fff", border: "1px solid " + C.line, borderRadius: 12, padding: "14px 16px", marginBottom: 14 }}>
          <div style={{ fontSize: 11.5, fontWeight: 700, color: C.muted, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 10 }}>How the score is calculated</div>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
            <tbody>
              {checks.map((c, i) => (
                <tr key={i} style={{ borderBottom: i < checks.length - 1 ? "1px solid #efe9dc" : "none" }}>
                  <td style={{ padding: "6px 8px 6px 0", width: 22 }}>
                    {c.ok ? <Check size={15} color={C.green} /> : <span style={{ color: C.red, fontWeight: 700, fontSize: 16 }}>*</span>}
                  </td>
                  <td style={{ padding: "6px 8px", color: c.ok ? C.ink : C.red }}>{c.label}</td>
                  <td style={{ padding: "6px 0", textAlign: "right", fontFamily: FONT_MONO, color: c.ok ? C.green : "#b8b2a4", whiteSpace: "nowrap" }}>
                    {c.ok ? "+" + c.pts : "0"} <span style={{ color: C.muted }}>/ {c.pts}</span>
                  </td>
                </tr>
              ))}
              <tr style={{ borderTop: "2px solid " + C.line }}>
                <td></td>
                <td style={{ padding: "8px 8px", fontWeight: 700 }}>Total</td>
                <td style={{ padding: "8px 0", textAlign: "right", fontFamily: FONT_MONO, fontWeight: 700, color: sc }}>{score} / 100</td>
              </tr>
            </tbody>
          </table>
          <div style={{ fontSize: 11.5, color: C.muted, marginTop: 10, display: "flex", alignItems: "center", gap: 6 }}>
            <span style={{ color: C.red, fontWeight: 700 }}>*</span> marks an item that is not yet ISO/IEC 11179 compliant.
          </div>
        </div>
      )}

      {/* suggestion banner when core 11179 fields are missing */}
      {!editing && missingCore && haveSuggestions && (
        <div style={{ background: C.amberSoft, border: "1px solid #e7d6ad", borderRadius: 12, padding: "12px 16px", marginBottom: 14 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
            <Lightbulb size={15} color={C.amber} strokeWidth={2.3} />
            <span style={{ fontSize: 12.5, fontWeight: 700, color: "#7a5606" }}>ISO 11179 not yet followed — suggested profile from the name, definition &amp; linked Entities:</span>
          </div>
          <div style={{ display: "flex", gap: 18, flexWrap: "wrap", marginBottom: 8 }}>
            {[["Object Class", suggestion["Object Class"]], ["Qualifier", suggestion.Qualifier], ["Property", suggestion.Property], ["Representation", suggestion.Representation], ["Datatype", suggestion.Datatype]].map(([k, v], i) => (
              <span key={i} style={{ fontSize: 13, color: "#7a5606" }}>
                <b style={{ textTransform: "uppercase", fontSize: 10.5, letterSpacing: 0.5 }}>{k}:</b>{" "}
                <span style={{ fontFamily: FONT_MONO, color: v ? C.ink : "#b8b2a4" }}>{v || "—"}</span>
              </span>
            ))}
          </div>
          {suggestion["Object Class"] && !suggestion.objectClassResolved && (
            <div style={{ fontSize: 11.5, color: C.red, display: "flex", alignItems: "center", gap: 6, marginBottom: 8 }}>
              <AlertCircle size={13} /> <span>No defined Entity matched — “{suggestion["Object Class"]}” is a guess. Define the containing Entity, then set Object Class to it.</span>
            </div>
          )}
          {!suggestion["Object Class"] && (
            <div style={{ fontSize: 11.5, color: C.red, display: "flex", alignItems: "center", gap: 6, marginBottom: 8 }}>
              <AlertCircle size={13} /> <span>Object Class should be the Entity that contains this attribute — none is defined yet, so define it first.</span>
            </div>
          )}
          <Btn small kind="amber" icon={Check} onClick={() => { startEdit(); setTimeout(applySuggestion, 0); }}>Apply suggestions &amp; edit</Btn>
        </div>
      )}

      {!editing ? (
        <>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(120px,1fr))", gap: 1, background: C.line, border: "1px solid " + C.line, borderRadius: 12, overflow: "hidden" }}>
            {cell("Object Class", term["Object Class"], "Object Class")}
            {cell("Qualifier", term.Qualifier)}
            {cell("Property", term.Property, "Property")}
            {cell("Representation", term.Representation, "Representation")}
            {cell("Datatype", term.Datatype, "Datatype")}
            {needsRange ? cell("Minimum", term.Minimum) : cell("Format", term.Format)}
            {needsRange ? cell("Maximum", term.Maximum) : cell("Unit", term.Unit)}
            {needsRange ? cell("Unit of Measure", term["Unit of Measure"], "Unit of Measure") : null}
          </div>
          {ocSet && !ocEntity && (
            <div style={{ marginTop: 10, fontSize: 12, color: C.red, display: "flex", alignItems: "center", gap: 7 }}>
              <span style={{ color: C.red, fontWeight: 700, fontSize: 16 }}>*</span>
              <span><b>Object Class:</b> “{term["Object Class"]}” is not a defined Entity. It should name the Entity that contains this attribute.</span>
            </div>
