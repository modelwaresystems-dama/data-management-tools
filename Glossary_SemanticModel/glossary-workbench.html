/* ============================================================================
   RECONCILIATION SIGN-OFF — guide the Steward through approving the changes from
   a Reconciliation_Signoff_Summary workbook. Foundational first, grouped by
   hypernym; Accept promotes the matched term in the loaded glossary to Approved.
============================================================================ */
function ReconciliationView({ glossary, recon, flash, onImport, onClear, onApprove, onOpenTerm }) {
  const wrap = { maxWidth: 1080, margin: "0 auto", padding: "8px 4px 60px" };
  const card = { background: C.panel, border: "1px solid " + C.line, borderRadius: 14 };

  // ---- no summary loaded yet: show the 3-step launcher ----
  if (!recon || !recon.ok) {
    const step = (n, title, body, active) => (
      <div style={{ display: "flex", gap: 13, marginBottom: 16, opacity: active ? 1 : 0.55 }}>
        <div style={{ flex: "0 0 30px", height: 30, borderRadius: "50%", background: active ? C.teal : "#e7e0d2",
          color: active ? "#fff" : C.muted, fontFamily: FONT_MONO, fontWeight: 700, fontSize: 14,
          display: "grid", placeItems: "center" }}>{n}</div>
        <div><div style={{ fontWeight: 700, fontSize: 14.5, color: C.ink }}>{title}</div>
          <div style={{ fontSize: 13, color: C.muted, marginTop: 2, lineHeight: 1.55 }}>{body}</div></div>
      </div>
    );
    return (
      <div style={wrap}>
        <div style={{ display: "flex", alignItems: "center", gap: 11, marginBottom: 6 }}>
          <GitMerge size={22} color={C.teal} strokeWidth={2.2} />
          <span style={{ fontFamily: FONT_DISP, fontSize: 23, fontWeight: 600, color: C.ink }}>Reconciliation sign-off</span>
        </div>
        <p style={{ color: C.muted, fontSize: 13.5, maxWidth: 640, margin: "0 0 22px", lineHeight: 1.6 }}>
          Work through a major set of reconciliation changes and approve them into this glossary, one theme at a time.
        </p>
        <div style={{ ...card, padding: "24px 26px" }}>
          {step(1, "Reload the reconciled glossary", <>Open the glossary that the reconciliation was applied to (Home → <b>Import an Excel glossary</b>). {glossary ? <>Currently open: <b>{glossary.name}</b>.</> : <>No glossary open yet.</>}</>, true)}
          {step(2, "Upload the Reconciliation Summary", <>Load the <b>Reconciliation_Signoff_Summary.xlsx</b> produced by the reconcile step — it lists the new, revised, retired and rejected terms.</>, !!glossary)}
          {step(3, "Approve the changes", <>Go term by term — Foundational first, grouped by parent class — accepting, amending or rejecting each, then promote accepted terms to <b>Approved</b>.</>, false)}
          <div style={{ marginTop: 8 }}>
            <Btn icon={Upload} kind="primary" onClick={onImport} disabled={!glossary}>Upload Reconciliation Summary (.xlsx)</Btn>
            {!glossary && <span style={{ marginLeft: 10, fontSize: 12.5, color: C.amber }}>Open a glossary first.</span>}
          </div>
        </div>
      </div>
    );
  }

  // ---- summary loaded: the guided approval workspace ----
  const termsByName = {};
  (glossary?.terms || []).forEach((t) => { termsByName[norm(t.Term)] = t; });
  const decisions = (glossary && glossary.reconDecisions) || {};
  const isApproved = (name) => { const t = termsByName[norm(name)]; return t && norm(t.Lifecycle) === "approved"; };

  let totalItems = 0, doneItems = 0;
  recon.order.forEach((g) => {
    const G = recon.glossaries[g];
    G.revised.forEach((r) => { totalItems++; if (decisions[g + "§" + r.term]) doneItems++; });
    G.groups.forEach((gr) => gr.terms.forEach((t) => { totalItems++; if (decisions[g + "§" + t.term]) doneItems++; }));
  });

  const decideBtn = (gname, term, kind, label, col) => {
    const key = gname + "§" + term; const on = decisions[key] && decisions[key].decision === kind;
    return (
      <button onClick={() => onApprove({ type: "decide", gname, term, kind })}
        style={{ fontFamily: FONT_UI, fontWeight: 600, fontSize: 12, padding: "5px 12px", borderRadius: 7,
          border: "1px solid " + (on ? col : C.line), background: on ? col : "#fff", color: on ? "#fff" : C.ink2, cursor: "pointer" }}>
        {label}
      </button>
    );
  };

  const TermRow = ({ gname, t }) => {
    const key = gname + "§" + t.term; const dec = decisions[key];
    const present = !!termsByName[norm(t.term)];
    const approved = isApproved(t.term);
    return (
      <div style={{ padding: "11px 15px", borderTop: "1px solid " + C.lineSoft, opacity: dec ? 0.82 : 1 }}>
        <div style={{ display: "flex", alignItems: "baseline", gap: 10, flexWrap: "wrap" }}>
          {present
            ? <span onClick={() => onOpenTerm(t.term)} style={{ fontWeight: 700, fontSize: 14.5, color: C.teal, cursor: "pointer" }}>{t.term}</span>
            : <span style={{ fontWeight: 700, fontSize: 14.5, color: C.ink }}>{t.term}</span>}
          {t.gid && <span style={{ fontFamily: FONT_MONO, fontSize: 10.5, color: C.muted, background: "#fff", border: "1px solid " + C.line, borderRadius: 6, padding: "1px 6px" }}>{t.gid}</span>}
          {t.spos ? <span style={{ fontFamily: FONT_MONO, fontSize: 10.5, color: C.tealDeep, background: C.tealSoft, borderRadius: 999, padding: "1px 8px" }}>{t.spos} SPO{t.spos > 1 ? "s" : ""}</span> : null}
          {approved && <span style={{ fontFamily: FONT_MONO, fontSize: 10, letterSpacing: 0.5, textTransform: "uppercase", background: C.greenSoft, color: C.green, borderRadius: 999, padding: "2px 7px" }}>Approved</span>}
          {!present && <span style={{ fontFamily: FONT_MONO, fontSize: 10, letterSpacing: 0.5, textTransform: "uppercase", background: C.amberSoft, color: "#7a5406", borderRadius: 999, padding: "2px 7px" }}>not in this glossary</span>}
          {dec && <span style={{ fontFamily: FONT_MONO, fontSize: 10, letterSpacing: 0.5, textTransform: "uppercase",
            background: dec.decision === "accept" ? C.greenSoft : dec.decision === "amend" ? C.amberSoft : C.redSoft,
            color: dec.decision === "accept" ? C.green : dec.decision === "amend" ? "#7a5406" : C.red,
            borderRadius: 999, padding: "2px 7px" }}>{dec.decision}{dec.decision === "accept" && present ? " · promoted" : ""}</span>}
        </div>
        {!dec && <div style={{ fontSize: 13, color: C.ink2, margin: "5px 0 9px", lineHeight: 1.5 }}>{t.definition}</div>}
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center", marginTop: dec ? 6 : 0 }}>
          {decideBtn(gname, t.term, "accept", present ? "Accept → Approve" : "Accept", C.green)}
          {decideBtn(gname, t.term, "amend", "Amend", C.amber)}
          {decideBtn(gname, t.term, "reject", "Reject", C.red)}
          {dec && dec.decision === "amend" && (
            <input defaultValue={dec.note || ""} placeholder="Note — what to change…"
              onBlur={(e) => onApprove({ type: "note", gname, term: t.term, note: e.target.value })}
              style={{ fontFamily: FONT_UI, fontSize: 12.5, padding: "5px 9px", borderRadius: 7, border: "1px solid " + C.line, outline: "none", flex: 1, minWidth: 180 }} />
          )}
        </div>
      </div>
    );
  };

  return (
    <div style={wrap}>
      <div style={{ display: "flex", alignItems: "center", gap: 11, marginBottom: 4 }}>
        <GitMerge size={22} color={C.teal} strokeWidth={2.2} />
        <span style={{ fontFamily: FONT_DISP, fontSize: 23, fontWeight: 600, color: C.ink }}>Reconciliation sign-off</span>
        <span style={{ marginLeft: "auto", display: "flex", gap: 8 }}>
          <Btn kind="ghost" small onClick={onImport}>Replace summary</Btn>
          <Btn kind="ghost" small onClick={onClear}>Clear</Btn>
        </span>
      </div>
      <p style={{ color: C.muted, fontSize: 13, margin: "0 0 12px" }}>
        From {recon.file} · approving into <b>{glossary?.name}</b> · {recon.totals.new} new, {recon.totals.revised} revised, {recon.totals.retired} retired, {recon.totals.rejected} rejected.
      </p>
      {/* progress */}
      <div style={{ display: "flex", alignItems: "center", gap: 14, margin: "0 0 20px" }}>
        <div style={{ flex: 1, height: 10, borderRadius: 6, background: "#e7e0d2", overflow: "hidden" }}>
          <div style={{ height: "100%", width: (totalItems ? doneItems / totalItems * 100 : 0) + "%", background: "linear-gradient(90deg," + C.teal + "," + C.green + ")" }} />
        </div>
        <span style={{ fontFamily: FONT_MONO, fontSize: 12.5, color: C.ink2, whiteSpace: "nowrap" }}>{doneItems} / {totalItems} decided</span>
        <Btn kind="primary" small onClick={() => onApprove({ type: "approveAllAccepted" })}>Promote all accepted</Btn>
      </div>

      {recon.order.map((g) => {
        const G = recon.glossaries[g];
        return (
          <div key={g} style={{ marginTop: 26 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 11, marginBottom: 3 }}>
              <span style={{ fontFamily: FONT_DISP, fontWeight: 600, fontSize: 22, color: C.ink }}>{g}</span>
              <span style={{ marginLeft: "auto", fontFamily: FONT_MONO, fontSize: 11.5, color: C.muted }}>{G.count} new · {G.revised.length} revised · {G.retired.length} retired</span>
            </div>
            <p style={{ color: C.muted, fontSize: 12.5, margin: "0 0 12px" }}>
              {g === "Foundational" ? "The upper ontology — shared roots the domains extend. Sign these off first." : "Domain extension of Foundational — terms specialise the shared roots via is a."}
            </p>

            {G.revised.length > 0 && (
              <div style={{ ...card, marginBottom: 14 }}>
                <div style={{ padding: "11px 15px", fontWeight: 700, fontSize: 13, color: C.amber }}>↻ Revised terms — new version, re-sign required</div>
                {G.revised.map((r) => {
                  const key = g + "§" + r.term; const dec = decisions[key];
                  return (
                    <div key={r.term} style={{ padding: "11px 15px", borderTop: "1px solid " + C.lineSoft, opacity: dec ? 0.82 : 1 }}>
                      <div style={{ display: "flex", alignItems: "baseline", gap: 10, flexWrap: "wrap" }}>
                        <span onClick={() => onOpenTerm(r.term)} style={{ fontWeight: 700, fontSize: 14.5, color: C.teal, cursor: "pointer" }}>{r.term}</span>
                        <span style={{ fontFamily: FONT_MONO, fontSize: 10.5, color: C.muted }}>v{r.version}</span>
                        {r.spos ? <span style={{ fontFamily: FONT_MONO, fontSize: 10.5, color: C.tealDeep, background: C.tealSoft, borderRadius: 999, padding: "1px 8px" }}>{r.spos} SPOs</span> : null}
                        {dec && <span style={{ fontFamily: FONT_MONO, fontSize: 10, letterSpacing: 0.5, textTransform: "uppercase", background: dec.decision === "accept" ? C.greenSoft : dec.decision === "amend" ? C.amberSoft : C.redSoft, color: dec.decision === "accept" ? C.green : dec.decision === "amend" ? "#7a5406" : C.red, borderRadius: 999, padding: "2px 7px" }}>{dec.decision}</span>}
                      </div>
                      <div style={{ fontSize: 12.5, color: C.amber, margin: "3px 0" }}>{r.change} · parent: <b>{r.before}</b> → <b>{r.after}</b></div>
                      {!dec && <div style={{ fontSize: 13, color: C.ink2, margin: "0 0 9px", lineHeight: 1.5 }}>{r.definition}</div>}
                      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center" }}>
                        {decideBtn(g, r.term, "accept", "Accept → Approve", C.green)}
                        {decideBtn(g, r.term, "amend", "Amend", C.amber)}
                        {decideBtn(g, r.term, "reject", "Reject", C.red)}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {G.groups.map((gr) => (
              <div key={gr.hypernym} style={{ ...card, marginBottom: 14, overflow: "hidden" }}>
                <div style={{ padding: "11px 15px", background: "#f1ece0", fontWeight: 700, fontSize: 13 }}>
                  {gr.hypernym} <span style={{ color: C.muted, fontWeight: 500, fontFamily: FONT_MONO, fontSize: 11 }}>· {gr.terms.length} term{gr.terms.length > 1 ? "s" : ""} that {gr.terms.length > 1 ? "are" : "is"} <i>is a</i> {gr.hypernym}</span>
                </div>
                {gr.terms.map((t) => <TermRow key={t.term} gname={g} t={t} />)}
              </div>
            ))}

            {(G.retired.length > 0 || G.rejected.length > 0) && (
              <div style={{ ...card, marginBottom: 14 }}>
                <div style={{ padding: "11px 15px", fontWeight: 700, fontSize: 13, color: C.muted }}>ⓘ Informational — already actioned, for audit</div>
                {G.retired.length > 0 && (
                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12.5 }}>
                    <thead><tr style={{ textAlign: "left" }}>{["Retired term", "Reason / canonical home"].map((h) => <th key={h} style={{ padding: "8px 15px", fontSize: 10.5, color: C.muted, fontWeight: 700, textTransform: "uppercase", borderBottom: "1px solid " + C.line }}>{h}</th>)}</tr></thead>
                    <tbody>{G.retired.map((r, i) => <tr key={i}><td style={{ padding: "8px 15px", borderBottom: "1px solid " + C.lineSoft, fontWeight: 700, color: C.ink2 }}>{r.term}</td><td style={{ padding: "8px 15px", borderBottom: "1px solid " + C.lineSoft, color: C.muted }}>{r.reason}</td></tr>)}</tbody>
                  </table>
                )}
                {G.rejected.length > 0 && (
                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12.5 }}>
                    <thead><tr style={{ textAlign: "left" }}>{["Rejected statement", "Reason"].map((h) => <th key={h} style={{ padding: "8px 15px", fontSize: 10.5, color: C.muted, fontWeight: 700, textTransform: "uppercase", borderBottom: "1px solid " + C.line }}>{h}</th>)}</tr></thead>
                    <tbody>{G.rejected.map((r, i) => <tr key={i}><td style={{ padding: "8px 15px", borderBottom: "1px solid " + C.lineSoft }}><b style={{ color: C.ink2 }}>{r.term}</b> <span style={{ fontFamily: FONT_MONO, color: C.muted }}>{r.predicate} → {r.object}</span></td><td style={{ padding: "8px 15px", borderBottom: "1px solid " + C.lineSoft, color: C.muted }}>{r.reason || "malformed / throwaway"}</td></tr>)}</tbody>
                  </table>
                )}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

/* ============================================================================
   SPO AUDIT  — import an audit workbook (from the Intralign audit) and show the
   flagged SPOs, each resolved to the Steward accountable for fixing it.
============================================================================ */
function UndefinedView({ glossary, mutate, flash, onImport, onExport, onClear, onOpenTerm }) {
  const items = glossary.undefWorklist || [];
  const [dec, setDec] = useState("all");
  const [q, setQ] = useState("");

  const keyOf = (x) => String(x["Ref ID"] || x["Referenced Term"]);
  const setDecision = (k, value) => mutate((g) => {
    const it = (g.undefWorklist || []).find((x) => String(x["Ref ID"] || x["Referenced Term"]) === k);
    if (it) it.decision = value;
    return g;
  });

  const counts = {
    total: items.length,
    accept: items.filter((x) => x.decision === "Accept").length,
    reject: items.filter((x) => x.decision === "Reject").length,
    undef: items.filter((x) => (x.decision || "Undefined") === "Undefined").length,
  };
  const rows = useMemo(() => items.filter((x) => {
    const d = x.decision || "Undefined";
    if (dec !== "all" && d !== dec) return false;
    if (q) { const hay = [x["Referenced Term"], x.Category, x["Suggested Bucket"], x["Matches / Canonical"], x["Referenced By"]].join(" ").toLowerCase(); if (!hay.includes(q.toLowerCase())) return false; }
    return true;
  }), [items, dec, q]);

  const wrap = { padding: "26px 32px 80px" };
  const card = { background: "#fff", border: "1px solid " + C.line, borderRadius: 12, overflow: "hidden" };
  const th = { padding: "10px 13px", fontSize: 10.5, color: C.muted, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.5, textAlign: "left", background: C.panel };
  const td = { padding: "11px 13px", verticalAlign: "top", fontSize: 13, borderTop: "1px solid " + C.line };
  const chip = (label, value, color) => (
    <div style={{ flex: "1 1 130px", minWidth: 130, background: "#fff", border: "1px solid " + C.line, borderRadius: 12, padding: "13px 16px" }}>
      <div style={{ fontSize: 10.5, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.5, color: C.muted }}>{label}</div>
      <div style={{ fontFamily: FONT_DISP, fontSize: 27, fontWeight: 600, color, marginTop: 3 }}>{value}</div>
    </div>
  );
  const DEC_COLOR = { Accept: C.green, Reject: C.red, Undefined: C.muted };
  const filterChip = (label, val, n) => (
    <button onClick={() => setDec(val)} style={{
      padding: "6px 12px", borderRadius: 999, cursor: "pointer", fontFamily: FONT_UI, fontSize: 12.5, fontWeight: 600,
      border: "1px solid " + (dec === val ? C.teal : C.line), background: dec === val ? C.teal : "#fff", color: dec === val ? "#fff" : C.ink2,
    }}>{label}{n != null ? " \u00B7 " + n : ""}</button>
  );

  if (!items.length) {
    return (
      <div style={wrap}>
        <div style={{ display: "flex", alignItems: "center", gap: 11, marginBottom: 6 }}>
          <AlertCircle size={22} color={C.teal} strokeWidth={2.2} />
          <span style={{ fontFamily: FONT_DISP, fontSize: 23, fontWeight: 600, color: C.ink }}>Undefined terms</span>
        </div>
        <div style={{ ...card, padding: 40, textAlign: "center", marginTop: 18 }}>
          <AlertCircle size={34} color={C.muted} strokeWidth={1.6} />
          <div style={{ fontFamily: FONT_DISP, fontSize: 19, color: C.ink, marginTop: 12 }}>No worklist imported yet</div>
          <div style={{ color: C.muted, fontSize: 13.5, maxWidth: 560, margin: "8px auto 18px", lineHeight: 1.6 }}>
            Import the <b>Undefined-Terms Worklist</b> (the corpus-wide gap sweep, with a <b>Worklist</b> sheet) to triage every referenced-but-undefined term for <b>{glossary.name}</b>. Set a CDS decision on each &mdash; <b>Accept</b>, <b>Reject</b>, or leave <b>Undefined</b>.
          </div>
          <Btn icon={Upload} kind="primary" onClick={onImport}>Import worklist (.xlsx)</Btn>
        </div>
      </div>
    );
  }

  return (
    <div style={wrap}>
      <div style={{ display: "flex", alignItems: "center", gap: 11, marginBottom: 14, flexWrap: "wrap" }}>
        <AlertCircle size={22} color={C.teal} strokeWidth={2.2} />
        <span style={{ fontFamily: FONT_DISP, fontSize: 23, fontWeight: 600, color: C.ink }}>Undefined terms</span>
        {glossary.undefFile ? <span style={{ fontSize: 12, color: C.muted }}>{glossary.undefFile}</span> : null}
        <div style={{ marginLeft: "auto", display: "flex", gap: 9 }}>
          <Btn icon={Download} kind="primary" small onClick={onExport}>Export decisions</Btn>
          <Btn icon={Upload} kind="ghost" small onClick={onImport}>Re-import</Btn>
          <Btn kind="ghost" small onClick={onClear}>Clear</Btn>
        </div>
      </div>

      <div style={{ display: "flex", gap: 11, flexWrap: "wrap", marginBottom: 16 }}>
        {chip("Total", counts.total, C.ink)}
        {chip("Undefined", counts.undef, C.muted)}
        {chip("Accepted", counts.accept, C.green)}
        {chip("Rejected", counts.reject, C.red)}
      </div>

      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center", marginBottom: 14 }}>
        {filterChip("All", "all", counts.total)}
        {filterChip("Undefined", "Undefined", counts.undef)}
        {filterChip("Accept", "Accept", counts.accept)}
        {filterChip("Reject", "Reject", counts.reject)}
        <input value={q} onChange={(e) => setQ(e.target.value)} placeholder={"Search terms\u2026"}
          style={{ marginLeft: "auto", padding: "8px 12px", borderRadius: 9, border: "1px solid " + C.line, background: "#fff", fontSize: 13, fontFamily: FONT_UI, color: C.ink, minWidth: 200 }} />
      </div>

      <div style={card}>
        <table style={{ width: "100%", borderCollapse: "collapse" }}>
          <thead><tr>
            <th style={th}>Referenced term</th><th style={th}>Category</th><th style={th}>Suggested bucket</th>
            <th style={th}>Referenced by</th><th style={{ ...th, textAlign: "center" }}>Decision</th>
          </tr></thead>
          <tbody>
            {rows.map((x, i) => {
              const k = keyOf(x); const d = x.decision || "Undefined";
              const refby = String(x["Referenced By"] || "").split(",").map((s) => s.trim()).filter(Boolean);
              return (
                <tr key={k + i}>
                  <td style={td}>
                    <div style={{ fontWeight: 700, color: C.ink, fontSize: 13.5 }}>{x["Referenced Term"]}</div>
                    {x["Matches / Canonical"] ? <div style={{ fontSize: 11.5, color: C.muted, marginTop: 2 }}>~ {x["Matches / Canonical"]}{x.Score ? " (" + x.Score + ")" : ""}</div> : null}
                  </td>
                  <td style={td}><Badge color={C.muted} soft={C.lineSoft}>{x.Category}</Badge></td>
                  <td style={{ ...td, color: C.ink2 }}>{x["Suggested Bucket"]}</td>
                  <td style={td}>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
                      {refby.slice(0, 8).map((t, j) => (
                        <button key={j} onClick={() => onOpenTerm(t)} title={"Open " + t} style={{ border: "1px solid " + C.line, background: C.panel, color: C.teal, borderRadius: 6, padding: "2px 7px", fontSize: 11.5, cursor: "pointer", fontFamily: FONT_UI }}>{t}</button>
                      ))}
                      {refby.length > 8 ? <span style={{ fontSize: 11.5, color: C.muted }}>+{refby.length - 8}</span> : null}
                    </div>
                  </td>
                  <td style={{ ...td, textAlign: "center" }}>
                    <div style={{ display: "inline-flex", border: "1px solid " + C.line, borderRadius: 8, overflow: "hidden" }}>
                      {["Accept", "Reject", "Undefined"].map((opt) => {
                        const on = d === opt;
                        return (
                          <button key={opt} onClick={() => setDecision(k, opt)} style={{
                            padding: "5px 11px", fontSize: 12, fontFamily: FONT_UI, cursor: "pointer", border: "none",
                            borderLeft: opt !== "Accept" ? "1px solid " + C.line : "none",
                            background: on ? DEC_COLOR[opt] : "#fff", color: on ? "#fff" : C.muted, fontWeight: on ? 700 : 500,
                          }}>{opt}</button>
                        );
                      })}
                    </div>
                  </td>
                </tr>
              );
            })}
            {!rows.length && <tr><td colSpan={5} style={{ ...td, textAlign: "center", color: C.muted, padding: 28 }}>No rows match this filter.</td></tr>}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function AuditView({ glossary, flash, onImport, onClear, onOpenTerm }) {
  const findings = glossary.audit || [];
  const [sev, setSev] = useState("all");
  const [steward, setSteward] = useState("all");
  const [q, setQ] = useState("");

  const stewardOf = (term) => { const t = findTerm(glossary.terms, term); return t ? String(t["Steward (BDS)"] || t.Owner || "").trim() : ""; };
  const knownIn = (term) => !!findTerm(glossary.terms, term);

  const enriched = useMemo(() => findings.map((f) => ({ ...f, _steward: stewardOf(f.Term), _known: knownIn(f.Term) })), [glossary]);
  const stewards = useMemo(() => Array.from(new Set(enriched.map((f) => f._steward).filter(Boolean))).sort(), [enriched]);
  const sevRank = (s) => { const m = { high: 0, medium: 1, low: 2 }; const k = String(s).toLowerCase(); return k in m ? m[k] : 3; };

  const rows = useMemo(() => enriched.filter((f) => {
    if (sev !== "all" && String(f.Severity).toLowerCase() !== sev) return false;
    if (steward === "__none" && f._steward) return false;
    if (steward !== "all" && steward !== "__none" && f._steward !== steward) return false;
    if (q) { const hay = [f.Term, f.Issue, f.Subject, f.Predicate, f.Object, f["Suggested Fix"]].join(" ").toLowerCase(); if (!hay.includes(q.toLowerCase())) return false; }
    return true;
  }).sort((a, b) => sevRank(a.Severity) - sevRank(b.Severity)
    || String(a._steward || "~").localeCompare(String(b._steward || "~"))
    || String(a.Term).localeCompare(String(b.Term))), [enriched, sev, steward, q]);

  const counts = {
    total: findings.length,
    high: findings.filter((f) => String(f.Severity).toLowerCase() === "high").length,
    medium: findings.filter((f) => String(f.Severity).toLowerCase() === "medium").length,
    terms: new Set(findings.map((f) => f.Term)).size,
    unassigned: enriched.filter((f) => !f._steward).length,
  };
  const sevStyle = (s) => { const k = String(s).toLowerCase(); return k === "high" ? { color: C.red, soft: C.redSoft } : k === "medium" ? { color: C.amber, soft: C.amberSoft } : k === "low" ? { color: C.muted, soft: C.lineSoft } : { color: C.teal, soft: C.tealSoft }; };

  const wrap = { padding: "26px 32px 80px" };
  const card = { background: "#fff", border: "1px solid " + C.line, borderRadius: 12, overflow: "hidden" };
  const th = { padding: "10px 13px", fontSize: 10.5, color: C.muted, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.5, textAlign: "left", background: C.panel };
  const td = { padding: "11px 13px", verticalAlign: "top", fontSize: 13, borderTop: "1px solid " + C.line };
  const chip = (label, value, color) => (
    <div style={{ flex: "1 1 130px", minWidth: 130, background: "#fff", border: "1px solid " + C.line, borderRadius: 12, padding: "13px 16px" }}>
      <div style={{ fontSize: 10.5, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.5, color: C.muted }}>{label}</div>
      <div style={{ fontFamily: FONT_DISP, fontSize: 27, fontWeight: 600, color, marginTop: 3 }}>{value}</div>
    </div>
  );
  const selectStyle = { padding: "8px 11px", borderRadius: 9, border: "1px solid " + C.line, background: "#fff", fontSize: 13, fontFamily: FONT_UI, color: C.ink };

  if (!findings.length) {
    const wasImported = !!glossary.auditImported;   // a clean audit (0 findings) was loaded, vs nothing imported yet
    return (
      <div style={wrap}>
        <div style={{ display: "flex", alignItems: "center", gap: 11, marginBottom: 6 }}>
          <ClipboardCheck size={22} color={C.teal} strokeWidth={2.2} />
          <span style={{ fontFamily: FONT_DISP, fontSize: 23, fontWeight: 600, color: C.ink }}>SPO Audit</span>
        </div>
        {wasImported ? (
          <div style={{ ...card, padding: 40, textAlign: "center", marginTop: 18, borderColor: C.green, background: C.greenSoft }}>
            <ShieldCheck size={36} color={C.green} strokeWidth={1.9} />
            <div style={{ fontFamily: FONT_DISP, fontSize: 20, color: C.ink, marginTop: 12 }}>No audit findings &mdash; clean pass</div>
            <div style={{ color: C.ink2, fontSize: 13.5, maxWidth: 540, margin: "8px auto 18px", lineHeight: 1.6 }}>
              The audit{glossary.auditFile ? <> (<b>{glossary.auditFile}</b>)</> : null} ran against <b>{glossary.name}</b> and flagged nothing. Every SPO statement passed the quality checks &mdash; no compound predicates, no issues to resolve.
            </div>
            <div style={{ display: "flex", gap: 9, justifyContent: "center", flexWrap: "wrap" }}>
              <Btn icon={Upload} kind="ghost" small onClick={onImport}>Import a different audit</Btn>
              <Btn kind="ghost" small onClick={onClear}>Clear</Btn>
            </div>
          </div>
        ) : (
          <div style={{ ...card, padding: 40, textAlign: "center", marginTop: 18 }}>
            <ClipboardCheck size={34} color={C.muted} strokeWidth={1.6} />
            <div style={{ fontFamily: FONT_DISP, fontSize: 19, color: C.ink, marginTop: 12 }}>No audit imported yet</div>
            <div style={{ color: C.muted, fontSize: 13.5, maxWidth: 520, margin: "8px auto 18px", lineHeight: 1.6 }}>
              Import an audit workbook produced by the Intralign audit to list the flagged SPOs for <b>{glossary.name}</b> — each one resolved to the steward accountable for the fix.
            </div>
            <Btn icon={Upload} kind="primary" onClick={onImport}>Import audit file (.xlsx)</Btn>
          </div>
        )}
      </div>
    );
  }

  return (
    <div style={wrap}>
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16, flexWrap: "wrap" }}>
        <ClipboardCheck size={22} color={C.teal} strokeWidth={2.2} />
        <div>
          <div style={{ fontFamily: FONT_DISP, fontSize: 23, fontWeight: 600, color: C.ink, lineHeight: 1.1 }}>SPO Audit</div>
          {glossary.auditFile ? <div style={{ fontSize: 11.5, color: C.muted, marginTop: 2 }}>{glossary.auditFile}</div> : null}
        </div>
        <div style={{ marginLeft: "auto", display: "flex", gap: 8 }}>
          <Btn icon={Upload} kind="ghost" small onClick={onImport} title="Replace with another audit file">Re-import</Btn>
          <Btn icon={Trash2} kind="ghost" small onClick={onClear} title="Clear imported audit">Clear</Btn>
        </div>
      </div>

      <div style={{ display: "flex", gap: 12, marginBottom: 18, flexWrap: "wrap" }}>
        {chip("Findings", counts.total, C.teal)}
        {chip("High", counts.high, C.red)}
        {chip("Medium", counts.medium, C.amber)}
        {chip("Terms affected", counts.terms, C.ink)}
        {chip("Unassigned steward", counts.unassigned, counts.unassigned ? C.red : C.green)}
      </div>

      <div style={{ display: "flex", alignItems: "center", gap: 11, marginBottom: 14, flexWrap: "wrap" }}>
        <div style={{ position: "relative", flex: 1, minWidth: 220, maxWidth: 380 }}>
          <span style={{ position: "absolute", left: 11, top: 9 }}><Search size={15} color={C.muted} /></span>
          <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="Search term, issue, predicate, fix\u2026"
            style={{ width: "100%", padding: "8px 11px 8px 34px", borderRadius: 9, border: "1px solid " + C.line, background: "#fff", fontSize: 13.5, outline: "none", boxSizing: "border-box", fontFamily: FONT_UI }} />
        </div>
        <select value={sev} onChange={(e) => setSev(e.target.value)} style={selectStyle}>
          <option value="all">All severities</option>
          <option value="high">High ({counts.high})</option>
          <option value="medium">Medium ({counts.medium})</option>
        </select>
        <select value={steward} onChange={(e) => setSteward(e.target.value)} style={selectStyle}>
          <option value="all">All stewards</option>
          {stewards.map((s) => <option key={s} value={s}>{s}</option>)}
          {counts.unassigned ? <option value="__none">\u2014 Unassigned ({counts.unassigned})</option> : null}
        </select>
        <span style={{ fontSize: 12.5, color: C.muted }}>{rows.length} of {findings.length}</span>
      </div>

      <div style={card}>
        <table style={{ width: "100%", borderCollapse: "collapse" }}>
          <thead><tr>
            {["Sev", "Term", "Flagged SPO", "Issue & suggested fix", "Steward"].map((h, i) => <th key={i} style={th}>{h}</th>)}
          </tr></thead>
          <tbody>
            {rows.length === 0 && <tr><td colSpan={5} style={{ ...td, textAlign: "center", color: C.muted, padding: 24 }}>No findings match.</td></tr>}
            {rows.map((f, i) => {
              const ss = sevStyle(f.Severity);
              return (
                <tr key={i}>
                  <td style={td}><Badge color={ss.color} soft={ss.soft}>{f.Severity || "\u2014"}</Badge></td>
                  <td style={{ ...td, minWidth: 150 }}>
                    {f._known ? (
                      <button onClick={() => onOpenTerm(f.Term)} style={{ background: "none", border: "none", padding: 0, cursor: "pointer", color: C.teal, fontWeight: 700, fontSize: 13, textAlign: "left" }} title="Open the term to fix it">{f.Term}</button>
                    ) : <span style={{ fontWeight: 700 }}>{f.Term}</span>}
                    <div style={{ fontSize: 11, color: C.muted, marginTop: 2 }}>
                      SPO {String(f["SPO ID"])}{f.Order ? " \u00B7 " + f.Order : ""}{!f._known ? " \u00B7 not in glossary" : ""}
                    </div>
                  </td>
                  <td style={{ ...td, minWidth: 230, fontFamily: FONT_MONO, fontSize: 12 }}>
                    <span style={{ color: C.muted }}>{f.Subject}</span>
                    <span style={{ color: C.red, fontWeight: 700 }}> {f.Predicate} </span>
                    <span style={{ color: C.muted }}>{f.Object}</span>
                  </td>
                  <td style={{ ...td, minWidth: 260 }}>
                    <div style={{ color: C.ink }}>{f.Issue}</div>
                    {f["Suggested Fix"] ? <div style={{ display: "flex", gap: 5, marginTop: 4, color: C.tealDeep, fontSize: 12.5 }}><Lightbulb size={13} style={{ flexShrink: 0, marginTop: 2 }} />{f["Suggested Fix"]}</div> : null}
                  </td>
                  <td style={{ ...td, minWidth: 130 }}>
                    {f._steward
                      ? <span style={{ display: "inline-flex", alignItems: "center", gap: 5, fontWeight: 600 }}><ShieldCheck size={13} color={C.amber} />{f._steward}</span>
                      : <span style={{ display: "inline-flex", alignItems: "center", gap: 5, color: C.red, fontWeight: 700 }}><AlertCircle size={13} />unassigned</span>}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      <div style={{ fontSize: 11.5, color: C.muted, marginTop: 10 }}>
        Stewards are resolved from each term&#x2019;s <b>Steward (BDS)</b> (falling back to Owner). Click a term to open it and fix the flagged statement.
      </div>
    </div>
  );
}

/* ============================================================================
   REFERENCE DATA MANAGER  (integrated, ported from the standalone tool)
   Self-contained IIFE: all of its tokens/components are function-scoped so they
   never collide with the workbench globals (C, Btn, Modal, norm, today, ...).
   It operates on the LIVE glossary: codeLists / crosswalks / rdChanges / terms,
   persisting through the workbench's own mutate()/saveGlossary().
============================================================================ */
const RefDataManager = (function () {
  const { useState, useMemo } = React;

  /* design tokens — warm "technical blueprint" palette (kept distinct on purpose) */
  const C = {
    paper: "#f3efe6", panel: "#faf7f1", ink: "#1c2126", teal: "#0f6e64", tealDeep: "#0a544c",
    tealSoft: "#e4f0ee", amber: "#b07908", amberSoft: "#f6edd8", green: "#2f7d4f", greenSoft: "#e6f1ea",
    red: "#a93b2c", redSoft: "#f5e4e0", muted: "#6c7079", line: "#ddd6c8", lineSoft: "#e9e3d6",
    purple: "#5b4a72", purpleSoft: "#ece7f1",
  };
  const FONT_DISP = '"Fraunces", Georgia, serif';
  const FONT_UI = '"Hanken Grotesk", ui-sans-serif, system-ui, sans-serif';
  const FONT_MONO = '"JetBrains Mono", ui-monospace, monospace';

  const PROVIDER_TYPES = ["External", "Internal", "External-Extended"];
  const RELATIONSHIPS = ["Equivalent to", "Broader than", "Narrower than", "Derived from", "Subset of", "Superset of", "Supersedes", "Overlaps with"];
  const CHANGE_STAGES = ["Receive Change Request", "Identify Stakeholder", "Identify Impact", "Decide & Communicate", "Update & Inform", "Closed"];
  const STAGE_COLOR = {
    "Receive Change Request": C.red, "Identify Stakeholder": C.purple, "Identify Impact": "#7d8a16",
    "Decide & Communicate": C.teal, "Update & Inform": C.amber, "Closed": C.muted,
  };
  const STATUS_COLOR = { "Active": C.green, "Proposed": C.amber, "Deprecated": C.muted, "Retired": C.red };

  const today = () => new Date().toISOString().slice(0, 10);
  const norm = (s) => String(s == null ? "" : s).trim().toLowerCase();
  const nextId = (rows, key, prefix) => {
    let mx = 0;
    (rows || []).forEach((r) => { const n = parseInt(String(r[key] || "").replace(/\D/g, ""), 10); if (!isNaN(n)) mx = Math.max(mx, n); });
    return prefix + String(mx + 1).padStart(3, "0");
  };

  /* icons */
  function I({ d, size = 18, color = "currentColor", sw = 2, fill = "none", style }) {
    return <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={color} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round" style={style} dangerouslySetInnerHTML={{ __html: d }} />;
  }
  const Ic = {
    database: '<ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.7 4 3 9 3s9-1.3 9-3V5"/><path d="M3 12c0 1.7 4 3 9 3s9-1.3 9-3"/>',
    link: '<path d="M10 13a5 5 0 0 0 7.5.5l3-3a5 5 0 0 0-7-7l-1.8 1.7"/><path d="M14 11a5 5 0 0 0-7.5-.5l-3 3a5 5 0 0 0 7 7l1.8-1.7"/>',
    flow: '<path d="M3 7h6l3 5 3-5h6"/><circle cx="6" cy="7" r="0"/><path d="M3 17h18"/>',
    plus: '<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',
    search: '<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>',
    download: '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>',
    check: '<polyline points="20 6 9 17 4 12"/>',
    x: '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
    edit: '<path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/>',
    trash: '<polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>',
    user: '<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>',
    shield: '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/>',
    arrow: '<line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>',
    ext: '<path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>',
    back: '<polyline points="15 18 9 12 15 6"/>',
    clock: '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',
  };
  const Icon = ({ name, ...p }) => <I d={Ic[name]} {...p} />;

  /* primitives */
  function Btn({ children, onClick, kind = "ghost", icon, disabled, small, title }) {
    const styles = {
      primary: { background: C.teal, color: "#fff", border: "1px solid " + C.tealDeep },
      solid: { background: C.ink, color: C.paper, border: "1px solid " + C.ink },
      ghost: { background: C.panel, color: C.ink, border: "1px solid " + C.line },
      danger: { background: C.redSoft, color: C.red, border: "1px solid #e3c7c0" },
    }[kind];
    return (
      <button onClick={onClick} disabled={disabled} title={title} style={{
        ...styles, opacity: disabled ? 0.45 : 1, cursor: disabled ? "not-allowed" : "pointer",
        display: "inline-flex", alignItems: "center", gap: 7, fontWeight: 600,
        fontSize: small ? 12.5 : 13.5, padding: small ? "6px 11px" : "9px 15px",
        borderRadius: 9, letterSpacing: 0.2, transition: "filter .15s ease", fontFamily: FONT_UI,
      }}
        onMouseEnter={(e) => !disabled && (e.currentTarget.style.filter = "brightness(1.05)")}
        onMouseLeave={(e) => (e.currentTarget.style.filter = "none")}>
        {icon && <Icon name={icon} size={small ? 14 : 16} color={styles.color} sw={2.2} />}{children}
      </button>
    );
  }
  function Field({ label, value, onChange, placeholder, options, area, mono, hint, readOnly }) {
    const common = {
      width: "100%", padding: "8px 11px", borderRadius: 8, border: "1px solid " + C.line,
      background: readOnly ? C.lineSoft : "#fff", fontSize: 13, fontFamily: mono ? FONT_MONO : FONT_UI,
      color: C.ink, outline: "none", boxSizing: "border-box",
    };
    return (
      <label style={{ display: "block" }}>
        <div style={{ fontSize: 10.5, fontWeight: 700, color: C.muted, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 5 }}>{label}</div>
        {options ? (
          <select value={value || ""} onChange={(e) => onChange(e.target.value)} style={common}>
            {options.map((o) => <option key={o} value={o}>{o || "\u2014"}</option>)}
          </select>
        ) : area ? (
          <textarea value={value || ""} onChange={(e) => onChange(e.target.value)} placeholder={placeholder} rows={area} style={{ ...common, resize: "vertical", lineHeight: 1.5 }} />
        ) : (
          <input value={value || ""} onChange={(e) => onChange && onChange(e.target.value)} placeholder={placeholder} readOnly={readOnly} style={common} />
        )}
        {hint && <div style={{ fontSize: 11, color: C.muted, marginTop: 3 }}>{hint}</div>}
      </label>
    );
  }
  function Modal({ title, onClose, children, wide }) {
    return (
      <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(28,33,38,.45)", display: "grid", placeItems: "center", padding: 24, zIndex: 80, fontFamily: FONT_UI }}>
        <div onClick={(e) => e.stopPropagation()} style={{ background: C.paper, borderRadius: 16, width: wide ? 920 : 620, maxWidth: "100%", maxHeight: "90vh", overflowY: "auto", boxShadow: "0 24px 70px rgba(0,0,0,.3)", color: C.ink }}>
          <div style={{ display: "flex", alignItems: "center", padding: "18px 22px", borderBottom: "1px solid " + C.line, position: "sticky", top: 0, background: C.paper, zIndex: 1 }}>
            <span style={{ fontFamily: FONT_DISP, fontSize: 20, fontWeight: 600, color: C.ink }}>{title}</span>
            <button onClick={onClose} style={{ marginLeft: "auto", background: "none", border: "none", cursor: "pointer", color: C.muted, padding: 4 }}><Icon name="x" size={20} color={C.muted} /></button>
          </div>
          <div style={{ padding: 22 }}>{children}</div>
        </div>
      </div>
    );
  }
  function Pill({ text, color }) {
    return <span style={{ display: "inline-flex", alignItems: "center", padding: "2px 10px", borderRadius: 999, background: color, color: "#fff", fontSize: 11.5, fontWeight: 700, whiteSpace: "nowrap" }}>{text}</span>;
  }
  function Tag({ text, soft }) {
    return <span style={{ display: "inline-flex", alignItems: "center", padding: "2px 9px", borderRadius: 6, background: soft || C.lineSoft, color: C.ink, fontSize: 11.5, fontWeight: 600 }}>{text}</span>;
  }

  /* shared bits */
  const pct = (n, d) => d ? Math.round((n / d) * 100) + "%" : "0%";
  const selectStyle = { padding: "9px 12px", borderRadius: 9, border: "1px solid " + C.line, background: "#fff", fontSize: 13, fontFamily: FONT_UI };
  const cardWrap = { background: "#fff", border: "1px solid " + C.line, borderRadius: 12, overflow: "hidden" };
  const tableStyle = { width: "100%", borderCollapse: "collapse", fontSize: 13 };
  const theadRow = { background: "#f1ece0", textAlign: "left" };
  const th = { padding: "10px 13px", fontSize: 10.5, color: C.muted, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.5 };
  const td = { padding: "11px 13px", verticalAlign: "top" };
  const iconBtn = { background: "none", border: "none", cursor: "pointer", padding: 5, borderRadius: 6 };

  function Dashboard({ cards }) {
    return (
      <div style={{ display: "flex", gap: 12, marginBottom: 18, flexWrap: "wrap" }}>
        {cards.map((c, i) => (
          <div key={i} style={{ flex: "1 1 150px", minWidth: 150, background: "#fff", border: "1px solid " + C.line, borderRadius: 12, padding: "14px 18px" }}>
            <div style={{ fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.5, color: C.muted }}>{c.label}</div>
            <div style={{ display: "flex", alignItems: "baseline", gap: 8, marginTop: 5 }}>
              <span style={{ fontFamily: FONT_DISP, fontSize: 30, fontWeight: 600, color: c.color }}>{c.value}</span>
              {c.sub && <span style={{ fontSize: 13, fontWeight: 600, color: C.muted }}>{c.sub}</span>}
            </div>
          </div>
        ))}
      </div>
    );
  }
  function Toolbar({ q, setQ, placeholder, right, children }) {
    return (
      <div style={{ display: "flex", alignItems: "center", gap: 11, marginBottom: 14, flexWrap: "wrap" }}>
        {setQ && (
          <div style={{ position: "relative", flex: 1, minWidth: 240, maxWidth: 420 }}>
            <span style={{ position: "absolute", left: 12, top: 10 }}><Icon name="search" size={15} color={C.muted} /></span>
            <input value={q} onChange={(e) => setQ(e.target.value)} placeholder={placeholder}
              style={{ width: "100%", padding: "9px 12px 9px 35px", borderRadius: 9, border: "1px solid " + C.line, background: "#fff", fontSize: 13.5, outline: "none", boxSizing: "border-box", fontFamily: FONT_UI }} />
          </div>
        )}
        {children}
        {right && <div style={{ marginLeft: "auto" }}>{right}</div>}
      </div>
    );
  }
  function Section({ title, children }) {
    return (
      <div style={{ marginBottom: 18 }}>
        <div style={{ fontSize: 11, fontWeight: 700, color: C.teal, textTransform: "uppercase", letterSpacing: 0.7, marginBottom: 10, paddingBottom: 6, borderBottom: "1px solid " + C.lineSoft }}>{title}</div>
        <div style={{ display: "grid", gap: 12 }}>{children}</div>
      </div>
    );
  }
  function Row({ cols, children }) {
    return <div style={{ display: "grid", gridTemplateColumns: cols, gap: 12 }}>{children}</div>;
  }

  /* ---- Reference Data Sets ---- */
  function SetsView({ state, mutate, flash, usage }) {
    const lists = state.codeLists;
    const [q, setQ] = useState("");
    const [concept, setConcept] = useState("");
    const [editing, setEditing] = useState(null);

    const concepts = useMemo(() => Array.from(new Set(lists.map((c) => String(c.Concept || "").trim()).filter(Boolean))).sort(), [lists]);
    const rows = useMemo(() => lists.filter((c) => {
      if (concept && String(c.Concept || "").trim() !== concept) return false;
      if (!q) return true;
      return [c.Name, c["Internal Name"], c.Authority, c["Data Provider"], c.Concept, c.Standard, c.Owner, c.Steward, c.Description]
        .join(" ").toLowerCase().includes(q.toLowerCase());
    }).sort((a, b) => String(a.Name).localeCompare(String(b.Name))), [lists, q, concept]);

    const save = (rec) => {
      mutate((s) => {
        s.codeLists = s.codeLists || [];
        if (rec.__new) {
          const { __new, ...clean } = rec;
          s.codeLists.push({ ...clean, "Code List ID": nextId(s.codeLists, "Code List ID", "CL_"), "Last Updated": today() });
        } else {
          const i = s.codeLists.findIndex((c) => c["Code List ID"] === rec["Code List ID"]);
          if (i >= 0) s.codeLists[i] = { ...rec, "Last Updated": today() };
        }
      });
      setEditing(null); flash(rec.__new ? "Reference data set added" : "Reference data set updated");
    };
    const remove = (rec) => { if (!confirm("Remove \"" + rec.Name + "\"? This does not delete codes, only the registry entry.")) return; mutate((s) => { s.codeLists = s.codeLists.filter((c) => c["Code List ID"] !== rec["Code List ID"]); }); flash("Removed"); };

    const owned = lists.filter((c) => String(c.Owner || "").trim()).length;
    const stewarded = lists.filter((c) => String(c.Steward || "").trim()).length;
    const external = lists.filter((c) => String(c["Provider Type"] || c.Authority || "").trim() && norm(c["Provider Type"]) !== "internal").length;

    return (
      <>
        <Dashboard cards={[
          { label: "Reference Sets", value: lists.length, color: C.teal },
          { label: "With Owner", value: owned, sub: pct(owned, lists.length), color: C.green },
          { label: "With Steward", value: stewarded, sub: pct(stewarded, lists.length), color: C.amber },
          { label: "Externally Sourced", value: external, sub: pct(external, lists.length), color: C.purple },
        ]} />
        <Toolbar q={q} setQ={setQ} placeholder="Search name, provider, owner, steward, concept\u2026"
          right={<Btn kind="solid" icon="plus" onClick={() => setEditing({ __new: true, "Provider Type": "External", Status: "Active" })}>Add reference set</Btn>}>
          <select value={concept} onChange={(e) => setConcept(e.target.value)} style={selectStyle}>
            <option value="">All concepts ({lists.length})</option>
            {concepts.map((c) => <option key={c} value={c}>{c}</option>)}
          </select>
        </Toolbar>
        <div style={cardWrap}>
          <table style={tableStyle}>
            <thead><tr style={theadRow}>
              {["Reference Data Set", "Data Provider", "Versions", "Ownership", "Used by", ""].map((h, i) => <th key={i} style={th}>{h}</th>)}
            </tr></thead>
            <tbody>
              {rows.length === 0 && <tr><td colSpan={6} style={{ padding: 24, textAlign: "center", color: C.muted }}>No reference data sets match.</td></tr>}
              {rows.map((c) => {
                const used = usage[norm(c.Name)] || [];
                return (
                  <tr key={c["Code List ID"]} style={{ borderTop: "1px solid " + C.line, background: used.length ? "#f4f9f7" : "transparent" }}>
                    <td style={{ ...td, minWidth: 250 }}>
                      <div style={{ fontWeight: 600 }}>{c.Name || <span style={{ color: C.muted }}>(unnamed)</span>}</div>
                      <div style={{ fontSize: 11.5, color: C.muted }}>
                        {c["Internal Name"] ? c["Internal Name"] + " \u00B7 " : ""}{[c.Standard, c.Concept].filter(Boolean).join(" \u00B7 ")}
                        {c.Reference ? <> \u00B7 <a href={c.Reference} target="_blank" rel="noreferrer" style={{ color: C.teal }}>source <Icon name="ext" size={10} color={C.teal} /></a></> : null}
                      </div>
                    </td>
                    <td style={td}>
                      <div>{c["Data Provider"] || c.Authority || "\u2014"}</div>
                      {c["Provider Type"] ? <div style={{ fontSize: 11, color: C.muted }}>{c["Provider Type"]}</div> : null}
                    </td>
                    <td style={{ ...td, fontFamily: FONT_MONO, fontSize: 12 }}>
                      <div title="Data provider latest version">ext {c["Provider Version"] || "\u2014"}</div>
                      <div title="Internal version" style={{ color: C.muted }}>int {c["Internal Version"] || "\u2014"}</div>
                    </td>
                    <td style={td}>
                      {c.Owner ? <div style={{ display: "flex", alignItems: "center", gap: 5 }}><Icon name="user" size={12} color={C.green} />{c.Owner}</div> : <span style={{ color: C.red, fontWeight: 700 }} title="No owner">* owner</span>}
                      {c.Steward ? <div style={{ display: "flex", alignItems: "center", gap: 5, color: C.muted }}><Icon name="shield" size={12} color={C.amber} />{c.Steward}</div> : <span style={{ fontSize: 11.5, color: C.red, fontWeight: 700 }} title="No steward">* steward</span>}
                    </td>
                    <td style={{ ...td, color: used.length ? C.tealDeep : "#b8b2a4", fontWeight: used.length ? 600 : 400, maxWidth: 200 }}>{used.length ? used.join(", ") : "\u2014"}</td>
                    <td style={{ ...td, whiteSpace: "nowrap" }}>
                      <button onClick={() => setEditing({ ...c })} title="Edit" style={iconBtn}><Icon name="edit" size={15} color={C.muted} /></button>
                      <button onClick={() => remove(c)} title="Remove" style={iconBtn}><Icon name="trash" size={15} color={C.muted} /></button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        <div style={{ fontSize: 11.5, color: C.muted, marginTop: 10 }}>Showing {rows.length} of {lists.length}. Rows in teal are referenced by a Business Data Element. <span style={{ color: C.red, fontWeight: 700 }}>*</span> marks missing ownership/stewardship.</div>
        {editing && <SetEditor rec={editing} onClose={() => setEditing(null)} onSave={save} />}
      </>
    );
  }

  function SetEditor({ rec, onClose, onSave }) {
    const [d, setD] = useState(rec);
    const set = (k) => (v) => setD((x) => ({ ...x, [k]: v }));
    const isNew = !!rec.__new;
    return (
      <Modal title={isNew ? "Add Reference Data Set" : (d.Name || "Edit Reference Data Set")} onClose={onClose} wide>
        <Section title="Identity">
          <Row cols="1fr 1fr">
            <Field label="Formal Name (external/official)" value={d.Name} onChange={set("Name")} placeholder="e.g. ISO 3166-1991 Country Code List" hint="The official name, especially for external sets" />
            <Field label="Internal Name" value={d["Internal Name"]} onChange={set("Internal Name")} placeholder="e.g. Country Codes \u2013 ISO" hint="Name used within the organization" />
          </Row>
          <Row cols="1fr 1fr 1fr">
            <Field label="Authority" value={d.Authority} onChange={set("Authority")} placeholder="e.g. ISO" />
            <Field label="Industry" value={d.Industry} onChange={set("Industry")} placeholder="e.g. Financial Services" />
            <Field label="Concept" value={d.Concept} onChange={set("Concept")} placeholder="e.g. Geography" />
          </Row>
        </Section>
        <Section title="Data Provider">
          <Row cols="1.2fr 1fr">
            <Field label="Data Provider" value={d["Data Provider"]} onChange={set("Data Provider")} placeholder="e.g. ISO / Finance Department" hint="The party that provides and maintains the set" />
            <Field label="Provider Type" value={d["Provider Type"]} onChange={set("Provider Type")} options={["", ...PROVIDER_TYPES]} hint="External, internal, or external-extended" />
          </Row>
          <Field label="Data Provider Data Set Source (URI)" value={d.Reference} onChange={set("Reference")} placeholder="https://\u2026 where the provider's data set can be obtained" mono />
          <Row cols="1fr 1fr">
            <Field label="Data Provider Latest Version Number" value={d["Provider Version"]} onChange={set("Provider Version")} placeholder="e.g. 2024-01" mono />
            <Field label="Data Provider Latest Version Date" value={d["Provider Version Date"]} onChange={set("Provider Version Date")} placeholder="YYYY-MM-DD" mono />
          </Row>
        </Section>
        <Section title="Internal Version & Reconciliation">
          <Row cols="1fr 1fr 1fr">
            <Field label="Internal Version Number" value={d["Internal Version"]} onChange={set("Internal Version")} placeholder="e.g. 1.3" mono hint="Current internal version" />
            <Field label="Reconciliation Date" value={d["Reconciliation Date"]} onChange={set("Reconciliation Date")} placeholder="YYYY-MM-DD" mono hint="Last reconciled to the external source" />
            <Field label="Internal Last Update Date" value={d["Internal Updated"]} onChange={set("Internal Updated")} placeholder="YYYY-MM-DD" mono hint="Last changed (\u2260 reconciliation)" />
          </Row>
          <Row cols="0.6fr 0.6fr 1fr">
            <Field label="Standard" value={d.Standard} onChange={set("Standard")} placeholder="ISO 3166-1 alpha-2" mono />
            <Field label="Edition" value={d.Edition} onChange={set("Edition")} placeholder="2020" mono />
            <div />
          </Row>
        </Section>
        <Section title="Ownership & Stewardship">
          <Row cols="1fr 1fr">
            <Field label="Owner (accountable)" value={d.Owner} onChange={set("Owner")} placeholder="e.g. Head of Trade Finance" />
            <Field label="Steward (maintains)" value={d.Steward} onChange={set("Steward")} placeholder="e.g. Veronica Diesel" />
          </Row>
          <Field label="Description" value={d.Description} onChange={set("Description")} area={2} placeholder="What this reference data set contains and how it is used." />
        </Section>
        <div style={{ display: "flex", gap: 9, justifyContent: "flex-end", marginTop: 6 }}>
          <Btn kind="ghost" onClick={onClose}>Cancel</Btn>
          <Btn kind="primary" icon="check" onClick={() => onSave(d)} disabled={!String(d.Name || "").trim()}>{isNew ? "Add set" : "Save changes"}</Btn>
        </div>
      </Modal>
    );
  }

  /* ---- Cross-Walks ---- */
  function CrosswalksView({ state, mutate, flash }) {
    const names = state.codeLists.map((c) => c.Name).filter(Boolean);
    const [editing, setEditing] = useState(null);
    const [q, setQ] = useState("");
    const rows = useMemo(() => state.crosswalks.filter((x) =>
      !q || [x["From Code List"], x["To Code List"], x.Relationship, x.Description, x.Owner, x.Steward].join(" ").toLowerCase().includes(q.toLowerCase())
    ), [state.crosswalks, q]);

    const save = (rec) => {
      mutate((s) => {
        s.crosswalks = s.crosswalks || [];
        if (rec.__new) { const { __new, ...clean } = rec; s.crosswalks.push({ ...clean, "Crosswalk ID": nextId(s.crosswalks, "Crosswalk ID", "XW_"), "Last Updated": today() }); }
        else { const i = s.crosswalks.findIndex((c) => c["Crosswalk ID"] === rec["Crosswalk ID"]); if (i >= 0) s.crosswalks[i] = { ...rec, "Last Updated": today() }; }
      });
      setEditing(null); flash(rec.__new ? "Cross-walk added" : "Cross-walk updated");
    };
    const remove = (rec) => { if (!confirm("Remove this cross-walk?")) return; mutate((s) => { s.crosswalks = s.crosswalks.filter((c) => c["Crosswalk ID"] !== rec["Crosswalk ID"]); }); flash("Removed"); };

    return (
      <>
        <p style={{ fontSize: 13.5, color: C.muted, maxWidth: 760, lineHeight: 1.6, marginTop: 0 }}>
          A <b>cross-walk</b> records that one reference data set maps to another \u2014 for example an internal code list derived from an ISO standard, or alpha-2 \u2194 alpha-3 country codes. These are list-level relationships with their own owner, steward, and status.
        </p>
        <Toolbar q={q} setQ={setQ} placeholder="Search cross-walks\u2026"
          right={<Btn kind="solid" icon="plus" onClick={() => setEditing({ __new: true, Relationship: "Equivalent to", Status: "Active" })} disabled={names.length < 1}>Add cross-walk</Btn>} />
        <div style={cardWrap}>
          <table style={tableStyle}>
            <thead><tr style={theadRow}>{["From", "Relationship", "To", "Ownership", "Status", ""].map((h, i) => <th key={i} style={th}>{h}</th>)}</tr></thead>
            <tbody>
              {rows.length === 0 && <tr><td colSpan={6} style={{ padding: 24, textAlign: "center", color: C.muted }}>No cross-walks yet. Map one reference set to another to get started.</td></tr>}
              {rows.map((x) => (
                <tr key={x["Crosswalk ID"]} style={{ borderTop: "1px solid " + C.line }}>
                  <td style={{ ...td, fontWeight: 600, maxWidth: 240 }}>{x["From Code List"]}</td>
                  <td style={td}><Tag text={x.Relationship || "\u2014"} soft={C.tealSoft} /></td>
                  <td style={{ ...td, fontWeight: 600, maxWidth: 240 }}>{x["To Code List"]}</td>
                  <td style={{ ...td, fontSize: 12 }}>
                    {x.Owner ? <div style={{ display: "flex", alignItems: "center", gap: 5 }}><Icon name="user" size={12} color={C.green} />{x.Owner}</div> : <span style={{ color: C.muted }}>\u2014</span>}
                    {x.Steward ? <div style={{ display: "flex", alignItems: "center", gap: 5, color: C.muted }}><Icon name="shield" size={12} color={C.amber} />{x.Steward}</div> : null}
                  </td>
                  <td style={td}><Pill text={x.Status || "Active"} color={STATUS_COLOR[x.Status] || C.green} /></td>
                  <td style={{ ...td, whiteSpace: "nowrap" }}>
                    <button onClick={() => setEditing({ ...x })} style={iconBtn}><Icon name="edit" size={15} color={C.muted} /></button>
                    <button onClick={() => remove(x)} style={iconBtn}><Icon name="trash" size={15} color={C.muted} /></button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        {editing && <CrosswalkEditor rec={editing} names={names} onClose={() => setEditing(null)} onSave={save} />}
      </>
    );
  }
  function CrosswalkEditor({ rec, names, onClose, onSave }) {
    const [d, setD] = useState(rec);
    const set = (k) => (v) => setD((x) => ({ ...x, [k]: v }));
    const opts = ["", ...names];
    return (
      <Modal title={rec.__new ? "Add Cross-Walk" : "Edit Cross-Walk"} onClose={onClose}>
        <div style={{ display: "grid", gridTemplateColumns: "1fr auto 1fr", gap: 12, alignItems: "end", marginBottom: 14 }}>
          <Field label="From Reference Set" value={d["From Code List"]} onChange={set("From Code List")} options={opts} />
          <div style={{ paddingBottom: 8 }}><Icon name="arrow" size={20} color={C.teal} /></div>
          <Field label="To Reference Set" value={d["To Code List"]} onChange={set("To Code List")} options={opts} />
        </div>
        <Row cols="1fr 1fr">
          <Field label="Relationship" value={d.Relationship} onChange={set("Relationship")} options={RELATIONSHIPS} />
          <Field label="Status" value={d.Status} onChange={set("Status")} options={["Active", "Proposed", "Deprecated", "Retired"]} />
        </Row>
        <Row cols="1fr 1fr">
          <Field label="Owner" value={d.Owner} onChange={set("Owner")} placeholder="Accountable" />
          <Field label="Steward" value={d.Steward} onChange={set("Steward")} placeholder="Maintains the mapping" />
        </Row>
        <Field label="Description" value={d.Description} onChange={set("Description")} area={2} placeholder="How the two sets relate, and any caveats (partial coverage, deprecations\u2026)." />
        <div style={{ display: "flex", gap: 9, justifyContent: "flex-end", marginTop: 14 }}>
          <Btn kind="ghost" onClick={onClose}>Cancel</Btn>
          <Btn kind="primary" icon="check" onClick={() => onSave(d)} disabled={!d["From Code List"] || !d["To Code List"]}>{rec.__new ? "Add cross-walk" : "Save"}</Btn>
        </div>
      </Modal>
    );
  }

  /* ---- Change Management (5-step workflow) ---- */
  function ChangesView({ state, mutate, flash }) {
    const names = state.codeLists.map((c) => c.Name).filter(Boolean);
    const [editing, setEditing] = useState(null);
    const open = state.changes.filter((c) => c.Stage !== "Closed");
    const closed = state.changes.filter((c) => c.Stage === "Closed");

    const save = (rec) => {
      mutate((s) => {
        s.changes = s.changes || [];
        if (rec.__new) { const { __new, ...clean } = rec; s.changes.push({ ...clean, "Change ID": nextId(s.changes, "Change ID", "RDC_"), "Requested Date": clean["Requested Date"] || today(), "Updated Date": today() }); }
        else { const i = s.changes.findIndex((c) => c["Change ID"] === rec["Change ID"]); if (i >= 0) s.changes[i] = { ...rec, "Updated Date": today() }; }
      });
      setEditing(null); flash(rec.__new ? "Change request logged" : "Change request updated");
    };
    const advance = (rec) => {
      const i = CHANGE_STAGES.indexOf(rec.Stage); const next = CHANGE_STAGES[Math.min(i + 1, CHANGE_STAGES.length - 1)];
      mutate((s) => { const t = s.changes.find((c) => c["Change ID"] === rec["Change ID"]); if (t) { t.Stage = next; t["Updated Date"] = today(); } });
      flash("Advanced to \u201C" + next + "\u201D");
    };

    return (
      <>
        <div style={{ display: "flex", alignItems: "stretch", gap: 0, marginBottom: 20, flexWrap: "wrap" }}>
          {CHANGE_STAGES.slice(0, 5).map((st, i) => (
            <div key={st} style={{ position: "relative", flex: 1, minWidth: 150, background: STAGE_COLOR[st], color: "#fff",
              padding: "12px 18px 12px 26px", clipPath: i === 0 ? "polygon(0 0,90% 0,100% 50%,90% 100%,0 100%)" : "polygon(0 0,90% 0,100% 50%,90% 100%,0 100%,10% 50%)",
              marginLeft: i === 0 ? 0 : -10, fontWeight: 700, fontSize: 13, display: "flex", alignItems: "center" }}>
              <span style={{ opacity: .7, fontFamily: FONT_MONO, marginRight: 8 }}>{i + 1}</span>{st}
            </div>
          ))}
        </div>
        <Toolbar right={<Btn kind="solid" icon="plus" onClick={() => setEditing({ __new: true, Stage: "Receive Change Request" })} disabled={!names.length}>Log change request</Btn>}>
          <div style={{ fontSize: 13.5, color: C.muted }}>{open.length} open \u00B7 {closed.length} closed</div>
        </Toolbar>
        <div style={{ display: "grid", gap: 12 }}>
          {state.changes.length === 0 && <div style={{ ...cardWrap, padding: 28, textAlign: "center", color: C.muted }}>No change requests yet. Log one when a reference data set needs to change.</div>}
          {[...open, ...closed].map((c) => (
            <div key={c["Change ID"]} style={{ background: "#fff", border: "1px solid " + C.line, borderLeft: "4px solid " + (STAGE_COLOR[c.Stage] || C.muted), borderRadius: 12, padding: "14px 18px" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
                <span style={{ fontFamily: FONT_MONO, fontSize: 12, color: C.muted }}>{c["Change ID"]}</span>
                <Pill text={c.Stage} color={STAGE_COLOR[c.Stage] || C.muted} />
                <span style={{ fontWeight: 600 }}>{c["Code List"]}</span>
                <span style={{ marginLeft: "auto", display: "flex", gap: 7, alignItems: "center" }}>
                  {c.Stage !== "Closed" && <Btn small kind="ghost" icon="arrow" onClick={() => advance(c)}>Advance</Btn>}
                  <button onClick={() => setEditing({ ...c })} style={iconBtn}><Icon name="edit" size={15} color={C.muted} /></button>
                </span>
              </div>
              {c.Request && <div style={{ marginTop: 8, fontSize: 13.5, lineHeight: 1.5 }}>{c.Request}</div>}
              <div style={{ display: "flex", flexWrap: "wrap", gap: 18, marginTop: 10, fontSize: 12.5, color: C.muted }}>
                {c.Stakeholders && <span><b style={{ color: C.ink }}>Stakeholders:</b> {c.Stakeholders}</span>}
                {c.Impact && <span><b style={{ color: C.ink }}>Impact:</b> {c.Impact}</span>}
                {c.Decision && <span><b style={{ color: C.ink }}>Decision:</b> {c.Decision}</span>}
                {c["Requested By"] && <span><Icon name="user" size={11} color={C.muted} /> {c["Requested By"]}</span>}
                {c["Requested Date"] && <span><Icon name="clock" size={11} color={C.muted} /> {c["Requested Date"]}</span>}
              </div>
            </div>
          ))}
        </div>
        {editing && <ChangeEditor rec={editing} names={names} onClose={() => setEditing(null)} onSave={save} />}
      </>
    );
  }
  function ChangeEditor({ rec, names, onClose, onSave }) {
    const [d, setD] = useState(rec);
    const set = (k) => (v) => setD((x) => ({ ...x, [k]: v }));
    return (
      <Modal title={rec.__new ? "Log Change Request" : (d["Change ID"] + " \u00B7 " + d.Stage)} onClose={onClose} wide>
        <Row cols="1.4fr 1fr">
          <Field label="Reference Data Set" value={d["Code List"]} onChange={set("Code List")} options={["", ...names]} />
          <Field label="Stage" value={d.Stage} onChange={set("Stage")} options={CHANGE_STAGES} />
        </Row>
        <Section title="1 \u00B7 Receive Change Request">
          <Field label="Request" value={d.Request} onChange={set("Request")} area={2} placeholder="What change is being requested, and why?" />
          <Row cols="1fr 1fr">
            <Field label="Requested By" value={d["Requested By"]} onChange={set("Requested By")} />
            <Field label="Requested Date" value={d["Requested Date"]} onChange={set("Requested Date")} placeholder="YYYY-MM-DD" mono />
          </Row>
        </Section>
        <Section title="2 \u00B7 Identify Stakeholder">
          <Field label="Stakeholders" value={d.Stakeholders} onChange={set("Stakeholders")} area={2} placeholder="Who is affected or must be consulted (owners, downstream systems, consumers)?" />
        </Section>
        <Section title="3 \u00B7 Identify Impact">
          <Field label="Impact" value={d.Impact} onChange={set("Impact")} area={2} placeholder="What is affected \u2014 attributes bound to this set, cross-walks, downstream data?" />
        </Section>
        <Section title="4 \u00B7 Decide & Communicate">
          <Field label="Decision" value={d.Decision} onChange={set("Decision")} area={2} placeholder="The decision taken (approve / reject / defer) and rationale." />
          <Field label="Communication" value={d.Communication} onChange={set("Communication")} area={2} placeholder="How and to whom the decision was communicated." />
        </Section>
        <Section title="5 \u00B7 Update & Inform (if applicable)">
          <Field label="Resolution" value={d.Resolution} onChange={set("Resolution")} area={2} placeholder="What was updated (new version number/date), and confirmation that consumers were informed." />
        </Section>
        <div style={{ display: "flex", gap: 9, justifyContent: "flex-end", marginTop: 6 }}>
          <Btn kind="ghost" onClick={onClose}>Cancel</Btn>
          <Btn kind="primary" icon="check" onClick={() => onSave(d)} disabled={!d["Code List"]}>{rec.__new ? "Log request" : "Save"}</Btn>
        </div>
      </Modal>
    );
  }

  /* ---- Container: binds the views to the live glossary ---- */
  function RefDataManagerView({ glossary, mutate: gmutate, flash, onBack }) {
    const [tab, setTab] = useState("sets");
    const state = {
      codeLists: glossary.codeLists || [],
      crosswalks: glossary.crosswalks || [],
      changes: glossary.rdChanges || [],
      terms: glossary.terms || [],
    };
    const mutate = (fn) => gmutate((g) => {
      if (!g.codeLists) g.codeLists = [];
      if (!g.crosswalks) g.crosswalks = [];
      if (!g.rdChanges) g.rdChanges = [];
      const s = { codeLists: g.codeLists, crosswalks: g.crosswalks, changes: g.rdChanges, terms: g.terms || [] };
      fn(s);
      g.codeLists = s.codeLists; g.crosswalks = s.crosswalks; g.rdChanges = s.changes;
      return g;
    });
    const usage = useMemo(() => {
      const m = {};
      (state.terms || []).forEach((t) => { const cl = norm(t["Code List"]); if (cl) (m[cl] = m[cl] || []).push(t.Term); });
      return m;
    }, [glossary]);
    const counts = {
      sets: state.codeLists.length,
      crosswalks: state.crosswalks.length,
      changes: state.changes.filter((c) => c.Stage && c.Stage !== "Closed").length,
    };
    return (
      <div style={{ minHeight: "100%", background: C.paper, fontFamily: FONT_UI, color: C.ink }}>
        <div style={{ background: C.ink, color: C.paper, padding: "0 28px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 16, height: 64 }}>
            <button onClick={onBack} title="Back to terms" style={{ background: "none", border: "1px solid #33393f", color: C.paper, borderRadius: 8, padding: "6px 11px", cursor: "pointer", display: "inline-flex", alignItems: "center", gap: 6, fontWeight: 600, fontSize: 12.5, fontFamily: FONT_UI }}><Icon name="back" size={15} color={C.paper} />Terms</button>
            <div style={{ width: 34, height: 34, borderRadius: 9, background: C.teal, display: "grid", placeItems: "center" }}><Icon name="database" size={18} color="#fff" /></div>
            <div>
              <div style={{ fontFamily: FONT_DISP, fontSize: 19, fontWeight: 600, lineHeight: 1 }}>Reference Data Manager</div>
              <div style={{ fontSize: 10, color: "#9aa0a6", letterSpacing: 1.4, textTransform: "uppercase", marginTop: 3 }}>Reference &amp; Master Data \u00B7 DMBOK Ch. 10 \u00B7 {glossary.name}</div>
            </div>
          </div>
          <div style={{ display: "flex", gap: 4 }}>
            {[["sets", "Reference Data Sets", "database"], ["crosswalks", "Cross-Walks", "link"], ["changes", "Change Management", "flow"]].map(([id, label, icon]) => (
              <button key={id} onClick={() => setTab(id)} style={{
                display: "flex", alignItems: "center", gap: 8, padding: "11px 16px", border: "none", cursor: "pointer",
                background: "none", color: tab === id ? "#fff" : "#9aa0a6", fontWeight: 600, fontSize: 13, fontFamily: FONT_UI,
                borderBottom: "3px solid " + (tab === id ? C.teal : "transparent"), marginBottom: -1,
              }}>
                <Icon name={icon} size={15} color={tab === id ? C.teal : "#9aa0a6"} />{label}
                <span style={{ fontSize: 11, background: tab === id ? C.teal : "#33393f", color: "#fff", borderRadius: 999, padding: "1px 8px", fontFamily: FONT_MONO }}>{counts[id]}</span>
              </button>
            ))}
          </div>
        </div>
        <div style={{ maxWidth: 1240, margin: "0 auto", padding: "24px 28px 80px" }}>
          {tab === "sets" && <SetsView state={state} mutate={mutate} flash={flash} usage={usage} />}
          {tab === "crosswalks" && <CrosswalksView state={state} mutate={mutate} flash={flash} />}
          {tab === "changes" && <ChangesView state={state} mutate={mutate} flash={flash} />}
        </div>
      </div>
    );
  }

  return RefDataManagerView;
})();
const rootEl = document.getElementById("root");
ReactDOM.createRoot(rootEl).render(<App />);
</script>
</body>
</html>
