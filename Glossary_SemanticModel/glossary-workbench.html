          {(term["Permissible Values"] || "").trim() ? (
            <div style={{ marginTop: 12 }}>
              <div style={{ fontSize: 10.5, fontWeight: 700, color: C.muted, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 6 }}>Permissible Values</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>
                {term["Permissible Values"].split(",").map((v, i) => v.trim() && (
                  <span key={i} style={{ fontFamily: FONT_MONO, fontSize: 12, padding: "3px 10px", borderRadius: 6, background: C.tealSoft, color: C.tealDeep, border: "1px solid #bfe0da" }}>{v.trim()}</span>
                ))}
              </div>
            </div>
          ) : null}
          {/* Reference Data: linked code list */}
          {(() => {
            const clName = String(term["Code List"] || "").trim();
            const enumLike = isEnumerated(term);
            if (clName) {
              const cl = (codeLists || []).find((c) => norm(c.Name) === norm(clName)) || {};
              return (
                <div style={{ marginTop: 12, background: C.tealSoft, border: "1px solid #bfe0da", borderRadius: 10, padding: "10px 14px" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                    <BookMarked size={14} color={C.tealDeep} />
                    <span style={{ fontSize: 10.5, fontWeight: 700, color: C.tealDeep, textTransform: "uppercase", letterSpacing: 0.5 }}>Reference Data — Code List</span>
                  </div>
                  <div style={{ marginTop: 6, fontSize: 13.5, color: C.ink, fontWeight: 600 }}>{clName}</div>
                  {(cl.Standard || cl.Authority || cl.Edition || cl.Concept) && (
                    <div style={{ fontSize: 12, color: C.muted, marginTop: 2 }}>
                      {[cl.Authority, cl.Standard, cl.Edition && ("ed. " + cl.Edition), cl.Concept].filter(Boolean).join(" · ")}
                    </div>
                  )}
                  {cl.Reference ? <a href={cl.Reference} target="_blank" rel="noreferrer" style={{ fontSize: 11.5, color: C.teal }}>{cl.Reference}</a> : null}
                </div>
              );
            }
            if (enumLike) {
              const sug = String(suggestion["Code List"] || "").trim();
              const cl = sug ? ((codeLists || []).find((c) => norm(c.Name) === norm(sug)) || { Name: sug }) : null;
              if (cl) {
                return (
                  <div style={{ marginTop: 12, background: C.amberSoft, border: "1px dashed #d9bd7a", borderRadius: 10, padding: "10px 14px" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                      <BookMarked size={14} color={C.amber} />
                      <span style={{ fontSize: 10.5, fontWeight: 700, color: C.amber, textTransform: "uppercase", letterSpacing: 0.5 }}>Reference Data — Code List (suggested)</span>
                    </div>
                    <div style={{ marginTop: 6, fontSize: 13.5, color: C.ink, fontWeight: 600 }}>{cl.Name}</div>
                    {(cl.Standard || cl.Authority || cl.Edition || cl.Concept) && (
                      <div style={{ fontSize: 12, color: C.muted, marginTop: 2 }}>
                        {[cl.Authority, cl.Standard, cl.Edition && ("ed. " + cl.Edition), cl.Concept].filter(Boolean).join(" · ")}
                      </div>
                    )}
                    {cl.Reference ? <a href={cl.Reference} target="_blank" rel="noreferrer" style={{ fontSize: 11.5, color: C.teal }}>{cl.Reference}</a> : null}
                    <div style={{ marginTop: 8 }}>
                      <Btn small kind="primary" icon={BookMarked} onClick={() => mutate((g) => {
                        const t = g.terms.find((x) => norm(x.Term) === norm(term.Term));
                        if (!t) return;
                        t["Code List"] = cl.Name;
                        if (!String(t.Representation || "").trim() || ["Count", "Quantity"].includes(String(t.Representation).trim())) t.Representation = "Code";
                        if (!String(t.Datatype || "").trim() || ["Integer", "Decimal"].includes(String(t.Datatype).trim())) t.Datatype = "Enumerated";
                        if (t["Term Type"] !== "Attribute") t["Term Type"] = "Business Element";
                        t["Quality Score"] = isoQualityScore(t, g.terms);
                        t["Last Updated"] = today();
                      }).then(() => flash("Bound to " + cl.Name))}>Bind {cl.Name}</Btn>
                    </div>
                  </div>
                );
              }
              return (
                <div style={{ marginTop: 12, fontSize: 12, color: C.red, display: "flex", alignItems: "center", gap: 7 }}>
                  <span style={{ color: C.red, fontWeight: 700, fontSize: 16 }}>*</span>
                  <span><b>Reference Data:</b> this is a coded (enumerated) attribute — bind it to a governed Code List.</span>
                </div>
              );
            }
            return null;
          })()}
          <div style={{ marginTop: 12, fontSize: 12.5, color: nm ? C.green : C.red, display: "flex", alignItems: "center", gap: 7 }}>
            {nm ? <Check size={15} /> : <span style={{ color: C.red, fontWeight: 700, fontSize: 16 }}>*</span>}
            <span><b>Naming (ISO 11179-5):</b> {nm ? "name reads Object Class + Property + Representation." : "name should read Object Class + [Qualifier] Property + Representation term (e.g. \u201cCustomer Account Balance Amount\u201d)."}</span>
          </div>
        </>
      ) : (
        <div style={{ background: C.panel, border: "1px solid " + C.line, borderLeft: "4px solid " + C.teal, borderRadius: 12, padding: "14px 16px" }}>
          {haveSuggestions && (
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12, flexWrap: "wrap" }}>
              <span style={{ fontSize: 12, color: C.muted }}>
                Suggested: <b style={{ fontFamily: FONT_MONO, color: C.ink }}>{suggestion["Object Class"] || "—"}</b> · <b style={{ fontFamily: FONT_MONO, color: C.ink }}>{[suggestion.Qualifier, suggestion.Property].filter(Boolean).join(" ") || "—"}</b> · <b style={{ fontFamily: FONT_MONO, color: C.ink }}>{suggestion.Representation || "—"}</b> · <b style={{ fontFamily: FONT_MONO, color: C.ink }}>{suggestion.Datatype || "—"}</b>
              </span>
              <Btn small kind="ghost" icon={Lightbulb} onClick={applySuggestion}>Use suggestions</Btn>
            </div>
          )}
          <div style={{ fontSize: 11.5, color: C.muted, marginBottom: 6, fontWeight: 700 }}>Data Element Concept</div>
          <div style={{ display: "grid", gridTemplateColumns: "1.3fr 1fr 1fr 1fr", gap: 12, marginBottom: 4 }}>
            <Field label="Object Class (an Entity)" value={d["Object Class"]} onChange={setF("Object Class")} options={entityNames.length ? ["", ...entityNames] : undefined} placeholder={suggestion["Object Class"] || "defined Entity"} />
            <Field label="Qualifier" value={d.Qualifier} onChange={setF("Qualifier")} placeholder={suggestion.Qualifier || "e.g. Opening"} />
            <Field label="Property" value={d.Property} onChange={setF("Property")} placeholder={suggestion.Property || "e.g. Date"} />
            <Field label="Representation" value={d.Representation} onChange={setF("Representation")} options={REPRESENTATION_CLASSES} />
          </div>
          {String(d["Object Class"] || "").trim() && !objectClassIsEntity(d, allTerms) && (
            <div style={{ fontSize: 11.5, color: C.red, display: "flex", alignItems: "center", gap: 6, marginBottom: 10 }}>
              <AlertCircle size={13} /> <span>“{d["Object Class"]}” is not a defined Entity.{entityNames.length ? " Pick one from the list." : " Define the containing Entity first."}</span>
            </div>
          )}
          <div style={{ fontSize: 11.5, color: C.muted, margin: "8px 0 6px", fontWeight: 700 }}>Value Domain</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 12 }}>
            <Field label="Datatype (derived from definition)" value={d.Datatype} onChange={setF("Datatype")} options={DATATYPES} />
            <Field label="Format" value={d.Format} onChange={setF("Format")} placeholder="e.g. YYYY-MM-DD" />
          </div>
          {RANGE_DATATYPES.includes(String(d.Datatype || "").trim()) && (
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 2fr", gap: 12, marginBottom: 12 }}>
              <Field label="Minimum" value={d.Minimum} onChange={setF("Minimum")} placeholder="e.g. 0" />
              <Field label="Maximum" value={d.Maximum} onChange={setF("Maximum")} placeholder="e.g. 1000000" />
              <Field label="Unit of Measure (UCUM — ISO 80000)" value={d["Unit of Measure"]} onChange={setF("Unit of Measure")} options={["", ...UOM_FLAT.map((u) => u.label)]} />
            </div>
          )}
          {isEnumerated(d) && (
            <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: 12, marginBottom: 12, alignItems: "end" }}>
              <Field label="Code List (Reference Data — governed standard)" value={d["Code List"]} onChange={setF("Code List")} options={codeListNames.length ? ["", ...codeListNames] : undefined} placeholder={suggestion["Code List"] || "link a registered code list"} />
              {suggestion["Code List"] && !String(d["Code List"] || "").trim() && (
                <Btn small kind="ghost" icon={BookMarked} onClick={() => setF("Code List")(suggestion["Code List"])}>Use {suggestion["Code List"]}</Btn>
              )}
            </div>
          )}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 12 }}>
            <Field label={isEnumerated(d) ? "Permissible Values (only if no Code List)" : "Permissible Values (comma-separated)"} value={d["Permissible Values"]} onChange={setF("Permissible Values")} placeholder="e.g. Active, Dormant, Closed" />
            <Field label="Value Meanings (optional)" value={d["Value Meanings"]} onChange={setF("Value Meanings")} placeholder="e.g. Active=in use; …" />
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 2fr", gap: 12, alignItems: "end", marginBottom: 14 }}>
            <Field label="Registration Status" value={d["Registration Status"]} onChange={setF("Registration Status")} options={REGISTRATION_STATUS} />
            <div style={{ fontSize: 12, color: nm ? C.green : C.red, display: "flex", alignItems: "center", gap: 6, paddingBottom: 8 }}>
              {nm ? <Check size={14} /> : <span style={{ color: C.red, fontWeight: 700, fontSize: 15 }}>*</span>}
              <span><b>Naming (11179-5):</b> {nm ? "reads Object Class + Property + Representation" : "should read Object Class + [Qualifier] Property + Representation term"}</span>
            </div>
          </div>
          <div style={{ display: "flex", gap: 9, justifyContent: "flex-end" }}>
            <Btn kind="ghost" onClick={() => setEditing(false)}>Cancel</Btn>
            <Btn kind="primary" icon={Check} onClick={save}>Save metadata</Btn>
          </div>
        </div>
      )}
    </div>
  );
}

/* ============================================================
   Hierarchy / taxonomy view — renders a term's is-a lineage as a
   top-down tree (ancestor spine + siblings along it + the term's
   full descendant subtree), rather than the force-directed graph.
   is-a edges come from SPO statements ("is a/is an" predicate \u2192
   Object is the parent), falling back to the Hypernym column.
============================================================ */
const ISA_PRED = /^\s*is\s+an?\b/i;
function isaEdgesFor(glossary) {
  const terms = glossary.terms || [];
  const byNorm = {}, lifeOf = {}, typeOf = {}; terms.forEach((t) => { byNorm[norm(t.Term)] = t.Term; lifeOf[norm(t.Term)] = String(t.Lifecycle || "").trim(); typeOf[norm(t.Term)] = String(t["Term Type"] || "").trim(); });
  const parents = {}, children = {};
  const addEdge = (childName, parentName) => {
    const cn = norm(childName), pn = norm(parentName);
    if (!cn || !pn || cn === pn) return;
    (parents[cn] = parents[cn] || []); if (!parents[cn].some((x) => norm(x) === pn)) parents[cn].push(parentName);
    (children[pn] = children[pn] || []); if (!children[pn].some((x) => norm(x) === cn)) children[pn].push(childName);
  };
  terms.forEach((t) => {
    const sps = termSpos(glossary, t.Term);
    const genus = sps.filter((s) => !isFactSpo(s) && ISA_PRED.test(String(s.Predicate || "")) && String(s.Object || "").trim());
    if (genus.length) genus.forEach((s) => addEdge(t.Term, String(s.Object).trim()));
    else if (String(t.Hypernym || "").trim()) addEdge(t.Term, String(t.Hypernym).trim());
  });
  return { parents, children, byNorm, lifeOf, typeOf };
}
function buildIsaTree(glossary, termName, opts) {
  const { focus = true, depth = 1, hideRetired = true, hideExamples = true } = opts || {};
  const { parents, children, byNorm, lifeOf, typeOf } = isaEdgesFor(glossary);
  const disp = (name) => byNorm[norm(name)] || name;
  const sortKids = (arr) => (arr || []).slice().sort((a, b) => a.localeCompare(b));
  const hidden = (n) => (hideRetired && lifeOf[n] === "Retired") || (hideExamples && String(typeOf[n] || "").toUpperCase() === "FACT");
  // children, lifting non-hidden descendants up through any hidden child
  const visibleChildren = (n, guard) => {
    guard = guard || new Set(); const out = [];
    sortKids(children[n]).forEach((c) => {
      const cn = norm(c);
      if (hidden(cn)) { if (!guard.has(cn)) { guard.add(cn); visibleChildren(cn, guard).forEach((x) => out.push(x)); } }
      else out.push(c);
    });
    return out;
  };
  // first non-hidden ancestor, skipping over hidden ones
  const upParent = (node) => {
    let p = (parents[node] || [])[0], g = 0;
    while (p && hidden(norm(p)) && g++ < 30) p = (parents[norm(p)] || [])[0];
    return p && !hidden(norm(p)) ? p : null;
  };
  const spine = []; let cur = termName; const seen = new Set([norm(termName)]);
  while (true) { const p = upParent(norm(cur)); if (!p || seen.has(norm(p))) break; spine.unshift(p); seen.add(norm(p)); cur = p; }
  const participates = spine.length > 0 || visibleChildren(norm(termName)).length > 0;
  const cap = focus ? (depth === "all" ? 9 : Number(depth)) : 9;
  const buildSub = (name, d, vis) => {
    const n = norm(name); const node = { name: disp(name), norm: n, children: [] };
    if (d >= cap || vis.has(n)) { node.more = visibleChildren(n).length > 0 && d >= cap; return node; }
    vis.add(n);
    visibleChildren(n).forEach((c) => node.children.push(buildSub(c, d + 1, vis)));
    return node;
  };
  let tree = buildSub(termName, 0, new Set());
  for (let i = spine.length - 1; i >= 0; i--) {
    const sp = spine[i]; const spNode = { name: disp(sp), norm: norm(sp), children: [] };
    const contNorm = tree.norm;
    if (focus) { spNode.children.push(tree); }
    else {
      visibleChildren(norm(sp)).forEach((c) => {
        if (norm(c) === contNorm) spNode.children.push(tree);
        else spNode.children.push({ name: disp(c), norm: norm(c), children: [] });
      });
      if (!spNode.children.some((c) => c.norm === contNorm)) spNode.children.unshift(tree);
    }
    tree = spNode;
  }
  return { tree, participates, curNorm: norm(termName), ancSet: new Set(spine.map(norm)), multiParent: (parents[norm(termName)] || []).length > 1 };
}
function TermHierarchy({ glossary, termName, onJump }) {

  const [depth, setDepth] = useState(1);         // descendant levels below the term (focus mode)
  const [scale, setScale] = useState(0.85);      // zoom
  const [hideRetired, setHideRetired] = useState(() => hideRetiredPref());   // remembered
  const [hideExamples, setHideExamples] = useState(() => hideExamplesPref()); // remembered
  const data = useMemo(() => buildIsaTree(glossary, termName, { focus, depth, hideRetired, hideExamples }), [glossary, termName, focus, depth, hideRetired, hideExamples]);
  if (!data.participates) return null;

  const COL = 168 * scale, ROW = 92 * scale, BOXH = 44 * scale;
  const bwBase = (name) => Math.max(96, Math.min(210, name.length * 7.6 + 26));
  const clip = (s, bb) => { const max = Math.floor((bb - 14) / 6.8); return s.length > max ? s.slice(0, Math.max(1, max - 1)) + "\u2026" : s; };

  const place = (node, d) => {
    maxDepth = Math.max(maxDepth, d);

            <label style={ctrlLabel}>

              <span style={{ minWidth: 34, textAlign: "center" }}>{Math.round(scale * 100)}%</span>

            })}
          </svg>
        </div>

            </span>
            <Btn small kind="primary" icon={ArrowRight} onClick={() => onJump(termName)}>Open in {home.gName}</Btn>

/* Version-grouped vertical timeline of a term's lifecycle events.
   Groups history rows by Version (newest first), marks the current version,
   and renders each event as a node on a spine, colour-coded by lifecycle. */
function TermLineage({ hist, currentVersion }) {
  const curV = String(currentVersion == null ? 1 : currentVersion);
  // group by version, preserving chronological order within a version
  const groups = {};
  hist.forEach((h, i) => {
    const v = String(h.Version == null ? 1 : h.Version);
    (groups[v] = groups[v] || []).push({ ...h, _i: i });
  });
  const versions = Object.keys(groups).sort((a, b) => Number(b) - Number(a)); // newest first
  const supersededCount = versions.filter((v) => v !== curV).length;

  return (
    <div style={{ background: C.panel, border: "1px solid " + C.line, borderRadius: 12, padding: "18px 20px 6px" }}>
      <div style={{ fontSize: 12, color: C.muted, marginBottom: 16 }}>
        Version {curV} <span style={{ color: C.green, fontWeight: 700 }}>(current)</span>
        {supersededCount > 0 && <span> · {supersededCount} superseded version{supersededCount === 1 ? "" : "s"} below</span>}
      </div>
      {versions.map((v, vi) => {
        const isCur = v === curV;
        const events = groups[v];
        const lastLife = events[events.length - 1].Lifecycle;
        return (
          <div key={v} style={{ marginBottom: vi === versions.length - 1 ? 4 : 18 }}>
            {/* version band header */}
            <div style={{ display: "flex", alignItems: "center", gap: 9, marginBottom: 10 }}>
              <span style={{
                fontFamily: FONT_MONO, fontSize: 12, fontWeight: 700,
                padding: "2px 9px", borderRadius: 6,
                color: isCur ? C.tealDeep : C.muted,
                background: isCur ? C.tealSoft : "#ece7da",
                border: "1px solid " + (isCur ? C.teal : C.line),
              }}>v{v}</span>
              {isCur
                ? <span style={{ fontSize: 11, fontWeight: 700, color: C.green, textTransform: "uppercase", letterSpacing: 0.6 }}>Current</span>
                : <span style={{ fontSize: 11, fontWeight: 600, color: C.muted, textTransform: "uppercase", letterSpacing: 0.6 }}>Superseded</span>}
              <span style={{ flex: 1, height: 1, background: C.lineSoft }} />
              <LifecycleDot state={lastLife} />
            </div>
            {/* spine + event nodes */}
            <div style={{ position: "relative", paddingLeft: 26, marginLeft: 6 }}>
              <div style={{ position: "absolute", left: 5, top: 4, bottom: 4, width: 2, background: C.lineSoft, borderRadius: 2 }} />
              {events.map((e, ei) => {
                const col = lifeColor(e.Lifecycle);
                return (
                  <div key={ei} style={{ position: "relative", paddingBottom: ei === events.length - 1 ? 4 : 14, opacity: isCur ? 1 : 0.78 }}>
                    <span style={{
                      position: "absolute", left: -25, top: 2, width: 12, height: 12, borderRadius: "50%",
                      background: col, border: "2.5px solid " + C.panel, boxShadow: "0 0 0 1.5px " + col,
                    }} />
                    <div style={{ display: "flex", alignItems: "baseline", gap: 10, flexWrap: "wrap" }}>
                      <span style={{ fontFamily: FONT_MONO, fontSize: 11.5, color: C.muted }}>{e.Date || "—"}</span>
                      <span style={{ fontSize: 12.5, fontWeight: 700, color: col }}>{e.Lifecycle || "Draft"}</span>
                      {e["Changed By"] && <span style={{ fontSize: 11.5, color: C.muted }}>· {e["Changed By"]}</span>}
                    </div>
                    {e.Note && <div style={{ fontSize: 12.5, color: C.ink2, marginTop: 3, lineHeight: 1.45 }}>{e.Note}</div>}
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function SectionTitle({ children, icon: Icon, help, helpTitle, right }) {

function FactExamples({ spos, resolver, onJump }) {

  if (!facts.length) return null;
  const verbalize = (s) => {
    const t = [s.Subject, s.Predicate, s.Object].map((x) => String(x || "").trim()).filter(Boolean).join(" ");
    if (!t) return "";
    let v = t.charAt(0).toUpperCase() + t.slice(1);
    if (!/[.!?]$/.test(v)) v += ".";
    return v;
  };
  const linkBtn = { fontFamily: FONT_MONO, fontSize: 12.5, fontWeight: 600, color: C.teal, background: "none", border: "none", borderBottom: "1px solid " + C.teal, padding: 0, cursor: "pointer" };
  return (
    <div style={{ marginTop: 20 }}>
      <SectionTitle icon={Lightbulb}>Examples (FACT)</SectionTitle>
      <div style={{ fontSize: 12.5, color: C.muted, marginBottom: 10, marginTop: -4 }}>
        Concrete instances that illustrate the term, FCO-IM style &mdash; each a populated SPO triple and its verbalisation.
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {facts.map((s, i) => {
          const canon = resolver[norm(s.Object)];
          return (
            <div key={i} style={{ border: "1px solid " + C.line, borderLeft: "3px solid " + C.amber, borderRadius: 12, background: C.panel, padding: "12px 16px" }}>
              <div style={{ fontFamily: FONT_MONO, fontSize: 12.5, display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
                <b style={{ color: C.ink }}>{s.Subject}</b>
                <span style={{ color: C.muted, fontStyle: "italic" }}>{s.Predicate}</span>
                {canon ? <button onClick={() => onJump(canon)} title={"Go to \"" + canon + "\""} style={linkBtn}>{s.Object}</button> : <b style={{ color: C.ink }}>{s.Object}</b>}
              </div>
              <div style={{ fontFamily: FONT_DISP, fontSize: 15.5, color: C.ink, marginTop: 7 }}>{"\u201C" + verbalize(s) + "\u201D"}</div>
              {s.Note ? <div style={{ fontSize: 12, color: C.muted, marginTop: 5 }}>{s.Note}</div> : null}
            </div>
          );
        })}
      </div>
    </div>
  );
}
function QChip({ v, children, small }) {

function QualityReview({ term, spos, onJumpTerm, l0, onLexicon }) {

  const l1c = { pass: 0, warn: 0, quar: 0 };
  l1Rows.forEach((s) => { const k = qKind(s.Validation); l1c[k === "na" ? "warn" : k]++; });
  const l1overall = l1c.quar ? "QUARANTINE" : l1c.warn ? "PASS+WARN" : l1Rows.length ? "PASS" : "";

  const dimPills = (dims) => <div style={{ display: "flex", gap: 5, flexWrap: "wrap", margin: "4px 0 8px" }}>
    {dims.map(([col]) => { const k = QK[qKind(term[col])]; return <span key={col} title={col + ": " + (term[col] || "\u2014")} style={{ display: "inline-flex", alignItems: "center", gap: 6, background: k.bg, color: k.c, border: "1px solid " + k.ln, borderRadius: 8, padding: "3px 9px", fontSize: 11, fontWeight: 700 }}>{col.replace(/^L\d /, "")}</span>; })}

  const pctLine = (label, v) => { const p = v == null ? null : parseFloat(String(v).replace(/[^0-9.\-]/g, "")); return (p != null && !isNaN(p)) ? <span style={{ fontFamily: FONT_MONO, fontSize: 12, color: C.muted }}>{label} {p}%</span> : null; };

  const levels = [

    { id: "L2", name: "L2 · Collection", overall: lvHas("L2"), present: !!lvHas("L2") },
    { id: "L3", name: "L3 · Prose", overall: lvHas("L3"), present: !!lvHas("L3") },
    { id: "L4", name: "L4 · Domain", overall: lvHas("L4"), present: !!lvHas("L4") },
  ];
  const detail = (id) => {
    if (id === "L0") return <div>
      <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
        <span style={{ fontFamily: FONT_MONO, fontSize: 12, color: C.muted }}>String <b style={{ color: C.ink2 }}>{l0.string}</b> · {l0.id}</span>
        <QChip v={l0.verdict} small />
      </div>
      {l0.info && l0.info.fails.length
        ? <div style={{ marginTop: 8, display: "flex", gap: 5, flexWrap: "wrap" }}>{l0.info.fails.map((fl, i) => <span key={i} style={{ fontFamily: FONT_MONO, fontSize: 11, fontWeight: 700, background: QK.warn.bg, color: QK.warn.c, border: "1px solid " + QK.warn.ln, borderRadius: 8, padding: "2px 8px" }}>{fl}</span>)}</div>
        : <div style={{ fontSize: 12, color: C.muted, marginTop: 8, fontStyle: "italic" }}>All Level-0 lexical checks passed.</div>}

      <div style={{ fontSize: 12, color: C.muted, marginTop: 8 }}>Level-0 is the Semantium lexical gate on the underlying string (the auditor writes it). {onLexicon ? <span onClick={() => onLexicon(l0.string)} style={{ color: C.teal, fontWeight: 700, cursor: "pointer", textDecoration: "underline" }}>Open in the Lexicon →</span> : null}</div>

        <QChip v="PASS" small>{l1c.pass} pass</QChip><QChip v="WARN" small>{l1c.warn} warn</QChip><QChip v="QUARANTINE" small>{l1c.quar} quar</QChip>
        {(() => { let t = 0, m = 0; l1Rows.forEach((s) => { const q = spoScore(s); if (q) { t += q.score; m++; } }); return m ? <span style={{ fontFamily: FONT_MONO, fontSize: 12, color: C.ink2, fontWeight: 700 }}>avg score {Math.round(t / m)}%</span> : null; })()}

  return <div style={{ marginTop: 20 }}>
    <SectionTitle icon={ShieldCheck} right={<a href={validatorLink(term.Term, exp || "")} target="_blank" rel="noreferrer" style={{ fontSize: 11.5, fontWeight: 700, color: C.teal, textDecoration: "none", borderBottom: "1px solid " + C.teal, display: "inline-flex", alignItems: "center", gap: 5 }}><ArrowRight size={13} /> Open in Validator</a>}>Quality Review</SectionTitle>
    <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
      {levels.map((lv) => { const on = exp === lv.id; const k = QK[qKind(lv.overall)]; return (
        <button key={lv.id} onClick={() => lv.present && setExp(on ? "" : lv.id)} disabled={!lv.present}
          style={{ textAlign: "left", border: "1px solid " + (on ? k.c : C.line), background: on ? k.bg : (lv.present ? "#fff" : "#f4f1ea"), borderRadius: 11, padding: "9px 14px", cursor: lv.present ? "pointer" : "default", opacity: lv.present ? 1 : 0.55, minWidth: 132 }}>
          <div style={{ fontSize: 11.5, fontWeight: 700, color: C.ink2, marginBottom: 5 }}>{lv.name}</div>
          {lv.present ? <QChip v={lv.overall} small /> : <span style={{ fontSize: 10.5, color: C.muted, fontStyle: "italic" }}>not validated</span>}
        </button>); })}
    </div>
    {exp && <div style={{ marginTop: 10, border: "1px solid " + C.line, borderLeft: "3px solid " + QK[qKind(levels.find((l) => l.id === exp).overall)].c, borderRadius: 12, background: C.panel, padding: "12px 18px" }}>{detail(exp)}</div>}
  </div>;
}
function SpoTable({ spos, resolver, onJump, selfTerm }) {
  const cellStyle = (rejected) => ({ padding: "10px 13px", fontFamily: FONT_MONO, fontSize: 12.5, fontWeight: 600, textDecoration: rejected ? "line-through" : "none" });
  const linkStyle = { fontFamily: FONT_MONO, fontSize: 12.5, fontWeight: 600 };
  // Sortable columns. Order sorts numerically (by its NN.NN code); the rest case-insensitively.
  const COLS = [
    { h: "Order", key: "Order", num: true, get: (s) => { const m = String(s.Order || "").match(/(\d+(?:\.\d+)?)/); return m ? parseFloat(m[1]) : 0; } },
    { h: "Subject", key: "Subject", get: (s) => String(s.Subject || "").toLowerCase() },
    { h: "Predicate", key: "Predicate", get: (s) => String(s.Predicate || "").toLowerCase() },
    { h: "Object", key: "Object", get: (s) => String(s.Object || "").toLowerCase() },
    { h: "Quality", key: "__score", num: true, get: (s) => { const q = spoScore(s); return q ? q.score : -1; } },
    { h: "Sign-off", key: "Sign-off", get: (s) => String(s["Sign-off"] || "").toLowerCase() },
  ];
  const [sortKey, setSortKey] = useState(null);
  const [sortDir, setSortDir] = useState(1);   // 1 = ascending, -1 = descending
  const onSort = (key) => {
    if (sortKey === key) { if (sortDir === 1) setSortDir(-1); else { setSortKey(null); setSortDir(1); } }  // asc -> desc -> original
    else { setSortKey(key); setSortDir(1); }
  };
  const col = COLS.find((c) => c.key === sortKey);
  const rows = col
    ? spos.map((s, i) => [s, i]).sort((A, B) => {
        const a = col.get(A[0]), b = col.get(B[0]);
        let r = col.num ? (a - b) : String(a).localeCompare(String(b));
        if (r === 0) r = A[1] - B[1];   // stable: fall back to original order
        return r * sortDir;
      }).map((p) => p[0])
    : spos;
  return (
    <div style={{ background: C.panel, border: "1px solid " + C.line, borderRadius: 12, overflow: "hidden" }}>
      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
        <thead><tr style={{ background: "#f1ece0", textAlign: "left" }}>
          {COLS.map((c) => {
            const active = sortKey === c.key;
            return (
              <th key={c.h} onClick={() => onSort(c.key)} title={"Sort by " + c.h}
                style={{ padding: "10px 13px", fontSize: 10.5, color: active ? C.teal : C.muted, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.5, cursor: "pointer", userSelect: "none", whiteSpace: "nowrap" }}>
                <span style={{ display: "inline-flex", alignItems: "center", gap: 4 }}>
                  {c.h}
                  <span style={{ fontSize: 8.5, opacity: active ? 1 : 0.3 }}>{active ? (sortDir === 1 ? "\u25B2" : "\u25BC") : "\u25B5"}</span>
                </span>
              </th>
            );
          })}
        </tr></thead>
        <tbody>
          {rows.length === 0 && <tr><td colSpan={6} style={{ padding: 24, textAlign: "center", color: C.muted }}>No statements.</td></tr>}
          {rows.map((s, i) => {
            const so = s["Sign-off"];
            const color = so === "Accepted" ? C.green : so === "Rejected" ? C.red : C.amber;
            const soft = so === "Accepted" ? C.greenSoft : so === "Rejected" ? C.redSoft : C.amberSoft;
            const rejected = so === "Rejected";
            const src = String(s.Source || "").trim();
            return (
              <React.Fragment key={i}>
              <tr style={{ borderTop: "1px solid " + C.lineSoft, opacity: rejected ? 0.6 : 1 }}>
                <td style={{ padding: "10px 13px", fontFamily: FONT_MONO, fontSize: 11.5, color: C.muted, whiteSpace: "nowrap" }}>{orderLabel(s.Order)}</td>
                <td style={cellStyle(rejected)}>
                  {resolver && onJump && norm(s.Subject) !== norm(selfTerm)
                    ? <EntityLink name={s.Subject} resolver={resolver} onJump={onJump} style={linkStyle} plainStyle={linkStyle} />
                    : s.Subject}
                </td>
                <td style={{ padding: "10px 13px", fontFamily: FONT_MONO, fontSize: 12.5, color: C.teal, fontStyle: "italic" }}>{s.Predicate}</td>
                <td style={cellStyle(rejected)}>
                  {resolver && onJump && norm(s.Object) !== norm(selfTerm)
                    ? <EntityLink name={s.Object} resolver={resolver} onJump={onJump} style={linkStyle} plainStyle={linkStyle} />
                    : s.Object}
                </td>
                <td style={{ padding: "10px 13px" }}>
                  {(() => { const q = spoScore(s); if (!q) return <span style={{ color: C.muted, fontFamily: FONT_MONO, fontSize: 12 }}>{"\u2014"}</span>;
                    const k = QK[qKind(q.overall)];
                    return <span title={`${q.pass}/${q.n} checks pass \u00b7 ${q.warn} warn \u00b7 ${q.quar} quarantine${s["Suggested Fix"] ? " \u2014 " + s["Suggested Fix"] : ""}`}
                      style={{ display: "inline-flex", alignItems: "center", gap: 6, background: k.bg, color: k.c, border: "1px solid " + k.ln, borderRadius: 999, padding: "2px 10px", fontFamily: FONT_MONO, fontSize: 12, fontWeight: 800 }}>{q.score}%</span>;
                  })()}
                </td>
                <td style={{ padding: "10px 13px" }}>
                  <Badge color={color} soft={soft}>{so}</Badge>
                  {s["Signed By"] ? <div style={{ fontSize: 11, color: C.muted, marginTop: 3 }}>{s["Signed By"]}{s["Signed Role"] ? ` · ${s["Signed Role"]}` : ""}{s["Signed Date"] ? ` · ${s["Signed Date"]}` : ""}</div> : null}
                  {s.Note ? <div style={{ fontSize: 11, color: C.muted, marginTop: 3, fontStyle: "italic" }}>{s.Note}</div> : null}
                </td>
              </tr>
              {src ? (
                <tr style={{ opacity: rejected ? 0.6 : 1 }}>
                  <td></td>
                  <td colSpan={5} style={{ padding: "0 13px 10px" }}>
                    <div style={{ display: "flex", gap: 7, alignItems: "flex-start", fontSize: 11, color: C.muted, lineHeight: 1.45 }}>
                      <BookMarked size={12} color={C.teal} strokeWidth={2} style={{ marginTop: 1, flexShrink: 0 }} />
                      <span><span style={{ fontWeight: 700, letterSpacing: 0.4, textTransform: "uppercase", color: C.teal, fontSize: 9.5, marginRight: 6 }}>Source</span>{src}</span>
                    </div>
                  </td>
                </tr>
              ) : null}
              </React.Fragment>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

/* Add a new SPO statement to a term, and rebuild the term's Definition from its SPO triples.
   In the Intralign method the genus ("is a"/"is an") statement leads the definition,
   followed by the differentia (the remaining predicate-object clauses). */
function buildDefinitionFromSpos(termName, spos) {
  const live = (spos || []).filter((s) => !isFactSpo(s) && String(s["Sign-off"]) !== "Rejected" && (s.Predicate || s.Object));
  if (!live.length) return "";
  const isGenus = (p) => /^is an?\b/i.test(String(p || "").trim()) || norm(p) === "is a" || norm(p) === "is an";
  const ordered = live.slice().sort((a, b) => {
    const ag = isGenus(a.Predicate) ? 0 : 1, bg = isGenus(b.Predicate) ? 0 : 1;
    if (ag !== bg) return ag - bg;
    return String(a.Order || "").localeCompare(String(b.Order || ""));
  });
  const genus = ordered.find((s) => isGenus(s.Predicate));
  const clause = (s) => `${String(s.Predicate || "").trim()} ${String(s.Object || "").trim()}`.trim();
  let lead;
  const rest = [];
  if (genus) {
    lead = `${termName} ${clause(genus)}`;
    ordered.forEach((s) => { if (s !== genus) rest.push(clause(s)); });
  } else {
    lead = `${termName} ${clause(ordered[0])}`;
    ordered.slice(1).forEach((s) => rest.push(clause(s)));
  }
  let text = lead;
  if (rest.length) text += " that " + (rest.length === 1 ? rest[0] : rest.slice(0, -1).join(", ") + " and " + rest[rest.length - 1]);
  text = text.replace(/\s+/g, " ").trim();
  if (!/[.!?]$/.test(text)) text += ".";
  return text.charAt(0).toUpperCase() + text.slice(1);
}

function SpoComposer({ glossary, term, termName, spos, mutate, flash }) {
  const lexIdx = useLexGate();
  const [open, setOpen] = useState(false);
  const [subject, setSubject] = useState(termName);
  const [predicate, setPredicate] = useState("");
  const [object, setObject] = useState("");
  const [source, setSource] = useState("");
  const [asFact, setAsFact] = useState(false);   // author this statement as an example (FACT, 09.00 band)
  const [preview, setPreview] = useState(null);   // proposed rebuilt definition awaiting confirm

  const inp = { fontFamily: FONT_UI, fontSize: 13, padding: "8px 10px", borderRadius: 8, border: "1px solid " + C.line, background: "#fff", color: C.ink, outline: "none", boxSizing: "border-box" };

  const nextOrder = () => {
    // pick the next unused ORDERS slot (by numeric code), falling back to a sequential NN.00
    const used = new Set(spos.map((s) => (String(s.Order || "").match(/\d{2}\.\d{2}/) || [])[0]).filter(Boolean));
    const free = ORDERS.find((o) => { const c = (o.match(/\d{2}\.\d{2}/) || [])[0]; return c && !used.has(c); });
    if (free) return free;
    const codes = spos.map((s) => parseInt((String(s.Order || "").match(/\d{2}/) || ["0"])[0], 10)).filter((n) => !isNaN(n));
    const n = (codes.length ? Math.max(...codes) : 0) + 1;
    return String(n).padStart(2, "0") + ".00";
  };

  const addStatement = () => {
    const p = predicate.trim(), o = object.trim(), s = (subject.trim() || termName);
    if (!p || !o) { flash("Add a predicate and an object", "err"); return; }
    mutate((g) => {
      const ids = g.spo.map((x) => parseInt(x["SPO ID"], 10)).filter((n) => !isNaN(n));
      const nextId = (ids.length ? Math.max(...ids) : 0) + 1;
      const t = g.terms.find((x) => norm(x.Term) === norm(termName));
      g.spo.push({
        "SPO ID": nextId, "Term": termName, "Version": t ? t.Version : 1, "Order": asFact ? "09.00 (Fact)" : nextOrder(),
        "Subject": s, "Predicate": p, "Object": o, "Decision": "", "Comment": "",
        "Sign-off": "Pending", "Signed By": "", "Signed Role": "", "Signed Date": "", "Note": "", "Source": source.trim(),
      });
      return g;
    }).then(() => { setPredicate(""); setObject(""); setSource(""); setSubject(termName); setAsFact(false); flash(asFact ? "Example (FACT) added (Pending sign-off)" : "Statement added (Pending sign-off)"); });
  };

  const proposeRebuild = () => {
    const after = spos.slice();
    setPreview(buildDefinitionFromSpos(termName, after));
  };
  const confirmRebuild = () => {
    const text = preview;
    mutate((g) => {
      const t = g.terms.find((x) => norm(x.Term) === norm(termName));
      if (!t) return g;
      g.history.push({ "Term": t.Term, "Version": t.Version, "Lifecycle": t.Lifecycle, "Definition": t.Definition || "", "Date": today(), "Changed By": "", "Note": "Definition rebuilt from SPO statements" });
      t.Definition = text; t["Last Updated"] = today();
      return g;
    }).then(() => { setPreview(null); flash("Definition rebuilt from SPO statements"); });
  };

  return (
    <div style={{ marginTop: 10 }}>
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
        {!open && <Btn small kind="ghost" icon={Plus} onClick={() => setOpen(true)}>Add statement</Btn>}
        <Btn small kind="ghost" icon={BookMarked} onClick={proposeRebuild} title="Recompose the Definition from this term's SPO triples — genus ('is a') first, then the differentia.">Rebuild definition from SPO</Btn>
      </div>

      {open && (
        <div style={{ marginTop: 10, background: C.panel, border: "1px solid " + C.line, borderRadius: 12, padding: 14 }}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
            <div>
              <div style={{ fontSize: 10.5, fontWeight: 700, color: C.muted, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 4 }}>Subject</div>
              <input value={subject} onChange={(e) => setSubject(e.target.value)} placeholder={termName} style={{ ...inp, width: "100%" }} />
              {lexIdx && <div><GateChip result={lexGate(lexIdx, subject || termName, "Subject")} /></div>}
            </div>
            <div>
              <div style={{ fontSize: 10.5, fontWeight: 700, color: C.muted, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 4 }}>Predicate</div>
              <input value={predicate} onChange={(e) => setPredicate(e.target.value)} placeholder="e.g. is a / has / is governed by"
                list="spo-predicate-suggestions" style={{ ...inp, width: "100%" }} />
              <datalist id="spo-predicate-suggestions">
                {["is a", "is an", "has", "is part of", "is governed by", "is performed by", "produces", "uses", "is classified by", "is identified by"].map((p) => <option key={p} value={p} />)}
              </datalist>
              {lexIdx && <div><GateChip result={lexGate(lexIdx, predicate, "Predicate")} /></div>}
            </div>
            <div>
              <div style={{ fontSize: 10.5, fontWeight: 700, color: C.muted, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 4 }}>Object</div>
              <input value={object} onChange={(e) => setObject(e.target.value)} placeholder="e.g. Legal Entity"
                onKeyDown={(e) => { if (e.key === "Enter") addStatement(); }} style={{ ...inp, width: "100%" }} />
              {lexIdx && <div><GateChip result={lexGate(lexIdx, object, "Object")} /></div>}
            </div>
          </div>
          <div style={{ marginTop: 8 }}>
            <div style={{ fontSize: 10.5, fontWeight: 700, color: C.muted, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 4 }}>Source <span style={{ fontWeight: 400, textTransform: "none", letterSpacing: 0 }}>(optional — where this statement comes from)</span></div>
            <input value={source} onChange={(e) => setSource(e.target.value)} placeholder="e.g. DMBOK2 Ch.1 §2.2"
              onKeyDown={(e) => { if (e.key === "Enter") addStatement(); }} style={{ ...inp, width: "100%" }} />
          </div>
          <div style={{ display: "flex", gap: 8, marginTop: 10, alignItems: "center", flexWrap: "wrap" }}>
            <Btn small kind="primary" icon={Check} onClick={addStatement}>{asFact ? "Add example" : "Add statement"}</Btn>
            <Btn small kind="ghost" onClick={() => { setOpen(false); setPredicate(""); setObject(""); setSource(""); setAsFact(false); }}>Done</Btn>
            <label style={{ display: "inline-flex", alignItems: "center", gap: 7, cursor: "pointer", fontSize: 12.5, color: C.ink2, marginLeft: 6 }}>
              <input type="checkbox" checked={asFact} onChange={(e) => setAsFact(e.target.checked)} style={{ accentColor: C.amber, width: 14, height: 14 }} />
              Add as example (FACT)
            </label>
            {asFact && <span style={{ fontSize: 11.5, color: C.muted }}>Subject = the instance (e.g. Modelware), Object = {termName}</span>}
          </div>
        </div>
      )}

      {preview !== null && (
        <div style={{ marginTop: 10, background: C.tealSoft, border: "1px solid #bfe0da", borderRadius: 12, padding: 14 }}>
          <div style={{ fontSize: 10.5, fontWeight: 700, color: C.tealDeep, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 6 }}>Proposed definition (from SPO)</div>
          {preview ? (
            <div style={{ fontSize: 14, color: C.ink, lineHeight: 1.6 }}>{preview}</div>
          ) : (
            <div style={{ fontSize: 13, color: C.muted }}>No statements to build from — add at least one SPO statement (ideally an “is a” genus) first.</div>
          )}
          <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
            {preview && <Btn small kind="primary" icon={Check} onClick={confirmRebuild}>Replace definition</Btn>}
            <Btn small kind="ghost" onClick={() => setPreview(null)}>Cancel</Btn>
          </div>
          {term.Definition ? <div style={{ fontSize: 11.5, color: C.muted, marginTop: 10 }}>Current: {term.Definition}</div> : null}
        </div>
      )}
    </div>
  );
}

/* ============================================================
   Sign-off worklist — the SME works through every term, signs off
   (accepts) or rejects its statements, resolves open decision notes,
   and can jump to a term for clarification. Progress is computed live
   from the per-statement sign-off state + open decision notes.
============================================================ */
function signoffRowFor(glossary, t) {
  const term = t.Term;
  const spos = termSpos(glossary, term);
  const dec = (s) => String(s.Decision || "");
  const so = (s) => String(s["Sign-off"] || "");
  const live = spos.length;
  const accept = spos.filter((s) => dec(s) === "Accept" || so(s) === "Accepted").length;
  const reject = spos.filter((s) => dec(s) === "Reject" || so(s) === "Rejected").length;
  const amend = spos.filter((s) => dec(s) === "Amend").length;
  const decided = spos.filter((s) => DECISIONS.includes(dec(s)) || so(s) === "Accepted" || so(s) === "Rejected").length;
  const awaiting = Math.max(0, live - decided);
  const signedAccepted = spos.filter((s) => so(s) === "Accepted").length;
  const openNotes = (glossary.notes || []).filter((n) => norm(n.Term) === norm(term)
    && !["Accepted as-is", "Override"].includes(String(n.Resolution || "").trim())).length;
  const life = t.Lifecycle || "Draft";
  const progress = live ? Math.round((decided / live) * 100) : (life === "Approved" ? 100 : 0);
  let next;
  if (life === "Approved") next = "Signed off";
  else if (live === 0) next = "No statements";
  else if (awaiting > 0) next = "Review " + awaiting + " statement" + (awaiting === 1 ? "" : "s");
  else if (openNotes > 0) next = "Resolve " + openNotes + " note" + (openNotes === 1 ? "" : "s");
  else next = "Ready to approve";
  return { id: t["Glossary ID"] || "", term, area: t["Subject Area"] || "", version: t.Version, life, live, accept, reject, amend, awaiting, signedAccepted, openNotes, decided, progress, next };
}

function signoffAwaitingCount(glossary) {
  if (!glossary) return 0;
  return (glossary.terms || []).reduce((n, t) => {
    const r = signoffRowFor(glossary, t);
    return n + ((r.life !== "Approved" && r.awaiting > 0) ? 1 : 0);
  }, 0);
}

function SignOffView({ glossary, onReview, onOpenTerm }) {
  const [q, setQ] = useState("");
  const [filter, setFilter] = useState("awaiting");
  const rows = useMemo(() => (glossary.terms || []).map((t) => signoffRowFor(glossary, t)), [glossary]);
  const totals = useMemo(() => {
    const approved = rows.filter((r) => r.life === "Approved").length;
    const awaiting = rows.filter((r) => r.life !== "Approved" && r.awaiting > 0).length;
    const ready = rows.filter((r) => r.life !== "Approved" && r.live > 0 && r.awaiting === 0).length;
    const totLive = rows.reduce((a, r) => a + r.live, 0), totDec = rows.reduce((a, r) => a + r.decided, 0);
    return { total: rows.length, approved, awaiting, ready, overall: totLive ? Math.round(totDec / totLive * 100) : 0 };
  }, [rows]);
  const match = (r) => {
    if (filter === "awaiting" && !(r.life !== "Approved" && r.awaiting > 0)) return false;
    if (filter === "ready" && !(r.life !== "Approved" && r.live > 0 && r.awaiting === 0)) return false;
    if (filter === "approved" && r.life !== "Approved") return false;
    if (q) { const hay = (r.term + " " + r.area + " " + r.next).toLowerCase(); if (!hay.includes(q.toLowerCase())) return false; }
    return true;
  };
  const shown = rows.filter(match).sort((a, b) => (b.awaiting - a.awaiting) || a.term.localeCompare(b.term));
  const FILTERS = [["awaiting", "Awaiting sign-off", totals.awaiting], ["ready", "Ready to approve", totals.ready], ["approved", "Signed off", totals.approved], ["all", "All terms", totals.total]];

  const Stat = ({ n, l, color }) => (
    <div style={{ flex: 1, minWidth: 120, background: C.panel, border: "1px solid " + C.line, borderRadius: 12, padding: "13px 16px" }}>
      <div style={{ fontFamily: FONT_DISP, fontSize: 26, fontWeight: 600, color: color || C.ink }}>{n}</div>
      <div style={{ fontSize: 12, color: C.muted, marginTop: 2 }}>{l}</div>
    </div>
  );

  return (
    <div style={{ padding: "30px 32px 60px" }} className="rise">
      <div style={{ marginBottom: 18 }}>
        <div style={{ fontFamily: FONT_MONO, fontSize: 12, color: C.teal, letterSpacing: 1.5, textTransform: "uppercase" }}>Sign-off</div>
        <h1 style={{ fontFamily: FONT_DISP, fontSize: 32, fontWeight: 600, margin: "4px 0 0" }}>Sign-off progress</h1>
        <div style={{ fontSize: 13.5, color: C.muted, marginTop: 4, maxWidth: 720 }}>Work through each term, accept or reject its statements, and resolve any open decision notes. Open a term first if you need to see its full definition for clarification.</div>
      </div>

      <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 16 }}>
        <Stat n={totals.awaiting} l="Awaiting sign-off" color={C.amber} />
        <Stat n={totals.ready} l="Ready to approve" color={C.teal} />
        <Stat n={totals.approved} l="Signed off" color={C.green} />
        <Stat n={totals.overall + "%"} l="Statements decided" />
      </div>

      <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap", marginBottom: 14 }}>
        {FILTERS.map(([k, label, n]) => (
          <button key={k} onClick={() => setFilter(k)} style={{
            display: "inline-flex", alignItems: "center", gap: 7, padding: "6px 12px", borderRadius: 999, cursor: "pointer",
            border: "1px solid " + (filter === k ? C.tealDeep : C.line), background: filter === k ? C.teal : "#fff",
            color: filter === k ? "#fff" : C.ink2, fontFamily: FONT_UI, fontWeight: 600, fontSize: 12.5,
          }}>{label}<span style={{ fontSize: 11, opacity: 0.85, background: filter === k ? "rgba(255,255,255,.25)" : C.lineSoft, borderRadius: 999, padding: "1px 7px" }}>{n}</span></button>
        ))}
        <div style={{ position: "relative", marginLeft: "auto" }}>
          <Search size={14} strokeWidth={2.4} style={{ position: "absolute", left: 10, top: "50%", transform: "translateY(-50%)", color: C.muted, pointerEvents: "none" }} />
          <input value={q} onChange={(e) => setQ(e.target.value)} placeholder={"Find a term\u2026"} style={{ padding: "8px 12px 8px 30px", borderRadius: 9, border: "1px solid " + C.line, background: "#fff", fontFamily: FONT_UI, fontSize: 13, width: 220, outline: "none" }} />
        </div>
      </div>

      <div style={{ background: C.panel, border: "1px solid " + C.line, borderRadius: 14, overflow: "hidden" }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
          <thead><tr style={{ background: "#f1ece0", textAlign: "left" }}>
            {[["Term", "left"], ["Lifecycle", "left"], ["Live", "center"], ["Acc", "center"], ["Rej", "center"], ["Amend", "center"], ["Await", "center"], ["Notes", "center"], ["Progress", "left"], ["Next action", "left"], ["", "right"]].map(([h, al], i) => (
              <th key={i} style={{ padding: "11px 12px", fontSize: 10.5, fontWeight: 700, color: C.muted, textTransform: "uppercase", letterSpacing: 0.5, textAlign: al, whiteSpace: "nowrap", borderBottom: "1px solid " + C.line }}>{h}</th>
            ))}
          </tr></thead>
          <tbody>
            {shown.length === 0 && <tr><td colSpan={11} style={{ padding: 30, textAlign: "center", color: C.muted }}>Nothing here — try another filter.</td></tr>}
            {shown.map((r, i) => {
              const cell = { padding: "10px 12px", textAlign: "center", fontFamily: FONT_MONO, fontSize: 12.5 };
              return (
                <tr key={r.term + i} style={{ borderBottom: "1px solid " + C.lineSoft }}>
                  <td style={{ padding: "10px 12px" }}>
                    <div style={{ fontWeight: 600, color: C.ink }}>{r.term}</div>
                    <div style={{ fontSize: 11, color: C.muted }}>{r.id ? r.id + " \u00B7 " : ""}{r.area}</div>
                  </td>
                  <td style={{ padding: "10px 12px" }}><LifecycleDot state={r.life} /></td>
                  <td style={cell}>{r.live}</td>
                  <td style={{ ...cell, color: r.accept ? C.green : "#c3bcab" }}>{r.accept || "\u2014"}</td>
                  <td style={{ ...cell, color: r.reject ? C.red : "#c3bcab" }}>{r.reject || "\u2014"}</td>
                  <td style={{ ...cell, color: r.amend ? C.amber : "#c3bcab" }}>{r.amend || "\u2014"}</td>
                  <td style={{ ...cell, fontWeight: 700, color: r.awaiting ? C.amber : "#c3bcab" }}>{r.awaiting || "\u2014"}</td>
                  <td style={{ ...cell, color: r.openNotes ? C.amber : "#c3bcab" }}>{r.openNotes || "\u2014"}</td>
                  <td style={{ padding: "10px 12px", minWidth: 130 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <div style={{ flex: 1, height: 7, background: C.lineSoft, borderRadius: 999, overflow: "hidden", minWidth: 56 }}>
                        <div style={{ width: r.progress + "%", height: "100%", background: r.life === "Approved" ? C.green : r.progress === 100 ? C.teal : C.amber }} />
                      </div>
                      <span style={{ fontFamily: FONT_MONO, fontSize: 11, color: C.muted, width: 32 }}>{r.progress}%</span>
                    </div>
                  </td>
                  <td style={{ padding: "10px 12px", fontSize: 12.5, color: r.life === "Approved" ? C.green : C.ink2, whiteSpace: "nowrap" }}>{r.next}</td>

                    <div style={{ display: "inline-flex", gap: 6 }}>
                      <Btn small kind="ghost" onClick={() => onOpenTerm(r.term)} title="Open the term to read its full definition for clarification">Open</Btn>
                      {r.life === "Approved"
                        ? <Btn small kind="ghost" icon={Check} onClick={() => onReview(r.term)} title="Re-open sign-off">Re-review</Btn>
                        : <Btn small kind="amber" icon={ClipboardCheck} onClick={() => onReview(r.term)}>Sign off</Btn>}
                    </div>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}


function ReviewView({ glossary, termName: rawTermName, onBack, onJump, mutate, flash, corpus }) {
  const term = findTerm(glossary.terms, rawTermName);
  const termName = term ? term.Term : rawTermName;   // resolve aliases → canonical
  const resolver = useMemo(() => corpusKnownMap(corpus, glossary.terms), [corpus, glossary.terms]);
  const spos = termSpos(glossary, termName);
  const [signer, setSigner] = useState(term?.["Steward (BDS)"] || term?.Owner || "");
  const [role, setRole] = useState("Steward");
  const [draft, setDraft] = useState(() => {
    const d = {};
    spos.forEach((s) => { d[s["SPO ID"]] = { decision: s.Decision || "", comment: s.Comment || "", by: s["Signed By"] || "", role: s["Signed Role"] || "" }; });
    return d;
  });

  if (!term) return <div style={{ padding: 40 }}>Term not found.</div>;

  const setDecision = (id, decision) => setDraft((d) => ({ ...d, [id]: { ...d[id], decision } }));
  const setComment = (id, comment) => setDraft((d) => ({ ...d, [id]: { ...d[id], comment } }));
  const setRowBy = (id, by) => setDraft((d) => ({ ...d, [id]: { ...d[id], by } }));
  const setRowRole = (id, r) => setDraft((d) => ({ ...d, [id]: { ...d[id], role: r } }));
  const setAll = (decision) => setDraft((d) => { const n = { ...d }; spos.forEach((s) => (n[s["SPO ID"]] = { ...n[s["SPO ID"]], decision })); return n; });

  const decidedCount = spos.filter((s) => DECISIONS.includes(draft[s["SPO ID"]]?.decision)).length;
  const allDecided = decidedCount === spos.length && spos.length > 0;
  const anyAmend = spos.some((s) => draft[s["SPO ID"]]?.decision === "Amend");

  /* write decisions back into the glossary (collect) */
  const apply = (promote) => mutate((g) => {
    if (!Array.isArray(g.spo)) g.spo = [];
    const v = currentVersion(g, termName);
    g.spo.forEach((s) => {
      if (norm(s.Term) !== norm(termName) || String(s.Version) !== String(v)) return;
      const d = draft[s["SPO ID"]];
      if (d && DECISIONS.includes(d.decision)) {
        s.Decision = d.decision;
        s.Comment = d.comment || "";
        s["Sign-off"] = DECISION_TO_SIGNOFF[d.decision];
        s["Signed By"] = d.by || signer || "";
        s["Signed Role"] = d.role || role || "";
        s["Signed Date"] = today();
        if (d.comment && !s.Note) s.Note = d.comment;
      }
    });
    if (promote) {
      const t = g.terms.find((x) => norm(x.Term) === norm(termName));
      if (t) {
        t.Lifecycle = "Approved";
        if (!t["Effective Date"]) t["Effective Date"] = today();
        t["Last Updated"] = today();
        if (!Array.isArray(g.history)) g.history = [];
        // rebuild definition from accepted triples if definition empty
        g.history.push({ "Term": t.Term, "Version": v, "Lifecycle": "Approved", "Definition": t.Definition, "Date": today(), "Changed By": signer, "Note": "Promoted to Approved (Effective " + today() + ")" });
      }
    }
  }).then(() => flash(promote
    ? "Approved \u2014 " + decidedCount + "/" + spos.length + " statements signed off by " + (signer || "\u2014") + " \u00B7 Effective " + today()
    : decidedCount + " decision" + (decidedCount === 1 ? "" : "s") + " saved"));

  // Jumping to another term mid-review: persist any decisions already marked, then navigate,
  // so the reviewer never loses work just because they wanted to understand a referenced term.
  const safeJump = (target) => {
    const anyMarked = spos.some((s) => DECISIONS.includes(draft[s["SPO ID"]]?.decision));
    const go = () => onJump(target);
    if (anyMarked) apply(false).then(go); else go();
  };

  return (
    <div style={{ padding: "26px 32px 80px" }} className="rise">
      <button onClick={onBack} style={{ ...navlink, display: "inline-flex", alignItems: "center", gap: 5, marginBottom: 14 }}><ChevronLeft size={16} /> Back to term</button>

      <div style={{ display: "flex", alignItems: "flex-end", gap: 16, flexWrap: "wrap", marginBottom: 20 }}>
        <div>
          <div style={{ fontFamily: FONT_MONO, fontSize: 12, color: C.amber, letterSpacing: 1.5, textTransform: "uppercase" }}>SME Sign-off</div>
          <h1 style={{ fontFamily: FONT_DISP, fontSize: 34, fontWeight: 600, margin: "4px 0 0" }}>{term.Term}</h1>
        </div>
        <div style={{ marginLeft: "auto", display: "flex", gap: 12, flexWrap: "wrap" }}>
          <div style={{ minWidth: 200 }}>
            <Field label="Reviewer name" value={signer} onChange={setSigner} placeholder="Your name" />
          </div>
          <div style={{ minWidth: 150 }}>
            <Field label="Your role" value={role} onChange={setRole} options={ROLES} />
          </div>
        </div>
      </div>

      <div style={{ fontSize: 12, color: C.muted, marginBottom: 12, marginTop: -6 }}>
        Your name and role pre-fill each decision below — change them on any individual statement if a different person signed it off.
      </div>

      <div style={{ background: "#fff", border: "1px solid " + C.line, borderRadius: 12, padding: "13px 16px", marginBottom: 16, display: "flex", alignItems: "center", gap: 14, flexWrap: "wrap" }}>
        <div style={{ fontSize: 13.5, color: C.ink2 }}>
          Mark each statement, then apply. <b>{decidedCount}/{spos.length}</b> decided.
        </div>
        <div style={{ marginLeft: "auto", display: "flex", gap: 8 }}>
          <Btn small kind="ghost" icon={Check} onClick={() => setAll("Accept")}>Accept all</Btn>
          <Btn small kind="ghost" onClick={() => setAll("")}>Clear</Btn>
        </div>
      </div>

      {/* statement cards */}
      <div style={{ display: "grid", gap: 11 }}>
        {spos.map((s) => {
          const d = draft[s["SPO ID"]] || {};
          return (
            <div key={s["SPO ID"]} style={{
              background: C.panel, border: "1px solid " + (d.decision ? decoColor(d.decision) : C.line),
              borderLeft: "4px solid " + (d.decision ? decoColor(d.decision) : C.line), borderRadius: 12, padding: "14px 16px",
            }}>
              <div style={{ display: "flex", alignItems: "center", gap: 14, flexWrap: "wrap" }}>
                <Badge mono soft="#ece7da" color={C.muted}>{orderLabel(s.Order)}</Badge>
                <div style={{ fontFamily: FONT_MONO, fontSize: 14.5, flex: 1, minWidth: 240 }}>
                  {onJump && norm(s.Subject) !== norm(termName)
                    ? <EntityLink name={s.Subject} resolver={resolver} onJump={safeJump} style={{ fontWeight: 700 }} plainStyle={{ fontWeight: 700 }} />
                    : <b>{s.Subject}</b>}
                  {" "}<span style={{ color: C.teal, fontStyle: "italic" }}>{s.Predicate}</span>{" "}
                  {onJump && norm(s.Object) !== norm(termName)
                    ? <EntityLink name={s.Object} resolver={resolver} onJump={safeJump} style={{ fontWeight: 700 }} plainStyle={{ fontWeight: 700 }} />
                    : <b>{s.Object}</b>}
                </div>
                <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                  <select value={d.decision || ""} onChange={(e) => setDecision(s["SPO ID"], e.target.value)}
                    style={{
                      padding: "7px 12px", borderRadius: 8, cursor: "pointer", fontFamily: FONT_UI, fontWeight: 700, fontSize: 13,
                      border: "1px solid " + (d.decision ? decoColor(d.decision) : C.line),
                      background: d.decision ? decoColor(d.decision) : "#fff", color: d.decision ? "#fff" : C.ink2,
                      minWidth: 120, outline: "none",
                    }}>
                    <option value="">Decide…</option>
                    {DECISIONS.map((dec) => <option key={dec} value={dec}>{dec}</option>)}
                  </select>
                </div>
              </div>
              {d.decision ? (
                <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginTop: 11, alignItems: "flex-end" }}>
                  <div style={{ minWidth: 180, flex: 1 }}>
                    <div style={{ fontSize: 10.5, fontWeight: 700, color: C.muted, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 4 }}>Signed by</div>
                    <input value={d.by ?? ""} onChange={(e) => setRowBy(s["SPO ID"], e.target.value)} placeholder={signer || "name"}
                      style={{ ...cellInput, fontFamily: FONT_UI }} />
                  </div>
                  <div style={{ minWidth: 130 }}>
                    <div style={{ fontSize: 10.5, fontWeight: 700, color: C.muted, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 4 }}>Role</div>
                    <select value={d.role || ""} onChange={(e) => setRowRole(s["SPO ID"], e.target.value)}
                      style={{ ...cellInput, fontFamily: FONT_UI }}>
                      <option value="">{role || "role"}</option>
                      {ROLES.map((r) => <option key={r} value={r}>{r}</option>)}
                    </select>
                  </div>
                  {(d.decision === "Reject" || d.decision === "Amend") && (
                    <div style={{ minWidth: 220, flex: 2 }}>
                      <div style={{ fontSize: 10.5, fontWeight: 700, color: C.muted, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 4 }}>{d.decision === "Amend" ? "What should change?" : "Reason"}</div>
                      <input value={d.comment || ""} onChange={(e) => setComment(s["SPO ID"], e.target.value)}
                        placeholder={d.decision === "Amend" ? "kept as audit note" : "kept as audit note"}
                        style={{ ...cellInput, fontFamily: FONT_UI }} />
                    </div>
                  )}
                </div>
              ) : null}
            </div>
          );
        })}
      </div>

      {/* apply bar */}
      <div style={{ position: "sticky", bottom: 0, marginTop: 20, background: "linear-gradient(180deg,transparent,#f3efe6 40%)", paddingTop: 20 }}>
        <div style={{ background: C.ink, color: C.paper, borderRadius: 14, padding: "16px 20px", display: "flex", alignItems: "center", gap: 16, flexWrap: "wrap" }}>
          <ShieldCheck size={22} color={allDecided ? "#7fd0a0" : "#c9a23f"} />
          <div style={{ fontSize: 13.5, lineHeight: 1.5 }}>
            {allDecided
              ? <>All statements decided. Recording sign-off as <b>{signer || "— add a name"}</b>.{anyAmend && <span style={{ color: "#e6c463" }}> Amend rows are marked Rejected — revise their wording for a new version.</span>}</>
              : <>Decide every statement to enable approval. Rejected/Amended statements are excluded from the final definition.</>}
          </div>
          <div style={{ marginLeft: "auto", display: "flex", gap: 9 }}>
            <Btn kind="ghost" onClick={() => apply(false)} disabled={decidedCount === 0}>Save decisions</Btn>
            <Btn kind="accept" icon={ShieldCheck} disabled={!allDecided} onClick={() => apply(true).then(() => onBack && onBack())}>Apply &amp; Approve</Btn>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   Cross-glossary force-directed graph (native port of the standalone
   site's D3 graph, using the same hand-rolled simulation as GraphView so
   the workbench keeps zero extra runtime dependencies). Nodes are every
   term across all loaded glossaries; an edge means one term's definition
   references another. Colour = glossary, size = how connected a term is.
============================================================ */
function ModelGraph({ an, ghex, short, glossaries, onOpen }) {
  const { nodes, links, nodeIndex } = useMemo(() => {
    const ns = (an.graph.nodes || []).map((n) => ({ ...n }));
    const idx = {}; ns.forEach((n, i) => { idx[n.id] = i; });
    const ls = (an.graph.links || []).filter((l) => idx[l.source] != null && idx[l.target] != null);
    return { nodes: ns, links: ls, nodeIndex: idx };
  }, [an]);

  const [hover, setHover] = useState(null);   // id
  const [sel, setSel] = useState(null);        // id (sticky)
  const [q, setQ] = useState("");
  const [showPred, setShowPred] = useState(true);   // show the predicate label on each edge
  const [, setTick] = useState(0);
  const posRef = useRef(null);
  const scopeRef = useRef(null);
  const dragRef = useRef(null);
  const svgRef = useRef(null);
  const W = 1000, H = 620;

  // adjacency for highlight
  const adj = useMemo(() => {
    const a = {}; links.forEach((l) => { (a[l.source] = a[l.source] || new Set()).add(l.target); (a[l.target] = a[l.target] || new Set()).add(l.source); }); return a;
  }, [links]);

  // (re)seed positions when the node set changes
  const scopeKey = nodes.length + ":" + links.length;
  if (!posRef.current || scopeRef.current !== scopeKey) {
    scopeRef.current = scopeKey;
    const n = nodes.length;
    posRef.current = nodes.map((nd, i) => { const a = (i / Math.max(1, n)) * Math.PI * 2; const rad = 150 + (i % 7) * 22; return { x: W / 2 + Math.cos(a) * rad, y: H / 2 + Math.sin(a) * rad, vx: 0, vy: 0 }; });
  }

  useEffect(() => {
    const pairs = links.map((e) => [nodeIndex[e.source], nodeIndex[e.target]]).filter(([a, b]) => a != null && b != null);
    const N = nodes.length;
    const big = N > 260;                       // throttle the O(N^2) pass on large estates
    const maxFrames = big ? 170 : 260;
    const rep = big ? 4200 : 6000;
    let frame = 0, raf;
    const step = () => {
      const p = posRef.current;
      for (let i = 0; i < N; i++) {
        for (let j = i + 1; j < N; j++) {
          let dx = p[i].x - p[j].x, dy = p[i].y - p[j].y;
          let d2 = dx * dx + dy * dy + 0.01; let d = Math.sqrt(d2);
          const f = rep / d2; const fx = (dx / d) * f, fy = (dy / d) * f;
          p[i].vx += fx; p[i].vy += fy; p[j].vx -= fx; p[j].vy -= fy;
        }
      }
      pairs.forEach(([a, b]) => {
        let dx = p[b].x - p[a].x, dy = p[b].y - p[a].y; let d = Math.sqrt(dx * dx + dy * dy) + 0.01;
        const k = (d - 120) * 0.02; const fx = (dx / d) * k, fy = (dy / d) * k;
        p[a].vx += fx; p[a].vy += fy; p[b].vx -= fx; p[b].vy -= fy;
      });
      for (let i = 0; i < N; i++) {
        p[i].vx += (W / 2 - p[i].x) * 0.004; p[i].vy += (H / 2 - p[i].y) * 0.004;
        p[i].vx *= 0.85; p[i].vy *= 0.85;
        if (dragRef.current !== i) { p[i].x += p[i].vx; p[i].y += p[i].vy; }
        p[i].x = Math.max(30, Math.min(W - 30, p[i].x)); p[i].y = Math.max(28, Math.min(H - 28, p[i].y));
      }
      setTick((t) => t + 1);
      frame++; if (frame < maxFrames) raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, [scopeKey]);   // eslint-disable-line

  const pos = posRef.current;
  const ql = q.trim().toLowerCase();
  const focus = hover || sel;
  const lit = focus ? new Set([focus, ...(adj[focus] || [])]) : null;
  const matched = ql ? new Set(nodes.filter((n) => n.id.toLowerCase().includes(ql)).map((n) => n.id)) : null;

  const toSvg = (evt) => { const r = svgRef.current.getBoundingClientRect(); return { x: (evt.clientX - r.left) / r.width * W, y: (evt.clientY - r.top) / r.height * H }; };
  const onMove = (e) => { if (dragRef.current == null || !pos[dragRef.current]) return; const m = toSvg(e); pos[dragRef.current].x = m.x; pos[dragRef.current].y = m.y; pos[dragRef.current].vx = 0; pos[dragRef.current].vy = 0; setTick((t) => t + 1); };
  const onUp = () => { dragRef.current = null; };

  if (!nodes.length) return <div style={{ color: C.muted, fontSize: 14, padding: 24 }}>No terms loaded yet.</div>;

  return (
    <div>
      <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap", marginBottom: 12 }}>
        <div style={{ position: "relative" }}>
          <Search size={14} strokeWidth={2.4} style={{ position: "absolute", left: 10, top: "50%", transform: "translateY(-50%)", color: C.muted, pointerEvents: "none" }} />

        </label>

        {glossaries.map((g) => (
          <span key={g} style={{ display: "inline-flex", alignItems: "center", gap: 6, fontSize: 12, color: C.muted }}>
            <span style={{ width: 11, height: 11, borderRadius: 9, background: ghex(g), display: "inline-block" }} /> {short(g)}
          </span>
        ))}
      </div>
      {links.length === 0 ? (
        <div style={{ background: C.panel, border: "1px solid " + C.line, borderRadius: 14, padding: 26, color: C.muted, fontSize: 14 }}>

        </div>
      ) : (
        <div style={{ background: C.panel, border: "1px solid " + C.line, borderRadius: 16, overflow: "hidden" }}>

            onMouseMove={onMove} onMouseUp={onUp} onMouseLeave={onUp} onClick={() => setSel(null)}>
            {(() => {
              // One label per unordered pair (reciprocal / multi-predicate edges otherwise
              // overprint into unreadable text).
              const pairPreds = {}, pairFirst = {};
              links.forEach((e, i) => {
                const key = e.source < e.target ? e.source + "\u0000" + e.target : e.target + "\u0000" + e.source;
                if (pairFirst[key] == null) pairFirst[key] = i;
                const lab = String(e.pred || "").trim();
                if (lab) { pairPreds[key] = pairPreds[key] || []; if (!pairPreds[key].includes(lab)) pairPreds[key].push(lab); }
              });
              return links.map((e, i) => {
                const a = pos[nodeIndex[e.source]], b = pos[nodeIndex[e.target]]; if (!a || !b) return null;
                const on = lit && lit.has(e.source) && lit.has(e.target) && (e.source === focus || e.target === focus);
                const dim = (lit && !on) || (matched && !(matched.has(e.source) || matched.has(e.target)));
                const key = e.source < e.target ? e.source + "\u0000" + e.target : e.target + "\u0000" + e.source;
                const labelText = (pairFirst[key] === i && pairPreds[key]) ? pairPreds[key].join(" \u00B7 ") : "";
                const showLabel = showPred && labelText && !dim && (focus ? on : links.length <= 80);
                const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
                let ang = Math.atan2(b.y - a.y, b.x - a.x) * 180 / Math.PI; if (ang > 90) ang -= 180; if (ang < -90) ang += 180;
                return (
                  <g key={i} opacity={dim ? 0.08 : 1}>
                    <line x1={a.x} y1={a.y} x2={b.x} y2={b.y} stroke={on ? C.teal : "#c6bda9"} strokeWidth={on ? 2.2 : Math.min(3, Math.sqrt(e.w || 1))} opacity={dim ? 1 : 0.5} />
                    {showLabel ? (
                      <text x={mx} y={my} transform={`rotate(${ang} ${mx} ${my})`} textAnchor="middle" dy={-3}
                        fontFamily={FONT_MONO} fontSize={on ? "10.5" : "9.5"} fill={on ? C.tealDeep : "#8a8472"}
                        style={{ fontStyle: "italic", paintOrder: "stroke", stroke: "#f4efe4", strokeWidth: 4, strokeLinejoin: "round", pointerEvents: "none" }}>{labelText}</text>
                    ) : null}
                  </g>
                );
              });
            })()}
            {nodes.map((nd, i) => {
              const p = pos[i]; if (!p) return null;
              const r = 5 + Math.sqrt(nd.deg || 0) * 1.7;
              const isFocus = focus === nd.id;
              const dim = (lit && !lit.has(nd.id)) || (matched && !matched.has(nd.id));
              const showLabel = isFocus || (matched && matched.has(nd.id)) || (!ql && !lit && (nd.deg || 0) >= 5) || (lit && lit.has(nd.id));
              return (
                <g key={i} transform={`translate(${p.x},${p.y})`} opacity={dim ? 0.16 : 1} style={{ cursor: "pointer" }}
                  onMouseEnter={() => setHover(nd.id)} onMouseLeave={() => setHover(null)}
                  onMouseDown={(e) => { e.preventDefault(); dragRef.current = i; }}
                  onClick={(e) => { e.stopPropagation(); if (dragRef.current == null) { setSel(nd.id); onOpen(nd.id); } }}>
                  <circle r={r + (isFocus ? 3 : 0)} fill={ghex(nd.glossary)} stroke="#fff" strokeWidth={1.4} />
                  {showLabel && <text x={r + 3} y={3.5} fontFamily={FONT_UI} fontWeight={isFocus ? 700 : 600} fontSize={isFocus ? 12.5 : 10.5} fill={C.ink} style={{ pointerEvents: "none", paintOrder: "stroke", stroke: "#f3efe6", strokeWidth: 3 }}>{nd.id}</text>}
                </g>
              );
            })}
          </svg>
        </div>
      )}
      {focus && an.byTerm[focus] && (
        <div style={{ marginTop: 12, fontSize: 13, color: C.muted }}>
          <b style={{ color: C.ink }}>{focus}</b> · {short(an.byTerm[focus].glossary)} · {an.byTerm[focus].type || "—"} — click to open it.
          {(() => {
            const rels = links.filter((l) => (l.source === focus || l.target === focus) && l.pred).slice(0, 10);
            if (!rels.length) return null;
            return (
              <div style={{ display: "flex", flexWrap: "wrap", gap: 7, marginTop: 8 }}>
                {rels.map((l, i) => {
                  const out = l.source === focus;
                  return (
                    <span key={i} style={{ display: "inline-flex", alignItems: "center", gap: 5, fontSize: 12, background: C.panel, border: "1px solid " + C.line, borderRadius: 999, padding: "3px 10px" }}>
                      <span style={{ color: C.ink, fontWeight: 600 }}>{out ? focus : l.source}</span>
                      <span style={{ color: C.teal, fontFamily: FONT_MONO, fontStyle: "italic" }}>{l.pred}</span>
                      <span style={{ color: C.ink, fontWeight: 600 }}>{out ? l.target : focus}</span>
                    </span>
                  );
                })}
              </div>
            );
          })()}
        </div>
      )}
    </div>
  );
}

const QUANT_CLASS_FACET = {

const Q6_ORDER = ["Who", "What", "When", "Where", "Why", "How"];
const QUANT_TYPES = ["Abbreviation", "Acronym", "Code", "Definition", "Description", "Flag", "Identifier", "Instruction", "Name", "Phrase", "Term", "Value"];
const QUANT_LEVELS = ["Business Concept", "Metadata", "Instance Data"];

const QUANT_EDGES = [
  ["IS-HAS", "An unspecified or transient relationship"],

  ["IS-PRECEDENT-HAS", "A temporal / sequential relationship"],
  ["IS-PROPERTY-HAS", "A characteristic or attribute relationship"],
  ["IS-EQUIVALENT-HAS", "Semantically the same but structurally different"],

// Quant Edge is now multi-valued: a "; "-joined subset of the 6 fixed edges.
const QE_ORDER = QUANT_EDGES.map((e) => e[0]);
const QE_SHORT = { "IS-HAS": "HAS", "IS-MEMBER-HAS": "MEMBER", "IS-PART-HAS": "PART", "IS-PRECEDENT-HAS": "PRECEDENT", "IS-PROPERTY-HAS": "PROPERTY", "IS-EQUIVALENT-HAS": "EQUIV" };
const QE_MEANING = Object.fromEntries(QUANT_EDGES);
function qeParse(v) { return String(v == null ? "" : v).split(/;\s*/).map((s) => s.trim()).filter(Boolean); }
